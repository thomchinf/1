runtime:
  output_dir: output
  log_dir: logs
  temp_dir: output/.tmp
  request_timeout_seconds: 20
  image_download_timeout_seconds: 20
  retries: 3
  max_workers: 10
  article_limit_per_source: 10
  max_articles_for_analysis: 40
  min_items_for_section_analysis: 2
  max_items_per_section: 5
  recent_hours: 168
  start_date:
  end_date:
  keep_temp_images: false
  document_name_template: "每日AI资讯_{timestamp}.docx"
  filename_time_format: "%Y%m%d_%H%M"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0 Safari/537.36"

schedule:
  daily_time: "09:00"

summary:
  min_chars: 100
  max_chars: 300

quality:
  min_score: 68

llm:
  enabled: true
  provider: qwen
  model: qwen-turbo
  api_key_env: DASHSCOPE_API_KEY
  temperature: 0.2
  top_p: 0.8
  max_workers: 5

document:
  title: "每日AI资讯摘编"
  subtitle_prefix: "内部参考"
  title_font: "方正小标宋_GBK"
  heading_font: "黑体"
  body_font: "仿宋_GB2312"
  emphasis_font: "楷体_GB2312"
  title_size_pt: 22
  heading_size_pt: 16
  body_size_pt: 14
  caption_size_pt: 11
  line_spacing_pt: 28
  image_width_inches: 5.8
  include_url: true
  sections:
    - key: ai_application
      label: "一、AI应用"
    - key: ai_model
      label: "二、AI模型"
    - key: ai_safety
      label: "三、AI安全"
    - key: ai_investment
      label: "四、AI投融资"
    - key: research_paper
      label: "五、最新研究论文"

filtering:
  include_keywords:
    - AI
    - 人工智能
    - 大模型
    - 生成式AI
    - 机器学习
    - 多模态
    - 智能体
    - Agent
    - LLM
    - GPT
    - Claude
    - Gemini
    - Qwen
    - DeepSeek
    - inference
    - reasoning
    - open source model
    - foundation model
    - machine learning
    - artificial intelligence
  exclude_keywords:
    - 招聘
    - 课程
    - 培训
    - 广告
    - 软文
    - 直播报名
    - 活动回顾
    - 报名入口
    - 促销
    - 自媒体运营
    - 带货
    - 返佣
    - 加群
    - 微信咨询
    - 股票荐股
    - 娱乐八卦
  category_keywords:
    ai_application:
      - 应用
      - 落地
      - 行业
      - 医疗
      - 教育
      - 金融
      - 工业
      - 消费
      - 企业服务
      - workflow
      - assistant
      - productivity
      - deployment
      - real-world
      - enterprise
    ai_model:
      - 模型
      - 开源
      - 权重
      - benchmark
      - inference
      - reasoning
      - multimodal
      - agent model
      - GPT
      - Claude
      - Qwen
      - Gemini
      - Grok
      - DeepSeek
      - Llama
      - transformer
    ai_safety:
      - 安全
      - 伦理
      - 风险
      - 数据安全
      - policy
      - regulation
      - security
      - safety
      - misuse
      - jailbreak
      - leakage
      - guardrail
    ai_investment:
      - 融资
      - 并购
      - 收购
      - 上市
      - 估值
      - 投资
      - funding
      - acquisition
      - valuation
      - series a
      - series b
      - seed
      - ipo
    research_paper:
      - arxiv
      - 论文
      - paper
      - neurips
      - icml
      - cvpr
      - iclr
      - aaai
      - acl
      - emnlp
