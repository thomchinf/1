      async render(scoredVenues, currentPick) {
        const map = document.querySelector('[data-map-view="true"]');
        if (!map || !scoredVenues.length) return;
        try {
          const mapItems = await this.resolveMapItems(scoredVenues, currentPick);
          if (!mapItems.length) return;
          const bounds = this.getBounds(mapItems);
          map.classList.add('is-live');
          map.insertAdjacentHTML('afterbegin', `
            <iframe class="map-frame" title="场地地图" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="${UI.escape(this.buildMapUrl(bounds))}"></iframe>
            <span class="map-credit">OpenStreetMap</span>

          this.positionPins(mapItems, bounds);
        } catch (error) {
          map.classList.remove('is-live');
        }

      async resolveMapItems(scoredVenues, currentPick) {
        const items = [];
        const originQuery = currentPick.userLocation ? `${currentPick.userLocation}` : '';
        const origin = originQuery ? await GeoService.geocode(originQuery) : null;
        if (origin) items.push({ ...origin, type: 'origin', id: 'origin', name: currentPick.userLocation || origin.name || '出发点' });
        for (const item of scoredVenues) {
          const venue = item.venue;
          const query = [venue.address, venue.name].filter(Boolean).join(' ');
          const point = query ? await GeoService.geocode(query) : null;
          if (point) items.push({ type: 'venue', id: venue.id, name: venue.name, ...point });
        }
        return items;
      },

      getBounds(items) {
        const lats = items.map((item) => item.lat);
        const lons = items.map((item) => item.lon);
        let minLat = Math.min(...lats);
        let maxLat = Math.max(...lats);
        let minLon = Math.min(...lons);
        let maxLon = Math.max(...lons);
        const latPad = Math.max((maxLat - minLat) * 0.28, 0.01);
        const lonPad = Math.max((maxLon - minLon) * 0.28, 0.01);
        minLat -= latPad;
        maxLat += latPad;
        minLon -= lonPad;
        maxLon += lonPad;
        return { minLat, maxLat, minLon, maxLon };
      },

      buildMapUrl(bounds) {
        const bbox = [
          bounds.minLon.toFixed(6),
          bounds.minLat.toFixed(6),
          bounds.maxLon.toFixed(6),
          bounds.maxLat.toFixed(6)
        ].join(',');
        return `https://www.openstreetmap.org/export/embed.html?bbox=${encodeURIComponent(bbox)}&layer=mapnik`;
      },

      positionPins(items, bounds) {
        items.forEach((item) => {
          const position = this.project(item, bounds);
          if (item.type === 'origin') {
            this.setPosition(document.querySelector('.map-pin.is-origin'), position);
            const originLabel = document.querySelector('[data-map-view="true"] > .map-label:not([data-map-label-id])');
            if (originLabel) originLabel.textContent = item.name;
            this.setPosition(originLabel, {
              x: position.x,
              y: Math.max(8, position.y - 10)
            });
            return;
          }
          const safeId = this.escapeSelector(item.id);
          this.setPosition(document.querySelector(`[data-map-venue-id="${safeId}"]`), position);
          this.setPosition(document.querySelector(`[data-map-label-id="${safeId}"]`), {
            x: position.x,
            y: Math.max(8, position.y - 10)
          });
        });
      },

      project(item, bounds) {
        const x = ((item.lon - bounds.minLon) / (bounds.maxLon - bounds.minLon)) * 100;
        const y = (1 - ((item.lat - bounds.minLat) / (bounds.maxLat - bounds.minLat))) * 100;
        return {
          x: Math.max(8, Math.min(92, x)),
          y: Math.max(12, Math.min(88, y))
        };
      },

      setPosition(element, position) {
        if (!element) return;
        element.style.setProperty('--x', `${position.x}%`);
        element.style.setProperty('--y', `${position.y}%`);
      },

      escapeSelector(value) {
        if (window.CSS?.escape) return window.CSS.escape(value);
        return String(value).replace(/["\\]/g, '\\$&');
      }
    };

      async extractVenueInfo(payload) {
        console.info('[PickPick] backend extract start', {
          configured: this.isConfigured(),
          endpoint: this.endpoint,
          context: payload.context,
          channel: payload.channel,
          textLength: String(payload.rawText || '').length,

        });

          };

        try {
          const response = await fetch(this.endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              type: 'extract',
              channel: payload.channel,
              text: payload.rawText,

            })
          });
          console.info('[PickPick] backend extract response', {
            ok: response.ok,

            url: response.url
          });
          if (!response.ok) throw new Error(`extract failed: ${response.status}`);
          const data = await response.json();

            console.info('[PickPick] backend extract fallback', {
              reason: 'remote empty',
              context: payload.context,
              channel: payload.channel
            });
            return {
              source: 'remote-empty',
              venue: AIExtractor.extractVenue(payload.rawText)
            };

        } catch (error) {

      },

      extractFirstUrl(value) {

      normalizeVenue(data = {}) {
        const source = data.data?.venue || data.data || data.venue || data;
        return {
          name: source.name || source.title || '',
          address: source.address || source.location || '',
          hours: source.hours || source.openingHours || source.time || '',
          price: {
            amount: Number(source.price?.amount ?? source.priceAmount ?? source.price) || 0,
            unit: source.price?.unit || source.priceUnit || '日'
          },
          tags: Array.isArray(source.tags) ? source.tags : [],
          customTags: Array.isArray(source.customTags) ? source.customTags : [],
          menuInfo: source.menuInfo || source.menu || '',
          membershipInfo: source.membershipInfo || source.cardInfo || source.membership || '',
          notes: source.notes || source.description || '',
          sceneType: source.sceneType || source.type || ''
        };

    const AIExtractor = {
      extractVenue(rawText) {
        const text = this.normalizeText(rawText);
        const lines = text.split(/\n+/).map((line) => line.trim()).filter(Boolean);
        const name = this.extractName(lines);
        return {
          id: StarManager.createId('v'),
          name,
          address: this.extractAddress(lines),
          hours: this.extractHours(text, lines),
          price: this.extractPrice(text),
          tags: this.extractTags(text),
          customTags: this.extractCustomTags(text),
          menuInfo: this.extractMenuInfo(lines),
          membershipInfo: this.extractMembershipInfo(lines),
          notes: text,
          images: [],
          visitCount: 0,
          createdAt: new Date().toISOString().slice(0, 10),
          sceneType: this.extractSceneType(text)
        };
      },

      applyToVenue(venue, rawText, extractedVenue = null) {
        const extracted = extractedVenue || this.extractVenue(rawText);
        const nextVenue = { ...venue };
        const mergeText = (field) => {
          if (extracted[field] && !nextVenue[field]) nextVenue[field] = extracted[field];
        };
        mergeText('address');
        mergeText('hours');
        mergeText('menuInfo');
        mergeText('membershipInfo');
        if (extracted.notes && !nextVenue.notes) nextVenue.notes = extracted.notes;
        if (!Number(nextVenue.price?.amount) && Number(extracted.price?.amount)) {
          nextVenue.price = extracted.price;
        }
        nextVenue.tags = [...new Set([...(nextVenue.tags || []), ...(extracted.tags || [])])];
        nextVenue.customTags = [...new Set([...(nextVenue.customTags || []), ...(extracted.customTags || [])])];
        if ((!nextVenue.sceneType || nextVenue.sceneType === '其他') && extracted.sceneType) {
          nextVenue.sceneType = extracted.sceneType;
        }
        return nextVenue;
      },

      saveExtractedVenue(venue, rawText, venues = Storage.loadVenues(), extractedVenue = null) {
        const nextVenue = this.applyToVenue(venue, rawText, extractedVenue);
        const changedFields = this.getChangedFields(venue, nextVenue);
        if (changedFields.length) {
          Storage.saveVenues(venues.map((item) => (item.id === venue.id ? nextVenue : item)));
        }
        return changedFields;
      },

      getChangedFields(before, after) {
        const fields = [
          ['address', '位置'],
          ['hours', '时间'],
          ['price', '价格'],
          ['tags', '标签'],
          ['customTags', '自定义标签'],
          ['menuInfo', '菜单'],
          ['membershipInfo', '办卡'],
          ['notes', '备注'],
          ['sceneType', '场景']
        ];
        return fields
          .filter(([field]) => JSON.stringify(before[field] || '') !== JSON.stringify(after[field] || ''))
          .map(([, label]) => label);
      },

      getExtractionStatus(rawText, changedFields) {
        if (changedFields.length) return `已保存并提取：${changedFields.join('、')}`;
        return this.isLinkOnly(rawText)
          ? '链接已保存。单独链接无法在本地提取字段，请粘贴页面复制文字。'
          : '信息已保存，未识别到可填字段。';
      },

      isLinkOnly(rawText) {
        const text = String(rawText || '').trim();
        if (!text) return false;
        const withoutUrls = text.replace(/https?:\/\/\S+/g, '').trim();
        return !withoutUrls || withoutUrls.length < 8;
      },

      normalizeText(rawText) {
        return String(rawText || '')
          .replace(/\r/g, '\n')
          .replace(/https?:\/\/\S+/g, '')
          .replace(/[ \t]+/g, ' ')
          .trim();
      },

      extractName(lines) {
        const line = lines.find((item) => !/链接|地址|营业|时间|价格|电话|导航|收藏|团购/.test(item));
        return line?.replace(/^[#【\[]|[】\]#]$/g, '').trim() || '未命名场地';
      },

      extractAddress(lines) {
        const addressLine = lines.find((line) => /^(地址|位置|导航|门店地址)[:：\s]/.test(line))
          || lines.find((line) => /(区|县|路|街|道|号|大学|广场|中心|商场)/.test(line));
        if (!addressLine) return '';
        return addressLine
          .replace(/^(地址|位置|导航|门店地址)[:：\s]*/, '')
          .replace(/(查看地图|导航|复制地址).*$/, '')
          .trim();
      },

      extractHours(text, lines) {
        const hourLine = lines.find((line) => /(营业|时间|开放|周一|周二|周三|周四|周五|周六|周日|\d{1,2}[:：]\d{2})/.test(line));
        if (!hourLine) return '';
        const range = hourLine.match(/(\d{1,2}[:：]\d{2})\s*[-~—至到]\s*(\d{1,2}[:：]\d{2})/);
        if (range) return `${range[1].replace('：', ':')}-${range[2].replace('：', ':')}`;
        const times = text.match(/\d{1,2}[:：]\d{2}/g);
        return times?.length >= 2 ? `${times[0].replace('：', ':')}-${times[1].replace('：', ':')}` : hourLine.trim();
      },

      extractPrice(text) {
        const priceMatch = text.match(/(?:日卡|单日|全天|人均|价格|￥|¥)?\s*(\d{1,4})\s*元\s*\/?\s*(日|天|时|小时|杯|次)?/);
        if (!priceMatch) return { amount: 0, unit: '日' };
        const unitMap = { 天: '日', 小时: '时' };
        return {
          amount: Number(priceMatch[1]) || 0,
          unit: unitMap[priceMatch[2]] || priceMatch[2] || '日'
        };
      },

      extractTags(text) {
        const tags = DEFAULT_FILTERS.filter((tag) => text.includes(tag.replace(/^有/, '')) || text.includes(tag));
        if (/插座|充电/.test(text)) tags.push('有插座');
        if (/安静|自习|学习|办公/.test(text)) tags.push('安静');
        if (/窗|采光|阳光/.test(text)) tags.push('靠窗');
        if (/大桌|长桌|桌子大/.test(text)) tags.push('大桌子');
        if (/咖啡|拿铁|美式/.test(text)) tags.push('有咖啡');
        if (/22[:：]?00|23[:：]?00|24[:：]?00|通宵|深夜/.test(text)) tags.push('22点后营业');
        return [...new Set(tags)];
      },

      extractCustomTags(text) {
        const tags = [];
        if (/椅子|座椅|沙发/.test(text)) tags.push('椅子舒服');
        if (/停车|车位/.test(text)) tags.push('可停车');
        if (/地铁|公交/.test(text)) tags.push('交通方便');
        if (/包间|独立/.test(text)) tags.push('有独立空间');
        return tags;
      },

      extractMenuInfo(lines) {
        const menuLines = lines.filter((line) => /(美式|拿铁|咖啡|饮品|茶|轻食|甜品|餐|菜单|元\/杯)/.test(line));
        return menuLines.slice(0, 4).join('；');
      },

      extractMembershipInfo(lines) {
        const memberLines = lines.filter((line) => /(会员|办卡|月卡|周卡|日卡|次卡|充值|套餐)/.test(line));
        return memberLines.slice(0, 4).join('；');
      },

      extractSceneType(text) {
        if (/咖啡|拿铁|美式|饮品/.test(text)) return '咖啡馆';
        if (/自习|学习|书房|工位|办公/.test(text)) return '自习室';
        return '其他';
      }
    };

      renderToolRow(record) {
        const disabledClass = record ? '' : ' is-disabled';
        const disabledAttr = record ? '' : 'aria-disabled="true"';
        return `
          <section class="my-tool-row" aria-label="记录工具">
            <button class="my-tool-btn" type="button" data-history-action="create-record" aria-label="新增记录">⊕</button>
            <label class="my-tool-btn${disabledClass}" ${disabledAttr} aria-label="上传照片">
              ⌾
              ${record ? `<input type="file" accept="image/*" multiple data-history-photo="upload" data-id="${record.id}">` : ''}
            </label>
            <button class="my-tool-btn${disabledClass}" type="button" data-history-action="focus-note" ${record ? '' : 'disabled'} aria-label="编辑备注">♧</button>
            <button class="my-tool-btn${disabledClass}" type="button" data-history-action="remove-record" ${record ? '' : 'disabled'} aria-label="删除记录">♜</button>
            <button class="my-tool-btn${disabledClass}" type="button" data-history-action="remove-photo" data-id="${record?.id || ''}" data-index="${Math.max(0, (record?.photos || []).length - 1)}" ${(record?.photos || []).length ? '' : 'disabled'} aria-label="删除照片">⊖</button>
          </section>
        `;
      },

      renderEmptyBook(activeDate) {
        return `
          <section class="record-book">
            <article class="record-card">
              <div class="record-meta">
                <h3>${UI.escape(activeDate)}</h3>
                <p>暂无记录，点击日期或左侧加号创建记录。</p>
              </div>
            </article>
          </section>
        `;
      },

      renderRecordBook(history) {
        const record = history[this.activeRecordIndex] || history[0];
        const venue = this.getPrimaryVenue(record);
        const venueNames = this.getRecordVenueNames(record);
        const conditions = record.filterConditions || [];
        return `
          <section class="record-book" aria-label="记录本">
            <article class="record-card">
              <div class="record-meta">
                <h3>${UI.escape(venue?.name || '未命名记录')}</h3>
                <p>${UI.escape(this.formatShortDate(record.date))} · ${UI.escape(record.userLocation || '-')} · ${UI.escape(this.getRecordTime(record) || '-')}</p>
                <p>场地：${UI.escape(venueNames || '-')}</p>
              </div>
              <div class="record-tags">
                ${conditions.length ? conditions.map((condition) => `<span class="tag is-primary">${UI.escape(condition)}</span>`).join('') : '<span class="tag">-</span>'}
              </div>
              <textarea class="record-note" data-history-field="notes" data-id="${record.id}" placeholder="写下这次选择的体验">${UI.escape(record.notes || '')}</textarea>
              <div class="photo-stack">
                ${this.renderPhotos(record)}
              </div>
              <span class="record-page-count">${this.activeRecordIndex + 1}/${history.length}</span>
            </article>
          </section>
        `;
      },

      renderPhotos(record) {
        const photos = record.photos || [];
        if (!photos.length) return '<div class="photo-empty">照片位置</div>';
        return photos.map((photo, index) => `
          <div class="photo-thumb">
            <img src="${UI.escape(photo)}" alt="记录照片 ${index + 1}">
            <button type="button" data-history-action="remove-photo" data-id="${record.id}" data-index="${index}" aria-label="删除照片">×</button>
          </div>
        `).join('');
      },

      handleClick(event) {
        const trigger = event.target.closest('[data-history-action]');
        if (!trigger) return;
        const action = trigger.dataset.historyAction;
        if (action === 'select-record') {
          if (this.calendarLongPress.triggered && trigger.dataset.date === this.calendarLongPress.date) {
            this.calendarLongPress.triggered = false;
            return;
          }
          this.selectRecord(trigger.dataset.index, trigger.dataset.date);
          return;
        }
        if (action === 'create-record') {
          this.createRecordForDate(this.activeDate || this.formatDateValue(new Date()));
          return;
        }
        if (action === 'focus-note') {
          document.querySelector('.record-note')?.focus();
          return;
        }
        if (action === 'remove-record') {
          this.removeActiveRecord();
          return;
        }
        if (action === 'remove-photo') {
          this.removePhoto(trigger.dataset.id, Number(trigger.dataset.index));
        }
      },

      handleInput(event) {
        if (event.target.dataset.historyField !== 'notes') return;
        this.saveRecordPatch(event.target.dataset.id, { notes: event.target.value }, false);
      },

      handleChange(event) {
        const datePart = event.target.dataset.historyDatePart;
        if (datePart) {
          this.setDatePart(datePart, event.target.value);
          return;
        }
        const photoInput = event.target.dataset.historyPhoto;
        if (!photoInput) return;
        const files = Array.from(event.target.files || []);
        if (photoInput === 'calendar-upload') {
          this.handleCalendarPhotoUpload(files);
        } else {
          this.handlePhotoUpload(event.target.dataset.id, files);
        }
        event.target.value = '';
      },

      handlePointerDown(event) {
        const calendarDay = event.target.closest('.calendar-day:not(.is-empty)');
        if (calendarDay) {
          this.startCalendarLongPress(event, calendarDay);
        }
        const recordBook = event.target.closest('.record-book');
        if (recordBook && !event.target.closest('textarea, input, button, label')) {
          this.startBookDrag(event, recordBook);
        }
      },

      handlePointerMove(event) {
        this.moveCalendarLongPress(event);
        this.moveBookDrag(event);
      },

      handlePointerUp() {
        this.endCalendarLongPress();
        this.endBookDrag();
      },

      handlePointerCancel() {
        this.cancelCalendarLongPress();
        this.cancelBookDrag();
      },

      selectRecord(indexValue, dateValue) {
        if (dateValue) this.activeDate = dateValue;
        if (indexValue !== '') {
          this.activeRecordIndex = Number(indexValue);
          this.render();
          return;
        }
        if (dateValue) this.createRecordForDate(dateValue);
      },

      setDatePart(part, value) {
        const selected = this.parseDateValue(this.activeDate || this.formatDateValue(new Date()));
        const year = part === 'year' ? Number(value) : selected.getFullYear();
        const month = part === 'month' ? Number(value) - 1 : selected.getMonth();
        const maxDay = new Date(year, month + 1, 0).getDate();
        const day = Math.min(selected.getDate(), maxDay);
        this.activeDate = this.formatDateValue(new Date(year, month, day));
        const history = this.getSortedHistory();
        const recordIndex = history.findIndex((record) => record.date === this.activeDate);
        if (recordIndex >= 0) this.activeRecordIndex = recordIndex;
        this.render();
      },

      getYearOptions(selectedYear) {
        const thisYear = new Date().getFullYear();
        const years = new Set([selectedYear]);
        for (let year = thisYear - 1; year <= thisYear + 2; year += 1) years.add(year);
        return [...years].sort((left, right) => left - right);
      },

      parseDateValue(value) {
        const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!match) return new Date();
        const date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
        return Number.isNaN(date.getTime()) ? new Date() : date;
      },

      startCalendarLongPress(event, dayButton) {
        this.cancelCalendarLongPress();
        const date = dayButton.dataset.date || '';
        this.calendarLongPress = {
          timer: window.setTimeout(() => {
            this.calendarLongPress.triggered = true;
          }, 560),
          date,
          moved: false,
          startX: event.clientX,
          startY: event.clientY,
          triggered: false
        };
      },

      moveCalendarLongPress(event) {
        if (!this.calendarLongPress.timer) return;
        const movedX = Math.abs(event.clientX - this.calendarLongPress.startX);
        const movedY = Math.abs(event.clientY - this.calendarLongPress.startY);
        if (movedX > 10 || movedY > 10) this.cancelCalendarLongPress();
      },

      endCalendarLongPress() {
        const shouldUpload = this.calendarLongPress.triggered && this.calendarLongPress.date;
        if (this.calendarLongPress.timer) {
          window.clearTimeout(this.calendarLongPress.timer);
          this.calendarLongPress.timer = null;
        }
        if (shouldUpload) this.prepareCalendarUpload(this.calendarLongPress.date);
      },

      cancelCalendarLongPress() {
        if (this.calendarLongPress.timer) window.clearTimeout(this.calendarLongPress.timer);
        this.calendarLongPress.timer = null;
      },

      prepareCalendarUpload(date) {
        this.activeDate = date;
        this.pendingPhotoDate = date;
        const existingRecord = this.getSortedHistory().find((record) => record.date === date);
        this.pendingPhotoRecordId = existingRecord?.id || '';
        const input = document.getElementById('calendar-upload-input');
        input?.click();
      },

      handleCalendarPhotoUpload(files) {
        const recordId = this.pendingPhotoRecordId;
        const date = this.pendingPhotoDate;
        this.pendingPhotoRecordId = '';
        this.pendingPhotoDate = '';
        if (!files.length || !date) return;
        const record = recordId
          ? this.getSortedHistory().find((item) => item.id === recordId)
          : this.ensureRecordForDate(date, false);
        if (!record) return;
        this.handlePhotoUpload(record.id, files);
      },

      ensureRecordForDate(date, shouldRender = true) {
        const sortedHistory = this.getSortedHistory();
        const existingIndex = sortedHistory.findIndex((record) => record.date === date);
        if (existingIndex >= 0) {
          this.activeRecordIndex = existingIndex;
          this.activeDate = date;
          if (shouldRender) this.render();
          return sortedHistory[existingIndex];
        }
        const record = {
          id: StarManager.createId('cr'),
          date,
          userLocation: '',
          weather: '',
          venueIds: [],
          chosenVenueId: '',
          filterConditions: [],
          notes: '',
          photos: []
        };
        const history = Storage.loadHistory();
        if (!Storage.saveHistory([record, ...history])) return null;
        this.activeRecordIndex = this.getSortedHistory().findIndex((item) => item.id === record.id);
        if (this.activeRecordIndex < 0) this.activeRecordIndex = 0;
        this.activeDate = date;
        if (shouldRender) this.render();
        return record;
      },

      startBookDrag(event, recordBook) {
        const card = recordBook.querySelector('.record-card');
        this.bookDrag = {
          active: true,
          startX: event.clientX,
          lastX: event.clientX,
          moved: false,
          card
        };
        recordBook.classList.add('is-dragging');
        recordBook.setPointerCapture?.(event.pointerId);
      },

      moveBookDrag(event) {
        if (!this.bookDrag.active) return;
        const deltaX = event.clientX - this.bookDrag.startX;
        this.bookDrag.lastX = event.clientX;
        if (Math.abs(deltaX) > 18) this.bookDrag.moved = true;
        if (this.bookDrag.card) {
          const clampedDelta = Math.max(-96, Math.min(96, deltaX));
          this.bookDrag.card.style.transform = `translateX(${clampedDelta}px)`;
        }
      },

      endBookDrag() {
        const recordBook = document.querySelector('.record-book');
        if (recordBook) recordBook.classList.remove('is-dragging');
        if (!this.bookDrag.active) return;
        const deltaX = this.bookDrag.lastX - this.bookDrag.startX;
        if (this.bookDrag.card) this.bookDrag.card.style.transform = 'translateX(0)';
        if (this.bookDrag.moved && Math.abs(deltaX) > 52) {
          this.changeRecord(deltaX < 0 ? 1 : -1);
        }
        this.bookDrag.active = false;
      },

      cancelBookDrag() {
        const recordBook = document.querySelector('.record-book');
        if (recordBook) recordBook.classList.remove('is-dragging');
        if (this.bookDrag.card) this.bookDrag.card.style.transform = 'translateX(0)';
        this.bookDrag.active = false;
      },

      changeRecord(direction) {
        const history = this.getSortedHistory();
        if (!history.length) return;
        const nextIndex = Math.max(0, Math.min(history.length - 1, this.activeRecordIndex + direction));
        if (nextIndex === this.activeRecordIndex) return;
        this.activeRecordIndex = nextIndex;
        this.activeDate = history[nextIndex]?.date || this.activeDate;
        this.render();
      },

      createRecordForDate(date) {
        const beforeCount = Storage.loadHistory().length;
        const record = this.ensureRecordForDate(date);
        if (!record) return;
        if (Storage.loadHistory().length > beforeCount) {
          UI.showStatus('已创建当天记录，可以上传照片或写备注。', 'success');
        }
      },

      saveRecordPatch(recordId, patch, shouldRender = true) {
        const history = Storage.loadHistory();
        const nextHistory = history.map((record) => (
          record.id === recordId ? { ...record, ...patch } : record
        ));
        const saved = Storage.saveHistory(nextHistory);
        if (!saved) return false;
        if (shouldRender) this.render();
        return true;
      },

      async handlePhotoUpload(recordId, files) {
        if (!files.length) return;
        const imageFiles = files.filter((file) => file.type.startsWith('image/'));
        if (!imageFiles.length) {
          UI.showStatus('请选择图片文件。');
          return;
        }
        try {
          const compressedPhotos = await Promise.all(imageFiles.map((file) => this.compressImage(file)));
          const history = Storage.loadHistory();
          const nextHistory = history.map((record) => {
            if (record.id !== recordId) return record;
            return { ...record, photos: [...(record.photos || []), ...compressedPhotos] };
          });
          if (!Storage.saveHistory(nextHistory)) return;
          UI.showStatus('照片已保存。', 'success');
          this.render();
        } catch (error) {
          UI.showStatus('图片处理失败，请换一张图片重试。');
        }
      },

      compressImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = () => reject(new Error('read failed'));
          reader.onload = () => {
            const image = new Image();
            image.onerror = () => reject(new Error('image failed'));
            image.onload = () => {
              const maxSize = 1200;
              const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
              const canvas = document.createElement('canvas');
              canvas.width = Math.max(1, Math.round(image.width * scale));
              canvas.height = Math.max(1, Math.round(image.height * scale));
              const context = canvas.getContext('2d');
              context.drawImage(image, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL('image/jpeg', 0.72));
            };
            image.src = reader.result;
          };
          reader.readAsDataURL(file);
        });
      },

      removeActiveRecord() {
        const history = this.getSortedHistory();
        const record = history[this.activeRecordIndex];
        if (!record) return;
        const nextHistory = Storage.loadHistory().filter((item) => item.id !== record.id);
        if (!Storage.saveHistory(nextHistory)) return;
        const nextSorted = this.getSortedHistory();
        this.activeRecordIndex = Math.min(Math.max(0, this.activeRecordIndex - 1), Math.max(0, nextSorted.length - 1));
        this.activeDate = nextSorted[this.activeRecordIndex]?.date || this.formatDateValue(new Date());
        UI.showStatus('记录已删除。', 'success');
        this.render();
      },

      removePhoto(recordId, photoIndex) {
        const history = Storage.loadHistory();
        const nextHistory = history.map((record) => {
          if (record.id !== recordId) return record;
          return {
            ...record,
            photos: (record.photos || []).filter((_, index) => index !== photoIndex)
          };
        });
        if (!Storage.saveHistory(nextHistory)) return;
        UI.showStatus('照片已删除。', 'success');
        this.render();
      },

      getPrimaryVenue(record) {
        const venues = Storage.loadVenues();
        return venues.find((venue) => venue.id === record.chosenVenueId)
          || venues.find((venue) => venue.id === (record.venueIds || [])[0])
          || null;
      },

      getRecordTime(record) {
        const venue = this.getPrimaryVenue(record);
        return venue?.hours || '';
      },

      formatShortDate(date = '') {
        const parts = date.split('-');
        if (parts.length !== 3) return '-';
        return `${Number(parts[1])}.${Number(parts[2])}`;
      },

      getRecordVenueNames(record) {
        const venues = Storage.loadVenues();
        return (record.venueIds || [])
          .map((venueId) => venues.find((venue) => venue.id === venueId)?.name)
          .filter(Boolean)
          .join('、');
      },

      formatDateValue(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
