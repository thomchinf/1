      userLocation: '',
      weather: null,
      selectedVenueIds: [],
      filterConditions: ['有插座', '安静'],
      customConditions: [],
      copiedInfo: {},
      confirmedVenueIds: [],
      currentStep: 1,
      activeVenueIndex: 0,
      step2Completed: false
    };

    const DEFAULT_FILTERS = ['有插座', '安静', '靠窗', '大桌子', '22点后营业', '有咖啡'];

    const Storage = {
      keys: {
        venues: 'venues',
        history: 'history',
        currentPick: 'currentPick',
        seeded: 'pickpickSeeded'
      },

      init() {
        if (!this.read(this.keys.seeded, false)) {
          this.saveVenues(DEFAULT_VENUES);
          this.saveHistory(DEFAULT_HISTORY);
          this.saveCurrentPick(DEFAULT_CURRENT_PICK);
          this.write(this.keys.seeded, true);
        } else {
          this.migrateVenues();
          this.migrateCurrentPick();
        }
      },

      read(key, fallback) {
        try {
          const rawValue = window.localStorage.getItem(key);
          return rawValue ? JSON.parse(rawValue) : fallback;
        } catch (error) {
          UI.showStatus('读取本地数据失败，已使用默认数据。');
          return fallback;
        }
      },

      write(key, value) {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
          return true;
        } catch (error) {
          UI.showStatus('存储空间不足，请删除一些旧照片或浏览器数据后重试。');
          return false;
        }
      },

      loadVenues() {
        return this.read(this.keys.venues, []);
      },

      saveVenues(venues) {
        return this.write(this.keys.venues, venues);
      },

      migrateVenues() {
        const venues = this.loadVenues();
        let changed = false;
        const nextVenues = venues.map((venue) => {
          const defaultVenue = DEFAULT_VENUES.find((item) => item.id === venue.id);
          const nextVenue = { ...venue };
          if (typeof nextVenue.menuInfo === 'undefined') {
            nextVenue.menuInfo = defaultVenue?.menuInfo || '';
            changed = true;
          }
          if (typeof nextVenue.membershipInfo === 'undefined') {
            nextVenue.membershipInfo = defaultVenue?.membershipInfo || '';
            changed = true;
          }
          if (typeof nextVenue.channelLinks === 'undefined') {
            nextVenue.channelLinks = defaultVenue?.channelLinks || {};
            changed = true;
          }
          return nextVenue;
        });
        if (changed) this.saveVenues(nextVenues);
      },

      migrateCurrentPick() {
        const currentPick = this.loadCurrentPick();
        if (typeof currentPick.confirmedVenueIds !== 'undefined') return;
        this.saveCurrentPick({ ...DEFAULT_CURRENT_PICK, ...currentPick, confirmedVenueIds: [] });
      },

      loadHistory() {
        return this.read(this.keys.history, []);
      },

      saveHistory(history) {
        return this.write(this.keys.history, history);
      },

      loadCurrentPick() {
        return this.read(this.keys.currentPick, { ...DEFAULT_CURRENT_PICK });
      },

      saveCurrentPick(currentPick) {
        return this.write(this.keys.currentPick, currentPick);
      }
    };

    const App = {
      currentTab: 'star',

      init() {
        Storage.init();
        StarManager.init();
        PickManager.init();
        HistoryManager.init();
        this.bindNavigation();
        this.handleShareTarget();
        this.render();
        this.registerServiceWorker();
      },

      bindNavigation() {
        document.querySelectorAll('.tab-btn').forEach((button) => {
          button.addEventListener('click', () => {
            if (button.dataset.tab === 'pick') {
              PickManager.viewStep = 1;
              const currentPick = Storage.loadCurrentPick();
              if (currentPick.currentStep !== 1) {
                Storage.saveCurrentPick({ ...currentPick, currentStep: 1 });
              }
            }
            this.switchTab(button.dataset.tab);
          });
        });
      },

      switchTab(tabName) {
        this.currentTab = tabName;
        document.querySelectorAll('.tab-btn').forEach((button) => {
          button.classList.toggle('is-active', button.dataset.tab === tabName);
        });
        document.querySelectorAll('.tab-panel').forEach((panel) => {
          panel.classList.toggle('is-active', panel.id === `tab-${tabName}`);
        });
        this.render();
      },

      render() {
        StarManager.render();
        PickManager.render();
        HistoryManager.render();
      },

      handleShareTarget() {
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title')?.trim() || '';
        const text = params.get('text')?.trim() || '';
        const explicitUrl = params.get('url')?.trim() || '';
        const sharedText = [title, text, explicitUrl].filter(Boolean).join('\n');
        const url = explicitUrl || sharedText.match(/https?:\/\/\S+/)?.[0] || '';
        if (!title && !text && !url) return;

        const extractedVenue = AIExtractor.applyToVenue({
          id: StarManager.createId('v'),
          name: title || AIExtractor.extractName(AIExtractor.normalizeText(sharedText).split(/\n+/).map((line) => line.trim()).filter(Boolean)),
          address: '',
          hours: '',
          price: { amount: 0, unit: '日' },
          tags: [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: text || url || '',
          images: [],
          channelLinks: url ? { share: url } : {},
          visitCount: 0,
          createdAt: new Date().toISOString().slice(0, 10),
          sceneType: '其他',
          source: 'share',
          sourceUrl: url
        }, sharedText);

        StarManager.openStep12Draft(extractedVenue);
        UI.showStatus('已接收分享内容，请确认后保存到 Star 库。', 'success');
        try {
          window.history.replaceState({}, document.title, window.location.href.split('?')[0]);
        } catch (error) {}
      },

      registerServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    };

    const UI = {
      escape(value = '') {
        return String(value).replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[char]));
      },

      renderHeader(title, subtitle, actionHtml = '') {
        return `
          <header class="app-header">
            <div>
              <p class="eyebrow">PickPick</p>
              <h1 id="${title.id}">${title.text}</h1>
              ${subtitle ? `<p class="header-copy">${subtitle}</p>` : ''}
            </div>
            ${actionHtml}
          </header>
        `;
      },

      showStatus(message, type = 'error') {
        const status = document.getElementById('app-status');
        if (!status) return;
        status.textContent = message;
        status.className = `status-banner is-visible${type === 'success' ? ' is-success' : ''}`;
      },

      clearStatus() {
        const status = document.getElementById('app-status');
        if (!status) return;
        status.textContent = '';
        status.className = 'status-banner';
      },

      renderMetrics(metrics) {
        return `
          <div class="metric-grid">
            ${metrics.map((metric) => `
              <div class="metric">
                <span class="metric-value">${metric.value}</span>
                <span class="metric-label">${metric.label}</span>
              </div>
            `).join('')}
          </div>
        `;
      },

      renderTags(tags, primaryTags = []) {
        if (!tags.length) return '<p class="venue-meta">暂无标签</p>';
        return `
          <div class="tag-row">
            ${tags.map((tag) => `
              <span class="tag${primaryTags.includes(tag) ? ' is-primary' : ''}">${this.escape(tag)}</span>
            `).join('')}
          </div>
        `;
      },

      openModal(content) {
        const modal = document.getElementById('modal-container');
        modal.innerHTML = `
          <div class="modal-backdrop" data-action="close-modal"></div>
          <section class="modal-sheet" role="dialog" aria-modal="true">
            ${content}
          </section>
        `;
        modal.classList.add('is-open');
      },

      closeModal() {
        const modal = document.getElementById('modal-container');
        modal.classList.remove('is-open');
        modal.innerHTML = '';
      }
    };

    const StarManager = {
      query: '',
      viewStep: 1,
      activeVenueId: '',
      step12Draft: null,

      init() {
        document.getElementById('tab-star').addEventListener('click', (event) => this.handleClick(event));
        document.getElementById('tab-star').addEventListener('input', (event) => this.handleInput(event));
        document.getElementById('modal-container').addEventListener('click', (event) => this.handleModalClick(event));
        document.getElementById('modal-container').addEventListener('submit', (event) => this.handleSubmit(event));
      },

      render() {
        if (this.viewStep === 2) {
          this.renderStep12();
          return;
        }
        const venues = Storage.loadVenues();
        const selectedCount = Storage.loadCurrentPick().selectedVenueIds.length;
        document.getElementById('tab-star').innerHTML = `
          ${UI.renderHeader({ id: 'star-title', text: '收藏库' }, '先把候选自习室和咖啡馆沉淀成自己的地点库。', '<button class="icon-btn" type="button" data-action="new-venue" aria-label="添加地点">+</button>')}
          <section class="panel">
            ${UI.renderMetrics([
              { value: venues.length, label: '已存场地' },
              { value: venues.filter((venue) => venue.sceneType === '自习室').length, label: '自习室' },
              { value: selectedCount, label: '已入 Pick' }
            ])}
            <label class="search-field" for="star-search">
              搜索场地
              <input id="star-search" type="search" value="${UI.escape(this.query)}" placeholder="输入场地名称">
            </label>
            <div id="star-list-area"></div>
          </section>
        `;
        this.renderList();
      },

      renderList() {
        const venues = Storage.loadVenues();
        const currentPick = Storage.loadCurrentPick();
        const keyword = this.query.trim().toLowerCase();
        const filteredVenues = venues.filter((venue) => venue.name.toLowerCase().includes(keyword));
        const listArea = document.getElementById('star-list-area');
        if (!listArea) return;

        if (!venues.length) {
          listArea.innerHTML = `
            <div class="empty-state">
              <h2 class="placeholder-title">还没有收藏地点</h2>
              <p>先添加一个自习室或咖啡馆，后续 Pick 时就能直接选择。</p>
              <button class="primary-btn" type="button" data-action="new-venue">添加第一个地点</button>
            </div>
          `;
          return;
        }

        if (!filteredVenues.length) {
          listArea.innerHTML = `
            <div class="empty-state">
              <h2 class="placeholder-title">没有匹配的地点</h2>
              <p>换一个名称关键词试试。</p>
              <button class="secondary-btn" type="button" data-action="clear-search">清空搜索</button>
            </div>
          `;
          return;
        }

        listArea.innerHTML = `
          <div class="venue-list">
            ${filteredVenues.map((venue) => this.renderVenueCard(venue, currentPick.selectedVenueIds.includes(venue.id))).join('')}
          </div>
        `;
      },

      renderVenueCard(venue, isSelected) {
        const tags = [...venue.tags, ...venue.customTags];
        const background = this.getVenueBackground(venue);
        return `
          <article class="venue-card" style="background-image: url('${background}')">
            <div class="venue-card-body">
              <div class="venue-card-header">
                <div>
                  <h3>${UI.escape(venue.name)}</h3>
                  <p class="venue-meta">${UI.escape(venue.address || '未填写地址')}</p>
                </div>
                <span class="scene-badge">${UI.escape(venue.sceneType || '场地')}</span>
              </div>
              <p class="venue-meta">${UI.escape(venue.hours || '营业时间待补充')} · ${UI.escape(this.formatPrice(venue))}</p>
              ${UI.renderTags(tags.slice(0, 4), venue.tags)}
              <div class="card-actions">
                <button class="text-btn" type="button" data-action="detail-venue" data-id="${venue.id}">查看</button>
                <button class="text-btn" type="button" data-action="edit-venue" data-id="${venue.id}">编辑</button>
                <button class="text-btn is-primary" type="button" data-action="add-to-pick" data-id="${venue.id}" ${isSelected ? 'disabled' : ''}>${isSelected ? '已加入' : '加入'}</button>
                <button class="danger-btn" type="button" data-action="delete-venue" data-id="${venue.id}">删除</button>
              </div>
            </div>
          </article>
        `;
      },

      handleInput(event) {
        if (event.target.id !== 'star-search') return;
        this.query = event.target.value;
        this.renderList();
      },

      handleClick(event) {
        const trigger = event.target.closest('[data-action]');
        if (!trigger) return;
        if (trigger.dataset.action === 'open-channel') {
          this.openChannel(trigger.dataset.channel, trigger.dataset.query);
          return;
        }
        this.runAction(trigger.dataset.action, trigger.dataset.id);
      },

      handleModalClick(event) {
        const trigger = event.target.closest('[data-action]');
        if (!trigger) return;
        if (trigger.dataset.action === 'pick-add-star') {
          PickManager.addStarVenue(trigger.dataset.id);
          return;
        }
        if (trigger.dataset.action === 'pick-new-venue') {
          StarManager.openForm('', { addToPick: true });
          return;
        }
        if (trigger.dataset.action === 'pick-open-star-list') {
          PickManager.openStarPickerList();
          return;
        }
        this.runAction(trigger.dataset.action, trigger.dataset.id);
      },

      async handleSubmit(event) {
        if (event.target.id === 'channel-link-form') {
          event.preventDefault();
          const formData = new FormData(event.target);
          const link = String(formData.get('link') || '').trim();
          console.info('[PickPick] channel submit', {
            owner: event.target.dataset.owner,
            venueId: event.target.dataset.venueId,
            channel: event.target.dataset.channel,
            linkLength: link.length,
            backendConfigured: BackendClient.isConfigured()
          });
          if (event.target.dataset.owner === 'pick') {
            await PickManager.saveChannelLink(event.target.dataset.venueId, event.target.dataset.channel, link);
          } else {
            await this.saveChannelLink(event.target.dataset.venueId, event.target.dataset.channel, link);
          }
          return;
        }
        if (event.target.id !== 'venue-form') return;
        event.preventDefault();
        this.saveFromForm(event.target);
      },

      runAction(action, id) {
        const actions = {
          'new-venue': () => this.openForm(),
          'edit-venue': () => this.openForm(id),
          'detail-venue': () => this.openDetail(id),
          'delete-venue': () => this.deleteVenue(id),
          'add-to-pick': () => this.addToPick(id),
          'back-star-list': () => this.goStep1(),
          'confirm-star-info': () => this.confirmStep12(),
          'clear-star-info': () => this.clearStep12Info(),
          'clear-search': () => {
            this.query = '';
            this.render();
          },
          'close-modal': () => UI.closeModal()
        };
        if (actions[action]) actions[action]();
      },

      openForm(venueId = '', options = {}) {
        const venue = venueId ? Storage.loadVenues().find((item) => item.id === venueId) : null;
        const isNewVenue = !venue;
        const shouldAddToPick = Boolean(options.addToPick);
        const completeTarget = options.addToPick ? 'pick' : (isNewVenue ? 'star' : '');
        const model = venue || {
          id: '',
          name: '',
          address: '',
          hours: '',
          price: { amount: '', unit: '日' },
          tags: [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: '',
          images: [],
          channelLinks: {},
          visitCount: 0,
          createdAt: '',
          sceneType: '自习室'
        };
        const fieldsHtml = isNewVenue ? `
          <label class="field">
            名称
            <input name="name" required value="${UI.escape(model.name)}" placeholder="例如 静思自习室">
          </label>
        ` : `
          <div class="form-grid">
            <label class="field is-full">
              名称
              <input name="name" required value="${UI.escape(model.name)}" placeholder="例如 静思自习室">
            </label>
            <label class="field is-full">
              地址
              <input name="address" value="${UI.escape(model.address)}" placeholder="例如 朝阳区建国路88号">
            </label>
            <label class="field">
              营业时间
              <input name="hours" value="${UI.escape(model.hours)}" placeholder="09:00-22:30">
            </label>
            <label class="field">
              场景
              <select name="sceneType">
                <option value="自习室" ${model.sceneType === '自习室' ? 'selected' : ''}>自习室</option>
                <option value="咖啡馆" ${model.sceneType === '咖啡馆' ? 'selected' : ''}>咖啡馆</option>
                <option value="其他" ${model.sceneType === '其他' ? 'selected' : ''}>其他</option>
              </select>
            </label>
            <label class="field">
              价格
              <input name="priceAmount" type="number" min="0" step="1" value="${UI.escape(model.price.amount)}" placeholder="39">
            </label>
            <label class="field">
              单位
              <select name="priceUnit">
                ${['日', '时', '杯', '次'].map((unit) => `<option value="${unit}" ${model.price.unit === unit ? 'selected' : ''}>${unit}</option>`).join('')}
              </select>
            </label>
            <label class="field is-full">
              设施标签
              <input name="tags" value="${UI.escape(model.tags.join('，'))}" placeholder="有插座，安静，靠窗">
            </label>
            <label class="field is-full">
              自定义标签
              <input name="customTags" value="${UI.escape(model.customTags.join('，'))}" placeholder="椅子舒服，绿植多">
            </label>
            <label class="field is-full">
              菜单/饮品
              <textarea name="menuInfo" placeholder="例如 美式 22 元，轻食 36 元，可自带水杯">${UI.escape(model.menuInfo || '')}</textarea>
            </label>
            <label class="field is-full">
              办卡信息
              <textarea name="membershipInfo" placeholder="例如 日卡 39 元，月卡 599 元，10 次卡 399 元">${UI.escape(model.membershipInfo || '')}</textarea>
            </label>
            <label class="field is-full">
              备注
              <textarea name="notes" placeholder="记录适合自己的观察">${UI.escape(model.notes)}</textarea>
            </label>
          </div>
        `;

        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">Star</p>
              <h2 class="modal-title">${venue ? '编辑场地' : '新建地点'}</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <form id="venue-form" class="venue-form" data-id="${UI.escape(model.id)}" data-add-to-pick="${shouldAddToPick ? 'true' : 'false'}" data-complete-target="${completeTarget}">
            ${fieldsHtml}
            <div class="form-actions">
              <button class="primary-btn" type="submit">${isNewVenue ? '保存并完善信息' : '保存场地'}</button>
              <button class="secondary-btn" type="button" data-action="close-modal">取消</button>
            </div>
          </form>
        `);
      },

      openDetail(venueId) {
        const venue = Storage.loadVenues().find((item) => item.id === venueId);
        if (!venue) return;
        const allTags = [...venue.tags, ...venue.customTags];
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">${UI.escape(venue.sceneType || '场地')}</p>
              <h2 class="modal-title">${UI.escape(venue.name)}</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <p class="detail-row">地址：${UI.escape(venue.address || '未填写')}</p>
          <p class="detail-row">营业时间：${UI.escape(venue.hours || '待补充')}</p>
          <p class="detail-row">价格：${UI.escape(this.formatPrice(venue))}</p>
          ${UI.renderTags(allTags, venue.tags)}
          <p class="detail-row">菜单/饮品：${UI.escape(venue.menuInfo || '暂无菜单信息')}</p>
          <p class="detail-row">办卡信息：${UI.escape(venue.membershipInfo || '暂无办卡信息')}</p>
          <p class="detail-row">备注：${UI.escape(venue.notes || '暂无备注')}</p>
          <div class="modal-actions">
            <button class="primary-btn" type="button" data-action="add-to-pick" data-id="${venue.id}">加入 Pick</button>
            <button class="secondary-btn" type="button" data-action="edit-venue" data-id="${venue.id}">编辑</button>
          </div>
        `);
      },

      saveFromForm(form) {
        const formData = new FormData(form);
        const venues = Storage.loadVenues();
        const id = form.dataset.id || this.createId('v');
        const existingVenue = venues.find((venue) => venue.id === id);
        const readField = (name, fallback = '') => String(formData.get(name) ?? fallback).trim();
        const nextVenue = {
          id,
          name: readField('name'),
          address: readField('address', existingVenue?.address || ''),
          hours: readField('hours', existingVenue?.hours || ''),
          price: {
            amount: Number(formData.get('priceAmount')) || existingVenue?.price?.amount || 0,
            unit: formData.get('priceUnit') || existingVenue?.price?.unit || '日'
          },
          tags: this.parseTags(formData.get('tags') ?? existingVenue?.tags?.join('，') ?? ''),
          customTags: this.parseTags(formData.get('customTags') ?? existingVenue?.customTags?.join('，') ?? ''),
          menuInfo: readField('menuInfo', existingVenue?.menuInfo || ''),
          membershipInfo: readField('membershipInfo', existingVenue?.membershipInfo || ''),
          notes: readField('notes', existingVenue?.notes || ''),
          images: existingVenue ? existingVenue.images : [],
          channelLinks: existingVenue ? (existingVenue.channelLinks || {}) : {},
          visitCount: existingVenue ? existingVenue.visitCount : 0,
          createdAt: existingVenue ? existingVenue.createdAt : new Date().toISOString().slice(0, 10),
          sceneType: formData.get('sceneType') || existingVenue?.sceneType || '自习室'
        };

        if (!nextVenue.name) {
          UI.showStatus('请先填写场地名称。');
          return;
        }

        if (!existingVenue && form.dataset.completeTarget === 'star') {
          UI.closeModal();
          this.openStep12Draft(nextVenue);
          return;
        }

        const nextVenues = existingVenue
          ? venues.map((venue) => (venue.id === id ? nextVenue : venue))
          : [nextVenue, ...venues];

        if (Storage.saveVenues(nextVenues)) {
          if (form.dataset.addToPick === 'true') {
            const currentPick = Storage.loadCurrentPick();
            Storage.saveCurrentPick({
              ...currentPick,
              selectedVenueIds: [...new Set([...currentPick.selectedVenueIds, id])]
            });
          }
          UI.closeModal();
          if (form.dataset.completeTarget === 'pick') {
            PickManager.goStep1({ selectedVenueIds: [...new Set([...Storage.loadCurrentPick().selectedVenueIds, id])] });
            UI.showStatus('新地点已加入 Pick 候选列表。', 'success');
            return;
          }
          if (form.dataset.completeTarget === 'star') {
            this.openStep12ForVenue(id);
            return;
          }
          UI.showStatus(
            form.dataset.addToPick === 'true'
              ? '新地点已加入 Pick 候选列表。'
              : (existingVenue ? '场地已更新。' : '场地已添加。'),
            'success'
          );
          App.render();
        }
      },

      deleteVenue(venueId) {
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId);
        if (!venue) return;
        if (!window.confirm(`删除「${venue.name}」？`)) return;

        const currentPick = Storage.loadCurrentPick();
        const nextSelectedVenueIds = currentPick.selectedVenueIds.filter((id) => id !== venueId);
        Storage.saveVenues(venues.filter((item) => item.id !== venueId));
        Storage.saveCurrentPick({ ...currentPick, selectedVenueIds: nextSelectedVenueIds });
        UI.closeModal();
        UI.showStatus('场地已删除。', 'success');
        App.render();
      },

      addToPick(venueId) {
        const currentPick = Storage.loadCurrentPick();
        if (currentPick.selectedVenueIds.includes(venueId)) {
          UI.showStatus('这个场地已经在 Pick 候选列表里。', 'success');
          return;
        }
        Storage.saveCurrentPick({
          ...currentPick,
          selectedVenueIds: [...currentPick.selectedVenueIds, venueId]
        });
        UI.closeModal();
        UI.showStatus('已加入 Pick 候选列表。', 'success');
        App.render();
      },

      parseTags(value) {
        return String(value || '')
          .split(/[,，、\n]/)
          .map((tag) => tag.trim())
          .filter(Boolean);
      },

      formatPrice(venue) {
        const amount = Number(venue.price?.amount) || 0;
        return amount > 0 ? `${amount}元/${venue.price.unit}` : '价格待补充';
      },

      getVenueBackground(venue) {
        if (venue.images?.length) return UI.escape(venue.images[0]);
        const palettes = {
          '自习室': ['#244D43', '#2DCD9B', '书桌', '专注'],
          '咖啡馆': ['#5A4636', '#D7A86E', '咖啡', '靠窗'],
          '其他': ['#334155', '#94A3B8', '地点', '对比']
        };
        const [base, accent, label, subLabel] = palettes[venue.sceneType] || palettes['其他'];
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
            <defs>
              <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="${base}"/>
                <stop offset="1" stop-color="${accent}"/>
              </linearGradient>
            </defs>
            <rect width="800" height="480" fill="url(#bg)"/>
            <rect x="62" y="78" width="676" height="324" rx="34" fill="rgba(255,255,255,0.16)"/>
            <circle cx="642" cy="145" r="54" fill="rgba(255,255,255,0.22)"/>
            <rect x="108" y="292" width="420" height="26" rx="13" fill="rgba(255,255,255,0.32)"/>
            <rect x="108" y="336" width="280" height="22" rx="11" fill="rgba(255,255,255,0.22)"/>
            <text x="108" y="174" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="54" font-weight="700">${label}</text>
            <text x="112" y="232" fill="rgba(255,255,255,0.76)" font-family="Arial, sans-serif" font-size="30">${subLabel}</text>
          </svg>
        `.trim();
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      },

      createId(prefix) {
        return `${prefix}_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
      },

      openStep12ForVenue(venueId) {
        this.activeVenueId = venueId;
        this.step12Draft = null;
        this.viewStep = 2;
        App.switchTab('star');
      },

      openStep12Draft(venue) {
        this.step12Draft = { ...venue, channelLinks: venue.channelLinks || {} };
        this.activeVenueId = venue.id;
        this.viewStep = 2;
        App.switchTab('star');
      },

      goStep1() {
        this.viewStep = 1;
        this.activeVenueId = '';
        this.step12Draft = null;
        this.render();
      },

      getChannelName(channel) {
        const channelNames = {
          meituan: '美团',
          xiaohongshu: '小红书',
          amap: '高德',
          dianping: '大众点评'
        };
        return channelNames[channel] || '渠道';
      },

      openChannel(channel, query) {
        const venue = this.getStep12Venue();
        if (!venue) return;
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">${UI.escape(this.getChannelName(channel))}</p>
              <h2 class="modal-title">粘贴信息</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <form id="channel-link-form" class="venue-form" data-owner="star" data-venue-id="${venue.id}" data-channel="${channel}">
            <p class="placeholder-text">可以保存链接；要自动提取字段，请粘贴页面复制出来的文字内容。</p>
            <label class="field">
              链接/复制内容
              <textarea name="link" rows="5" placeholder="粘贴 ${UI.escape(this.getChannelName(channel))} 链接或页面复制内容">${UI.escape(venue.channelLinks?.[channel] || '')}</textarea>
            </label>
            <div class="form-actions">
              <button class="primary-btn" type="submit">保存并提取</button>
              <button class="secondary-btn" type="button" data-action="close-modal">取消</button>
            </div>
          </form>
        `);
      },

      async saveChannelLink(venueId, channel, link) {
        console.info('[PickPick] star saveChannelLink', {
          venueId,
          channel,
          linkLength: String(link || '').length,
          hasDraft: Boolean(this.step12Draft),
          draftId: this.step12Draft?.id || '',
          backendConfigured: BackendClient.isConfigured()
        });
        if (this.step12Draft && this.step12Draft.id === venueId) {
          const baseDraft = {
            ...this.step12Draft,
            channelLinks: {
              ...(this.step12Draft.channelLinks || {}),
              [channel]: link
            }
          };
          const extraction = await BackendClient.extractVenueInfo({
            rawText: link,
            channel,
            venue: baseDraft,
            context: 'star'
          });
          const nextDraft = AIExtractor.applyToVenue(baseDraft, link, extraction.venue);
          const changedFields = AIExtractor.getChangedFields(baseDraft, nextDraft);
          this.step12Draft = {
            ...nextDraft
          };
          UI.closeModal();
          UI.showStatus(AIExtractor.getExtractionStatus(link, changedFields), 'success');
          this.renderStep12();
          return;
        }
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId);
        if (!venue) {
          console.warn('[PickPick] star saveChannelLink skipped: venue not found', { venueId, channel });
          return;
        }
        const baseVenue = {
          ...venue,
          channelLinks: {
            ...(venue.channelLinks || {}),
            [channel]: link
          }
        };
        const extraction = await BackendClient.extractVenueInfo({
          rawText: link,
          channel,
          venue: baseVenue,
          context: 'star'
        });
        const nextVenue = AIExtractor.applyToVenue(baseVenue, link, extraction.venue);
        const changedFields = AIExtractor.getChangedFields(baseVenue, nextVenue);
        if (!Storage.saveVenues(venues.map((item) => (item.id === venueId ? nextVenue : item)))) return;
        UI.closeModal();
        UI.showStatus(AIExtractor.getExtractionStatus(link, changedFields), 'success');
        this.renderStep12();
      },

      confirmStep12() {
        const venue = this.getStep12Venue();
        if (!venue) return;
        if (this.step12Draft) {
          const venues = Storage.loadVenues();
          if (!Storage.saveVenues([this.step12Draft, ...venues])) return;
        }
        this.goStep1();
        UI.showStatus('已保存到 Star 库。', 'success');
      },

      clearStep12Info() {
        if (this.step12Draft) {
          this.step12Draft = {
            ...this.step12Draft,
            address: '',
            hours: '',
            price: { amount: 0, unit: this.step12Draft.price?.unit || '日' },
            tags: [],
            customTags: [],
            menuInfo: '',
            membershipInfo: '',
            notes: '',
            channelLinks: {}
          };
          UI.showStatus('信息已清空。', 'success');
          this.renderStep12();
          return;
        }
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === this.activeVenueId);
        if (!venue) return;
        const nextVenue = {
          ...venue,
          address: '',
          hours: '',
          price: { amount: 0, unit: venue.price?.unit || '日' },
          tags: [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: '',
          channelLinks: {}
        };
        if (!Storage.saveVenues(venues.map((item) => (item.id === venue.id ? nextVenue : item)))) return;
        UI.showStatus('信息已清空。', 'success');
        this.renderStep12();
      },

      getStep12Venue() {
        return this.step12Draft || Storage.loadVenues().find((item) => item.id === this.activeVenueId);
      },

      getSourceLinks(venue) {
        return [
          venue.sourceUrl,
          ...Object.values(venue.channelLinks || {})
        ]
          .flatMap((value) => String(value || '').match(/https?:\/\/\S+/g) || [])
          .filter(Boolean);
      },

      getExtractedLabels(venue) {
        return [
          ['address', '位置'],
          ['hours', '时间'],
          ['price', '价格'],
          ['tags', '标签'],
          ['customTags', '自定义标签'],
          ['menuInfo', '菜单'],
          ['membershipInfo', '办卡'],
          ['notes', '备注']
        ]
          .filter(([field]) => {
            const value = venue[field];
            if (field === 'price') return Number(value?.amount) > 0;
            return Array.isArray(value) ? value.length : Boolean(value);
          })
          .map(([, label]) => label);
      },

      renderSourceInfo(venue) {
        const links = [...new Set(this.getSourceLinks(venue))];
        const labels = this.getExtractedLabels(venue);
        return `
          <div class="source-info-panel" aria-label="来源与提取状态">
            <div class="star-info-row">
              <strong>来源</strong>
              <span>${links.length ? `${links.length} 个链接已保存` : '暂无来源链接'}</span>
            </div>
            ${links[0] ? `<div class="source-link">${UI.escape(links[0])}</div>` : ''}
            <p class="placeholder-text">${labels.length ? `本地已提取：${UI.escape(labels.join('、'))}` : '还没有提取到字段，可以继续粘贴页面文字。'}</p>
            <p class="placeholder-text">${UI.escape(BackendClient.getStatusText())}</p>
          </div>
        `;
      },

      renderStep12() {
        const venue = this.getStep12Venue();
        if (!venue) {
          this.goStep1();
          return;
        }
        this.activeVenueId = venue.id;
        document.getElementById('tab-star').innerHTML = `
          <div class="step2-nav" aria-label="Star 信息补全导航">
            <button class="pick-arrow-btn" type="button" data-action="back-star-list" aria-label="返回">←</button>
          </div>
          ${UI.renderHeader({ id: 'star-copy-title', text: 'Enjoy coffee any time' }, 'Star 1.2')}
          <section class="panel pick-board">
            <div class="step2-shell">
              <div class="channel-orbit">
                ${PickManager.renderChannelCard('xiaohongshu', '小红书', '环境', venue.name, 'data-action')}
                ${PickManager.renderChannelCard('meituan', '美团', '价格', venue.name, 'data-action')}
                ${PickManager.renderChannelCard('amap', '高德', '位置', venue.name, 'data-action')}
              </div>
              <div class="star-cup-card">
                <div class="star-cup">
                  <span>${UI.escape(venue.name)}</span>
                </div>
              </div>
              <div class="star-info-panel" aria-label="场地补充信息">
                <div class="star-info-row">
                  <strong>时间</strong>
                  <span>${UI.escape(venue.hours || '-')}</span>
                </div>
                <div class="star-info-row">
                  <strong>位置</strong>
                  <span>${UI.escape(venue.address || '-')}</span>
                </div>
                <div class="star-info-row">
                  <strong>备注</strong>
                  <span>${UI.escape(venue.notes || '-')}</span>
                </div>
              </div>
              ${this.renderSourceInfo(venue)}
              <div class="form-actions">
                <button class="primary-btn" type="button" data-action="confirm-star-info">确认保存到库</button>
                <button class="secondary-btn" type="button" data-action="clear-star-info">清空信息</button>
              </div>
            </div>
          </section>
        `;
      }
    };

    const PickManager = {
      viewStep: 1,
      dateDrag: {
        strip: null,
        targetDate: '',
        startX: 0,
        startScrollLeft: 0,
        moved: false,
        active: false,
        suppressClick: false
      },
      cupDrag: {
        startX: 0,
        lastX: 0,
        moved: false,
        active: false,
        row: null
      },

      init() {
        const pickTab = document.getElementById('tab-pick');
        pickTab.addEventListener('input', (event) => this.handleInput(event));
        pickTab.addEventListener('change', (event) => this.handleChange(event));
        pickTab.addEventListener('click', (event) => this.handleClick(event));
        pickTab.addEventListener('pointerdown', (event) => this.handleDatePointerDown(event));
        pickTab.addEventListener('pointermove', (event) => this.handleDatePointerMove(event));
        pickTab.addEventListener('pointerup', () => this.endDateDrag());
        pickTab.addEventListener('pointercancel', () => this.cancelDateDrag());
        pickTab.addEventListener('pointerdown', (event) => this.handleCupPointerDown(event));
        pickTab.addEventListener('pointermove', (event) => this.handleCupPointerMove(event));
        pickTab.addEventListener('pointerup', () => this.endCupDrag());
        pickTab.addEventListener('pointercancel', () => this.cancelCupDrag());
      },

      render() {
        const currentPick = Storage.loadCurrentPick();
        if (this.viewStep === 3) {
          this.renderStep3(currentPick);
          return;
        }
        if (this.viewStep === 2) {
          this.renderStep2(currentPick);
          return;
        }
        if (currentPick.currentStep !== 1) {
          Storage.saveCurrentPick({ ...currentPick, currentStep: 1 });
          currentPick.currentStep = 1;
        }
        this.renderStep1(currentPick);
      },

      renderStep1(currentPick) {
        const selectedVenues = this.getSelectedVenues(currentPick);
        const allConditions = [...DEFAULT_FILTERS, ...currentPick.customConditions];
        const canGoStep2 = selectedVenues.length >= 2;
        document.getElementById('tab-pick').innerHTML = `
          ${UI.renderHeader({ id: 'pick-title', text: 'pick' })}
          <section class="panel pick-board">
            <div class="pick-step">
              <div class="pick-topbar">
                <div class="pick-location">
                  <input id="pick-location-input" name="userLocation" value="${UI.escape(currentPick.userLocation)}" placeholder="输入出发位置" data-pick-field="userLocation">
                </div>
              </div>
              ${this.renderDateStrip(currentPick)}
              ${this.renderWeather(currentPick)}
              <div class="pick-columns">
                <section class="station-panel">
                  <div class="station-title">station</div>
                  <div class="station-actions">
                    <button class="station-add-btn" type="button" data-pick-action="open-star-picker">+</button>
                    <button class="station-step-btn" type="button" data-pick-action="go-step-2" ${canGoStep2 ? '' : 'disabled'}>进入信息复制</button>
                  </div>
                  ${this.renderSelectedVenues(selectedVenues)}
                </section>
                <section class="select-panel">
                  <div class="select-title">select</div>
                  <div class="condition-grid">
                    ${allConditions.map((condition) => `
                      <label class="condition-pill">
                        <input type="checkbox" data-condition="${UI.escape(condition)}" ${currentPick.filterConditions.includes(condition) ? 'checked' : ''}>
                        ${UI.escape(condition)}
                      </label>
                    `).join('')}
                  </div>
                  <div class="custom-condition-form">
                    <input id="custom-condition-input" placeholder="+ 条件">
                    <button class="mini-btn is-primary" type="button" data-pick-action="add-condition">+</button>
                  </div>
                </section>
              </div>
              <div class="step-footer">
                <p class="helper-text">${canGoStep2 ? '可以进入复制信息步骤。' : '至少选择 2 个场地后才能进入下一步。'}</p>
              </div>
            </div>
          </section>
        `;
        WeatherService.ensureWeather(currentPick);
      },

      renderStep2(currentPick) {
        UI.clearStatus();
        const selectedVenues = this.getSelectedVenues(currentPick);
        const activeVenue = selectedVenues[currentPick.activeVenueIndex] || selectedVenues[0];
        if (!activeVenue) {
          this.goStep1({ activeVenueIndex: 0 });
          return;
        }
        const progress = `${currentPick.activeVenueIndex + 1}/${selectedVenues.length}`;
        document.getElementById('tab-pick').innerHTML = this.renderCopyStep({
          title: 'Enjoy coffee any time',
          subtitle: `当前地点 ${progress}`,
          venue: activeVenue,
          venues: selectedVenues,
          activeIndex: currentPick.activeVenueIndex,
          progress,
          backAction: 'back-step-1',
          nextAction: 'go-step-3',
          actionAttribute: 'data-pick-action'
        });
      },

      renderCopyStep({ title, subtitle, venue, venues = [venue], activeIndex = 0, backAction, nextAction, actionAttribute }) {
        return `
          <div class="step2-nav" aria-label="步骤导航">
            <button class="pick-arrow-btn" type="button" ${actionAttribute}="${backAction}" aria-label="返回">←</button>
            ${nextAction ? `<button class="pick-arrow-btn" type="button" ${actionAttribute}="${nextAction}" aria-label="下一步">→</button>` : ''}
          </div>
          ${UI.renderHeader({ id: 'copy-step-title', text: title }, subtitle)}
          <section class="panel pick-board">
            <div class="step2-shell">
              <div class="step2-title">
                <h2>${UI.escape(venue.name)}</h2>
              </div>
              <div class="channel-orbit">
                ${this.renderChannelCard('xiaohongshu', '小红书', '环境', venue.name, actionAttribute)}
                ${this.renderChannelCard('meituan', '美团', '价格', venue.name, actionAttribute)}
                ${this.renderChannelCard('amap', '高德', '位置', venue.name, actionAttribute)}
              </div>
              ${this.renderVenueCarousel(venues, activeIndex)}
              <p class="helper-text">按住杯子左右拖动切换地点；点击渠道圆点粘贴链接。</p>
            </div>
          </section>
        `;
      },

      renderChannelCard(channel, title, subtitle, venueName, actionAttribute = 'data-pick-action') {
        return `
          <button class="channel-dot" type="button" ${actionAttribute}="open-channel" data-channel="${channel}" data-query="${UI.escape(venueName)}" aria-label="${title} ${subtitle}">
            <em></em>
            <strong>${title}</strong>
          </button>
        `;
      },

      renderStep3(currentPick) {
        const selectedVenues = this.getSelectedVenues(currentPick);
        if (!selectedVenues.length) {
          this.goStep1();
          return;
        }
        const scoredVenues = this.getScoredVenues(selectedVenues, currentPick.filterConditions);
        const filteredVenues = scoredVenues.filter((item) => item.matches.length > 0 || !currentPick.filterConditions.length);
        const visibleVenues = filteredVenues.length ? filteredVenues : scoredVenues;
        const confirmedVenueIds = currentPick.confirmedVenueIds?.length
          ? currentPick.confirmedVenueIds
          : visibleVenues.slice(0, 1).map((item) => item.venue.id);
        if (!currentPick.confirmedVenueIds?.length && confirmedVenueIds.length) {
          Storage.saveCurrentPick({ ...currentPick, confirmedVenueIds });
          currentPick.confirmedVenueIds = confirmedVenueIds;
        }
        document.getElementById('tab-pick').innerHTML = `
          <div class="step2-nav" aria-label="Pick 结果导航">
            <button class="pick-arrow-btn" type="button" data-pick-action="back-step-2" aria-label="返回 2.2">←</button>
          </div>
          ${UI.renderHeader({ id: 'pick-result-title', text: 'pick result' }, '地图筛选与确认')}
          <section class="panel pick-board">
            <div class="step3-shell">
              ${this.renderMapPlaceholder(visibleVenues, currentPick)}
              <div class="filter-summary">
                <p class="helper-text">筛选条件</p>
                ${this.renderFilterTags(currentPick.filterConditions, visibleVenues)}
              </div>
              <div class="result-list">
                ${visibleVenues.map((item) => this.renderResultCard(item, currentPick)).join('')}
              </div>
              ${visibleVenues.length ? '' : '<p class="placeholder-text">没有符合条件的场地，返回 2.1 调整条件。</p>'}
            </div>
          </section>
        `;
        MapView.render(visibleVenues, currentPick);
      },

      renderMapPlaceholder(scoredVenues, currentPick) {
        const confirmedVenueIds = currentPick.confirmedVenueIds || [];
        return `
          <div class="map-placeholder" data-map-view="true" aria-label="地图">
            <div class="map-route"></div>
            <span class="map-pin is-origin"></span>
            <div class="map-label" style="--x: 22%; --y: 68%;">${UI.escape(currentPick.userLocation || '出发点')}</div>
            ${scoredVenues.map((item, index) => {
              const venue = item.venue;
              const position = MapView.getFallbackPosition(index);
              const selected = confirmedVenueIds.includes(venue.id);
              return `
                <span class="map-pin is-venue${selected ? ' is-selected' : ''}" data-map-venue-id="${UI.escape(venue.id)}" style="--x: ${position.x}%; --y: ${position.y}%;"></span>
                <div class="map-label${selected ? ' is-selected' : ''}" data-map-label-id="${UI.escape(venue.id)}" style="--x: ${position.x}%; --y: ${position.y - 10}%;">${UI.escape(venue.name)}</div>
              `;
            }).join('')}
          </div>
        `;
      },

      renderFilterTags(filterConditions, scoredVenues) {
        const availableTags = new Set(scoredVenues.flatMap((item) => [...item.venue.tags, ...item.venue.customTags]));
        const tags = filterConditions.length ? filterConditions : ['暂无筛选条件'];
        return `
          <div class="tag-row">
            ${tags.map((tag) => {
              const matched = availableTags.has(tag);
              return `<span class="tag${matched ? ' is-primary' : ' is-muted'}">${UI.escape(tag)}</span>`;
            }).join('')}
          </div>
        `;
      },

      renderResultCard(item, currentPick) {
        const { venue, matches, misses, score } = item;
        const checked = currentPick.confirmedVenueIds?.includes(venue.id);
        const allTags = [...venue.tags, ...venue.customTags];
        const copiedInfo = currentPick.copiedInfo?.[venue.id] || {};
        const copiedCount = Object.values(copiedInfo).filter(Boolean).length;
        return `
          <article class="result-card${matches.length ? '' : ' is-dimmed'}">
            <div class="result-card-head">
              <input class="result-check" type="checkbox" data-pick-action="toggle-confirmed" data-id="${venue.id}" ${checked ? 'checked' : ''} aria-label="显示 ${UI.escape(venue.name)}">
              <div>
                <h3>${UI.escape(venue.name)}</h3>
                <p class="venue-meta">${UI.escape(venue.address || venue.hours || '信息待完善')}</p>
              </div>
              <span class="result-score">${score}</span>
            </div>
            <div class="tag-row">
              ${allTags.length ? allTags.map((tag) => `<span class="tag${matches.includes(tag) ? ' is-primary' : ''}">${UI.escape(tag)}</span>`).join('') : '<span class="tag is-muted">暂无标签</span>'}
              ${misses.map((tag) => `<span class="tag is-muted">${UI.escape(tag)}</span>`).join('')}
            </div>
            <div class="result-actions">
              <p class="venue-meta">已复制 ${copiedCount}/3 个渠道信息</p>
              <button class="mini-btn is-primary" type="button" data-pick-action="save-result-star" data-id="${venue.id}">收藏到 Star</button>
            </div>
          </article>
        `;
      },

      getScoredVenues(venues, filterConditions) {
        return venues.map((venue) => {
          const allTags = [...venue.tags, ...venue.customTags];
          const matches = filterConditions.filter((condition) => allTags.includes(condition));
          const misses = filterConditions.filter((condition) => !allTags.includes(condition));
          const score = filterConditions.length
            ? Math.round((matches.length / filterConditions.length) * 100)
            : 100;
          return { venue, matches, misses, score };
        }).sort((a, b) => b.score - a.score);
      },

      renderVenueCarousel(selectedVenues, activeIndex) {
        const visibleVenues = [
          selectedVenues[activeIndex - 1] || selectedVenues[selectedVenues.length - 1],
          selectedVenues[activeIndex],
          selectedVenues[activeIndex + 1] || selectedVenues[0]
        ].filter(Boolean);
        return `
          <div class="venue-carousel" data-cup-carousel="true" aria-label="当前复制地点">
            <div class="venue-cup-row">
              ${visibleVenues.map((venue, index) => `
                <div class="venue-cup${index === 1 ? ' is-active' : ''}">
                  <span>${UI.escape(venue.name)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      },

      renderDateStrip(currentPick) {
        const today = new Date();
        const todayValue = this.formatDateValue(today);
        const selectedDate = this.parseDateValue(currentPick.date);
        const selectedYear = selectedDate.getFullYear();
        const selectedMonth = selectedDate.getMonth();
        const dayCount = new Date(selectedYear, selectedMonth + 1, 0).getDate();
        const years = this.getYearOptions(selectedYear);
        const days = Array.from({ length: dayCount }, (_, index) => {
            const date = new Date(selectedYear, selectedMonth, index + 1);
            return date;
          });
        return `
          <div class="date-picker">
            <div class="date-month-controls" aria-label="年月选择">
              <select data-date-part="year" aria-label="选择年份">
                ${years.map((year) => `<option value="${year}" ${year === selectedYear ? 'selected' : ''}>${year}年</option>`).join('')}
              </select>
              <select data-date-part="month" aria-label="选择月份">
                ${Array.from({ length: 12 }, (_, index) => {
                  const month = index + 1;
                  return `<option value="${month}" ${index === selectedMonth ? 'selected' : ''}>${month}月</option>`;
                }).join('')}
              </select>
            </div>
            <div class="date-strip" aria-label="日期选择">
              ${days.map((date) => {
                const value = this.formatDateValue(date);
                const weekday = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'][date.getDay()];
                const isActive = value === currentPick.date;
                const isToday = value === todayValue;
                return `
                  <button class="date-item${isActive ? ' is-active' : ''}${isToday ? ' is-today' : ''}" type="button" data-pick-action="set-date" data-date="${value}">
                    <strong>${date.getDate()}</strong>
                    <span>${weekday}</span>
                  </button>
                `;
              }).join('')}
            </div>
          </div>
        `;
      },

      parseDateValue(value) {
        const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!match) return new Date();
        const year = Number(match[1]);
        const month = Number(match[2]) - 1;
        const day = Number(match[3]);
        const parsed = new Date(year, month, day);
        return Number.isNaN(parsed.getTime()) ? new Date() : parsed;
      },

      getYearOptions(selectedYear) {
        const thisYear = new Date().getFullYear();
        const years = new Set([selectedYear]);
        for (let year = thisYear - 1; year <= thisYear + 2; year += 1) years.add(year);
        return [...years].sort((a, b) => a - b);
      },

      formatDateValue(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      },

      renderWeather(currentPick) {
        if (!currentPick.userLocation) {
          return '<div class="weather-card"><strong>weather</strong>填写出发位置后显示天气占位信息。</div>';
        }
        const weather = WeatherService.getWeather(currentPick);
        return `<div class="weather-card"><strong>weather</strong><span data-weather-text="true">${UI.escape(weather)}</span></div>`;
      },

      renderSelectedVenues(selectedVenues) {
        if (!selectedVenues.length) {
          return `
            <div class="empty-state">
              <h2 class="placeholder-title">还没有候选场地</h2>
              <p>点 + 新建地点或从 Star 选择候选场地。</p>
            </div>
          `;
        }

        return `
          <div class="selected-list">
            ${selectedVenues.map((venue) => `
              <div class="selected-item">
                <div>
                  <h3>${UI.escape(venue.name)}</h3>
                  <p>${UI.escape(venue.hours || '时间待补充')}</p>
                </div>
                <button class="mini-btn is-danger" type="button" data-pick-action="remove-venue" data-id="${venue.id}">×</button>
              </div>
            `).join('')}
          </div>
        `;
      },

      handleInput(event) {
        const field = event.target.dataset.pickField;
        if (!field) return;
        this.updateCurrentPick({ [field]: event.target.value }, false);
        if (field === 'userLocation') WeatherService.scheduleFetch(event.target.value);
      },

      handleChange(event) {
        const field = event.target.dataset.pickField;
        if (field) {
          this.updateCurrentPick({ [field]: event.target.value });
          return;
        }
        const datePart = event.target.dataset.datePart;
        if (datePart) {
          this.setDatePart(datePart, event.target.value);
          return;
        }
        const condition = event.target.dataset.condition;
        if (!condition) return;
        const currentPick = Storage.loadCurrentPick();
        const nextConditions = event.target.checked
          ? [...new Set([...currentPick.filterConditions, condition])]
          : currentPick.filterConditions.filter((item) => item !== condition);
        this.updateCurrentPick({ filterConditions: nextConditions }, false);
      },

      handleClick(event) {
        const trigger = event.target.closest('[data-pick-action]');
        if (!trigger) return;
        const action = trigger.dataset.pickAction;
        if (action === 'set-date' && this.dateDrag.suppressClick) {
          event.preventDefault();
          this.dateDrag.moved = false;
          this.dateDrag.suppressClick = false;
          return;
        }
        const actions = {
          'back-step-1': () => this.goStep1(),
          'back-step-2': () => this.goStep2View(),
          'open-star-picker': () => this.openStarPicker(),
          'open-channel': () => this.openChannel(trigger.dataset.channel, trigger.dataset.query),
          'remove-venue': () => this.removeVenue(trigger.dataset.id),
          'toggle-confirmed': () => this.toggleConfirmedVenue(trigger.dataset.id),
          'save-result-star': () => this.saveResultToStar(trigger.dataset.id),
          'add-condition': () => this.addCustomCondition(),
          'set-date': () => this.setDate(trigger.dataset.date),
          'go-step-2': () => this.goStep2(),
          'go-step-3': () => this.goStep3()
        };
        if (actions[action]) actions[action]();
      },

      setDate(date) {
        this.updateCurrentPick({ date });
      },

      setDatePart(part, value) {
        const currentPick = Storage.loadCurrentPick();
        const selected = this.parseDateValue(currentPick.date);
        const year = part === 'year' ? Number(value) : selected.getFullYear();
        const month = part === 'month' ? Number(value) - 1 : selected.getMonth();
        const maxDay = new Date(year, month + 1, 0).getDate();
        const day = Math.min(selected.getDate(), maxDay);
        this.updateCurrentPick({ date: this.formatDateValue(new Date(year, month, day)) });
      },

      handleDatePointerDown(event) {
        const strip = event.target.closest('.date-strip');
        if (!strip) return;
        this.dateDrag = {
          strip,
          targetDate: event.target.closest('.date-item')?.dataset.date || '',
          startX: event.clientX,
          startScrollLeft: strip.scrollLeft,
          moved: false,
          active: true,
          suppressClick: false
        };
        strip.classList.add('is-dragging');
        strip.setPointerCapture?.(event.pointerId);
      },

      handleDatePointerMove(event) {
        if (!this.dateDrag.active || !this.dateDrag.strip) return;
        const deltaX = event.clientX - this.dateDrag.startX;
        if (Math.abs(deltaX) > 14) this.dateDrag.moved = true;
        if (!this.dateDrag.moved) return;
        this.dateDrag.strip.scrollLeft = this.dateDrag.startScrollLeft - deltaX;
      },

      endDateDrag() {
        const { active, strip, moved, targetDate } = this.dateDrag;
        if (!active || !strip) return;
        strip.classList.remove('is-dragging');
        if (moved) {
          this.dateDrag.suppressClick = true;
        } else if (targetDate) {
          this.dateDrag.suppressClick = true;
          this.setDate(targetDate);
        }
        this.dateDrag = {
          strip: null,
          targetDate: '',
          startX: 0,
          startScrollLeft: 0,
          moved: false,
          active: false,
          suppressClick: this.dateDrag.suppressClick
        };
      },

      cancelDateDrag() {
        if (this.dateDrag.strip) this.dateDrag.strip.classList.remove('is-dragging');
        this.dateDrag = {
          strip: null,
          targetDate: '',
          startX: 0,
          startScrollLeft: 0,
          moved: false,
          active: false,
          suppressClick: false
        };
      },

      handleCupPointerDown(event) {
        const carousel = event.target.closest('[data-cup-carousel]');
        if (!carousel) return;
        const row = carousel.querySelector('.venue-cup-row');
        this.cupDrag = {
          startX: event.clientX,
          lastX: event.clientX,
          moved: false,
          active: true,
          row
        };
        carousel.classList.add('is-dragging');
        carousel.setPointerCapture?.(event.pointerId);
      },

      handleCupPointerMove(event) {
        if (!this.cupDrag.active) return;
        const deltaX = event.clientX - this.cupDrag.startX;
        this.cupDrag.lastX = event.clientX;
        if (Math.abs(deltaX) > 32) this.cupDrag.moved = true;
        if (this.cupDrag.row) {
          const clampedDelta = Math.max(-120, Math.min(120, deltaX));
          this.cupDrag.row.style.transform = `translateX(${clampedDelta}px)`;
        }
      },

      endCupDrag() {
        const carousel = document.querySelector('[data-cup-carousel]');
        if (carousel) carousel.classList.remove('is-dragging');
        if (!this.cupDrag.active) return;
        const currentPick = Storage.loadCurrentPick();
        const selectedCount = currentPick.selectedVenueIds.length;
        const deltaX = this.cupDrag.lastX - this.cupDrag.startX;
        const row = this.cupDrag.row;
        if (row) {
          row.style.transition = 'transform 0.22s ease';
          row.style.transform = this.cupDrag.moved && selectedCount > 1
            ? `translateX(${deltaX < 0 ? -226 : 226}px)`
            : 'translateX(0)';
        }
        if (this.cupDrag.moved && selectedCount > 1) {
          const direction = deltaX < 0 ? 1 : -1;
          const nextIndex = (currentPick.activeVenueIndex + direction + selectedCount) % selectedCount;
          window.setTimeout(() => {
            this.updateCurrentPick({ activeVenueIndex: nextIndex });
          }, 180);
        }
        this.cupDrag.active = false;
      },

      cancelCupDrag() {
        const carousel = document.querySelector('[data-cup-carousel]');
        if (carousel) carousel.classList.remove('is-dragging');
        if (this.cupDrag.row) this.cupDrag.row.style.transform = 'translateX(0)';
        this.cupDrag.active = false;
      },

      updateCurrentPick(patch, shouldRender = true) {
        const currentPick = Storage.loadCurrentPick();
        Storage.saveCurrentPick({
          ...currentPick,
          ...patch,
          weather: patch.userLocation !== undefined ? null : currentPick.weather
        });
        if (shouldRender) this.render();
      },

      goStep1(patch = {}) {
        this.viewStep = 1;
        this.updateCurrentPick({ currentStep: 1, ...patch });
      },

      goStep2View() {
        this.viewStep = 2;
        this.updateCurrentPick({ currentStep: 2 });
      },

      openStep2ForVenue(venueId) {
        const currentPick = Storage.loadCurrentPick();
        const selectedVenueIds = [...new Set([...currentPick.selectedVenueIds, venueId])];
        const activeVenueIndex = Math.max(0, selectedVenueIds.indexOf(venueId));
        Storage.saveCurrentPick({
          ...currentPick,
          selectedVenueIds,
          currentStep: 2,
          activeVenueIndex
        });
        this.viewStep = 2;
        App.switchTab('pick');
      },

      openChannel(channel, query) {
        const currentPick = Storage.loadCurrentPick();
        const venueId = currentPick.selectedVenueIds[currentPick.activeVenueIndex];
        const channelNames = {
          meituan: '美团',
          xiaohongshu: '小红书',
          amap: '高德地图',
          dianping: '大众点评'
        };
        const copiedInfo = currentPick.copiedInfo?.[venueId] || {};
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">${UI.escape(channelNames[channel] || '渠道')}</p>
              <h2 class="modal-title">粘贴信息</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <form id="channel-link-form" class="venue-form" data-owner="pick" data-venue-id="${venueId}" data-channel="${channel}">
            <p class="placeholder-text">可以保存链接；要自动提取字段，请粘贴页面复制出来的文字内容。</p>
            <label class="field">
              链接/复制内容
              <textarea name="link" rows="5" placeholder="每行粘贴一个 ${UI.escape(channelNames[channel] || '渠道')} 链接，或粘贴页面复制内容">${UI.escape(copiedInfo[channel] || '')}</textarea>
            </label>
            <div class="form-actions">
              <button class="primary-btn" type="submit">保存并提取</button>
              <button class="secondary-btn" type="button" data-action="close-modal">取消</button>
            </div>
          </form>
        `);
      },

      async saveChannelLink(venueId, channel, link) {
        console.info('[PickPick] pick saveChannelLink', {
          venueId,
          channel,
          linkLength: String(link || '').length,
          backendConfigured: BackendClient.isConfigured()
        });
        const currentPick = Storage.loadCurrentPick();
        const copiedInfo = {
          ...(currentPick.copiedInfo || {}),
          [venueId]: {
            ...(currentPick.copiedInfo?.[venueId] || {}),
            [channel]: link
          }
        };
        Storage.saveCurrentPick({ ...currentPick, copiedInfo });
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId) || this.createDraftVenueForExtraction(venueId);
        const extraction = await BackendClient.extractVenueInfo({
          rawText: link,
          channel,
          venue,
          context: 'pick'
        });
        let changedFields = [];
        if (venues.some((item) => item.id === venueId)) {
          changedFields = AIExtractor.saveExtractedVenue(venue, link, venues, extraction.venue);
        } else {
          console.warn('[PickPick] pick saveChannelLink extracted without saved venue', { venueId, channel });
        }
        UI.closeModal();
        UI.showStatus(AIExtractor.getExtractionStatus(link, changedFields), 'success');
      },

      createDraftVenueForExtraction(venueId) {
        const currentPick = Storage.loadCurrentPick();
        return {
          id: venueId || 'pick_draft',
          name: '',
          address: currentPick.userLocation || '',
          hours: '',
          price: { amount: 0, unit: '日' },
          tags: [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: '',
          images: [],
          channelLinks: {},
          visitCount: 0,
          createdAt: new Date().toISOString().slice(0, 10),
          sceneType: '其他'
        };
      },

      toggleConfirmedVenue(venueId) {
        const currentPick = Storage.loadCurrentPick();
        const confirmedVenueIds = currentPick.confirmedVenueIds || [];
        const nextConfirmed = confirmedVenueIds.includes(venueId)
          ? confirmedVenueIds.filter((id) => id !== venueId)
          : [...confirmedVenueIds, venueId];
        this.updateCurrentPick({ confirmedVenueIds: nextConfirmed });
      },

      saveResultToStar(venueId) {
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId);
        if (!venue) return;
        Storage.saveVenues(venues.map((item) => (
          item.id === venueId
            ? { ...item, visitCount: (Number(item.visitCount) || 0) + 1 }
            : item
        )));
        UI.showStatus('已收藏到 Star。', 'success');
        this.render();
      },

      getSelectedVenues(currentPick) {
        const venues = Storage.loadVenues();
        return currentPick.selectedVenueIds
          .map((venueId) => venues.find((venue) => venue.id === venueId))
          .filter(Boolean);
      },

      openStarPicker() {
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">Pick</p>
              <h2 class="modal-title">添加候选场地</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <div class="modal-actions">
            <button class="primary-btn" type="button" data-action="pick-new-venue">新建地点</button>
            <button class="secondary-btn" type="button" data-action="pick-open-star-list">从 Star 选择</button>
          </div>
        `);
      },

      openStarPickerList() {
        const venues = Storage.loadVenues();
        const currentPick = Storage.loadCurrentPick();
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">Pick</p>
              <h2 class="modal-title">从 Star 选择</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <div class="star-picker-list">
            ${venues.length ? venues.map((venue) => {
              const selected = currentPick.selectedVenueIds.includes(venue.id);
              return `
                <div class="star-picker-item">
                  <div>
                    <h3>${UI.escape(venue.name)}</h3>
                    <p>${UI.escape(venue.sceneType || '场地')} · ${UI.escape(venue.hours || '时间待补充')}</p>
                  </div>
                  <button class="mini-btn is-primary" type="button" data-action="pick-add-star" data-id="${venue.id}" ${selected ? 'disabled' : ''}>${selected ? '已选择' : '选择'}</button>
                </div>
              `;
            }).join('') : '<p class="placeholder-text">Star 里还没有场地。</p>'}
          </div>
        `);
      },

      addStarVenue(venueId) {
        const currentPick = Storage.loadCurrentPick();
        Storage.saveCurrentPick({
          ...currentPick,
          selectedVenueIds: [...new Set([...currentPick.selectedVenueIds, venueId])]
        });
        UI.closeModal();
        UI.showStatus('已加入。', 'success');
        App.render();
      },

      removeVenue(venueId) {
        const currentPick = Storage.loadCurrentPick();
        this.updateCurrentPick({
          selectedVenueIds: currentPick.selectedVenueIds.filter((id) => id !== venueId)
        });
      },

      addCustomCondition() {
        const input = document.getElementById('custom-condition-input');
        const value = input.value.trim();
        if (!value) return;
        const currentPick = Storage.loadCurrentPick();
        const customConditions = [...new Set([...currentPick.customConditions, value])];
        const filterConditions = [...new Set([...currentPick.filterConditions, value])];
        Storage.saveCurrentPick({ ...currentPick, customConditions, filterConditions });
        this.render();
      },

      goStep2() {
        const currentPick = Storage.loadCurrentPick();
        if (currentPick.selectedVenueIds.length < 2) {
          UI.showStatus('至少选择 2 个场地后才能进入下一步。');
          return;
        }
        this.viewStep = 2;
        Storage.saveCurrentPick({ ...currentPick, currentStep: 2, activeVenueIndex: 0 });
        UI.clearStatus();
        this.render();
      },

      goStep3() {
        const currentPick = Storage.loadCurrentPick();
        const selectedVenues = this.getSelectedVenues(currentPick);
        const confirmedVenueIds = currentPick.confirmedVenueIds?.length
          ? currentPick.confirmedVenueIds
          : selectedVenues.slice(0, 1).map((venue) => venue.id);
        Storage.saveCurrentPick({
          ...currentPick,
          currentStep: 3,
          step2Completed: true,
          confirmedVenueIds
        });
        this.viewStep = 3;
        UI.clearStatus();
        this.render();
      }
    };

    const WeatherService = {
      pendingKey: '',
      timer: null,

      getWeather(currentPick) {
        if (!currentPick.userLocation) return '';
        const weather = currentPick.weather;
        if (typeof weather === 'string' && weather) return weather;
        if (weather?.text) return weather.text;
        return `${currentPick.userLocation} · 正在获取天气...`;
      },

      ensureWeather(currentPick) {
        if (!currentPick.userLocation) return;
        const key = `${currentPick.userLocation}|${currentPick.date}`;
        if (this.hasResolvedWeather(currentPick.weather, key) || this.pendingKey === key) return;
        window.setTimeout(() => this.fetchWeather(currentPick), 0);
      },

      scheduleFetch(location) {
        if (this.timer) window.clearTimeout(this.timer);
        this.updateWeatherText(location ? `${location} · 正在获取天气...` : '填写出发位置后显示天气信息。');
        this.timer = window.setTimeout(() => {
          const currentPick = Storage.loadCurrentPick();
          if (currentPick.userLocation) this.fetchWeather({ ...currentPick, weather: null });
        }, 500);
      },

      async fetchWeather(currentPick) {
        if (!currentPick.userLocation) return;
        const key = `${currentPick.userLocation}|${currentPick.date}`;
        if (this.pendingKey === key || this.hasResolvedWeather(currentPick.weather, key)) return;
        this.pendingKey = key;
        try {
          const place = await GeoService.geocode(currentPick.userLocation);
          if (!place) throw new Error('place not found');
          const weather = await this.fetchForecast(place, currentPick, key);
          const latestPick = Storage.loadCurrentPick();
          if (latestPick.userLocation !== currentPick.userLocation || latestPick.date !== currentPick.date) return;
          Storage.saveCurrentPick({ ...latestPick, weather });
          this.updateWeatherText(weather.text);
        } catch (error) {
          const fallback = {
            key,
            unavailable: true,
            text: `${currentPick.userLocation} · 天气暂不可用`
          };
          const latestPick = Storage.loadCurrentPick();
          if (latestPick.userLocation === currentPick.userLocation) {
            Storage.saveCurrentPick({ ...latestPick, weather: fallback });
          }
          this.updateWeatherText(fallback.text);
        } finally {
          this.pendingKey = '';
        }
      },

      async fetchForecast(place, currentPick, key) {
        const url = [
          'https://api.open-meteo.com/v1/forecast',
          `?latitude=${encodeURIComponent(place.latitude ?? place.lat)}`,
          `&longitude=${encodeURIComponent(place.longitude ?? place.lon)}`,
          '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m',
          '&timezone=auto'
        ].join('');
        const response = await fetch(url);
        if (!response.ok) throw new Error('forecast failed');
        const data = await response.json();
        const current = data.current || {};
        const temperature = Math.round(Number(current.temperature_2m));
        const humidity = Math.round(Number(current.relative_humidity_2m));
        const wind = Math.round(Number(current.wind_speed_10m));
        return {
          key,
          text: `${currentPick.userLocation || place.name} · ${this.describeWeather(current.weather_code)} · ${Number.isFinite(temperature) ? `${temperature}°C` : '-'} · 湿度 ${Number.isFinite(humidity) ? `${humidity}%` : '-'} · 风 ${Number.isFinite(wind) ? `${wind}km/h` : '-'}`
        };
      },

      describeWeather(code) {
        const weatherCode = Number(code);
        if (weatherCode === 0) return '晴';
        if ([1, 2].includes(weatherCode)) return '多云';
        if (weatherCode === 3) return '阴';
        if ([45, 48].includes(weatherCode)) return '雾';
        if ([51, 53, 55, 56, 57].includes(weatherCode)) return '毛毛雨';
        if ([61, 63, 65, 66, 67, 80, 81, 82].includes(weatherCode)) return '雨';
        if ([71, 73, 75, 77, 85, 86].includes(weatherCode)) return '雪';
        if ([95, 96, 99].includes(weatherCode)) return '雷雨';
        return '天气';
      },

      updateWeatherText(text) {
        const weatherText = document.querySelector('[data-weather-text="true"]');
        if (weatherText) weatherText.textContent = text;
      },

      hasResolvedWeather(weather, key) {
        if (!weather || weather.key !== key) return false;
        const text = typeof weather === 'string' ? weather : weather.text;
        return Boolean(text && !String(text).includes('天气暂不可用'));
      }
    };

    const GeoService = {
      cache: {},

      async geocode(query) {
        const key = String(query || '').trim().toLowerCase();
        if (!key) return null;
        if (Object.prototype.hasOwnProperty.call(this.cache, key)) return this.cache[key];
        let point = null;
        try {
          point = await this.geocodeAddress(query);
        } catch (error) {
          point = null;
        }
        if (!point) point = await this.geocodeCityCandidates(query);
        this.cache[key] = point;
        return point;
      },

      async geocodeAddress(query) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=zh-CN&q=${encodeURIComponent(query)}`;
        const response = await fetch(url, { headers: { Accept: 'application/json' } });
        if (!response.ok) return null;
        const data = await response.json();
        const first = data?.[0];
        if (!first) return null;
        const latitude = Number(first.lat);
        const longitude = Number(first.lon);
        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return null;
        return {
          name: first.display_name?.split(',')?.[0] || query,
          latitude,
          longitude,
          lat: latitude,
          lon: longitude
        };
      },

      async geocodeCity(query) {
        const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=zh&format=json`);
        if (!response.ok) return null;
        const data = await response.json();
        const first = data.results?.[0];
        if (!first) return null;
        const latitude = Number(first.latitude);
        const longitude = Number(first.longitude);
        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return null;
        return {
          name: first.name || query,
          latitude,
          longitude,
          lat: latitude,
          lon: longitude
        };
      },

      async geocodeCityCandidates(query) {
        const candidates = this.getLocationCandidates(query);
        for (const candidate of candidates) {
          let point = null;
          try {
            point = await this.geocodeCity(candidate);
          } catch (error) {
            point = null;
          }
          if (point) return point;
        }
        return null;
      },

      getLocationCandidates(query) {
        const value = String(query || '').trim();
        const candidates = [value];
        const municipalities = ['北京', '上海', '天津', '重庆'];
        municipalities.forEach((city) => {
          if (value.includes(city)) {
            candidates.push(`${city}市`, city);
          }
        });
        const patterns = [
          /([\u4e00-\u9fa5]+市)/,
          /([\u4e00-\u9fa5]+区)/,
          /([\u4e00-\u9fa5]+县)/,
          /([\u4e00-\u9fa5]+镇)/,
          /([\u4e00-\u9fa5]+乡)/
        ];
        patterns.forEach((pattern) => {
          const match = value.match(pattern);
          if (match?.[1]) {
            candidates.push(match[1]);
            candidates.push(match[1].replace(/[市区县镇乡]$/, ''));
          }
        });
        return [...new Set(candidates.filter(Boolean))];
      }
    };
