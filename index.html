          : this.ensureRecordForDate(date, false);
        if (!record) return;
        if (!this.saveRecordPatch(record.id, { notes }, false)) return;
        const history = this.getSortedHistory();
        this.activeRecordIndex = history.findIndex((item) => item.id === record.id);
        this.activeDate = record.date;
        return history.find((item) => item.id === record.id) || { ...record, notes };
      },

      openRecordDetail(recordId = '', date = '') {
        const history = this.getSortedHistory();
        const record = recordId
          ? history.find((item) => item.id === recordId)
          : this.getRecordByDate(date, history);
        if (!record) return;
        this.activeDate = record.date || this.activeDate;
        this.activeRecordIndex = history.findIndex((item) => item.id === record.id);
        const venue = this.getPrimaryVenue(record);
        const rows = this.getRecordDetailRows(record, venue, { includeEmpty: true, starOnly: true });
        this.render();
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">${UI.escape(this.formatShortDate(record.date))}</p>
              <h2 class="modal-title">${UI.escape(venue?.name || record.title || '记录详情')}</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          ${this.renderModalPhotos(this.getRecordDisplayPhotos(record, venue))}
          ${this.renderRecordRows(rows)}
        `);
      },

      buildRecordSnapshot(record) {
        const liveVenue = this.getLivePrimaryVenue(record);
        const savedVenue = record.venueSnapshot || null;
        const baseVenue = liveVenue || savedVenue || this.buildFallbackVenue(record);
        const recordPhotos = record.photos || [];
        const venueNotes = this.mergeRecordNotes(baseVenue.notes, record.notes);
        const venue = {
          ...baseVenue,
          service: StarManager.getVenueServiceValues(baseVenue),
          pet: [],
          notes: venueNotes,
          images: this.uniqueArray([...(baseVenue.images || []), ...recordPhotos])
        };
        return {
          savedAt: new Date().toISOString(),
          date: record.date || '',
          userLocation: record.userLocation || '',
          weather: record.weather || '',
          filterConditions: record.filterConditions || [],
          venueNames: this.getRecordVenueNames(record),
          notes: record.notes || '',
          photos: recordPhotos,
          venue
        };
      },

      buildFallbackVenue(record) {
        return {
          id: StarManager.createId('v'),
          name: record.title || record.date || '未命名记录',
          address: record.userLocation || '',
          hours: '',
          price: { amount: 0, unit: '次', text: '' },
          environment: [],
          device: [],
          food: [],
          business: [],
          service: [],
          pet: [],
          tags: record.filterConditions || [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: record.notes || '',
          images: record.photos || [],
          channelLinks: {},
          visitCount: 0,
          createdAt: record.date || new Date().toISOString().slice(0, 10),
          sceneType: '其他'
        };
      },

      getRecordDetailRows(record, venue = this.getPrimaryVenue(record), options = {}) {
        const title = venue?.name || record.title || '';
        const venueNames = this.getRecordVenueNames(record);
        const starRows = [
          ['名称', title],
          ['地点', venue?.address || ''],
          ['时间', venue?.hours || ''],
          ['场景', venue?.sceneType || ''],
          ['环境', this.joinList(venue?.environment)],
          ['设备', this.joinList(venue?.device)],
          ['美食', this.joinList(venue?.food)],
          ['价格', venue ? StarManager.formatPrice(venue) : ''],
          ['业态', this.joinList(venue?.business)],
          ['服务', venue ? StarManager.getVenueFieldValue(venue, 'service') : ''],
          ['备注', record.notes || '']
        ];
        const rowValues = options.starOnly
          ? starRows
          : [
            ...starRows.slice(0, 1),
            ['日期', record.date || ''],
            ...starRows.slice(1, 3),
            ['起点', record.userLocation || ''],
            ['天气', record.weather || ''],
            ...starRows.slice(3, -1),
            ['场地', venueNames && venueNames !== title ? venueNames : ''],
            ['标签', this.joinList(record.filterConditions)],
            ['照片', (record.photos || []).length ? `${record.photos.length} 张` : ''],
            starRows[starRows.length - 1]
          ];
        if (options.includeEmpty) {
          return rowValues.map(([label, value]) => [label, this.hasDisplayValue(value) ? value : '']);
        }
        return rowValues.filter(([, value]) => this.hasDisplayValue(value));
      },

      renderRecordRows(rows) {
        if (!rows.length) return '<p class="placeholder-text">暂无可保存的信息。</p>';
        return `
          <div class="star-info-list">
            ${rows.map(([label, value]) => `
              <div class="star-info-row">
                <strong>${UI.escape(label)}</strong>
                <span>${UI.escape(value)}</span>
              </div>
            `).join('')}
          </div>
        `;
      },

      renderModalPhotos(photos = []) {
        if (!photos.length) {
          return `
            <div class="photo-stack">
              <div class="photo-empty">照片位置</div>
            </div>
          `;
        }
        return `
          <div class="photo-stack">
            ${photos.map((photo, index) => `
              <div class="photo-thumb">
                <img src="${UI.escape(photo)}" alt="记录照片 ${index + 1}">
              </div>
            `).join('')}
          </div>
        `;
      },

      getRecordDisplayPhotos(record, venue = this.getPrimaryVenue(record)) {
        return this.uniqueArray([
          ...(venue?.images || []),
          ...(record?.photos || [])
        ]);
      },

      openSaveConfirm(record) {
        const venue = this.getPrimaryVenue(record);
        const rows = this.getRecordDetailRows(record, venue, { includeEmpty: true, starOnly: true });
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">Save</p>
              <h2 class="modal-title">保存记录</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          ${this.renderModalPhotos(this.getRecordDisplayPhotos(record, venue))}
          ${this.renderRecordRows(rows)}
          <div class="modal-actions">
            <button class="primary-btn" type="button" data-history-action="confirm-save-record" data-id="${record.id}">确认保存</button>
            <button class="secondary-btn" type="button" data-action="close-modal">取消</button>
          </div>
        `);
      },

      confirmSaveRecord(recordId = '') {
        const record = this.saveCurrentDailyState(recordId);
        if (!record) return;
        const snapshot = this.buildRecordSnapshot(record);
        if (!this.saveRecordPatch(record.id, {
          venueSnapshot: snapshot.venue,
          savedDetails: snapshot,
          savedAt: snapshot.savedAt
        }, false)) return;
        UI.closeModal();
        UI.showStatus('记录详情已保存。', 'success');
        this.render();
      },

      openRecordOutput(recordId = '') {
        const record = this.saveCurrentDailyState(recordId);
        if (!record) return;
        const venue = this.getPrimaryVenue(record);
        const text = this.buildRecordShareText(record);
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">Output</p>
              <h2 class="modal-title">分享内容</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          ${this.renderModalPhotos(this.getRecordDisplayPhotos(record, venue))}
          <label class="field">
            详情
            <textarea id="record-output-text" rows="10">${UI.escape(text)}</textarea>
          </label>
          <div id="record-output-status" class="inline-status" role="status"></div>
          <div class="modal-actions">
            <button class="primary-btn" type="button" data-history-action="share-record" data-id="${record.id}" data-channel="wechat">分享微信</button>
            <button id="record-xhs-publish-btn" class="secondary-btn" type="button" data-history-action="share-record" data-id="${record.id}" data-channel="xiaohongshu">打开并填写小红书</button>
          </div>
        `);
      },

      openRecordStar(recordId = '') {
        const record = this.saveCurrentDailyState(recordId);
        if (!record) return;
        const venue = this.getPrimaryVenue(record);
        const draft = this.buildStarDraftFromRecord(record, venue);
        StarManager.openStep12Draft(draft);
        UI.showStatus('已进入 Star 1.2，可以继续完善信息。', 'success');
      },

      buildStarDraftFromRecord(record, venue) {
        const recordPhotos = record.photos || [];
        if (venue) {
          const images = [...new Set([...(venue.images || []), ...recordPhotos])];
          const notes = this.mergeRecordNotes(venue.notes, record.notes);
          return {
            ...venue,
            images,
            notes
          };
        }
        return {
          id: StarManager.createId('v'),
          name: record.title || record.date || '未命名记录',
          address: record.userLocation || '',
          hours: '',
          price: { amount: 0, unit: '次' },
          tags: record.filterConditions || [],
          customTags: [],
          service: [],
          pet: [],
          menuInfo: '',
          membershipInfo: '',
          notes: record.notes || '',
          images: recordPhotos,
          channelLinks: {},
          visitCount: 0,
          createdAt: record.date || new Date().toISOString().slice(0, 10),
          sceneType: '其他'
        };
      },

      buildRecordShareText(record) {
        const venue = this.getPrimaryVenue(record);
        const rows = this.getRecordDetailRows(record, venue, { includeEmpty: true, starOnly: true });
        return rows.map(([label, value]) => `${label}：${value}`).join('\n');
      },

      async shareRecord(recordId, channel = '') {
        const record = this.getSortedHistory().find((item) => item.id === recordId);
        if (!record) return;
        if (channel === 'xiaohongshu') {
          await this.publishXiaohongshuRecord(record);
          return;
        }
        const title = this.getPrimaryVenue(record)?.name || 'PickPick 记录';
        const editedText = document.getElementById('record-output-text')?.value.trim();
        const text = editedText || this.buildRecordShareText(record);
        const channelName = channel === 'xiaohongshu' ? '小红书' : '微信';
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
            if (channel === 'wechat') {
              window.location.href = 'weixin://';
              UI.showStatus('微信分享内容已复制，请在微信好友聊天中粘贴发送。', 'success');
              return;
            }
            UI.showStatus(`${channelName}分享内容已复制，可以手动粘贴。`, 'success');
            return;
          }
          UI.showStatus('当前浏览器不支持复制，请手动复制记录内容到微信。');
        } catch (error) {
          if (error?.name === 'AbortError') return;
          UI.showStatus('微信分享内容复制失败，请手动复制。');
        }
      },

      async publishXiaohongshuRecord(record) {
        const editedText = document.getElementById('record-output-text')?.value.trim();
        const content = editedText || this.buildRecordShareText(record);
        const payload = this.buildXiaohongshuPayload(record, content);
        const publishableImages = this.getXiaohongshuDraftImages(record);
        const publishButton = document.getElementById('record-xhs-publish-btn');
        if (publishButton) publishButton.disabled = true;
        const imageLimitText = publishableImages.length > XIAOHONGSHU_MAX_IMAGES
          ? `，已截取前 ${XIAOHONGSHU_MAX_IMAGES} 张`
          : '';
        this.showOutputStatus(`准备填写小红书草稿：${publishableImages.length} 张图片${imageLimitText}。`, 'success');
        if (!payload.images.length) {
          if (publishButton) publishButton.disabled = false;
          this.showOutputStatus('小红书图文需要至少一张图片。当前已复制文案，请手动发布。');
          await this.copyShareText(content, '小红书图文需要至少一张图片，已复制文案。');
          return;
        }
        try {
          this.showOutputStatus('正在打开并填写小红书草稿，请等待浏览器页面完成填充...', 'success');
          UI.showStatus('正在打开并填写小红书草稿...', 'success');
          const result = await this.callXiaohongshuProxy(payload);
          if (result?.error) throw new Error(result.error.message || result.error);
          if (result?.needsLogin) throw new Error(result.message || '请先登录小红书创作服务平台');
          this.showOutputStatus('小红书草稿已打开并填写完成，请在浏览器确认后手动点击发布。', 'success');
          UI.showStatus('小红书草稿已填写，请手动确认发布。', 'success');
        } catch (error) {
          this.showOutputStatus(`小红书草稿填写失败，已复制文案。${error?.message || ''}`.trim());
          await this.copyShareText(content, `小红书草稿填写失败，已复制文案。${error?.message || ''}`.trim());
        } finally {
          if (publishButton) publishButton.disabled = false;
        }
      },

      showOutputStatus(message, type = 'error') {
        const status = document.getElementById('record-output-status');
        if (!status) return;
        status.textContent = message;
        status.className = `inline-status is-visible${type === 'success' ? '' : ' is-error'}`;
      },

      buildXiaohongshuPayload(record, content) {
        const venue = this.getPrimaryVenue(record);
        const title = this.truncateText(venue?.name || record.title || 'PickPick 记录', 20);
        const tags = this.uniqueArray([
          venue?.sceneType,
          ...(venue?.business || []),
          ...(record.filterConditions || [])
        ]).slice(0, 10);
        return {
          title,
          content,
          images: this.getXiaohongshuDraftImages(record, venue).slice(0, XIAOHONGSHU_MAX_IMAGES),
          tags
        };
      },

      getXiaohongshuDraftImages(record, venue = null) {
        const sourceVenue = venue || this.getPrimaryVenue(record);
        return this.getRecordDisplayPhotos(record, sourceVenue)
          .filter((photo) => this.isXiaohongshuDraftImage(photo));
      },

      isXiaohongshuDraftImage(value) {
        const text = String(value || '').trim();
        if (/^data:image\/[a-z0-9.+-]+;base64,/i.test(text)) return true;
        return this.isMcpPublishableImage(text);
      },

      isMcpPublishableImage(value) {
        const text = String(value || '').trim();
        if (/^https?:\/\//i.test(text)) return true;
        return /^[a-zA-Z]:[\\/]/.test(text) || /^\\\\/.test(text) || /^\//.test(text);
      },

      async callXiaohongshuProxy(payload) {
        try {
          const response = await this.fetchWithTimeout(XIAOHONGSHU_PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }, 120000);
          const data = await response.json().catch(() => ({}));
          if (!response.ok || data.code !== 0) {
            throw new Error(data.msg || `proxy HTTP ${response.status}`);
          }
          return data.data || {};
        } catch (error) {
          const message = String(error?.message || '');
          if (/Failed to fetch|NetworkError|Load failed/i.test(message)) {
            throw new Error('请先运行 start-xiaohongshu-proxy.cmd');
          }
          throw error;
        }
      },

      async fetchWithTimeout(url, options, timeoutMs = 15000) {
        const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
        const timer = controller ? setTimeout(() => controller.abort(), timeoutMs) : null;
        try {
          return await fetch(url, {
            ...options,
            signal: controller?.signal
          });
        } catch (error) {
          if (error?.name === 'AbortError') throw new Error('连接小红书发布服务超时');
          throw error;
        } finally {
          if (timer) clearTimeout(timer);
        }
      },

      async copyShareText(text, message) {
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
          }
        } catch (error) {}
        UI.showStatus(message, 'success');
      },

      truncateText(value, maxLength) {
        const text = String(value || '').trim();
        return text.length > maxLength ? text.slice(0, maxLength) : text;
      },

      saveRecordPatch(recordId, patch, shouldRender = true) {
        const history = Storage.loadHistory();
        const nextHistory = history.map((record) => (
          record.id === recordId ? { ...record, ...patch } : record
        ));
        const saved = Storage.saveHistory(nextHistory);
        if (!saved) return false;
        if (shouldRender) this.render();
        return true;
      },

      async handlePhotoUpload(recordId, files) {
        if (!files.length) return;
        const imageFiles = files.filter((file) => file.type.startsWith('image/'));
        if (!imageFiles.length) {
          UI.showStatus('请选择图片文件。');
          return;
        }
        try {
          const compressedPhotos = await Promise.all(imageFiles.map((file) => this.compressImage(file)));
          const history = Storage.loadHistory();
          const nextHistory = history.map((record) => {
            if (record.id !== recordId) return record;
            return { ...record, photos: [...(record.photos || []), ...compressedPhotos] };
          });
          if (!Storage.saveHistory(nextHistory)) return;
          UI.showStatus('照片已保存。', 'success');
          this.render();
        } catch (error) {
          UI.showStatus('图片处理失败，请换一张图片重试。');
        }
      },

      async handleCalendarDayPhoto(recordId, files) {
        const imageFile = files.find((file) => file.type.startsWith('image/'));
        if (!imageFile) {
          UI.showStatus('请选择图片文件。');
          return;
        }
        try {
          const calendarPhoto = await this.compressImage(imageFile);
          const history = Storage.loadHistory();
          const nextHistory = history.map((record) => (
            record.id === recordId ? { ...record, calendarPhoto } : record
          ));
          if (!Storage.saveHistory(nextHistory)) return;
          UI.showStatus('日期照片已保存。', 'success');
          this.render();
        } catch (error) {
          UI.showStatus('图片处理失败，请换一张图片重试。');
        }
      },

      compressImage(file) {
        return ImageTools.compressImage(file);
      },

      removeActiveRecord() {
        const history = this.getSortedHistory();
        const record = history[this.activeRecordIndex];
        if (!record) return;
        this.deleteRecordById(record.id);
      },

      deleteRecordById(recordId = '') {
        if (!recordId) return;
        const sortedHistory = this.getSortedHistory();
        const deletedIndex = sortedHistory.findIndex((record) => record.id === recordId);
        const nextHistory = Storage.loadHistory().filter((item) => item.id !== recordId);
        if (!Storage.saveHistory(nextHistory)) return;
        const nextSorted = this.getSortedHistory();
        const nextIndex = Math.min(Math.max(0, deletedIndex), Math.max(0, nextSorted.length - 1));
        this.activeRecordIndex = nextSorted.length ? nextIndex : -1;
        this.activeDate = nextSorted[nextIndex]?.date || this.activeDate || this.formatDateValue(new Date());
        this.recentDeleteRecordId = '';
        this.recentClickBlockId = '';
        this.cancelRecentLongPress();
        UI.showStatus('记录已删除。', 'success');
        this.render();
      },

      removePhoto(recordId, photoIndex) {
        const history = Storage.loadHistory();
        const nextHistory = history.map((record) => {
          if (record.id !== recordId) return record;
          return {
            ...record,
            photos: (record.photos || []).filter((_, index) => index !== photoIndex)
          };
        });
        if (!Storage.saveHistory(nextHistory)) return;
        UI.showStatus('照片已删除。', 'success');
        this.render();
      },

      getPrimaryVenue(record) {
        if (!record) return null;
        if (record.venueSnapshot) return record.venueSnapshot;
        if (record.savedDetails?.venue) return record.savedDetails.venue;
        return this.getLivePrimaryVenue(record);
      },

      getLivePrimaryVenue(record) {
        if (!record) return null;
        const venues = Storage.loadVenues();
        return venues.find((venue) => venue.id === record.chosenVenueId)
          || venues.find((venue) => venue.id === (record.venueIds || [])[0])
          || null;
      },

      getRecordTime(record) {
        const venue = this.getPrimaryVenue(record);
        return venue?.hours || '';
      },

      formatShortDate(date = '') {
        const parts = date.split('-');
        if (parts.length !== 3) return '-';
        return `${Number(parts[1])}.${Number(parts[2])}`;
      },

      getRecordVenueNames(record) {
        const venues = Storage.loadVenues();
        const names = (record.venueIds || [])
          .map((venueId) => venues.find((venue) => venue.id === venueId)?.name)
          .filter(Boolean)
          .join('、');
        return names || record.venueSnapshot?.name || '';
      },

      joinList(value) {
        if (Array.isArray(value)) return value.filter(Boolean).join('、');
        return String(value || '').trim();
      },

      hasDisplayValue(value) {
        const text = String(value || '').trim();
        return Boolean(text && text !== '-' && text !== '暂无数据' && text !== '0 张' && text !== '价格待补充');
      },

      uniqueArray(values) {
        return [...new Set(values.map((item) => String(item || '').trim()).filter(Boolean))];
      },

      mergeRecordNotes(...values) {
        return this.uniqueArray(values.flatMap((value) => String(value || '').split(/\n+/))).join('\n');
      },

      addDays(dateValue, offset) {
        const date = this.parseDateValue(dateValue);
        date.setDate(date.getDate() + offset);
        return this.formatDateValue(date);
      },

      formatDateValue(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
