      openDetail(venueId) {
        const venue = Storage.loadVenues().find((item) => item.id === venueId);
        if (!venue) return;
        const infoRows = this.getVenueInfoRows(venue);
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">${UI.escape(venue.sceneType || '场地')}</p>
              <h2 class="modal-title">${UI.escape(venue.name)}</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <div class="star-info-list">
            ${infoRows.map(([label, value]) => `
              <div class="star-info-row">
                <strong>${UI.escape(label)}</strong>
                <span>${UI.escape(value)}</span>
              </div>
            `).join('')}
          </div>
          <div class="modal-actions">
            <button class="primary-btn" type="button" data-action="add-to-pick" data-id="${venue.id}">加入 Pick</button>
            <button class="secondary-btn" type="button" data-action="edit-venue" data-id="${venue.id}">编辑</button>
          </div>
        `);
      },

      saveFromForm(form) {
        const formData = new FormData(form);
        const venues = Storage.loadVenues();
        const id = form.dataset.id || this.createId('v');
        const existingVenue = venues.find((venue) => venue.id === id);
        const readField = (name, fallback = '') => String(formData.get(name) ?? fallback).trim();
        const nextVenue = {
          id,
          name: readField('name'),
          address: readField('address', existingVenue?.address || ''),
          hours: readField('hours', existingVenue?.hours || ''),
          price: {
            amount: Number(formData.get('priceAmount')) || existingVenue?.price?.amount || 0,
            unit: formData.get('priceUnit') || existingVenue?.price?.unit || '日'
          },
          tags: this.parseTags(formData.get('tags') ?? existingVenue?.tags?.join('，') ?? ''),
          customTags: this.parseTags(formData.get('customTags') ?? existingVenue?.customTags?.join('，') ?? ''),
          service: existingVenue ? this.getVenueServiceValues(existingVenue) : [],
          pet: [],
          menuInfo: readField('menuInfo', existingVenue?.menuInfo || ''),
          membershipInfo: readField('membershipInfo', existingVenue?.membershipInfo || ''),
          notes: readField('notes', existingVenue?.notes || ''),
          images: existingVenue ? existingVenue.images : [],
          channelLinks: existingVenue ? (existingVenue.channelLinks || {}) : {},
          geoPlace: existingVenue?.geoPlace || null,
          visitCount: existingVenue ? existingVenue.visitCount : 0,
          createdAt: existingVenue ? existingVenue.createdAt : new Date().toISOString().slice(0, 10),
          sceneType: formData.get('sceneType') || existingVenue?.sceneType || '自习室'
        };

        if (!nextVenue.name) {
          UI.showStatus('请先填写场地名称。');
          return;
        }

        if (!existingVenue && form.dataset.completeTarget === 'star') {
          UI.closeModal();
          this.openStep12Draft(nextVenue);
          return;
        }

        const nextVenues = existingVenue
          ? venues.map((venue) => (venue.id === id ? nextVenue : venue))
          : [nextVenue, ...venues];

        if (Storage.saveVenues(nextVenues)) {
          if (form.dataset.addToPick === 'true') {
            const currentPick = Storage.loadCurrentPick();
            Storage.saveCurrentPick({
              ...currentPick,
              selectedVenueIds: [...new Set([...currentPick.selectedVenueIds, id])]
            });
          }
          UI.closeModal();
          if (form.dataset.completeTarget === 'pick') {
            PickManager.goStep1({ selectedVenueIds: [...new Set([...Storage.loadCurrentPick().selectedVenueIds, id])] });
            UI.showStatus('新地点已加入 Pick 候选列表。', 'success');
            return;
          }
          if (form.dataset.completeTarget === 'star') {
            this.openStep12ForVenue(id);
            return;
          }
          UI.showStatus(
            form.dataset.addToPick === 'true'
              ? '新地点已加入 Pick 候选列表。'
              : (existingVenue ? '场地已更新。' : '场地已添加。'),
            'success'
          );
          App.render();
        }
      },

      deleteVenue(venueId) {
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId);
        if (!venue) return;
        if (!window.confirm(`删除「${venue.name}」？`)) return;

        const currentPick = Storage.loadCurrentPick();
        const nextSelectedVenueIds = currentPick.selectedVenueIds.filter((id) => id !== venueId);
        Storage.saveVenues(venues.filter((item) => item.id !== venueId));
        Storage.saveCurrentPick({ ...currentPick, selectedVenueIds: nextSelectedVenueIds });
        UI.closeModal();
        UI.showStatus('场地已删除。', 'success');
        App.render();
      },

      addToPick(venueId) {
        const currentPick = Storage.loadCurrentPick();
        if (currentPick.selectedVenueIds.includes(venueId)) {
          UI.showStatus('这个场地已经在 Pick 候选列表里。', 'success');
          return;
        }
        Storage.saveCurrentPick({
          ...currentPick,
          selectedVenueIds: [...currentPick.selectedVenueIds, venueId]
        });
        UI.closeModal();
        UI.showStatus('已加入 Pick 候选列表。', 'success');
        App.render();
      },

      parseTags(value) {
        return String(value || '')
          .split(/[,，、\n]/)
          .map((tag) => tag.trim())
          .filter(Boolean);
      },

      formatPrice(venue) {
        const amount = Number(venue.price?.amount) || 0;
        if (amount > 0) return `${amount}元/${venue.price.unit || '次'}`;
        return venue.price?.text || '价格待补充';
      },

      getVenueBackground(venue) {
        const palettes = {
          '自习室': ['#34462E', '#42543A'],
          '咖啡馆': ['#34462E', '#4E5A3F'],
          '其他': ['#34462E', '#46513A']
        };
        const [base, accent] = palettes[venue.sceneType] || palettes['其他'];
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
            <defs>
              <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="${base}"/>
                <stop offset="1" stop-color="${accent}"/>
              </linearGradient>
            </defs>
            <rect width="800" height="480" fill="url(#bg)"/>
            <rect width="800" height="480" fill="rgba(255,255,255,0.03)"/>
          </svg>
        `.trim();
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      },

      createId(prefix) {
        return `${prefix}_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
      },

      openStep12ForVenue(venueId) {
        this.activeVenueId = venueId;
        this.step12Draft = null;
        this.viewStep = 2;
        App.switchTab('star');
      },

      openStep12Draft(venue) {
        this.step12Draft = { ...venue, channelLinks: venue.channelLinks || {} };
        this.activeVenueId = venue.id;
        this.viewStep = 2;
        App.switchTab('star');
      },

      goStep1() {
        this.viewStep = 1;
        this.activeVenueId = '';
        this.step12Draft = null;
        this.render();
      },

      getChannelName(channel) {
        const channelNames = {
          meituan: '美团',
          xiaohongshu: '小红书',
          amap: '高德',
          dianping: '大众点评'
        };
        return channelNames[channel] || '渠道';
      },

      openChannel(channel, query) {
        const venue = this.getStep12Venue();
        if (!venue) return;
        const channelName = this.getChannelName(channel);
        const screenshotInputId = `channel-screenshot-star-${UI.escape(channel)}-${UI.escape(venue.id)}`;
        const dianpingSearchButton = channel === 'dianping'
          ? `<button class="secondary-btn" type="button" data-action="open-dianping-search" data-query="${UI.escape(venue.name || query || '')}" data-city="${UI.escape(venue.address || '')}">打开大众点评</button>`
          : '';
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">${UI.escape(channelName)}</p>
              <h2 class="modal-title">粘贴信息</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <form id="channel-link-form" class="venue-form" data-owner="star" data-venue-id="${venue.id}" data-channel="${channel}">
            <p class="placeholder-text">可以保存链接；要自动提取字段，请粘贴页面复制出来的文字内容。</p>
            ${dianpingSearchButton ? `<div class="form-actions">${dianpingSearchButton}</div>` : ''}
            <label class="field">
              链接/复制内容
              <textarea name="link" rows="5" placeholder="粘贴 ${UI.escape(channelName)} 链接或页面复制内容">${UI.escape(venue.channelLinks?.[channel] || '')}</textarea>
            </label>
            <div class="form-actions">
              <label class="secondary-btn channel-screenshot-label" for="${screenshotInputId}">上传截图</label>
              <input id="${screenshotInputId}" class="channel-screenshot-input" type="file" accept="image/*" multiple data-channel-screenshot="true" data-owner="star" data-venue-id="${UI.escape(venue.id)}" data-channel="${UI.escape(channel)}">
            </div>
            <p class="placeholder-text">截图会先保存到场地图片，后续可作为识别兜底。</p>
            <div class="form-actions">
              <button class="primary-btn" type="submit">保存并提取</button>
              <button class="secondary-btn" type="button" data-action="close-modal">取消</button>
            </div>
          </form>
        `);
      },

      async saveChannelLink(venueId, channel, link) {
        console.info('[PickPick] star saveChannelLink', {
          venueId,
          channel,
          linkLength: String(link || '').length,
          hasDraft: Boolean(this.step12Draft),
          draftId: this.step12Draft?.id || '',
          backendConfigured: BackendClient.isConfigured()
        });
        if (this.step12Draft && this.step12Draft.id === venueId) {
          const baseDraft = {
            ...this.step12Draft,
            channelLinks: {
              ...(this.step12Draft.channelLinks || {}),
              [channel]: link
            }
          };
          const extraction = await BackendClient.extractVenueInfo({
            rawText: link,
            channel,
            venue: baseDraft,
            context: 'star'
          });
          const extractedDraft = AIExtractor.applyToVenue(baseDraft, link, extraction.venue);
          const enrichedDraft = await BackendClient.enrichVenueWithPoi({
            baseVenue: baseDraft,
            venue: extractedDraft,
            rawText: link,
            extraction,
            channel
          });
          const nextDraft = enrichedDraft.venue;
          const changedFields = AIExtractor.getChangedFields(baseDraft, nextDraft);
          this.step12Draft = {
            ...nextDraft
          };
          if (enrichedDraft.poiCandidates.length) {
            this.renderStep12();
            this.showPoiCandidates({
              owner: 'star',
              venueId,
              baseVenue: baseDraft,
              candidates: enrichedDraft.poiCandidates
            });
            UI.showStatus(`${AIExtractor.getExtractionStatus(link, changedFields)}；请选择高德地点。`, 'success');
            return;
          }
          UI.closeModal();
          UI.showStatus(AIExtractor.getExtractionStatus(link, changedFields), 'success');
          this.renderStep12();
          return;
        }
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId);
        if (!venue) {
          console.warn('[PickPick] star saveChannelLink skipped: venue not found', { venueId, channel });
          return;
        }
        const baseVenue = {
          ...venue,
          channelLinks: {
            ...(venue.channelLinks || {}),
            [channel]: link
          }
        };
        const extraction = await BackendClient.extractVenueInfo({
          rawText: link,
          channel,
          venue: baseVenue,
          context: 'star'
        });
        const extractedVenue = AIExtractor.applyToVenue(baseVenue, link, extraction.venue);
        const enrichedVenue = await BackendClient.enrichVenueWithPoi({
          baseVenue,
          venue: extractedVenue,
          rawText: link,
          extraction,
          channel
        });
        const nextVenue = enrichedVenue.venue;
        const changedFields = AIExtractor.getChangedFields(baseVenue, nextVenue);
        if (!Storage.saveVenues(venues.map((item) => (item.id === venueId ? nextVenue : item)))) return;
        if (enrichedVenue.poiCandidates.length) {
          this.renderStep12();
          this.showPoiCandidates({
            owner: 'star',
            venueId,
            baseVenue,
            candidates: enrichedVenue.poiCandidates
          });
          UI.showStatus(`${AIExtractor.getExtractionStatus(link, changedFields)}；请选择高德地点。`, 'success');
          return;
        }
        UI.closeModal();
        UI.showStatus(AIExtractor.getExtractionStatus(link, changedFields), 'success');
        this.renderStep12();
      },

      showPoiCandidates({ owner, venueId, baseVenue, candidates = [] }) {
        this.pendingPoiSelection = {
          owner,
          venueId,
          baseVenue,
          candidates
        };
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">高德地点</p>
              <h2 class="modal-title">选择匹配店铺</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <div class="poi-candidate-list">
            ${candidates.map((poi, index) => `
              <button class="secondary-btn poi-candidate-btn" type="button" data-action="apply-poi-candidate" data-index="${index}">
                <strong>${UI.escape(poi.name || '未命名店铺')}</strong>
                <span>${UI.escape([poi.cityname, poi.adname, poi.address].filter(Boolean).join('') || '地址待补充')}</span>
                <span>${UI.escape([
                  poi.openTime || '',
                  poi.cost ? `人均${poi.cost}元` : '',
                  poi.rating ? `评分${poi.rating}` : ''
                ].filter(Boolean).join(' · ') || '信息待补充')}</span>
              </button>
            `).join('')}
          </div>
        `);
      },

      applyPoiCandidate(index) {
        const selection = this.pendingPoiSelection;
        const poi = selection?.candidates?.[Number(index)];
        if (!selection || !poi) return;
        const poiVenue = BackendClient.poiToVenue(poi);
        if (selection.owner === 'star' && this.step12Draft?.id === selection.venueId) {
          const nextDraft = AIExtractor.applyPoiToVenue(selection.baseVenue, this.step12Draft, poiVenue);
          this.step12Draft = nextDraft;
          this.pendingPoiSelection = null;
          UI.closeModal();
          this.renderStep12();
          UI.showStatus('已应用高德店铺信息。', 'success');
          return;
        }

        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === selection.venueId);
        if (!venue) return;
        const nextVenue = AIExtractor.applyPoiToVenue(selection.baseVenue || venue, venue, poiVenue);
        if (!Storage.saveVenues(venues.map((item) => (item.id === selection.venueId ? nextVenue : item)))) return;
        this.pendingPoiSelection = null;
        UI.closeModal();
        if (selection.owner === 'pick') {
          PickManager.render();
        } else {
          this.renderStep12();
        }
        UI.showStatus('已应用高德店铺信息。', 'success');
      },

      confirmStep12() {
        const venue = this.getStep12Venue();
        if (!venue) return;
        const nextVenue = this.readStep12Form(venue);
        if (!nextVenue.name.trim()) {
          UI.showStatus('请先填写名称。');
          return;
        }
        if (this.step12Draft) {
          const venues = Storage.loadVenues();
          const existingIndex = venues.findIndex((item) => item.id === nextVenue.id);
          const nextVenues = existingIndex >= 0
            ? venues.map((item) => (item.id === nextVenue.id ? nextVenue : item))
            : [nextVenue, ...venues];
          if (!Storage.saveVenues(nextVenues)) return;
        } else {
          const venues = Storage.loadVenues();
          if (!Storage.saveVenues(venues.map((item) => (item.id === nextVenue.id ? nextVenue : item)))) return;
        }
        this.goStep1();
        UI.showStatus('已保存到 Star 库。', 'success');
      },

      clearStep12Info() {
        if (this.step12Draft) {
          this.step12Draft = {
            ...this.step12Draft,
            address: '',
            hours: '',
            price: { amount: 0, unit: this.step12Draft.price?.unit || '日' },
            tags: [],
            customTags: [],
            service: [],
            pet: [],
            menuInfo: '',
            membershipInfo: '',
            notes: '',
            channelLinks: {}
          };
          UI.showStatus('信息已清空。', 'success');
          this.renderStep12();
          return;
        }
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === this.activeVenueId);
        if (!venue) return;
        const nextVenue = {
          ...venue,
          address: '',
          hours: '',
          price: { amount: 0, unit: venue.price?.unit || '日' },
          tags: [],
          customTags: [],
          service: [],
          pet: [],
          menuInfo: '',
          membershipInfo: '',
          notes: '',
          channelLinks: {}
        };
        if (!Storage.saveVenues(venues.map((item) => (item.id === venue.id ? nextVenue : item)))) return;
        UI.showStatus('信息已清空。', 'success');
        this.renderStep12();
      },

      getStep12Venue() {
        return this.step12Draft || Storage.loadVenues().find((item) => item.id === this.activeVenueId);
      },

      getSourceLinks(venue) {
        return [
          venue.sourceUrl,
          ...Object.values(venue.channelLinks || {})
        ]
          .flatMap((value) => String(value || '').match(/https?:\/\/\S+/g) || [])
          .filter(Boolean);
      },

      getExtractedLabels(venue) {
        return [
          ['address', '位置'],
          ['hours', '时间'],
          ['price', '价格'],
          ['tags', '标签'],
          ['customTags', '自定义标签'],
          ['service', '服务'],
          ['menuInfo', '菜单'],
          ['membershipInfo', '办卡'],
          ['notes', '备注']
        ]
          .filter(([field]) => {
            const value = venue[field];
            if (field === 'price') return Number(value?.amount) > 0;
            return Array.isArray(value) ? value.length : Boolean(value);
          })
          .map(([, label]) => label);
      },

      renderSourceInfo(venue) {
        const links = [...new Set(this.getSourceLinks(venue))];
        const labels = this.getExtractedLabels(venue);
        return `
          <div class="source-info-panel" aria-label="来源与提取状态">
            <div class="star-info-row">
              <strong>来源</strong>
              <span>${links.length ? `${links.length} 个链接已保存` : '暂无来源链接'}</span>
            </div>
            ${links[0] ? `<div class="source-link">${UI.escape(links[0])}</div>` : ''}
            <p class="placeholder-text">${labels.length ? `本地已提取：${UI.escape(labels.join('、'))}` : '还没有提取到字段，可以继续粘贴页面文字。'}</p>
            <p class="placeholder-text">${UI.escape(BackendClient.getStatusText())}</p>
          </div>
        `;
      },

      renderStep12Info(venue) {
        const images = this.getRenderableImages(venue.images || []);
        return `
          <form id="star-step12-form" class="star-info-panel" aria-label="场地补充信息">
            <div class="star-info-image${images.length > 1 ? ' is-gallery' : ''}">
              ${this.renderImageGallery(images, venue.name, { editable: true })}
            </div>
            <div class="star-info-list">
              <label class="star-info-row">
                <strong>名称</strong>
                <input class="star-info-input" name="name" value="${UI.escape(venue.name || '')}">
              </label>
              <label class="star-info-row">
                <strong>地点</strong>
                <input class="star-info-input" name="address" value="${UI.escape(venue.address || '')}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>时间</strong>
                <input class="star-info-input" name="hours" value="${UI.escape(venue.hours || '')}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>场景</strong>
                <select class="star-info-input" name="sceneType">
                  ${['自习室', '咖啡馆', '其他'].map((scene) => `<option value="${scene}" ${venue.sceneType === scene ? 'selected' : ''}>${scene}</option>`).join('')}
                </select>
              </label>
              <label class="star-info-row">
                <strong>环境</strong>
                <input class="star-info-input" name="environment" value="${UI.escape(this.getVenueFieldEditValue(venue, 'environment'))}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>设备</strong>
                <input class="star-info-input" name="device" value="${UI.escape(this.getVenueFieldEditValue(venue, 'device'))}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>美食</strong>
                <input class="star-info-input" name="food" value="${UI.escape(this.getVenueFieldEditValue(venue, 'food'))}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>价格</strong>
                <input class="star-info-input" name="priceAmount" value="${UI.escape(this.getVenueFieldEditValue(venue, 'price'))}" placeholder="价格待补充">
              </label>
              <label class="star-info-row">
                <strong>业态</strong>
                <input class="star-info-input" name="business" value="${UI.escape(this.getVenueFieldEditValue(venue, 'business'))}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>服务</strong>
                <input class="star-info-input" name="service" value="${UI.escape(this.getVenueFieldEditValue(venue, 'service'))}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>备注</strong>
                <textarea class="star-info-input" name="notes" rows="3" placeholder="-">${UI.escape(venue.notes || '')}</textarea>
              </label>
            </div>
          </form>
        `;
      },

      getRenderableImages(images = []) {
        return [...new Set(images.map((image) => {
          const text = String(image || '').trim();
          if (/^data:image\//i.test(text)) return text;
          if (!/^https?:\/\//i.test(text)) return '';
          try {
            return new URL(text).toString();
          } catch (error) {
            return '';
          }
        }).filter(Boolean))];
      },

      renderImageGallery(images = [], name = '', options = {}) {
        const renderableImages = this.getRenderableImages(images);
        if (!renderableImages.length) return '图片';
        const editable = Boolean(options.editable);
        return renderableImages.map((image, index) => (
          `<span class="image-gallery-item${editable && this.imageDeleteIndex === index ? ' is-delete-open' : ''}"${editable ? ` data-image-index="${index}"` : ''}><img src="${UI.escape(image)}" alt="${UI.escape(name)} 图片 ${index + 1}" loading="lazy" decoding="async" referrerpolicy="no-referrer" onerror="this.closest('.image-gallery-item')?.classList.add('is-hidden')">${editable ? `<button class="image-gallery-delete" type="button" data-action="delete-step12-image" data-index="${index}" aria-label="删除图片 ${index + 1}">删除</button>` : ''}</span>`
        )).join('');
      },

      deleteStep12Image(indexValue) {
        const index = Number(indexValue);
        const venue = this.getStep12Venue();
        if (!venue || !Number.isFinite(index)) return;
        const target = this.getRenderableImages(venue.images || [])[index];
        if (!target) return;
        let removed = false;
        const nextImages = (venue.images || []).filter((image) => {
          const normalized = this.getRenderableImages([image])[0];
          if (!removed && normalized === target) {
            removed = true;
            return false;
          }
          return true;
        });
        if (!removed) return;
        const nextVenue = {
          ...this.readStep12Form(venue),
          images: nextImages
        };
        this.imageDeleteIndex = -1;
        if (this.step12Draft && this.step12Draft.id === nextVenue.id) {
          this.step12Draft = nextVenue;
          this.renderStep12();
          UI.showStatus('图片已删除。', 'success');
          return;
        }
        const venues = Storage.loadVenues();
        if (!Storage.saveVenues(venues.map((item) => (item.id === nextVenue.id ? nextVenue : item)))) return;
        this.renderStep12();
        UI.showStatus('图片已删除。', 'success');
      },

      renderStep12() {
        const venue = this.getStep12Venue();
        if (!venue) {
          this.goStep1();
          return;
        }
        this.activeVenueId = venue.id;
        document.getElementById('tab-star').innerHTML = `
          <div class="star12-actions" aria-label="Star 信息补全导航">
            <button class="secondary-btn" type="button" data-action="back-star-list" aria-label="返回">←</button>
            <span></span>
            <button class="primary-btn" type="button" data-action="confirm-star-info">Save</button>
            <button class="secondary-btn" type="button" data-action="clear-star-info">Clear</button>
          </div>
          ${UI.renderHeader({ id: 'star-copy-title', text: 'Star' }, 'Paste source info and complete one place.')}
          <section class="panel pick-board">
            <div class="step2-shell">
              <div class="star-cup-card">
                <div class="star-cup">
                  <span class="star-cup-logo">logo</span>
                  <span class="star-cup-name">${UI.escape(venue.name)}</span>
                </div>
              </div>
              <div class="channel-orbit is-star12">
                ${PickManager.renderChannelCard('xiaohongshu', '小红书', '环境', venue.name, 'data-action')}
                ${PickManager.renderChannelCard('dianping', '大众点评', '价格', venue.name, 'data-action')}
              </div>
              ${this.renderStep12Info(venue)}
            </div>
          </section>
        `;
      }
    };

    const PickManager = {
      viewStep: 1,
      dateDrag: {
        strip: null,
        targetDate: '',
        startX: 0,
        startScrollLeft: 0,
        moved: false,
        active: false,
        suppressClick: false
      },
      cupDrag: {
        carousel: null,
        pointerId: null,
        startX: 0,
        lastX: 0,
        moved: false,
        active: false,
        row: null
      },

      init() {
        const pickTab = document.getElementById('tab-pick');
        pickTab.addEventListener('input', (event) => this.handleInput(event));
        pickTab.addEventListener('change', (event) => this.handleChange(event));
        pickTab.addEventListener('click', (event) => this.handleClick(event));
        pickTab.addEventListener('pointerdown', (event) => this.handleDatePointerDown(event));
        pickTab.addEventListener('pointermove', (event) => this.handleDatePointerMove(event));
        pickTab.addEventListener('pointerup', () => this.endDateDrag());
        pickTab.addEventListener('pointercancel', () => this.cancelDateDrag());
        pickTab.addEventListener('pointerdown', (event) => this.handleCupPointerDown(event));
        pickTab.addEventListener('pointermove', (event) => this.handleCupPointerMove(event));
        pickTab.addEventListener('pointerup', (event) => this.endCupDrag(event));
        pickTab.addEventListener('pointercancel', (event) => this.cancelCupDrag(event));
        document.getElementById('modal-container').addEventListener('click', (event) => this.handleModalClick(event));
        window.addEventListener('pointermove', (event) => this.handleCupPointerMove(event));
        window.addEventListener('pointerup', (event) => this.endCupDrag(event));
        window.addEventListener('pointercancel', (event) => this.cancelCupDrag(event));
      },

      render() {
        const currentPick = Storage.loadCurrentPick();
        if (this.viewStep === 3) {
          this.renderStep3(currentPick);
          return;
        }
        if (this.viewStep === 2) {
          this.renderStep2(currentPick);
          return;
        }
        if (currentPick.currentStep !== 1) {
          Storage.saveCurrentPick({ ...currentPick, currentStep: 1 });
          currentPick.currentStep = 1;
        }
        this.renderStep1(currentPick);
      },

      renderStep1(currentPick) {
        const selectedVenues = this.getSelectedVenues(currentPick);
        const allConditions = this.getStep1Conditions();
        const visibleFilterConditions = currentPick.filterConditions.filter((condition) => allConditions.includes(condition));
        if (visibleFilterConditions.length !== currentPick.filterConditions.length) {
          Storage.saveCurrentPick({ ...currentPick, filterConditions: visibleFilterConditions });
          currentPick.filterConditions = visibleFilterConditions;
        }
        const canGoStep2 = selectedVenues.length >= 2;
        document.getElementById('tab-pick').innerHTML = `
          <div class="pick-step-header">
            <div>
              <h1 id="pick-title">PICK</h1>
              <p>Date, start point, weather and candidates.</p>
            </div>
            <button class="pick-arrow-btn" type="button" data-pick-action="go-step-2" aria-label="进入 2.2" ${canGoStep2 ? '' : 'disabled'}>→</button>
          </div>
          <section class="panel pick-board">
            <div class="pick-step">
              ${this.renderDateStrip(currentPick)}
              <div class="pick-topbar">
                <div class="pick-location">
                  <textarea id="pick-location-input" name="userLocation" rows="2" placeholder="输入出发位置；多个起点可换行或用逗号分隔" data-pick-field="userLocation">${UI.escape(currentPick.userLocation)}</textarea>
                </div>
              </div>
              ${this.renderWeather(currentPick)}
              <div class="pick-columns">
                <section class="station-panel">
                  <div class="station-title">candidates</div>
                  <div class="station-actions">
                    <button class="station-add-btn" type="button" data-pick-action="open-star-picker">Add new +</button>
                  </div>
                  ${this.renderSelectedVenues(selectedVenues)}
                </section>
                <section class="select-panel">
                  <div class="select-title">conditions</div>
                  <div class="condition-grid">
                    ${allConditions.map((condition) => `
                      <label class="condition-pill">
                        <input type="checkbox" data-condition="${UI.escape(condition)}" ${currentPick.filterConditions.includes(condition) ? 'checked' : ''}>
                        ${UI.escape(condition)}
                      </label>
                    `).join('')}
                  </div>
                </section>
              </div>
              <div class="step-footer">
                <p class="helper-text">${canGoStep2 ? '点击右上角箭头进入下一步。' : '至少选择 2 个场地后才能进入下一步。'}</p>
              </div>
            </div>
          </section>
        `;
        this.scrollDateStripToActive();
        WeatherService.ensureWeather(currentPick);
      },

      getStep1Conditions() {
        return ['环境', '设备', '美食', '价格', '业态', '周边', '服务'];
      },

      getStartLocations(value) {
        return String(value || '')
          .split(/[\n,，、;；]+/)
          .map((item) => item.trim())
          .filter(Boolean);
      },

      getPrimaryStartLocation(value) {
        return this.getStartLocations(value)[0] || '';
      },

      renderStep2(currentPick) {
        UI.clearStatus();
        const selectedVenues = this.getSelectedVenues(currentPick);
        const activeVenue = selectedVenues[currentPick.activeVenueIndex] || selectedVenues[0];
        if (!activeVenue) {
          this.goStep1({ activeVenueIndex: 0 });
          return;
        }
        const progress = `${currentPick.activeVenueIndex + 1}/${selectedVenues.length}`;
        document.getElementById('tab-pick').innerHTML = this.renderCopyStep({
          title: 'PICK',
          subtitle: `Paste source links by venue. ${progress}`,
          venue: activeVenue,
          venues: selectedVenues,
          activeIndex: currentPick.activeVenueIndex,
          filterConditions: currentPick.filterConditions,
          progress,
          backAction: 'back-step-1',
          nextAction: 'go-step-3',
          actionAttribute: 'data-pick-action'
        });
      },

      renderCopyStep({ title, subtitle, venue, venues = [venue], activeIndex = 0, filterConditions = [], backAction, nextAction, actionAttribute }) {
        return `
          <div class="step2-nav" aria-label="步骤导航">
            <button class="pick-arrow-btn" type="button" ${actionAttribute}="${backAction}" aria-label="返回">←</button>
            ${nextAction ? `<button class="pick-arrow-btn" type="button" ${actionAttribute}="${nextAction}" aria-label="下一步">→</button>` : ''}
          </div>
          ${UI.renderHeader({ id: 'copy-step-title', text: title }, subtitle)}
          <section class="panel pick-board">
            <div class="step2-shell">
              ${this.renderVenueCarousel(venues, activeIndex)}
              <p class="helper-text step2-swipe-hint">Swipe to switch place</p>
              <div class="channel-orbit">
                ${this.renderChannelCard('xiaohongshu', '小红书', '环境', venue.name, actionAttribute)}
                ${this.renderChannelCard('dianping', '大众点评', '价格', venue.name, actionAttribute)}
              </div>
              ${this.renderStep2InfoCard(venue, filterConditions)}
            </div>
          </section>
        `;
      },

      renderChannelCard(channel, title, subtitle, venueName, actionAttribute = 'data-pick-action') {
        return `
          <button class="channel-dot" type="button" ${actionAttribute}="open-channel" data-channel="${channel}" data-query="${UI.escape(venueName)}" aria-label="${title} ${subtitle}">
            <em></em>
            <strong>${title}</strong>
          </button>
        `;
      },

      renderStep2InfoCard(venue, filterConditions = []) {
        const images = StarManager.getRenderableImages(venue.images || []);
        const visibleConditions = [...new Set(filterConditions)];
        const rows = [
          ['时间', venue.hours || '-'],
          ['地点', venue.address || '-'],
          ...visibleConditions.map((condition) => [condition, this.getStep2ConditionValue(venue, condition)]),
          ['备注', venue.notes || '-']
        ];
        return `
          <article class="pick-step2-info-card" aria-label="当前场地信息">
            <div class="pick-step2-image${images.length > 1 ? ' is-gallery' : ''}">
              ${StarManager.renderImageGallery(images, venue.name)}
            </div>
            <div class="pick-step2-info-list">
              ${rows.map(([label, value]) => `
                <div class="pick-step2-info-row">
                  <strong>${UI.escape(label)}</strong>
                  <span>${UI.escape(value || '-')}</span>
                </div>
              `).join('')}
            </div>
          </article>
        `;
      },

      getStep2ConditionValue(venue, condition) {
        if (condition === '价格') return StarManager.formatPrice(venue);
        if (condition === '业态') return this.getMatchedVenueTerms(venue, ['纯咖啡', '日咖夜酒', '书店+咖啡', venue.sceneType]).join('、') || venue.sceneType || '-';
        if (condition === '服务') return StarManager.getVenueFieldValue(venue, 'service');
        if (condition === '美食') {
          if (Array.isArray(venue.food) && venue.food.length) return venue.food.join('、');
          if (venue.menuInfo) return venue.menuInfo;
          return '-';
        }
        const optionsByCondition = {
          '环境': ['安静', '禁烟', '靠窗', '老洋房', '露天位', '独立房间', '适合办公', '适合拍照', '绿植多'],
          '设备': ['插座', '大桌', '音乐', '卫生间', '柠檬水', '可寄存'],
          '美食': ['柠檬巴斯克', '咖啡', '茶', '甜点', '抹茶', '焙茶', '轻食'],
          '周边': ['地铁', '停车', '商场', '公园', '学校', '五大道'],
          '服务': ['免费柠檬水', '免费自取水', '提供纸巾', '宠物友好', '无需预约', '需现场等位', '猫', '狗']
        };
        const matched = this.getMatchedVenueTerms(venue, optionsByCondition[condition] || []);
        if (matched.length) return matched.join('、');
        return '-';
      },

      getMatchedVenueTerms(venue, options = []) {
        const text = [
          venue.sceneType,
          venue.menuInfo,
          venue.membershipInfo,
          venue.notes,
          ...(venue.environment || []),
          ...(venue.device || []),
          ...(venue.food || []),
          ...(venue.business || []),
          ...(venue.service || []),
          ...(venue.pet || []),
          ...(venue.tags || []),
          ...(venue.customTags || [])
        ].join(' ');
        return [...new Set(options.filter((option) => option && text.includes(option)))];
      },

      renderStep3(currentPick) {
        const selectedVenues = this.getSelectedVenues(currentPick);
        if (!selectedVenues.length) {
          this.goStep1();
          return;
        }
        const visibleVenues = selectedVenues.map((venue) => ({ venue, matches: [], misses: [], score: 100 }));
        const visibleVenueIds = new Set(visibleVenues.map((item) => item.venue.id));
        const confirmedVenueIds = (currentPick.confirmedVenueIds || []).filter((id) => visibleVenueIds.has(id));
        if (confirmedVenueIds.length !== (currentPick.confirmedVenueIds || []).length) {
          Storage.saveCurrentPick({ ...currentPick, confirmedVenueIds });
          currentPick.confirmedVenueIds = confirmedVenueIds;
        }
        document.getElementById('tab-pick').innerHTML = `
          <div class="step2-nav" aria-label="Pick 结果导航">
            <button class="pick-arrow-btn" type="button" data-pick-action="back-step-2" aria-label="返回 2.2">←</button>
            <button class="pick-arrow-btn" type="button" data-pick-action="finish-pick" aria-label="确认加入记录">sure</button>
          </div>
          ${UI.renderHeader({ id: 'pick-result-title', text: 'pick result' }, '')}
          <section class="panel pick-board">
            <div class="step3-shell">
              ${this.renderMapPlaceholder(visibleVenues, currentPick)}
              <div class="result-list">
                ${visibleVenues.map((item) => this.renderResultCard(item, currentPick)).join('')}
              </div>
              ${visibleVenues.length ? '' : '<p class="placeholder-text">没有符合条件的场地，返回 2.1 调整条件。</p>'}
            </div>
          </section>
        `;
        MapView.render(visibleVenues, currentPick);
      },

      renderMapPlaceholder(scoredVenues, currentPick) {
        const confirmedVenueIds = currentPick.confirmedVenueIds || [];
        const startLocations = PickManager.getStartLocations(currentPick.userLocation);
        const originFallbackPositions = MapView.getOriginFallbackPositions(startLocations.length || 1);
        return `
          <div class="map-placeholder" data-map-view="true" aria-label="地图">
            <div class="map-route"></div>
            ${(startLocations.length ? startLocations : ['出发点']).map((location, index) => {
              const position = originFallbackPositions[index];
              const id = `origin_${index}`;
              return `
                <span class="map-pin is-origin" data-map-origin-id="${id}" style="--x: ${position.x}%; --y: ${position.y}%;"></span>
                <div class="map-label" data-map-origin-label-id="${id}" style="--x: ${position.x}%; --y: ${Math.max(8, position.y - 10)}%;">${UI.escape(location)}</div>
              `;
            }).join('')}
            ${scoredVenues.map((item, index) => {
              const venue = item.venue;
              const position = MapView.getFallbackPosition(index);
              const selected = confirmedVenueIds.includes(venue.id);
              return `
                <span class="map-pin is-venue${selected ? ' is-selected' : ''}" data-map-venue-id="${UI.escape(venue.id)}" style="--x: ${position.x}%; --y: ${position.y}%;"></span>
                <div class="map-label${selected ? ' is-selected' : ''}" data-map-label-id="${UI.escape(venue.id)}" style="--x: ${position.x}%; --y: ${position.y - 10}%;">${UI.escape(venue.name)}</div>
              `;
            }).join('')}
          </div>
        `;
      },

      renderFilterTags(filterConditions, scoredVenues) {
        const availableTags = new Set(scoredVenues.flatMap((item) => this.getVenueComparableTags(item.venue)));
        const tags = filterConditions.length ? filterConditions : ['暂无筛选条件'];
        return `
          <div class="tag-row">
            ${tags.map((tag) => {
              const matched = availableTags.has(tag);
              return `<span class="tag${matched ? ' is-primary' : ' is-muted'}">${UI.escape(tag)}</span>`;
            }).join('')}
          </div>
        `;
      },

      renderResultCard(item, currentPick) {
        const { venue } = item;
        const checked = currentPick.confirmedVenueIds?.includes(venue.id);
        const copiedInfo = currentPick.copiedInfo?.[venue.id] || {};
        const copiedCount = ['xiaohongshu', 'dianping'].filter((channel) => copiedInfo[channel]).length;
        return `
          <article class="result-card">
            <div class="result-card-head">
              <input class="result-check" type="checkbox" data-pick-action="toggle-confirmed" data-id="${venue.id}" ${checked ? 'checked' : ''} aria-label="选择 ${UI.escape(venue.name)} 加入 My 记录">
              <button class="result-delete-btn" type="button" data-pick-action="remove-venue" data-id="${venue.id}" aria-label="删除 ${UI.escape(venue.name)}">×</button>
              <h3>${UI.escape(venue.name)}</h3>
              <div class="result-card-info">
                <span>${UI.escape(venue.address || '-')}</span>
                <span>${UI.escape(venue.hours || '-')}</span>
                <span>环境：${UI.escape(this.getStep2ConditionValue(venue, '环境'))}</span>
                <span>设备：${UI.escape(this.getStep2ConditionValue(venue, '设备'))}</span>
                <span>美食：${UI.escape(this.getStep2ConditionValue(venue, '美食'))}</span>
                <span>业态：${UI.escape(this.getStep2ConditionValue(venue, '业态'))}</span>
                <span>服务：${UI.escape(this.getStep2ConditionValue(venue, '服务'))}</span>
              </div>
            </div>
            <div class="result-actions">
              <p class="result-copy-count">${copiedCount}/2</p>
              <button class="result-star-btn" type="button" data-pick-action="save-result-star" data-id="${venue.id}" aria-label="进入 Star">♛</button>
            </div>
          </article>
        `;
      },

      getScoredVenues(venues, filterConditions) {
        return venues.map((venue) => {
          const allTags = this.getVenueComparableTags(venue);
          const matches = filterConditions.filter((condition) => allTags.includes(condition));
          const misses = filterConditions.filter((condition) => !allTags.includes(condition));
          const score = filterConditions.length
            ? Math.round((matches.length / filterConditions.length) * 100)
            : 100;
          return { venue, matches, misses, score };
        }).sort((a, b) => b.score - a.score);
      },

      renderVenueCarousel(selectedVenues, activeIndex) {
        const visibleVenues = [
          selectedVenues[activeIndex - 1] || selectedVenues[selectedVenues.length - 1],
          selectedVenues[activeIndex],
          selectedVenues[activeIndex + 1] || selectedVenues[0]
        ].filter(Boolean);
        return `
          <div class="venue-carousel" data-cup-carousel="true" aria-label="当前复制地点">
            <div class="venue-cup-row">
              ${visibleVenues.map((venue, index) => `
                <div class="venue-cup${index === 1 ? ' is-active' : ''}">
                  <span>${UI.escape(venue.name)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      },

      renderDateStrip(currentPick) {
        const today = new Date();
        const todayValue = this.formatDateValue(today);
        const selectedDate = this.parseDateValue(currentPick.date);
        const selectedYear = selectedDate.getFullYear();
        const selectedMonth = selectedDate.getMonth();
        const dayCount = new Date(selectedYear, selectedMonth + 1, 0).getDate();
        const years = this.getYearOptions(selectedYear);
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const days = Array.from({ length: dayCount }, (_, index) => {
            const date = new Date(selectedYear, selectedMonth, index + 1);
            return date;
          });
        return `
          <div class="date-picker">
            <div class="date-month-controls" aria-label="年月选择">
              <label class="date-month-control">
                <select data-date-part="year" aria-label="选择年份">
                  ${years.map((year) => `<option value="${year}" ${year === selectedYear ? 'selected' : ''}>${year}</option>`).join('')}
                </select>
                <span>年</span>
              </label>
              <label class="date-month-control">
                <select data-date-part="month" aria-label="选择月份">
                  ${Array.from({ length: 12 }, (_, index) => {
                    const month = index + 1;
                    return `<option value="${month}" ${index === selectedMonth ? 'selected' : ''}>${monthNames[index]}</option>`;
                  }).join('')}
                </select>
                <span>月</span>
              </label>
            </div>
            <div class="date-strip" aria-label="日期选择">
              ${days.map((date) => {
                const value = this.formatDateValue(date);
                const weekday = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'][date.getDay()];
                const isActive = value === currentPick.date;
                const isToday = value === todayValue;
                return `
                  <button class="date-item${isActive ? ' is-active' : ''}${isToday ? ' is-today' : ''}" type="button" data-pick-action="set-date" data-date="${value}">
                    <strong>${date.getDate()}</strong>
                    <span>${weekday}</span>
                  </button>
                `;
              }).join('')}
            </div>
          </div>
        `;
      },

      scrollDateStripToActive() {
        window.requestAnimationFrame(() => {
          const strip = document.querySelector('#tab-pick .date-strip');
          const active = strip?.querySelector('.date-item.is-active');
          if (!strip || !active) return;
          const targetLeft = active.offsetLeft - (strip.clientWidth - active.clientWidth) / 2;
          strip.scrollLeft = Math.max(0, targetLeft);
        });
      },

      getVenueComparableTags(venue = {}) {
        return [...new Set([
          ...(venue.tags || []),
          ...(venue.customTags || []),
          ...(venue.environment || []),
          ...(venue.device || []),
          ...(venue.food || []),
          ...(venue.business || []),
          ...(venue.service || []),
          ...(venue.pet || [])
        ].map((item) => String(item || '').trim()).filter(Boolean))];
      },

      parseDateValue(value) {
        const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!match) return new Date();
        const year = Number(match[1]);
        const month = Number(match[2]) - 1;
        const day = Number(match[3]);
        const parsed = new Date(year, month, day);
        return Number.isNaN(parsed.getTime()) ? new Date() : parsed;
      },

      getYearOptions(selectedYear) {
        const thisYear = new Date().getFullYear();
        const years = new Set([selectedYear]);
        for (let year = thisYear - 1; year <= thisYear + 2; year += 1) years.add(year);
        return [...years].sort((a, b) => a - b);
      },

      formatDateValue(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      },

      renderWeather(currentPick) {
        if (!this.getPrimaryStartLocation(currentPick.userLocation)) {
          return '<div class="weather-card"><strong>weather</strong>填写出发位置后显示天气占位信息。</div>';
        }
        const weather = WeatherService.getWeather(currentPick);
        return `<div class="weather-card"><strong>weather</strong><span data-weather-text="true">${UI.escape(weather)}</span></div>`;
      },

      renderSelectedVenues(selectedVenues) {
        if (!selectedVenues.length) {
          return `
            <div class="empty-state">
              <h2 class="placeholder-title">还没有候选场地</h2>
              <p>点 + 新建地点或从 Star 选择候选场地。</p>
            </div>
          `;
        }

        return `
          <div class="selected-list">
            ${selectedVenues.map((venue) => `
              <div class="selected-item">
                <div>
                  <h3>${UI.escape(venue.name)}</h3>
                  <p>${UI.escape(venue.hours || '时间待补充')}</p>
                </div>
                <button class="mini-btn is-danger" type="button" data-pick-action="remove-venue" data-id="${venue.id}">×</button>
              </div>
            `).join('')}
          </div>
        `;
      },

      handleInput(event) {
        const field = event.target.dataset.pickField;
        if (!field) return;
        this.updateCurrentPick({ [field]: event.target.value }, false);
        if (field === 'userLocation') WeatherService.scheduleFetch(event.target.value);
      },

      handleChange(event) {
        const field = event.target.dataset.pickField;
        if (field) {
          this.updateCurrentPick({ [field]: event.target.value });
          return;
        }
        const datePart = event.target.dataset.datePart;
        if (datePart) {
          this.setDatePart(datePart, event.target.value);
          return;
        }
        const condition = event.target.dataset.condition;
        if (!condition) return;
        const currentPick = Storage.loadCurrentPick();
        const visibleConditions = this.getStep1Conditions();
        const currentVisibleConditions = currentPick.filterConditions.filter((item) => visibleConditions.includes(item));
        const nextConditions = event.target.checked
          ? [...new Set([...currentVisibleConditions, condition])]
          : currentVisibleConditions.filter((item) => item !== condition);
        this.updateCurrentPick({ filterConditions: nextConditions }, false);
      },

      handleClick(event) {
        const trigger = event.target.closest('[data-pick-action]');
        if (!trigger) return;
        const action = trigger.dataset.pickAction;
        if (action === 'set-date' && this.dateDrag.suppressClick) {
          event.preventDefault();
          this.dateDrag.moved = false;
          this.dateDrag.suppressClick = false;
          return;
        }
        const actions = {
          'back-step-1': () => this.goStep1(),
          'back-step-2': () => this.goStep2View(),
          'open-star-picker': () => this.openStarPicker(),
          'open-channel': () => this.openChannel(trigger.dataset.channel, trigger.dataset.query),
          'remove-venue': () => this.removeVenue(trigger.dataset.id),
          'toggle-confirmed': () => this.toggleConfirmedVenue(trigger.dataset.id),
          'save-result-star': () => this.saveResultToStar(trigger.dataset.id),
          'add-condition': () => this.addCustomCondition(),
          'set-date': () => this.setDate(trigger.dataset.date),
          'go-step-2': () => this.goStep2(),
          'go-step-3': () => this.goStep3(),
          'finish-pick': () => this.openFinishConfirm()
        };
        if (actions[action]) actions[action]();
      },

      handleModalClick(event) {
        const trigger = event.target.closest('[data-pick-action]');
        if (!trigger) return;
        const actions = {
          'confirm-finish-pick': () => this.confirmFinishPick()
        };
        if (actions[trigger.dataset.pickAction]) actions[trigger.dataset.pickAction]();
      },

      setDate(date) {
        this.updateCurrentPick({ date });
      },

      setDatePart(part, value) {
        const currentPick = Storage.loadCurrentPick();
        const selected = this.parseDateValue(currentPick.date);
        const year = part === 'year' ? Number(value) : selected.getFullYear();
        const month = part === 'month' ? Number(value) - 1 : selected.getMonth();
        const maxDay = new Date(year, month + 1, 0).getDate();
        const day = Math.min(selected.getDate(), maxDay);
        this.updateCurrentPick({ date: this.formatDateValue(new Date(year, month, day)) });
      },

      handleDatePointerDown(event) {
        const strip = event.target.closest('.date-strip');
        if (!strip) return;
        this.dateDrag = {
          strip,
          targetDate: event.target.closest('.date-item')?.dataset.date || '',
          startX: event.clientX,
          startScrollLeft: strip.scrollLeft,
          moved: false,
          active: true,
          suppressClick: false
        };
        strip.classList.add('is-dragging');
        strip.setPointerCapture?.(event.pointerId);
      },

      handleDatePointerMove(event) {
        if (!this.dateDrag.active || !this.dateDrag.strip) return;
        const deltaX = event.clientX - this.dateDrag.startX;
        if (Math.abs(deltaX) > 14) this.dateDrag.moved = true;
        if (!this.dateDrag.moved) return;
        this.dateDrag.strip.scrollLeft = this.dateDrag.startScrollLeft - deltaX;
      },

      endDateDrag() {
        const { active, strip, moved, targetDate } = this.dateDrag;
        if (!active || !strip) return;
        strip.classList.remove('is-dragging');
        if (moved) {
          this.dateDrag.suppressClick = true;
        } else if (targetDate) {
          this.dateDrag.suppressClick = true;
          this.setDate(targetDate);
        }
        this.dateDrag = {
          strip: null,
          targetDate: '',
          startX: 0,
          startScrollLeft: 0,
          moved: false,
          active: false,
          suppressClick: this.dateDrag.suppressClick
        };
      },

      cancelDateDrag() {
        if (this.dateDrag.strip) this.dateDrag.strip.classList.remove('is-dragging');
        this.dateDrag = {
          strip: null,
          targetDate: '',
          startX: 0,
          startScrollLeft: 0,
          moved: false,
          active: false,
          suppressClick: false
        };
      },

      handleCupPointerDown(event) {
        const carousel = event.target.closest('[data-cup-carousel]');
        if (!carousel) return;
        const row = carousel.querySelector('.venue-cup-row');
        const currentPick = Storage.loadCurrentPick();
        if (this.getSelectedVenues(currentPick).length < 2) return;
        this.cupDrag = {
          carousel,
          pointerId: event.pointerId,
          startX: event.clientX,
          lastX: event.clientX,
          moved: false,
          active: true,
          row
        };
        carousel.classList.add('is-dragging');
        carousel.setPointerCapture?.(event.pointerId);
        event.preventDefault();
      },

      handleCupPointerMove(event) {
        if (!this.cupDrag.active) return;
        if (this.cupDrag.pointerId !== null && event.pointerId !== this.cupDrag.pointerId) return;
        const deltaX = event.clientX - this.cupDrag.startX;
        this.cupDrag.lastX = event.clientX;
        if (Math.abs(deltaX) > 24) this.cupDrag.moved = true;
        if (this.cupDrag.row) {
          const clampedDelta = Math.max(-120, Math.min(120, deltaX));
          this.cupDrag.row.style.transform = `translateX(${clampedDelta}px)`;
        }
        if (this.cupDrag.moved) event.preventDefault();
      },

      endCupDrag(event = null) {
        if (event && this.cupDrag.pointerId !== null && event.pointerId !== this.cupDrag.pointerId) return;
        const carousel = this.cupDrag.carousel || document.querySelector('[data-cup-carousel]');
        if (carousel) carousel.classList.remove('is-dragging');
        if (!this.cupDrag.active) return;
        const currentPick = Storage.loadCurrentPick();
        const selectedCount = this.getSelectedVenues(currentPick).length;
        const deltaX = this.cupDrag.lastX - this.cupDrag.startX;
        const row = this.cupDrag.row;
        if (row) {
          row.style.transition = 'transform 0.22s ease';
          row.style.transform = this.cupDrag.moved && Math.abs(deltaX) > 36 && selectedCount > 1
            ? `translateX(${deltaX < 0 ? -226 : 226}px)`
            : 'translateX(0)';
        }
        if (this.cupDrag.moved && Math.abs(deltaX) > 36 && selectedCount > 1) {
          const direction = deltaX < 0 ? 1 : -1;
          const nextIndex = (currentPick.activeVenueIndex + direction + selectedCount) % selectedCount;
          window.setTimeout(() => {
            this.updateCurrentPick({ activeVenueIndex: nextIndex });
          }, 140);
        }
        if (carousel && this.cupDrag.pointerId !== null) {
          try {
            carousel.releasePointerCapture?.(this.cupDrag.pointerId);
          } catch (error) {}
        }
        this.cupDrag.active = false;
      },

      cancelCupDrag(event = null) {
        if (event && this.cupDrag.pointerId !== null && event.pointerId !== this.cupDrag.pointerId) return;
        const carousel = this.cupDrag.carousel || document.querySelector('[data-cup-carousel]');
        if (carousel) carousel.classList.remove('is-dragging');
        if (this.cupDrag.row) this.cupDrag.row.style.transform = 'translateX(0)';
        if (carousel && this.cupDrag.pointerId !== null) {
          try {
            carousel.releasePointerCapture?.(this.cupDrag.pointerId);
          } catch (error) {}
        }
        this.cupDrag = {
          carousel: null,
          pointerId: null,
          startX: 0,
          lastX: 0,
          moved: false,
          active: false,
          row: null
        };
      },

      async saveChannelLink(venueId, channel, link) {
        console.info('[PickPick] pick saveChannelLink', {
          venueId,
          channel,
          linkLength: String(link || '').length,
          backendConfigured: BackendClient.isConfigured()
        });
        const currentPick = Storage.loadCurrentPick();
        const copiedInfo = {
          ...(currentPick.copiedInfo || {}),
          [venueId]: {
            ...(currentPick.copiedInfo?.[venueId] || {}),
            [channel]: link
          }
        };
        Storage.saveCurrentPick({ ...currentPick, copiedInfo });
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId) || this.createDraftVenueForExtraction(venueId);
        const extraction = await BackendClient.extractVenueInfo({
          rawText: link,
          channel,
          venue,
          context: 'pick'
        });
        let changedFields = [];
        if (venues.some((item) => item.id === venueId)) {
          const extractedVenue = AIExtractor.applyToVenue(venue, link, extraction.venue);
          const enrichedVenue = await BackendClient.enrichVenueWithPoi({
            baseVenue: venue,
            venue: extractedVenue,
            rawText: link,
            extraction,
            channel
          });
          const nextVenue = enrichedVenue.venue;
          changedFields = AIExtractor.getChangedFields(venue, nextVenue);
          if (JSON.stringify(venue) !== JSON.stringify(nextVenue)) {
            Storage.saveVenues(venues.map((item) => (item.id === venue.id ? nextVenue : item)));
          }
          if (enrichedVenue.poiCandidates.length) {
            UI.closeModal();
            if (this.viewStep === 2) this.render();
            StarManager.showPoiCandidates({
              owner: 'pick',
              venueId,
              baseVenue: venue,
              candidates: enrichedVenue.poiCandidates
            });
            UI.showStatus(`${AIExtractor.getExtractionStatus(link, changedFields)}；请选择高德地点。`, 'success');
            return;
          }
        } else {
          console.warn('[PickPick] pick saveChannelLink extracted without saved venue', { venueId, channel });
        }
        const statusText = AIExtractor.getExtractionStatus(link, changedFields);
        UI.closeModal();
        if (this.viewStep === 2) this.render();
        UI.showStatus(statusText, 'success');

    const WeatherService = {
      pendingKey: '',
      timer: null,

      getWeather(currentPick) {
        const primaryLocation = this.getPrimaryLocation(currentPick);
        if (!primaryLocation) return '';
        const weather = currentPick.weather;
        if (typeof weather === 'string' && weather) return weather;
        if (weather?.text) return weather.text;
        return `${primaryLocation} · 正在获取天气...`;
      },

      ensureWeather(currentPick) {
        const primaryLocation = this.getPrimaryLocation(currentPick);
        if (!primaryLocation) return;
        const key = `${primaryLocation}|${currentPick.date}`;
        if (this.hasResolvedWeather(currentPick.weather, key) || this.pendingKey === key) return;
        window.setTimeout(() => this.fetchWeather(currentPick), 0);
      },

      scheduleFetch(location) {
        const primaryLocation = PickManager.getPrimaryStartLocation(location);
        if (this.timer) window.clearTimeout(this.timer);
        this.updateWeatherText(primaryLocation ? `${primaryLocation} · 正在获取天气...` : '填写出发位置后显示天气信息。');
        this.timer = window.setTimeout(() => {
          const currentPick = Storage.loadCurrentPick();
          if (this.getPrimaryLocation(currentPick)) this.fetchWeather({ ...currentPick, weather: null });
        }, 500);
      },

      async fetchWeather(currentPick) {
        const primaryLocation = this.getPrimaryLocation(currentPick);
        if (!primaryLocation) return;
        const key = `${primaryLocation}|${currentPick.date}`;
        if (this.pendingKey === key || this.hasResolvedWeather(currentPick.weather, key)) return;
        this.pendingKey = key;
        try {
          const place = await this.getUsablePlace(currentPick);
          if (!place) throw new Error('place not found');
          const weather = await this.fetchForecast(place, currentPick, key);
          const latestPick = Storage.loadCurrentPick();
          if (this.getPrimaryLocation(latestPick) !== primaryLocation || latestPick.date !== currentPick.date) return;
          Storage.saveCurrentPick({ ...latestPick, originPlace: place, weather });
          this.updateWeatherText(weather.text);
        } catch (error) {
          const fallback = {
            key,
            unavailable: true,
            text: `${primaryLocation} · 天气暂不可用`
          };
          const latestPick = Storage.loadCurrentPick();
          if (this.getPrimaryLocation(latestPick) === primaryLocation) {
            Storage.saveCurrentPick({ ...latestPick, weather: fallback });
          }
          this.updateWeatherText(fallback.text);
        } finally {
          this.pendingKey = '';
        }
      },

      async getUsablePlace(currentPick) {
        const savedPlace = this.normalizePlace(currentPick.originPlace);
        if (savedPlace) return savedPlace;
        const resolvedPlace = await GeoService.geocode(this.getPrimaryLocation(currentPick));
        return this.normalizePlace(resolvedPlace);
      },

      getPrimaryLocation(currentPick) {
        return PickManager.getPrimaryStartLocation(currentPick.userLocation);
      },

      normalizePlace(place) {
        if (!place) return null;
        const latitude = Number(place.latitude ?? place.lat);
        const longitude = Number(place.longitude ?? place.lon);
        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return null;
        return {
          ...place,
          latitude,
          longitude,
          lat: latitude,
          lon: longitude
        };
      },

      async fetchForecast(place, currentPick, key) {
        const url = [
          'https://api.open-meteo.com/v1/forecast',
          `?latitude=${encodeURIComponent(place.latitude ?? place.lat)}`,
          `&longitude=${encodeURIComponent(place.longitude ?? place.lon)}`,
          '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m',
          '&timezone=auto'
        ].join('');
        const response = await fetch(url);
        if (!response.ok) throw new Error('forecast failed');
        const data = await response.json();
        const current = data.current || {};
        const temperature = Math.round(Number(current.temperature_2m));
        const humidity = Math.round(Number(current.relative_humidity_2m));
        const wind = Math.round(Number(current.wind_speed_10m));
        return {
          key,
          text: `${this.getPrimaryLocation(currentPick) || place.name} · ${this.describeWeather(current.weather_code)} · ${Number.isFinite(temperature) ? `${temperature}°C` : '-'} · 湿度 ${Number.isFinite(humidity) ? `${humidity}%` : '-'} · 风 ${Number.isFinite(wind) ? `${wind}km/h` : '-'}`
        };
      },

      describeWeather(code) {
        const weatherCode = Number(code);
        if (weatherCode === 0) return '晴';
        if ([1, 2].includes(weatherCode)) return '多云';
        if (weatherCode === 3) return '阴';
        if ([45, 48].includes(weatherCode)) return '雾';
        if ([51, 53, 55, 56, 57].includes(weatherCode)) return '毛毛雨';
        if ([61, 63, 65, 66, 67, 80, 81, 82].includes(weatherCode)) return '雨';
        if ([71, 73, 75, 77, 85, 86].includes(weatherCode)) return '雪';
        if ([95, 96, 99].includes(weatherCode)) return '雷雨';
        return '天气';
      },

      updateWeatherText(text) {
        const weatherText = document.querySelector('[data-weather-text="true"]');
        if (weatherText) weatherText.textContent = text;
      },

      hasResolvedWeather(weather, key) {
        if (!weather || weather.key !== key) return false;
        const text = typeof weather === 'string' ? weather : weather.text;
        return Boolean(text && !String(text).includes('天气暂不可用'));
      }
    };

    const GeoService = {
      cache: {},

      async geocode(query) {
        const key = String(query || '').trim().toLowerCase();
        if (!key) return null;
        if (Object.prototype.hasOwnProperty.call(this.cache, key)) {
          this.saveOriginPlace(query, this.cache[key]);
          return this.cache[key];
        }
        let point = null;
        try {
          point = await BackendClient.geocode(query);
        } catch (error) {
          point = null;
        }
        try {
          if (!point) point = await this.geocodeAddress(query);
        } catch (error) {
          if (!point) point = null;
        }
        if (!point) point = await this.geocodeCityCandidates(query);
        this.cache[key] = point;
        this.saveOriginPlace(query, point);
        return point;
      },

      saveOriginPlace(query, point) {
        if (!point) return;
        const currentPick = Storage.loadCurrentPick();
        const primaryLocation = PickManager.getPrimaryStartLocation(currentPick.userLocation);
        if (String(primaryLocation || '').trim().toLowerCase() !== String(query || '').trim().toLowerCase()) return;
        Storage.saveCurrentPick({
          ...currentPick,
          originPlace: point
        });
      },

      async geocodeAddress(query) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=zh-CN&q=${encodeURIComponent(query)}`;
        const response = await fetch(url, { headers: { Accept: 'application/json' } });
        if (!response.ok) return null;
        const data = await response.json();
        const first = data?.[0];
        if (!first) return null;
        const latitude = Number(first.lat);
        const longitude = Number(first.lon);
        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return null;
        return {
          name: first.display_name?.split(',')?.[0] || query,
          latitude,
          longitude,
          lat: latitude,
          lon: longitude
        };
      },

      async geocodeCity(query) {
        const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=zh&format=json`);
        if (!response.ok) return null;
        const data = await response.json();
        const first = data.results?.[0];
        if (!first) return null;
        const latitude = Number(first.latitude);
        const longitude = Number(first.longitude);
        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return null;
        return {
          name: first.name || query,
          latitude,
          longitude,
          lat: latitude,
          lon: longitude
        };
      },

      async geocodeCityCandidates(query) {
        const candidates = this.getLocationCandidates(query);
        for (const candidate of candidates) {
          let point = null;
          try {
            point = await this.geocodeCity(candidate);
          } catch (error) {
            point = null;
          }
          if (point) return point;
        }
        return null;
      },

      getLocationCandidates(query) {
        const value = String(query || '').trim();
        const candidates = [value];
        const municipalities = ['北京', '上海', '天津', '重庆'];
        municipalities.forEach((city) => {
          if (value.includes(city)) {
            candidates.push(`${city}市`, city);
          }
        });
        const patterns = [
          /([\u4e00-\u9fa5]+市)/,
          /([\u4e00-\u9fa5]+区)/,
          /([\u4e00-\u9fa5]+县)/,
          /([\u4e00-\u9fa5]+镇)/,
          /([\u4e00-\u9fa5]+乡)/
        ];
        patterns.forEach((pattern) => {
          const match = value.match(pattern);
          if (match?.[1]) {
            candidates.push(match[1]);
            candidates.push(match[1].replace(/[市区县镇乡]$/, ''));
          }
        });
        return [...new Set(candidates.filter(Boolean))];
      }
    };

      async render(scoredVenues, currentPick) {
        const map = document.querySelector('[data-map-view="true"]');
        if (!map || !scoredVenues.length) return;
