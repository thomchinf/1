      async resolveMapItems(scoredVenues, currentPick) {
        const items = [];
        const originQueries = PickManager.getStartLocations(currentPick.userLocation);
        const originPoints = [];
        for (const [index, query] of originQueries.entries()) {
          const savedOrigin = index === 0 ? this.normalizePoint(currentPick.originPlace) : null;
          const originPoint = savedOrigin || this.normalizePoint(query ? await GeoService.geocode(query) : null);
          if (originPoint) {
            const originItem = { ...originPoint, type: 'origin', id: `origin_${index}`, name: query || originPoint.name || '出发点' };
            originPoints.push(originItem);
            items.push(originItem);
          }
        }
        const origin = originPoints[0] || null;
        for (const item of scoredVenues) {
          const venue = item.venue;
          const point = await this.resolveVenuePoint(venue, origin);
          if (point && this.isReasonableVenuePoint(point, origin)) items.push({ type: 'venue', id: venue.id, name: venue.name, ...point });
        }
        return items;
      },

      async resolveVenuePoint(venue, origin) {
        const cachedPoint = this.normalizePoint(venue.geoPlace);
        if (cachedPoint && this.isReasonableVenuePoint(cachedPoint, origin)) return cachedPoint;
        const baseQuery = [venue.address, venue.name].filter(Boolean).join(' ');
        if (!baseQuery) {
          console.warn('[PickPick] map venue geo skipped', { venueId: venue.id, venueName: venue.name, reason: 'empty query' });
          return null;
        }
        const point = await this.resolveReasonablePoint(baseQuery, origin, venue);
        if (!point) return null;
        this.saveVenuePoint(venue.id, point);
        return point;
      },

      async resolveReasonablePoint(baseQuery, origin, venue) {
        const cityPrefix = origin?.city || origin?.province || '';
        const queries = [
          baseQuery,
          cityPrefix ? `${cityPrefix} ${baseQuery}` : ''
        ].filter(Boolean);
        for (const query of [...new Set(queries)]) {
          const point = this.normalizePoint(await GeoService.geocode(query));
          if (!point) {
            console.warn('[PickPick] map venue geo skipped', {
              venueId: venue.id,
              venueName: venue.name,
              query,
              reason: 'geocode empty'
            });
            continue;
          }
          const distanceKm = origin ? this.getDistanceKm(point, origin) : 0;
          if (this.isReasonableVenuePoint(point, origin)) return point;
          console.warn('[PickPick] map venue geo skipped', {
            venueId: venue.id,
            venueName: venue.name,
            query,
            reason: 'too far from origin',
            distanceKm: Math.round(distanceKm)
          });
        }
        return null;
      },

      saveVenuePoint(venueId, point) {
        const venues = Storage.loadVenues();
        const target = venues.find((venue) => venue.id === venueId);
        if (!target) {
          console.warn('[PickPick] map venue geo cache skipped', { venueId, reason: 'venue not found' });
          return;
        }
        const geoPlace = {
          name: point.name || point.formattedAddress || target.name || '',
          formattedAddress: point.formattedAddress || '',
          city: point.city || '',
          district: point.district || '',
          adcode: point.adcode || '',
          latitude: point.latitude,
          longitude: point.longitude,
          lat: point.lat,
          lon: point.lon
        };
        const saved = Storage.saveVenues(venues.map((venue) => (
          venue.id === venueId ? { ...venue, geoPlace } : venue
        )));
        console.info('[PickPick] map venue geo cached', {
          venueId,
          venueName: target.name,
          saved,
          geoPlace
        });
      },

      isReasonableVenuePoint(point, origin) {
        if (!origin) return true;
        return this.getDistanceKm(point, origin) <= 80;
      },

      getDistanceKm(left, right) {
        const toRadians = (value) => Number(value) * Math.PI / 180;
        const earthRadiusKm = 6371;
        const dLat = toRadians(right.lat - left.lat);
        const dLon = toRadians(right.lon - left.lon);
        const lat1 = toRadians(left.lat);
        const lat2 = toRadians(right.lat);
        const a = Math.sin(dLat / 2) ** 2
          + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
        return earthRadiusKm * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      },

      normalizePoint(point) {
        if (!point) return null;
        const parsedLocation = String(point.location || '').split(',').map((item) => Number(item));
        let latitude = Number(point.latitude ?? point.lat ?? parsedLocation[1]);
        let longitude = Number(point.longitude ?? point.lon ?? parsedLocation[0]);
        if (Math.abs(latitude) > 90 && Math.abs(longitude) <= 90) {
          [latitude, longitude] = [longitude, latitude];
        }
        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return null;
        return {
          ...point,
          latitude,
          longitude,
          lat: latitude,
          lon: longitude
        };
      },

      getBounds(items) {
        const lats = items.map((item) => item.lat);
        const lons = items.map((item) => item.lon);
        let minLat = Math.min(...lats);
        let maxLat = Math.max(...lats);
        let minLon = Math.min(...lons);
        let maxLon = Math.max(...lons);
        const latPad = Math.max((maxLat - minLat) * 0.28, 0.01);
        const lonPad = Math.max((maxLon - minLon) * 0.28, 0.01);
        minLat -= latPad;
        maxLat += latPad;
        minLon -= lonPad;
        maxLon += lonPad;
        return { minLat, maxLat, minLon, maxLon };
      },

      buildMapUrl(bounds) {
        const bbox = [
          bounds.minLon.toFixed(6),
          bounds.minLat.toFixed(6),
          bounds.maxLon.toFixed(6),
          bounds.maxLat.toFixed(6)
        ].join(',');
        return `https://www.openstreetmap.org/export/embed.html?bbox=${encodeURIComponent(bbox)}&layer=mapnik`;
      },

      positionPins(items, bounds) {
        const positionedVenueIds = new Set(items.filter((item) => item.type === 'venue').map((item) => item.id));
        const positionedOriginIds = new Set(items.filter((item) => item.type === 'origin').map((item) => item.id));
        items.forEach((item) => {
          const position = this.project(item, bounds);
          if (item.type === 'origin') {
            const safeOriginId = this.escapeSelector(item.id);
            this.setPosition(document.querySelector(`[data-map-origin-id="${safeOriginId}"]`), position);
            const originPin = document.querySelector(`[data-map-origin-id="${safeOriginId}"]`);
            if (originPin) originPin.style.display = '';
            const originLabel = document.querySelector(`[data-map-origin-label-id="${safeOriginId}"]`);
            if (originLabel) originLabel.textContent = item.name;
            this.setPosition(originLabel, {
              x: position.x,
              y: Math.max(8, position.y - 10)
            });
            if (originLabel) originLabel.style.display = '';
            return;
          }
          const safeId = this.escapeSelector(item.id);
          this.setPosition(document.querySelector(`[data-map-venue-id="${safeId}"]`), position);
          const pin = document.querySelector(`[data-map-venue-id="${safeId}"]`);
          if (pin) pin.style.display = '';
          this.setPosition(document.querySelector(`[data-map-label-id="${safeId}"]`), {
            x: position.x,
            y: Math.max(8, position.y - 10)
          });
          const label = document.querySelector(`[data-map-label-id="${safeId}"]`);
          if (label) label.style.display = '';
        });
        document.querySelectorAll('[data-map-venue-id]').forEach((pin) => {
          if (!positionedVenueIds.has(pin.dataset.mapVenueId)) pin.style.display = 'none';
        });
        document.querySelectorAll('[data-map-label-id]').forEach((label) => {
          if (!positionedVenueIds.has(label.dataset.mapLabelId)) label.style.display = 'none';
        });
        document.querySelectorAll('[data-map-origin-id]').forEach((pin) => {
          if (!positionedOriginIds.has(pin.dataset.mapOriginId)) pin.style.display = 'none';
        });
        document.querySelectorAll('[data-map-origin-label-id]').forEach((label) => {
          if (!positionedOriginIds.has(label.dataset.mapOriginLabelId)) label.style.display = 'none';
        });
      },

      project(item, bounds) {
        const x = ((item.lon - bounds.minLon) / (bounds.maxLon - bounds.minLon)) * 100;
        const minY = this.mercatorY(bounds.minLat);
        const maxY = this.mercatorY(bounds.maxLat);
        const pointY = this.mercatorY(item.lat);
        const y = (1 - ((pointY - minY) / (maxY - minY))) * 100;
        return {
          x: Math.max(8, Math.min(92, x)),
          y: Math.max(12, Math.min(88, y))
        };
      },

      mercatorY(latitude) {
        const clamped = Math.max(-85.05112878, Math.min(85.05112878, Number(latitude)));
        const radians = clamped * Math.PI / 180;
        return Math.log(Math.tan(Math.PI / 4 + radians / 2));
      },

      setPosition(element, position) {
        if (!element) return;
        element.style.setProperty('--x', `${position.x}%`);
        element.style.setProperty('--y', `${position.y}%`);
      },

      escapeSelector(value) {
        if (window.CSS?.escape) return window.CSS.escape(value);
        return String(value).replace(/["\\]/g, '\\$&');
      }
    };

    const BackendClient = {

      async enrichVenueWithPoi({ baseVenue, venue, rawText = '', extraction = {}, channel = '' }) {
        const keyword = this.getPoiKeyword(venue, baseVenue, rawText);
        if (!keyword || !this.shouldSearchPoi(baseVenue, venue, channel)) {
          console.info('[PickPick] backend poi search skipped', {
            channel,
            keyword,
            venueId: baseVenue?.id || venue?.id || '',
            hasGeoPlace: Boolean(baseVenue?.geoPlace || venue?.geoPlace),
            hasAddress: Boolean(baseVenue?.address || venue?.address),
            hasHours: Boolean(AIExtractor.sanitizeHours(baseVenue?.hours || venue?.hours)),
            hasPrice: Boolean(Number(baseVenue?.price?.amount) || Number(venue?.price?.amount)),
            imageCount: Math.max(baseVenue?.images?.length || 0, venue?.images?.length || 0)
          });
          return { venue, poiCandidates: [], autoAppliedPoi: null };
        }
        const city = this.inferPoiCity(venue, baseVenue, rawText, extraction);
        const poiCandidates = await this.searchPoi(keyword, city);

      shouldSearchPoi(baseVenue = {}, venue = {}, channel = '') {
        if (!this.isConfigured()) return false;
        if (!this.getPoiKeyword(venue, baseVenue, '')) return false;
        const linkedChannel = ['xiaohongshu', 'dianping'].includes(String(channel || '').toLowerCase());
        const hasGeoPlace = Boolean(baseVenue.geoPlace || venue.geoPlace);
        const hasAddress = Boolean(baseVenue.address || venue.address);
        const hasHours = Boolean(AIExtractor.sanitizeHours(baseVenue.hours || venue.hours));
        const hasPrice = Boolean(Number(baseVenue.price?.amount) || Number(venue.price?.amount));
        const hasImages = Boolean((baseVenue.images?.length || 0) || (venue.images?.length || 0));
        if (linkedChannel) {
          return !hasGeoPlace || !hasAddress || !hasHours || !hasPrice || !hasImages;
        }
        return !hasGeoPlace || !hasAddress || !hasHours || !hasPrice;
      },

      getPoiKeyword(venue = {}, baseVenue = {}, rawText = '') {
        const sourceName = String(venue.name || baseVenue.name || '').trim();
        const cleanName = sourceName
          .replace(/[（(].*?[)）]/g, ' ')
          .replace(/[^\u4e00-\u9fa5A-Za-z0-9 .&·_-]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
        if (cleanName.length >= 2) return cleanName;
        const textName = String(rawText || '').match(/(?:名称|店名|📍)\s*[:：]?\s*([^\n]{2,32})/)?.[1] || '';
        return textName
          .replace(/[（(].*?[)）]/g, ' ')
          .replace(/[^\u4e00-\u9fa5A-Za-z0-9 .&·_-]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      },

      inferPoiCity(venue = {}, baseVenue = {}, rawText = '', extraction = {}) {
        const note = extraction.note || {};
        const text = [
          note.ipLocation,
          note.city,
          venue.address,
          baseVenue.address,
          extraction.sourceText,
          rawText
        ].map((item) => String(item || '')).join(' ');
        const municipalities = ['北京', '天津', '上海', '重庆'];
        const municipality = municipalities.find((name) => text.includes(name));
        if (municipality) return municipality;
        return text.match(/([\u4e00-\u9fa5]{2,10}市)/)?.[1] || '';
      },

          latitude: Number.isFinite(latitude) ? latitude : null,

          notes: '',
          sceneType: this.getPoiSceneType(poi),
          images: poi.photos?.map((photo) => this.normalizeImageUrl(photo.url)).filter(Boolean) || [],
          geoPlace: poi.latitude !== null && poi.longitude !== null && Number.isFinite(Number(poi.latitude)) && Number.isFinite(Number(poi.longitude))
            ? {
              provider: 'amap',
              id: poi.id || '',
              name: poi.name || '',
              formattedAddress: address,
              city,
              district,
              adcode: poi.adcode || '',
              latitude: Number(poi.latitude),
              longitude: Number(poi.longitude),
              lat: Number(poi.latitude),
              lon: Number(poi.longitude)
            }
            : null
        };
      },

      getPoiBusiness(poi = {}) {
        const text = `${poi.name || ''} ${poi.type || ''}`;
        if (/狗咖|宠物|犬/.test(text) && /咖啡/.test(text)) return '狗咖';
        if (/书店|图书|书房/.test(text) && /咖啡/.test(text)) return '书店+咖啡';
        if (/酒吧|酒馆|精酿|日咖夜酒|早C晚A/.test(text)) return '日咖夜酒';
        if (/咖啡|咖啡厅|饮品|甜品/.test(text)) return '纯咖啡';
        return '';
      },

      getPoiSceneType(poi = {}) {
        const text = `${poi.name || ''} ${poi.type || ''}`;
        if (/咖啡|咖啡厅|饮品|甜品/.test(text)) return '咖啡馆';
        if (/自习|图书|书店|书房|教育/.test(text)) return '自习室';
        return '';
      },

      extractFirstUrl(value) {
        return String(value || '').match(/https?:\/\/\S+/)?.[0] || '';
      },

      cleanCurlValue(value) {
        return String(value || '')
          .trim()
          .replace(/^\^+|\^+$/g, '')
          .replace(/^['"]|['"]$/g, '')
          .trim();
      },

      normalizeCurlCommandText(value) {
        return String(value || '')
          .replace(/\^\r?\n/g, ' ')
          .replace(/\^"/g, '"')
          .replace(/"\^/g, '"')
          .replace(/\^'/g, "'")
          .replace(/'\^/g, "'");
      },

      normalizeDianpingShopUrl(value) {
        const text = this.cleanCurlValue(value);
        const match = text.match(/https?:\/\/(?:m\.|www\.)?dianping\.com\/shop\/([A-Za-z0-9]+)/i);
        return match?.[1] ? `https://m.dianping.com/shop/${match[1]}` : '';
      },

      extractDianpingMobileUrl(value) {
        const text = this.normalizeCurlCommandText(value);
        const direct = text.match(/https?:\/\/(?:m\.|www\.)?dianping\.com\/shop\/[A-Za-z0-9]+/i)?.[0] || '';
        return this.normalizeDianpingShopUrl(direct);
      },

      canonicalDianpingHeaderName(name) {
        const lowered = this.cleanCurlValue(name).replace(/\\"/g, '"').replace(/^\\+/, '').replace(/^"+|"+$/g, '').trim().toLowerCase();
        const map = {
          accept: 'Accept',
          'accept-language': 'Accept-Language',
          cookie: 'Cookie',
          pragma: 'Pragma',
          referer: 'Referer',
          'user-agent': 'User-Agent'
        };
        return map[lowered] || '';
      },

      normalizeDianpingMobileHeaders(headers = {}) {
        const output = {};
        Object.entries(headers || {}).forEach(([name, value]) => {
          const key = this.canonicalDianpingHeaderName(name);
          const text = String(value || '')
            .trim()
            .replace(/\s+/g, ' ')
            .replace(/\^([%#@&|<>()"'])/g, '$1')
            .replace(/\\"/g, '"')
            .trim();
          if (key && text) output[key] = text;
        });
        return output;
      },

      extractDianpingMobileRequest(rawText) {
        const text = this.normalizeCurlCommandText(rawText);
        const url = this.extractDianpingMobileUrl(text);
        if (!url) return null;

        const headers = {};
        const headerPattern = /(?:^|\s)(?:-H|--header)\s+(?:"([^"]*)"|'([^']*)'|([^\r\n]+?)(?=\s+(?:-\w|--\w)|\s*$))/gi;
        let match;
        while ((match = headerPattern.exec(text))) {
          const headerLine = this.cleanCurlValue(match[1] || match[2] || match[3] || '');
          const separator = headerLine.indexOf(':');
          if (separator <= 0) continue;
          const key = headerLine.slice(0, separator).trim();
          const value = headerLine.slice(separator + 1).trim();
          if (key && value) headers[key] = value;
        }

        const cookiePattern = /(?:^|\s)(?:-b|--cookie)\s+(?:"([^"]*)"|'([^']*)'|([^\r\n]+?)(?=\s+(?:-\w|--\w)|\s*$))/gi;
        while ((match = cookiePattern.exec(text))) {
          const cookie = this.cleanCurlValue(match[1] || match[2] || match[3] || '');
          if (cookie) headers.Cookie = cookie;
        }

        return {
          url,
          headers: this.normalizeDianpingMobileHeaders(headers),
          requestMode: 'curl-compact'
        };
      },

      sanitizeVenueForBackend(venue, channel, dianpingMobile) {
        if (!venue || channel !== 'dianping' || !dianpingMobile?.url) return venue;
        const sanitized = JSON.parse(JSON.stringify(venue));
        sanitized.channelLinks = {
          ...(sanitized.channelLinks || {}),
          dianping: dianpingMobile.url
        };
        if (sanitized.sourceUrl && /m\.dianping\.com\/shop\//i.test(String(sanitized.sourceUrl))) {
          sanitized.sourceUrl = dianpingMobile.url;
        }
        return sanitized;
      },

      buildExtractRequestPayload(payload) {
        const channel = String(payload.channel || '').toLowerCase();
        const dianpingMobile = channel === 'dianping'
          ? this.extractDianpingMobileRequest(payload.rawText)
          : null;
        const text = dianpingMobile?.url || payload.rawText;
        return {
          type: 'extract',
          channel: payload.channel,
          text,
          url: dianpingMobile?.url || this.extractFirstUrl(payload.rawText),
          venue: this.sanitizeVenueForBackend(payload.venue, channel, dianpingMobile),
          context: payload.context,
          ...(dianpingMobile ? { dianpingMobile } : {})
        };
      },

      normalizePlace(place) {
        if (!place) return null;
        const latitude = Number(place.latitude ?? place.lat);
        const longitude = Number(place.longitude ?? place.lon);
        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return null;
        return {
          ...place,
          name: place.formattedAddress || place.name || place.query || '',
          latitude,
          longitude,
          lat: latitude,
          lon: longitude
        };
      },

      getSourceText(data = {}) {
        const source = data.data || data;
        const note = source.note || {};
        return [
          source.sourceText,
          note.title ? `标题：${note.title}` : '',
          note.desc ? `正文：${note.desc}` : '',
          note.author ? `作者：${note.author}` : '',
          note.ipLocation ? `地区：${note.ipLocation}` : ''
        ]
          .filter(Boolean)
          .join('\n');
      },

      combineText(rawText, sourceText) {
        const parts = [rawText, sourceText].map((item) => String(item || '').trim()).filter(Boolean);
        return [...new Set(parts)].join('\n');
      },

      normalizeImageUrl(value) {
        const text = String(value || '').trim().replace(/&amp;/g, '&');
        if (/^data:image\//i.test(text)) return text;
        if (!/^https?:\/\//i.test(text)) return '';
        try {
          const url = new URL(text);
          if (!['http:', 'https:'].includes(url.protocol)) return '';
          if (url.hostname.toLowerCase().includes('xiaohongshu.com') && /\/discovery\/item\//i.test(url.pathname)) return '';
          return url.toString();
        } catch (error) {
          return '';
        }
      },

      getExtractedImages(data = {}) {
        const source = data.data || data;
        const values = this.collectImageValues([
          ...(Array.isArray(source.images) ? source.images : []),
          ...(Array.isArray(source.venue?.images) ? source.venue.images : []),
          ...(Array.isArray(source.note?.images) ? source.note.images : []),
          source.note,
          source.venue,
          source.raw,
          data
        ]);
        return [...new Set(values.map((item) => {
          if (typeof item === 'string') return this.normalizeImageUrl(item);
          if (!item || typeof item !== 'object') return '';
          return this.normalizeImageUrl(item.url || item.src || item.imageUrl || item.image_url || item.urlDefault || item.url_default || item.originUrl || item.origin_url);
        }).filter(Boolean))];
      },

      collectImageValues(value, output = [], seen = new Set(), depth = 0, imageContext = false) {
        if (!value || depth > 6 || output.length >= 80) return output;
        if (typeof value === 'string') {
          if (imageContext || /https?:\/\//i.test(value)) output.push(value);
          return output;
        }
        if (typeof value !== 'object' || seen.has(value)) return output;
        seen.add(value);
        if (Array.isArray(value)) {
          value.forEach((item) => this.collectImageValues(item, output, seen, depth + 1, imageContext));
          return output;
        }
        Object.entries(value).forEach(([key, item]) => {
          const isImageKey = /(image|images|photo|photos|pic|picture|cover|urlDefault|url_default|originUrl|origin_url|originalUrl|original_url)/i.test(key)
            && !/(avatar|icon|logo|user)/i.test(key);
          if (isImageKey || imageContext) this.collectImageValues(item, output, seen, depth + 1, isImageKey || imageContext);
        });
        return output;
      },

      normalizeVenue(data = {}) {
        const source = data.data?.venue || data.data || data.venue || data;
        const toArray = (value) => {
          if (Array.isArray(value)) return value.map((item) => String(item).trim()).filter(Boolean);
          if (typeof value === 'string') return value.split(/[，,、\s]+/).map((item) => item.trim()).filter(Boolean);
          return [];
        };
        const environment = toArray(source.environment || source.environments);
        const device = toArray(source.device || source.devices || source.equipment);
        const food = toArray(source.food || source.foods || source.menuItems || source.menu_items);
        const business = toArray(source.business || source.businessType || source.business_type);
        const pet = toArray(source.pet || source.pets);
        const service = [...new Set([
          ...toArray(source.service || source.services || source.policy || source.policies),
          ...pet
        ])];
        const tags = [...new Set([
          ...toArray(source.tags),
          ...environment,
          ...device
        ])];
        const customTags = [...new Set([
          ...toArray(source.customTags || source.custom_tags),
          ...food,
          ...business,
          ...service
        ])];
        return {
          name: source.name || source.title || '',
          address: source.address || source.location || '',
          hours: source.hours || source.openingHours || source.time || '',
          price: {
            amount: Number(source.price?.amount ?? source.priceAmount ?? source.price) || 0,
            unit: source.price?.unit || source.priceUnit || '日',
            text: source.price?.text || source.priceText || source.price_text || ''
          },
          environment,
          device,
          food,
          business,
          service,
          pet,
          tags,
          customTags,
          menuInfo: source.menuInfo || source.menu || '',
          membershipInfo: source.membershipInfo || source.cardInfo || source.membership || '',
          notes: source.notes || source.description || '',
          sceneType: source.sceneType || source.type || '',
          images: Array.isArray(source.images) ? source.images.map((image) => this.normalizeImageUrl(image)).filter(Boolean) : [],
          geoPlace: source.geoPlace || null,
          source: source.source || ''
        };
      },

      hasVenueData(venue = {}) {
        return Boolean(
          venue.name ||
          venue.address ||
          venue.hours ||
          Number(venue.price?.amount) > 0 ||
          venue.price?.text ||
          venue.environment?.length ||
          venue.device?.length ||
          venue.food?.length ||
          venue.business?.length ||
          venue.service?.length ||
          venue.pet?.length ||
          venue.tags?.length ||
          venue.customTags?.length ||
          venue.images?.length ||
          venue.menuInfo ||
          venue.membershipInfo ||
          venue.notes ||
          venue.sceneType
        );
      }
    };

    const AIExtractor = {
      extractVenue(rawText) {
        const text = this.normalizeText(rawText);
        const lines = text.split(/\n+/).map((line) => line.trim()).filter(Boolean);
        const name = this.extractName(lines);
        return {
          id: StarManager.createId('v'),
          name,
          address: this.extractAddress(lines),
          hours: this.extractHours(text, lines),
          price: this.extractPrice(text),
          environment: this.extractEnvironment(text),
          device: this.extractDevice(text),
          food: this.extractFood(text),
          business: this.extractBusiness(text),
          service: this.extractService(text),
          pet: [],
          tags: this.extractTags(text),
          customTags: this.extractCustomTags(text),
          menuInfo: this.extractMenuInfo(lines),
          membershipInfo: this.extractMembershipInfo(lines),
          notes: this.extractNotes(text),
          images: [],
          visitCount: 0,
          createdAt: new Date().toISOString().slice(0, 10),
          sceneType: this.extractSceneType(text)
        };
      },

      applyToVenue(venue, rawText, extractedVenue = null) {
        const extracted = this.cleanVenueFields(extractedVenue || this.extractVenue(rawText));
        const nextVenue = { ...venue };
        const mergeText = (field) => {
          if (extracted[field] && !nextVenue[field]) nextVenue[field] = extracted[field];
        };
        if (extracted.name && (!nextVenue.name || this.isPlaceholderName(nextVenue.name))) {
          nextVenue.name = extracted.name;
        }
        if (nextVenue.address && !this.isLikelyAddress(nextVenue.address)) {
          nextVenue.address = '';
        }
        mergeText('address');
        mergeText('hours');
        mergeText('menuInfo');
        mergeText('membershipInfo');
        nextVenue.notes = this.mergeTextBlock(nextVenue.notes, extracted.notes);
        if (!Number(nextVenue.price?.amount) && (Number(extracted.price?.amount) || extracted.price?.text)) {
          nextVenue.price = extracted.price;
        }
        ['environment', 'device', 'food', 'business', 'service'].forEach((field) => {
          nextVenue[field] = this.uniqueArray([...(nextVenue[field] || []), ...(extracted[field] || [])]);
        });
        nextVenue.service = this.uniqueArray([...(nextVenue.service || []), ...(nextVenue.pet || []), ...(extracted.pet || [])]);
        nextVenue.pet = [];
        nextVenue.tags = this.uniqueArray([
          ...(nextVenue.tags || []),
          ...(extracted.tags || []),
          ...(nextVenue.environment || []),
          ...(nextVenue.device || [])
        ]);
        nextVenue.customTags = this.uniqueArray([
          ...(nextVenue.customTags || []),
          ...(extracted.customTags || []),
          ...(nextVenue.food || []),
          ...(nextVenue.business || []),
          ...(nextVenue.service || [])
        ]);
        if ((!nextVenue.sceneType || nextVenue.sceneType === '其他') && extracted.sceneType) {
          nextVenue.sceneType = extracted.sceneType;
        }
        if (extracted.geoPlace && !nextVenue.geoPlace) {
          nextVenue.geoPlace = extracted.geoPlace;
        }
        nextVenue.images = this.uniqueArray([...(nextVenue.images || []), ...(extracted.images || [])]);
        return this.cleanVenueFields(nextVenue);
      },

      applyPoiToVenue(baseVenue = {}, currentVenue = {}, poiVenue = {}) {
        const nextVenue = { ...currentVenue };
        if (poiVenue.name) {
          nextVenue.name = poiVenue.name;
        }
        if (poiVenue.address) {
          nextVenue.address = poiVenue.address;
        }
        const poiHours = this.sanitizeHours(poiVenue.hours);
        if (poiHours) {
          nextVenue.hours = poiHours;
        }
        if ((Number(poiVenue.price?.amount) || poiVenue.price?.text) && !Number(baseVenue.price?.amount)) {
          nextVenue.price = poiVenue.price;
        }
        if ((!baseVenue.sceneType || baseVenue.sceneType === '其他') && poiVenue.sceneType) {
          nextVenue.sceneType = poiVenue.sceneType;
        }
        ['environment', 'device', 'food', 'business', 'service'].forEach((field) => {
          nextVenue[field] = this.uniqueArray([...(nextVenue[field] || []), ...(poiVenue[field] || [])]);
        });
        nextVenue.service = this.uniqueArray([...(nextVenue.service || []), ...(nextVenue.pet || []), ...(poiVenue.pet || [])]);
        nextVenue.pet = [];
        nextVenue.tags = this.uniqueArray([
          ...(nextVenue.tags || []),
          ...(poiVenue.tags || []),
          ...(nextVenue.environment || []),
          ...(nextVenue.device || [])
        ]);
        nextVenue.customTags = this.uniqueArray([
          ...(nextVenue.customTags || []),
          ...(poiVenue.customTags || []),
          ...(nextVenue.food || []),
          ...(nextVenue.business || []),
          ...(nextVenue.service || [])
        ]);
        if (poiVenue.geoPlace) nextVenue.geoPlace = poiVenue.geoPlace;
        nextVenue.images = this.uniqueArray([...(nextVenue.images || []), ...(poiVenue.images || [])]);
        if (poiVenue.notes) {
          nextVenue.notes = this.mergeTextBlock(nextVenue.notes, poiVenue.notes);
        }
        return this.cleanVenueFields(nextVenue);
      },

      mergeExtractedVenue(primary = {}, fallback = {}) {
        const merged = { ...this.cleanVenueFields(primary) };
        fallback = this.cleanVenueFields(fallback);
        ['name', 'hours', 'menuInfo', 'membershipInfo', 'notes'].forEach((field) => {
          if (!merged[field] && fallback[field]) merged[field] = fallback[field];
        });
        if (!merged.address && fallback.address && this.isLikelyAddress(fallback.address)) {
          merged.address = fallback.address;
        }
        if ((!merged.sceneType || merged.sceneType === '其他') && fallback.sceneType) {
          merged.sceneType = fallback.sceneType;
        }
        if (!Number(merged.price?.amount) && !merged.price?.text && (Number(fallback.price?.amount) || fallback.price?.text)) {
          merged.price = fallback.price;
        }
        ['environment', 'device', 'food', 'business', 'service'].forEach((field) => {
          merged[field] = this.uniqueArray([...(merged[field] || []), ...(fallback[field] || [])]);
        });
        merged.service = this.uniqueArray([...(merged.service || []), ...(merged.pet || []), ...(fallback.pet || [])]);
        merged.pet = [];
        merged.tags = this.uniqueArray([
          ...(merged.tags || []),
          ...(fallback.tags || []),
          ...(merged.environment || []),
          ...(merged.device || [])
        ]);
        merged.customTags = this.uniqueArray([
          ...(merged.customTags || []),
          ...(fallback.customTags || []),
          ...(merged.food || []),
          ...(merged.business || []),
          ...(merged.service || [])
        ]);
        merged.images = this.uniqueArray([...(merged.images || []), ...(fallback.images || [])]);
        merged.notes = this.mergeTextBlock(merged.notes, fallback.notes);
        return this.cleanVenueFields(merged);
      },

      mergeTextBlock(current = '', incoming = '') {
        const currentText = String(current || '').trim();
        const incomingText = String(incoming || '').trim();
        if (!incomingText) return currentText;
        if (!currentText) return incomingText;
        if (currentText.includes(incomingText) || incomingText.includes(currentText)) return currentText.length >= incomingText.length ? currentText : incomingText;
        return `${currentText}\n${incomingText}`;
      },

      cleanVenueFields(venue = {}) {
        const nextVenue = { ...venue };
        const noteText = String(nextVenue.notes || '').trim();
        const deviceValues = nextVenue.device || [];
        const serviceLikeDevice = deviceValues.filter((item) => /Wi-?Fi|无线|停车|宠物|抽烟|吸烟|禁烟|地铁|交通|服务态度/.test(item));
        const trueDeviceValues = deviceValues.filter((item) => !serviceLikeDevice.includes(item));
        const serviceFromPet = this.uniqueArray([...(nextVenue.service || []), ...(nextVenue.pet || []), ...serviceLikeDevice]);
        nextVenue.environment = this.uniqueArray([...(nextVenue.environment || []), ...this.extractEnvironment(noteText)]);
        nextVenue.device = this.uniqueArray([...trueDeviceValues, ...this.extractDevice(noteText)]);
        nextVenue.food = this.uniqueArray([...(nextVenue.food || []), ...this.extractFood(noteText)]);
        nextVenue.business = this.uniqueArray([...(nextVenue.business || []), ...this.extractBusiness(noteText)]);
        nextVenue.service = this.uniqueArray([...serviceFromPet, ...this.extractService(noteText)]);
        nextVenue.pet = [];
        nextVenue.hours = this.sanitizeHours(nextVenue.hours);
        if (/不适合自习|不建议自习|自习建议选择.*专门/.test(noteText) && !/不适合自习/.test(nextVenue.sceneType || '')) {
          nextVenue.sceneType = nextVenue.sceneType && nextVenue.sceneType !== '其他'
            ? `${nextVenue.sceneType}；不适合自习`
            : '不适合自习';
        }
        nextVenue.notes = this.extractBusinessStatus(noteText);
        nextVenue.tags = this.uniqueArray([...(nextVenue.tags || []), ...(nextVenue.environment || []), ...(nextVenue.device || [])]);
        nextVenue.customTags = this.uniqueArray([
          ...(nextVenue.customTags || []),
          ...(nextVenue.food || []),
          ...(nextVenue.business || []),
          ...(nextVenue.service || [])
        ]);
        return nextVenue;
      },

      sanitizeHours(value = '') {
        const text = String(value || '')
          .replace(/[—–－~～]/g, '-')
          .replace(/：/g, ':')
          .replace(/\s+/g, ' ')
          .trim();
        if (!text) return '';
        const hasWeek = /周[一二三四五六日末]|星期[一二三四五六日天]|工作日|每天|每日|全年|节假日/.test(text);
        const hasRange = /\d{1,2}:\d{2}\s*(?:-|至|到)\s*\d{1,2}:\d{2}/.test(text);
        const isRelativeStatus = /^(?:次日|明日|明天|今天|今日)|(?:开始营业|营业中|休息中|已打烊|打烊|闭店|暂停营业)/.test(text);
        if (isRelativeStatus && !hasWeek && !hasRange) return '';
        return text;
      },

      extractBusinessStatus(text = '') {
        const status = String(text || '').match(/(正常营业|暂停营业|休息中|已打烊|打烊|闭店|搬迁(?:新址)?|停业|歇业)/)?.[1] || '';
        return status ? `营业状态：${status}` : '';
      },

      isPlaceholderName(value) {
        return /^\d+$/.test(String(value || '').trim()) || /^未命名/.test(String(value || '').trim());
      },

      isLikelyAddress(value) {
        const text = String(value || '').trim();
        if (!text || text.length < 3 || /^https?:\/\//.test(text)) return false;
        if (/[|｜#]/.test(text) || /\[话题\]/.test(text) || /小红书|笔记|测评|标题|作者/.test(text)) return false;
        return /(省|市|区|县).{0,24}(路|街|道|号|弄|巷|广场|中心|商场|大厦|大学|店|旧址)/.test(text)
          || /(路|街|道|弄|巷).{0,16}\d{1,5}\s*号?/.test(text)
          || /(天津|北京|上海|广州|深圳|杭州|成都|重庆|南京|武汉|西安|苏州).{0,24}(路|街|道|号|广场|中心|商场|大厦|大学|旧址)/.test(text);
      },

      uniqueArray(values) {
        return [...new Set(values.map((item) => String(item || '').trim()).filter(Boolean))];
      },

      saveExtractedVenue(venue, rawText, venues = Storage.loadVenues(), extractedVenue = null) {
        const nextVenue = this.applyToVenue(venue, rawText, extractedVenue);
        const changedFields = this.getChangedFields(venue, nextVenue);
        if (changedFields.length) {
          Storage.saveVenues(venues.map((item) => (item.id === venue.id ? nextVenue : item)));
        }
        return changedFields;
      },

      getChangedFields(before, after) {
        const fields = [
          ['address', '位置'],
          ['hours', '时间'],
          ['price', '价格'],
          ['tags', '标签'],
          ['customTags', '自定义标签'],
          ['service', '服务'],
          ['menuInfo', '菜单'],
          ['membershipInfo', '办卡'],
          ['images', '照片'],
          ['notes', '备注'],
          ['sceneType', '场景']
        ];
        return fields
          .filter(([field]) => JSON.stringify(before[field] || '') !== JSON.stringify(after[field] || ''))
          .map(([, label]) => label);
      },

      getExtractionStatus(rawText, changedFields) {
        if (changedFields.length) return `已保存并提取：${changedFields.join('、')}`;
        return this.isLinkOnly(rawText)
          ? '链接已保存。单独链接无法在本地提取字段，请粘贴页面复制文字。'
          : '信息已保存，未识别到可填字段。';
      },

      isLinkOnly(rawText) {
        const text = String(rawText || '').trim();
        if (!text) return false;
        const withoutUrls = text.replace(/https?:\/\/\S+/g, '').trim();
        return !withoutUrls || withoutUrls.length < 8;
      },

      normalizeText(rawText) {
        return String(rawText || '')
          .replace(/\r/g, '\n')
          .replace(/https?:\/\/\S+/g, '')
          .replace(/[ \t]+/g, ' ')
          .trim();
      },

      extractName(lines) {
        const line = lines
          .map((item) => this.stripSourcePrefix(item))
          .find((item) => !/链接|地址|营业|时间|价格|电话|导航|收藏|团购/.test(item));
        return line
          ?.replace(/^(标题|名称|店名)[:：\s]*/, '')
          .replace(/^[#【\[]|[】\]#]$/g, '')
          .trim() || '未命名场地';
      },

      extractAddress(lines) {
        const cleanLines = lines.map((line) => this.stripSourcePrefix(line));
        const addressLine = cleanLines.find((line) => /^(地址|位置|导航|门店地址)[:：\s]/.test(line))
          || cleanLines.find((line) => this.isLikelyAddress(line));
        if (!addressLine) return '';
        const address = addressLine
          .replace(/^(地址|位置|导航|门店地址)[:：\s]*/, '')
          .replace(/(查看地图|导航|复制地址).*$/, '')
          .trim();
        return this.isLikelyAddress(address) ? address : '';
      },

      extractHours(text, lines) {
        const cleanLines = lines.map((line) => this.stripSourcePrefix(line));
        const hourLines = cleanLines
          .filter((line) => /(营业|开放|时间|周一|周二|周三|周四|周五|周六|周日|周末|星期|每天|每日)/.test(line))
          .filter((line) => /(\d{1,2}[:：]\d{2}|休息|关闭|打烊|闭店|全天)/.test(line))
          .map((line) => line
            .replace(/^(营业时间|时间|开放时间)[:：\s]*/, '')
            .replace(/[—–－~～]/g, '-')
            .replace(/：/g, ':')
            .trim())
          .filter(Boolean);
        if (hourLines.length) return this.uniqueArray(hourLines).slice(0, 3).join('；');
        const times = text.match(/\d{1,2}[:：]\d{2}/g);
        return times?.length >= 2 ? `${times[0].replace('：', ':')}-${times[1].replace('：', ':')}` : '';
      },

      stripSourcePrefix(line) {
        return String(line || '')
          .replace(/^\s*(?:\[[^\]]{1,12}\]|【[^】]{1,12}】|#[^#\s]{1,16}#)\s*/g, '')
          .replace(/^\s*(?:[^\s:：]{1,8}R)\s*/g, '')
          .trim();
      },

      extractPrice(text) {
        const rangeMatch = text.match(/(?:人均|单价|价格|甜品单价|咖啡.*单价)?[^\d]{0,8}(\d{1,4})\s*[-~—至到]\s*(\d{1,4})\s*(?:元|块)/);
        if (rangeMatch) {
          return {
            amount: Math.round((Number(rangeMatch[1]) + Number(rangeMatch[2])) / 2),
            unit: /杯|咖啡|饮品|拿铁/.test(rangeMatch[0]) ? '杯' : '人',
            text: rangeMatch[0].trim()
          };
        }
        const priceMatch = text.match(/(?:日卡|单日|全天|人均|均价|价格|单价|￥|¥)?\s*(\d{1,4})\s*(?:元|块|r|R)\s*\/?\s*(日|天|时|小时|杯|次|人)?/);
        if (!priceMatch) return { amount: 0, unit: '日', text: '' };
        const unitMap = { 天: '日', 小时: '时' };
        const unit = unitMap[priceMatch[2]] || priceMatch[2] || (/人均/.test(priceMatch[0]) ? '人' : (/饮品均价|咖啡.*均价|饮品|咖啡|杯/.test(text) ? '杯' : '次'));
        return {
          amount: Number(priceMatch[1]) || 0,
          unit,
          text: priceMatch[0].trim()
        };
      },

      extractEnvironment(text) {
        const values = [];
        if (/安静|宁静|静谧|专注|自习|学习|办公|看书/.test(text)) values.push('整体宁静');
        if (/吵|嘈杂|喧闹|聊天声|人声|爆满|满座|人多|人很多|排队/.test(text)) values.push(/周末|周六|周日/.test(text) ? '周末人多' : '人多偏吵');
        if (/采光|自然光|阳光|明亮|光线好|光线很棒/.test(text)) values.push('自然光充足');
        if (/天黑|晚上|夜晚|光线暗|有点暗|偏暗|昏暗/.test(text)) values.push('光线偏暗');
        if (/温馨|暖色|暖光|温暖/.test(text)) values.push('色彩温暖');
        if (/复古|老洋房|民国|中古/.test(text)) values.push('复古风格');
        if (/日式|原木|木质/.test(text)) values.push('日式原木感');
        if (/简洁|极简|简约/.test(text)) values.push('复古简洁');
        if (/宽敞|空间大|空间感|两层|2层|三层|3层/.test(text)) values.push('空间宽敞');
        if (/局促|拥挤|狭小|位置挤/.test(text)) values.push('略显局促');
        if (/咖啡香|香气|闻起来|味道/.test(text)) values.push('咖啡香');
        const timeScene = text.match(/(?:周[一二三四五六日末]|星期[一二三四五六日天]|工作日|周末)?\s*(?:上午|中午|下午|晚上|天黑后|夜间)\s*\d{0,2}点?/);
        if (timeScene?.[0]) values.push(`到店时段：${timeScene[0].trim()}`);
        return this.uniqueArray(values);
      },

      extractDevice(text) {
        const values = [];
        if (/座位宽敞|坐得开|不挤|座位间距/.test(text)) values.push('座位宽敞');
        if (/座位窄|位置挤|座位少|座位有限|只能容纳|六七桌/.test(text)) values.push('座位偏窄');
        if (/椅子舒服|座椅舒服|沙发|靠垫/.test(text)) values.push('座位舒适');
        if (/椅子硬|座椅硬/.test(text)) values.push('椅子偏硬');
        if (/楼梯.*陡|楼梯很陡|楼梯偏陡/.test(text)) values.push('楼梯较陡');
        if (/空调冷|空调偏冷/.test(text)) values.push('空调偏冷');
        if (/空调热|闷热|温度高/.test(text)) values.push('空调偏热');
        if (/窗景|窗边|靠窗|窗户|大窗|落地窗/.test(text)) values.push('有窗景');
        if (/树荫|树影|绿荫|绿化/.test(text)) values.push('有树荫');
        if (/大桌|长桌|桌子大/.test(text)) values.push('大桌');
        const tableSize = text.match(/\d{1,2}\s*[-到至]\s*\d{1,2}\s*人桌/);
        if (tableSize?.[0]) values.push(tableSize[0].replace(/\s+/g, ''));
        if (/每个座位.*插座|每座.*插座|插座.*每个座位/.test(text)) values.push('每座有插座');
        else if (/插座不多|插座不算多|插座少|不是每个位置|并非每个位置|电源少/.test(text)) values.push('插座不多');
        else if (/插座|充电|电源/.test(text)) values.push('有插座');
        if (/卫生间|洗手间|厕所/.test(text)) values.push(/干净|自动马桶|马桶垫/.test(text) ? '洗手间干净' : '洗手间');
        return this.uniqueArray(values);
      },

      extractFood(text) {
        const matches = text.match(/手冲|特调|风味咖啡|特色咖啡|冰美式|美式|拿铁|抹茶拿铁|焙茶拿铁|咖啡|苹果肉桂茶|茶|气泡水|苏打|薯条|三明治|贝果|披萨|简餐|轻食|鸡肉沙拉|柠檬巴斯克|巴斯克|芝士流心可颂|苹果肉桂卷|可颂|甜点|甜品|蛋糕|冰激凌|Gelato/gi) || [];
        return this.uniqueArray(matches).slice(0, 8);
      },

      extractBusiness(text) {
        if (/狗咖|宠物咖啡|狗狗咖啡/.test(text)) return ['狗咖'];
        if (/日咖夜酒|早C晚A|晚上.*酒|夜间.*酒|晚上.*酒吧|咖啡\s*\+\s*酒|咖啡和酒/.test(text)) return ['日咖夜酒'];
        if (/书店|书房|图书/.test(text) && /咖啡/.test(text)) return ['书店+咖啡'];
        if (/咖啡|拿铁|美式|饮品|茶/.test(text)) return ['纯咖啡'];
        return [];
      },

      extractPet(text) {
        const values = [];
        if (/猫|猫咪|店猫/.test(text)) values.push('猫');
        if (/狗|狗狗|宠物狗/.test(text)) values.push('狗');
        return this.uniqueArray(values);
      },

      extractService(text) {
        const values = [];
        if (/Wi-?Fi|无线网|无线网络|网速/.test(text)) values.push(/网差|网速慢|Wi-?Fi.*慢/.test(text) ? 'Wi-Fi较弱' : 'Wi-Fi');
        if (/服务态度好|服务好|店员.*好|店员.*贴心|姐姐.*送/.test(text)) values.push('服务态度好');
        if (/服务差|态度差|不耐烦/.test(text)) values.push('服务态度一般');
        if (/宠物友好|可带宠物|带狗|带猫/.test(text)) values.push('宠物友好');
        if (/不可携带宠物|不能带宠物|禁止宠物/.test(text)) values.push('不可携带宠物');
        if (/可抽烟|允许抽烟|吸烟区/.test(text)) values.push('可抽烟');
        if (/禁烟|无烟|不吸烟/.test(text)) values.push('禁烟');
        if (/付费停车|停车收费|收费停车/.test(text)) values.push('付费停车');
        else if (/停车|车位|停车位/.test(text)) values.push('有停车位');
        if (/地铁|公交|交通方便|交通便利|\d+号线|站[A-Z0-9]*口|口出|步行?\d+\s*m|走\d+\s*m/.test(text)) values.push('交通便利');
        if (/免费柠檬水|柠檬水/.test(text)) values.push('免费柠檬水');
        if (/免费自取水|自取水|免费饮水|饮用水/.test(text)) values.push('免费自取水');
        if (/纸巾|擦手纸|卫生纸/.test(text)) values.push('提供纸巾');
        if (/无需预约|不用预约/.test(text)) values.push('无需预约');
        if (/现场等位|排队|等位/.test(text)) values.push('需现场等位');
        return this.uniqueArray([...values, ...this.extractPet(text)]);
      },

      extractTags(text) {
        return this.uniqueArray([...this.extractEnvironment(text), ...this.extractDevice(text)]);
      },

      extractCustomTags(text) {
        const tags = [...this.extractFood(text), ...this.extractBusiness(text), ...this.extractService(text)];
        if (/椅子|座椅|沙发/.test(text)) tags.push('椅子舒服');
        if (/停车|车位/.test(text)) tags.push('可停车');
        if (/地铁|公交/.test(text)) tags.push('交通方便');
        if (/包间|独立/.test(text)) tags.push('有独立空间');
        if (/露天|户外|小院|院子/.test(text)) tags.push('露天位');
        if (/老洋房|洋房|民国老建筑/.test(text)) tags.push('老洋房');
        return this.uniqueArray(tags);
      },

      extractNotes(text) {
        return this.extractBusinessStatus(text);
      },

      extractMenuInfo(lines) {
        const menuLines = lines.filter((line) => /(美式|拿铁|咖啡|饮品|茶|轻食|甜品|餐|菜单|元\/杯)/.test(line));
        return menuLines.slice(0, 4).join('；');
      },

      extractMembershipInfo(lines) {
        const memberLines = lines.filter((line) => /(会员|办卡|月卡|周卡|日卡|次卡|充值|套餐)/.test(line));
        return memberLines.slice(0, 4).join('；');
      },

      extractSceneType(text) {
        if (/咖啡|拿铁|美式|饮品/.test(text)) return '咖啡馆';
        if (/自习|学习|书房|工位|办公/.test(text)) return '自习室';
        return '其他';
      }
    };

    const HistoryManager = {
      activeRecordIndex: 0,
      activeDate: '',
      pendingPhotoRecordId: '',
      pendingPhotoDate: '',
      pendingPhotoTarget: 'record',
      calendarClick: {
        timer: null,
        date: '',
        index: ''
      },
      calendarLongPress: {
        timer: null,
        date: '',
        moved: false,
        startX: 0,
        startY: 0,
        triggered: false
      },
      recentDeleteRecordId: '',
      recentClickBlockId: '',
      recentLongPress: {
        timer: null,
        id: '',
        startX: 0,
        startY: 0
      },
      bookDrag: {
        active: false,
        startX: 0,
        lastX: 0,
        moved: false,
        card: null
      },

      init() {
        const myTab = document.getElementById('tab-my');
        myTab.addEventListener('click', (event) => this.handleClick(event));
        myTab.addEventListener('dblclick', (event) => this.handleDoubleClick(event));
        myTab.addEventListener('input', (event) => this.handleInput(event));
        myTab.addEventListener('change', (event) => this.handleChange(event));
        myTab.addEventListener('pointerdown', (event) => this.handlePointerDown(event));
        myTab.addEventListener('pointermove', (event) => this.handlePointerMove(event));
        myTab.addEventListener('pointerup', () => this.handlePointerUp());
        myTab.addEventListener('pointercancel', () => this.handlePointerCancel());
        document.getElementById('modal-container').addEventListener('click', (event) => this.handleModalClick(event));
      },

      render() {
        const history = this.getSortedHistory();
        const todayValue = this.formatDateValue(new Date());
        const activeDate = this.activeDate || todayValue;
        const activeRecord = this.getRecordByDate(activeDate, history);
        this.activeRecordIndex = activeRecord ? history.findIndex((record) => record.id === activeRecord.id) : -1;
        this.activeDate = activeDate;
        document.getElementById('tab-my').innerHTML = `
          <h1 id="my-title" class="sr-only">我的记录</h1>
          <div class="my-shell">
            <section class="my-profile" aria-label="个人信息">
              <div class="my-avatar" aria-hidden="true"></div>
              <p>explorer of the world</p>
            </section>
            ${this.renderCalendar(history, activeDate)}
            ${this.renderRecentRecords(history, activeDate)}
            ${this.renderDailyPanel(activeDate, activeRecord)}
          </div>
        `;
        this.scrollRecentToActive();
      },

      getSortedHistory() {
        return Storage.loadHistory().slice().sort((left, right) => {
          const rightTime = new Date(right.date || 0).getTime();
          const leftTime = new Date(left.date || 0).getTime();
          return rightTime - leftTime;
        });
      },

      getRecordByDate(date, history = this.getSortedHistory()) {
        return history.find((record) => record.date === date) || null;
      },

      renderCalendar(history, activeDate) {
        const calendarDate = new Date(`${activeDate}T00:00:00`);
        const year = calendarDate.getFullYear();
        const month = calendarDate.getMonth();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const firstDay = new Date(year, month, 1);
        const dayCount = new Date(year, month + 1, 0).getDate();
        const todayValue = this.formatDateValue(new Date());
        const blankCount = (firstDay.getDay() + 6) % 7;
        const dateRecordMap = history.reduce((map, record, index) => {
          if (record.date && !map.has(record.date)) map.set(record.date, index);
          return map;
        }, new Map());
        const blanks = Array.from({ length: blankCount }, () => '<span class="calendar-day is-empty"></span>');
        const days = Array.from({ length: dayCount }, (_, index) => {
          const day = index + 1;
          const value = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const recordIndex = dateRecordMap.get(value);
          const hasRecord = typeof recordIndex !== 'undefined';
          const calendarPhoto = hasRecord ? history[recordIndex]?.calendarPhoto : '';
          return `
            <button
              class="calendar-day${hasRecord ? ' has-record' : ''}${calendarPhoto ? ' has-photo' : ''}${value === activeDate ? ' is-active' : ''}${value === todayValue ? ' is-today' : ''}"
              type="button"
              data-history-action="select-record"
              data-date="${value}"
              data-index="${hasRecord ? recordIndex : ''}"
              aria-label="${value}${hasRecord ? ' 有记录' : ''}"
            >
              ${calendarPhoto ? `<img src="${UI.escape(calendarPhoto)}" alt="">` : ''}
              <span>${day}</span>
            </button>
          `;
        });
        return `
          <section>
            <div class="my-month">
              <div class="my-month-controls" aria-label="My 年月选择">
                <label class="date-month-control">
                  <select data-history-date-part="year" aria-label="选择年份">
                    ${this.getYearOptions(year).map((item) => `<option value="${item}" ${item === year ? 'selected' : ''}>${item}</option>`).join('')}
                  </select>
                  <span>年</span>
                </label>
                <label class="date-month-control">
                  <select data-history-date-part="month" aria-label="选择月份">
                    ${Array.from({ length: 12 }, (_, index) => {
                      const item = index + 1;
                      return `<option value="${item}" ${index === month ? 'selected' : ''}>${monthNames[index]}</option>`;
                    }).join('')}
                  </select>
                  <span>月</span>
                </label>
              </div>
            </div>
            <div class="my-calendar-card">
              <div class="calendar-grid">
                ${['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map((day) => `<span class="calendar-weekday">${day}</span>`).join('')}
                ${blanks.join('')}
                ${days.join('')}
              </div>
              <input id="calendar-upload-input" class="calendar-upload-input" type="file" accept="image/*" multiple data-history-photo="calendar-upload">
            </div>
          </section>
        `;
      },

      renderRecentRecords(history, activeDate) {
        const rows = this.getTimelineRows(history, activeDate);
        return `
          <section class="recent-board" aria-label="记录本">
            <button class="recent-nav is-up" type="button" data-history-action="move-record-date" data-direction="-1" aria-label="上一条记录">▲</button>
            <div class="recent-track">
              ${rows.map((record, index) => this.renderRecentRow(record, index)).join('')}
            </div>
            <button class="recent-nav is-down" type="button" data-history-action="move-record-date" data-direction="1" aria-label="下一条记录">▼</button>
          </section>
        `;
      },

      renderRecentRow(row, index) {
        const record = row.record;
        const venue = record ? this.getPrimaryVenue(record) : null;
        const time = record ? this.getRecordTime(record) : '';
        const address = venue?.address || record?.userLocation || '';
        const action = record ? 'open-record-detail' : 'select-record';
        const deleteOpen = record && this.recentDeleteRecordId === record.id;
        return `
          <div class="recent-item-wrap${deleteOpen ? ' is-delete-open' : ''}">
            <button class="recent-item${row.isActive ? ' is-active' : ''}${record ? '' : ' is-placeholder'}" type="button" data-history-action="${action}" data-id="${record?.id || ''}" data-date="${row.date}" data-index="${record ? row.index : ''}">
              <span class="recent-date">${UI.escape(this.formatShortDate(row.date))}</span>
              <span class="recent-venue">${UI.escape(venue?.name || '')}</span>
              <span class="recent-time">${UI.escape(time || '')}</span>
              <span class="recent-place">${UI.escape(address || '')}</span>
            </button>
            ${record ? `<button class="recent-delete-btn" type="button" data-history-action="delete-record-row" data-id="${record.id}" aria-label="删除 ${UI.escape(venue?.name || record.date || '记录')}">删除</button>` : ''}
          </div>
        `;
      },

      getTimelineRows(history, activeDate) {
        const activeValue = activeDate || this.formatDateValue(new Date());
        const rowsByDate = new Map();
        history.forEach((record, index) => {
          if (!record.date || rowsByDate.has(record.date)) return;
          rowsByDate.set(record.date, { date: record.date, record, index });
        });
        if (!rowsByDate.has(activeValue)) {
          rowsByDate.set(activeValue, { date: activeValue, record: null, index: -1 });
        }

        const recordDates = history
          .map((record) => record.date)
          .filter(Boolean)
          .sort((left, right) => this.parseDateValue(left) - this.parseDateValue(right));
        const hasPreviousRecord = recordDates.some((date) => date < activeValue);
        const hasNextRecord = recordDates.some((date) => date > activeValue);
        if (!hasPreviousRecord) {
          const previousDate = this.addDays(activeValue, -1);
          if (!rowsByDate.has(previousDate)) rowsByDate.set(previousDate, { date: previousDate, record: null, index: -1 });
        }
        if (!hasNextRecord) {
          const nextDate = this.addDays(activeValue, 1);
          if (!rowsByDate.has(nextDate)) rowsByDate.set(nextDate, { date: nextDate, record: null, index: -1 });
        }

        return [...rowsByDate.values()]
          .sort((left, right) => this.parseDateValue(left.date) - this.parseDateValue(right.date))
          .map((row) => ({ ...row, isActive: row.date === activeValue }));
      },

      scrollRecentToActive() {
        window.requestAnimationFrame(() => {
          const track = document.querySelector('#tab-my .recent-track');
          const active = track?.querySelector('.recent-item.is-active');
          if (!track || !active) return;
          const targetTop = active.offsetTop - (track.clientHeight - active.clientHeight) / 2;
          track.scrollTop = Math.max(0, targetTop);
        });
      },

      moveRecordDate(direction) {
        if (!direction) return;
        const history = this.getSortedHistory();
        const rows = this.getTimelineRows(history, this.activeDate || this.formatDateValue(new Date()));
        const activeIndex = rows.findIndex((row) => row.isActive);
        const nextIndex = Math.max(0, Math.min(rows.length - 1, activeIndex + direction));
        if (nextIndex === activeIndex) return;
        const nextRow = rows[nextIndex];
        this.activeDate = nextRow.date;
        this.activeRecordIndex = nextRow.index;
        this.render();
      },

      renderDailyPanel(activeDate, record) {
        const venue = record ? this.getPrimaryVenue(record) : null;
        const title = venue?.name || record?.title || activeDate;
        const displayDate = record?.date || activeDate;
        return `
          <section class="my-day-panel" aria-label="当天记录">
            <div>
              <div class="my-note-box">
                <span class="my-note-label">note &gt;</span>
                <textarea class="record-note" id="daily-note-input" placeholder="写下这次选择的体验">${UI.escape(record?.notes || '')}</textarea>
                <div class="photo-stack">
                  ${record ? this.renderPhotos(record) : '<div class="photo-empty">照片位置</div>'}
                </div>
              </div>
              <div class="my-day-info">
                <h3>${UI.escape(title)}</h3>
                <p>${UI.escape(this.formatShortDate(displayDate))}</p>
              </div>
            </div>
            <div class="my-day-actions">
              <button class="my-side-action" type="button" data-history-action="save-daily-note" data-id="${record?.id || ''}">save</button>
              <button class="my-side-action" type="button" data-history-action="open-record-output" data-id="${record?.id || ''}">output</button>
              <button class="my-side-action" type="button" data-history-action="open-record-star" data-id="${record?.id || ''}">star</button>
              <span></span>
              <button class="my-photo-action" type="button" data-history-action="open-photo-source" data-id="${record?.id || ''}">photo</button>
            </div>
          </section>
        `;
      },

      renderToolRow(record) {
        const disabledClass = record ? '' : ' is-disabled';
        return `
          <section class="my-tool-row" aria-label="记录工具">
            <button class="my-tool-btn" type="button" data-history-action="create-record" aria-label="新增记录">⊕</button>
            <button class="my-tool-btn" type="button" data-history-action="open-photo-source" data-id="${record?.id || ''}" aria-label="添加照片">⌾</button>
            <button class="my-tool-btn${disabledClass}" type="button" data-history-action="focus-note" ${record ? '' : 'disabled'} aria-label="编辑备注">♧</button>
            <button class="my-tool-btn${disabledClass}" type="button" data-history-action="remove-record" ${record ? '' : 'disabled'} aria-label="删除记录">♜</button>
            <button class="my-tool-btn${disabledClass}" type="button" data-history-action="remove-photo" data-id="${record?.id || ''}" data-index="${Math.max(0, (record?.photos || []).length - 1)}" ${(record?.photos || []).length ? '' : 'disabled'} aria-label="删除照片">⊖</button>
          </section>
        `;
      },

      renderEmptyBook(activeDate) {
        return `
          <section class="record-book">
            <article class="record-card">
              <div class="record-meta">
                <h3>${UI.escape(activeDate)}</h3>
                <p>暂无记录，点击日期或左侧加号创建记录。</p>
              </div>
            </article>
          </section>
        `;
      },

      renderRecordBook(history) {
        const record = history[this.activeRecordIndex] || history[0];
        const venue = this.getPrimaryVenue(record);
        const venueNames = this.getRecordVenueNames(record);
        const conditions = record.filterConditions || [];
        return `
          <section class="record-book" aria-label="记录本">
            <article class="record-card">
              <div class="record-meta">
                <h3>${UI.escape(venue?.name || '未命名记录')}</h3>
                <p>${UI.escape(this.formatShortDate(record.date))} · ${UI.escape(record.userLocation || '-')} · ${UI.escape(this.getRecordTime(record) || '-')}</p>
                <p>场地：${UI.escape(venueNames || '-')}</p>
              </div>
              <div class="record-tags">
                ${conditions.length ? conditions.map((condition) => `<span class="tag is-primary">${UI.escape(condition)}</span>`).join('') : '<span class="tag">-</span>'}
              </div>
              <textarea class="record-note" data-history-field="notes" data-id="${record.id}" placeholder="写下这次选择的体验">${UI.escape(record.notes || '')}</textarea>
              <div class="photo-stack">
                ${this.renderPhotos(record)}
              </div>
              <span class="record-page-count">${this.activeRecordIndex + 1}/${history.length}</span>
            </article>
          </section>
        `;
      },

      renderPhotos(record) {
        const photos = record.photos || [];
        if (!photos.length) return '<div class="photo-empty">照片位置</div>';
        return photos.map((photo, index) => `
          <div class="photo-thumb">
            <img src="${UI.escape(photo)}" alt="记录照片 ${index + 1}">
            <button type="button" data-history-action="remove-photo" data-id="${record.id}" data-index="${index}" aria-label="删除照片">×</button>
          </div>
        `).join('');
      },

      handleClick(event) {
        const trigger = event.target.closest('[data-history-action]');
        if (!trigger) return;
        const action = trigger.dataset.historyAction;
        if (action === 'delete-record-row') {
          this.deleteRecordById(trigger.dataset.id);
          return;
        }
        if (action === 'select-record') {
          if (this.calendarLongPress.triggered && trigger.dataset.date === this.calendarLongPress.date) {
            this.calendarLongPress.triggered = false;
            return;
          }
          if (trigger.classList.contains('calendar-day') && trigger.classList.contains('has-record')) {
            this.handleCalendarRecordClick(trigger.dataset.index, trigger.dataset.date);
            return;
          }
          if (event.detail >= 2 && trigger.classList.contains('has-record')) {
            this.openRecordDetail('', trigger.dataset.date || '');
            return;
          }
          this.selectRecord(trigger.dataset.index, trigger.dataset.date);
          return;
        }
        if (action === 'open-record-detail') {
          if (this.recentClickBlockId === trigger.dataset.id) {
            this.recentClickBlockId = '';
            return;
          }
          if (this.recentDeleteRecordId === trigger.dataset.id) {
            this.recentDeleteRecordId = '';
            this.render();
            return;
          }
          this.recentDeleteRecordId = '';
          this.openRecordDetail(trigger.dataset.id, trigger.dataset.date);
          return;
        }
        if (action === 'move-record-date') {
          this.moveRecordDate(Number(trigger.dataset.direction) || 0);
          return;
        }
        if (action === 'create-record') {
          this.createRecordForDate(this.activeDate || this.formatDateValue(new Date()));
          return;
        }
        if (action === 'open-photo-source') {
          const record = this.saveCurrentDailyState(trigger.dataset.id);
          this.prepareRecordUpload(record?.id || trigger.dataset.id);
          return;
        }
        if (action === 'save-daily-note') {
          this.saveDailyNote(trigger.dataset.id);
          return;
        }
        if (action === 'open-record-output') {
          this.openRecordOutput(trigger.dataset.id);
          return;
        }
        if (action === 'open-record-star') {
          this.openRecordStar(trigger.dataset.id);
          return;
        }
        if (action === 'focus-note') {
          document.querySelector('.record-note')?.focus();
          return;
        }
        if (action === 'remove-record') {
          this.removeActiveRecord();
          return;
        }
        if (action === 'remove-photo') {
          this.removePhoto(trigger.dataset.id, Number(trigger.dataset.index));
        }
      },

      handleDoubleClick(event) {
        const calendarDay = event.target.closest('.calendar-day.has-record');
        if (!calendarDay) return;
        event.preventDefault();
        this.openRecordDetail('', calendarDay.dataset.date || '');
      },

      handleCalendarRecordClick(indexValue = '', dateValue = '') {
        if (this.calendarClick.timer && this.calendarClick.date === dateValue) {
          window.clearTimeout(this.calendarClick.timer);
          this.calendarClick = { timer: null, date: '', index: '' };
          this.openRecordDetail('', dateValue);
          return;
        }
        if (this.calendarClick.timer) window.clearTimeout(this.calendarClick.timer);
        this.calendarClick = {
          date: dateValue,
          index: indexValue,
          timer: window.setTimeout(() => {
            const pending = { ...this.calendarClick };
            this.calendarClick = { timer: null, date: '', index: '' };
            this.selectRecord(pending.index, pending.date);
          }, 260)
        };
      },

      handleModalClick(event) {
        const trigger = event.target.closest('[data-history-action]');
        if (!trigger) return;
        const action = trigger.dataset.historyAction;
        if (action === 'choose-photo-source') {
          this.openPendingPhotoInput(trigger.dataset.source);
          return;
        }
        if (action === 'confirm-save-record') {
          this.confirmSaveRecord(trigger.dataset.id);
          return;
        }
        if (action === 'share-record') {
          this.shareRecord(trigger.dataset.id, trigger.dataset.channel);
        }
      },

      handleInput(event) {
        if (event.target.dataset.historyField !== 'notes') return;
        this.saveRecordPatch(event.target.dataset.id, { notes: event.target.value }, false);
      },

      handleChange(event) {
        const datePart = event.target.dataset.historyDatePart;
        if (datePart) {
          this.setDatePart(datePart, event.target.value);
          return;
        }
        const photoInput = event.target.dataset.historyPhoto;
        if (!photoInput) return;
        const files = Array.from(event.target.files || []);
        if (photoInput === 'calendar-upload') {
          this.handleCalendarPhotoUpload(files);
        } else {
          this.handlePhotoUpload(event.target.dataset.id, files);
        }
        event.target.value = '';
      },

      handlePointerDown(event) {
        const recentItem = event.target.closest('.recent-item[data-history-action="open-record-detail"]');
        if (recentItem) {
          this.startRecentLongPress(event, recentItem);
        }
        const calendarDay = event.target.closest('.calendar-day:not(.is-empty)');
        if (calendarDay) {
          this.startCalendarLongPress(event, calendarDay);
        }
      },

      handlePointerMove(event) {
        this.moveRecentLongPress(event);
        this.moveCalendarLongPress(event);
      },

      handlePointerUp() {
        this.endRecentLongPress();
        this.endCalendarLongPress();
      },

      handlePointerCancel() {
        this.cancelRecentLongPress();
        this.cancelCalendarLongPress();
      },

      selectRecord(indexValue, dateValue) {
        if (dateValue) this.activeDate = dateValue;
        if (indexValue !== '' && typeof indexValue !== 'undefined') {
          this.activeRecordIndex = Number(indexValue);
          const history = this.getSortedHistory();
          this.activeDate = history[this.activeRecordIndex]?.date || this.activeDate;
          this.render();
          return;
        }
        if (dateValue) this.render();
      },

      setDatePart(part, value) {
        const selected = this.parseDateValue(this.activeDate || this.formatDateValue(new Date()));
        const year = part === 'year' ? Number(value) : selected.getFullYear();
        const month = part === 'month' ? Number(value) - 1 : selected.getMonth();
        const maxDay = new Date(year, month + 1, 0).getDate();
        const day = Math.min(selected.getDate(), maxDay);
        this.activeDate = this.formatDateValue(new Date(year, month, day));
        const history = this.getSortedHistory();
        const recordIndex = history.findIndex((record) => record.date === this.activeDate);
        if (recordIndex >= 0) this.activeRecordIndex = recordIndex;
        this.render();
      },

      getYearOptions(selectedYear) {
        const thisYear = new Date().getFullYear();
        const years = new Set([selectedYear]);
        for (let year = thisYear - 1; year <= thisYear + 2; year += 1) years.add(year);
        return [...years].sort((left, right) => left - right);
      },

      parseDateValue(value) {
        const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!match) return new Date();
        const date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
        return Number.isNaN(date.getTime()) ? new Date() : date;
      },

      startRecentLongPress(event, rowButton) {
        this.cancelRecentLongPress();
        const id = rowButton.dataset.id || '';
        if (!id) return;
        this.recentLongPress = {
          timer: window.setTimeout(() => {
            this.recentDeleteRecordId = id;
            this.recentClickBlockId = id;
            this.recentLongPress.timer = null;
            this.render();
          }, 560),
          id,
          startX: event.clientX,
          startY: event.clientY
        };
      },

      moveRecentLongPress(event) {
        if (!this.recentLongPress.timer) return;
        const movedX = Math.abs(event.clientX - this.recentLongPress.startX);
        const movedY = Math.abs(event.clientY - this.recentLongPress.startY);
        if (movedX > 10 || movedY > 10) this.cancelRecentLongPress();
      },

      endRecentLongPress() {
        if (!this.recentLongPress.timer) return;
        window.clearTimeout(this.recentLongPress.timer);
        this.recentLongPress = { timer: null, id: '', startX: 0, startY: 0 };
      },

      cancelRecentLongPress() {
        if (this.recentLongPress.timer) window.clearTimeout(this.recentLongPress.timer);
        this.recentLongPress = { timer: null, id: '', startX: 0, startY: 0 };
      },

      startCalendarLongPress(event, dayButton) {
        this.cancelCalendarLongPress();
        const date = dayButton.dataset.date || '';
        this.calendarLongPress = {
          timer: window.setTimeout(() => {
            this.calendarLongPress.triggered = true;
          }, 560),
          date,
          moved: false,
          startX: event.clientX,
          startY: event.clientY,
          triggered: false
        };
      },

      moveCalendarLongPress(event) {
        if (!this.calendarLongPress.timer) return;
        const movedX = Math.abs(event.clientX - this.calendarLongPress.startX);
        const movedY = Math.abs(event.clientY - this.calendarLongPress.startY);
        if (movedX > 10 || movedY > 10) this.cancelCalendarLongPress();
      },

      endCalendarLongPress() {
        const shouldUpload = this.calendarLongPress.triggered && this.calendarLongPress.date;
        if (this.calendarLongPress.timer) {
          window.clearTimeout(this.calendarLongPress.timer);
          this.calendarLongPress.timer = null;
        }
        if (shouldUpload) this.prepareCalendarUpload(this.calendarLongPress.date);
      },

      cancelCalendarLongPress() {
        if (this.calendarLongPress.timer) window.clearTimeout(this.calendarLongPress.timer);
        this.calendarLongPress.timer = null;
      },

      prepareCalendarUpload(date) {
        this.activeDate = date;
        this.pendingPhotoDate = date;
        const existingRecord = this.getSortedHistory().find((record) => record.date === date);
        this.pendingPhotoRecordId = existingRecord?.id || '';
        this.pendingPhotoTarget = 'calendar';
        this.openPhotoSourceModal(date);
      },

      prepareRecordUpload(recordId) {
        const fallbackDate = this.activeDate || this.formatDateValue(new Date());
        const record = recordId
          ? this.getSortedHistory().find((item) => item.id === recordId)
          : this.ensureRecordForDate(fallbackDate, false);
        if (!record) return;
        this.pendingPhotoRecordId = record.id;
        this.pendingPhotoDate = record.date;
        this.pendingPhotoTarget = 'record';
        this.openPhotoSourceModal(record.date);
      },

      openPhotoSourceModal(date) {
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">Photo</p>
              <h2 class="modal-title">${UI.escape(date)} 添加照片</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <div class="modal-actions">
            <button class="primary-btn" type="button" data-history-action="choose-photo-source" data-source="camera">拍照</button>
            <button class="secondary-btn" type="button" data-history-action="choose-photo-source" data-source="gallery">从相册选择</button>
          </div>
        `);
      },

      openPendingPhotoInput(source) {
        const input = document.getElementById('calendar-upload-input');
        if (!input) return;
        if (source === 'camera') {
          input.setAttribute('capture', 'environment');
          input.multiple = false;
        } else {
          input.removeAttribute('capture');
          input.multiple = true;
        }
        UI.closeModal();
        window.setTimeout(() => input.click(), 0);
      },

      handleCalendarPhotoUpload(files) {
        const recordId = this.pendingPhotoRecordId;
        const date = this.pendingPhotoDate;
        const target = this.pendingPhotoTarget;
        this.pendingPhotoRecordId = '';
        this.pendingPhotoDate = '';
        this.pendingPhotoTarget = 'record';
        if (!files.length || !date) return;
        const record = recordId
          ? this.getSortedHistory().find((item) => item.id === recordId)
          : this.ensureRecordForDate(date, false);
        if (!record) return;
        if (target === 'calendar') {
          this.handleCalendarDayPhoto(record.id, files);
        } else {
          this.handlePhotoUpload(record.id, files);
        }
      },

      ensureRecordForDate(date, shouldRender = true) {
        const sortedHistory = this.getSortedHistory();
        const existingIndex = sortedHistory.findIndex((record) => record.date === date);
        if (existingIndex >= 0) {
          this.activeRecordIndex = existingIndex;
          this.activeDate = date;
          if (shouldRender) this.render();
          return sortedHistory[existingIndex];
        }
        const record = {
          id: StarManager.createId('cr'),
          date,
          userLocation: '',
          weather: '',
          venueIds: [],
          chosenVenueId: '',
          filterConditions: [],
          notes: '',
          calendarPhoto: '',
          photos: []
        };
        const history = Storage.loadHistory();
        if (!Storage.saveHistory([record, ...history])) return null;
        this.activeRecordIndex = this.getSortedHistory().findIndex((item) => item.id === record.id);
        if (this.activeRecordIndex < 0) this.activeRecordIndex = 0;
        this.activeDate = date;
        if (shouldRender) this.render();
        return record;
      },

      startBookDrag(event, recordBook) {
        const card = recordBook.querySelector('.record-card');
        this.bookDrag = {
          active: true,
          startX: event.clientX,
          lastX: event.clientX,
          moved: false,
          card
        };
        recordBook.classList.add('is-dragging');
        recordBook.setPointerCapture?.(event.pointerId);
      },

      moveBookDrag(event) {
        if (!this.bookDrag.active) return;
        const deltaX = event.clientX - this.bookDrag.startX;
        this.bookDrag.lastX = event.clientX;
        if (Math.abs(deltaX) > 18) this.bookDrag.moved = true;
        if (this.bookDrag.card) {
          const clampedDelta = Math.max(-96, Math.min(96, deltaX));
          this.bookDrag.card.style.transform = `translateX(${clampedDelta}px)`;
        }
      },

      endBookDrag() {
        const recordBook = document.querySelector('.record-book');
        if (recordBook) recordBook.classList.remove('is-dragging');
        if (!this.bookDrag.active) return;
        const deltaX = this.bookDrag.lastX - this.bookDrag.startX;
        if (this.bookDrag.card) this.bookDrag.card.style.transform = 'translateX(0)';
        if (this.bookDrag.moved && Math.abs(deltaX) > 52) {
          this.changeRecord(deltaX < 0 ? 1 : -1);
        }
        this.bookDrag.active = false;
      },

      cancelBookDrag() {
        const recordBook = document.querySelector('.record-book');
        if (recordBook) recordBook.classList.remove('is-dragging');
        if (this.bookDrag.card) this.bookDrag.card.style.transform = 'translateX(0)';
        this.bookDrag.active = false;
      },

      changeRecord(direction) {
        const history = this.getSortedHistory();
        if (!history.length) return;
        const nextIndex = Math.max(0, Math.min(history.length - 1, this.activeRecordIndex + direction));
        if (nextIndex === this.activeRecordIndex) return;
        this.activeRecordIndex = nextIndex;
        this.activeDate = history[nextIndex]?.date || this.activeDate;
        this.render();
      },

      createRecordForDate(date) {
        const beforeCount = Storage.loadHistory().length;
        const record = this.ensureRecordForDate(date);
        if (!record) return;
        if (Storage.loadHistory().length > beforeCount) {
          UI.showStatus('已创建当天记录，可以上传照片或写备注。', 'success');
        }
      },

      saveDailyNote(recordId = '') {
        const record = this.saveCurrentDailyState(recordId);
        if (!record) return;
        this.openSaveConfirm(record);
      },

      saveCurrentDailyState(recordId = '') {
        const noteInput = document.getElementById('daily-note-input');
        const notes = noteInput ? noteInput.value : '';
        const date = this.activeDate || this.formatDateValue(new Date());
        const record = recordId
          ? this.getSortedHistory().find((item) => item.id === recordId)
