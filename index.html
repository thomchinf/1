<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2DCD9B">
  <title>PickPick</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <style>
    :root {
      --color-primary: #2DCD9B;
      --color-primary-dark: #159D77;
      --color-bg: #FAFAFA;
      --color-surface: #FFFFFF;
      --color-text: #1F2933;
      --color-muted: #6B7280;
      --color-line: #E5E7EB;
      --color-soft: #F2FBF8;
      --color-danger: #E5484D;
      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.06);
      --radius-card: 12px;
      --radius-control: 12px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --tab-height: 64px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      display: flex;
      justify-content: center;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--color-bg);
      overflow: hidden;
    }

    .app-main {
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 0px) + var(--space-4)) var(--space-4)
        calc(var(--tab-height) + env(safe-area-inset-bottom, 0px) + var(--space-4));
      overflow-y: auto;
    }

    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .eyebrow {
      margin: 0 0 var(--space-1);
      color: var(--color-primary-dark);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .header-copy {
      margin: var(--space-2) 0 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .panel {
      background: var(--color-surface);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--space-4);
    }

    .panel + .panel {
      margin-top: var(--space-4);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .metric {
      min-width: 0;
      border-radius: 10px;
      background: var(--color-soft);
      padding: var(--space-3);
    }

    .metric-value {
      display: block;
      color: var(--color-primary-dark);
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .metric-label {
      display: block;
      margin-top: var(--space-1);
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .data-list {
      display: grid;
      gap: var(--space-2);
      margin: var(--space-3) 0 0;
      padding: 0;
      list-style: none;
    }

    .data-list li {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      border-top: 1px solid var(--color-line);
      padding-top: var(--space-2);
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .data-list strong {
      color: var(--color-text);
      font-size: 14px;
    }

    .status-banner {
      display: none;
      margin-bottom: var(--space-4);
      border: 1px solid rgba(229, 72, 77, 0.28);
      border-radius: var(--radius-control);
      background: #FFF5F5;
      color: #A8252A;
      padding: var(--space-3);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-banner.is-visible {
      display: block;
    }

    .status-banner.is-success {
      border-color: rgba(45, 205, 155, 0.36);
      background: #ECFDF5;
      color: #13765A;
    }

    .search-field,
    .field {
      display: grid;
      gap: var(--space-2);
    }

    .search-field {
      margin-bottom: var(--space-4);
    }

    label {
      color: var(--color-text);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-control);
      background: #FFFFFF;
      color: var(--color-text);
      padding: 10px 12px;
      outline: none;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(45, 205, 155, 0.16);
    }

    .venue-list {
      display: grid;
      gap: var(--space-3);
      margin-top: var(--space-4);
    }

    .venue-card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: minmax(96px, 1fr) auto;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      background-position: center;
      background-size: cover;
      box-shadow: var(--shadow-card);
      color: #FFFFFF;
      isolation: isolate;
      min-height: 240px;
    }

    .venue-card::before {
      position: absolute;
      inset: 0;
      z-index: -1;
      content: "";
      background: linear-gradient(180deg, rgba(31, 41, 51, 0.04) 0%, rgba(31, 41, 51, 0.12) 42%, rgba(31, 41, 51, 0.82) 100%);
    }

    .venue-card::after {
      position: absolute;
      inset: 0;
      z-index: -2;
      content: "";
      background: #1F2933;
    }

    .venue-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-2);
    }

    .venue-card-body {
      align-self: end;
      display: grid;
      gap: var(--space-2);
      margin: var(--space-3);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      background: rgba(31, 41, 51, 0.54);
      padding: var(--space-3);
      backdrop-filter: blur(10px);
    }

    .venue-card h3,
    .modal-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
    }

    .venue-card h3 {
      font-size: 16px;
    }

    .venue-meta,
    .detail-row {
      margin: 0;
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .venue-card .venue-meta {
      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      line-height: 1.35;
    }

    .scene-badge {
      flex: 0 0 auto;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      color: #FFFFFF;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      border-radius: 999px;
      background: #F3F4F6;
      color: var(--color-muted);
      padding: 4px 7px;
      font-size: 11px;
      line-height: 1.2;
    }

    .tag.is-primary {
      background: var(--color-soft);
      color: var(--color-primary-dark);
      font-weight: 700;
    }

    .venue-card .tag {
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
    }

    .venue-card .tag.is-primary {
      background: rgba(45, 205, 155, 0.88);
      color: #FFFFFF;
    }

    .card-actions,
    .form-actions,
    .modal-actions {
      display: grid;
      gap: var(--space-2);
    }

    .card-actions {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .text-btn,
    .danger-btn {
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.16);
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .text-btn.is-primary {
      border-color: rgba(45, 205, 155, 0.56);
      background: rgba(45, 205, 155, 0.9);
      color: #FFFFFF;
    }

    .danger-btn {
      border-color: rgba(255, 255, 255, 0.22);
      color: #FFE3E3;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.56;
    }

    .empty-state {
      display: grid;
      gap: var(--space-3);
      border: 1px dashed var(--color-line);
      border-radius: var(--radius-card);
      background: #FFFFFF;
      padding: var(--space-5);
      text-align: center;
    }

    .empty-state p {
      margin: 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .modal-container {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
    }

    .modal-container.is-open {
      display: block;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(31, 41, 51, 0.42);
    }

    .modal-sheet {
      position: absolute;
      left: 50%;
      bottom: 0;
      display: grid;
      gap: var(--space-4);
      width: 100%;
      max-width: 430px;
      max-height: min(88vh, 760px);
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      background: #FFFFFF;
      padding: var(--space-5) var(--space-4) calc(var(--space-5) + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .modal-close {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      min-height: 40px;
      border: 0;
      border-radius: 50%;
      background: #F3F4F6;
      color: var(--color-muted);
      font-size: 22px;
      line-height: 1;
    }

    .venue-form {
      display: grid;
      gap: var(--space-4);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .form-grid .field.is-full {
      grid-column: 1 / -1;
    }

    .pick-step {
      display: grid;
      gap: var(--space-3);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .pick-board {
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
    }

    #tab-pick .app-header {
      margin-bottom: var(--space-3);
    }

    #tab-pick h1 {
      font-size: 24px;
      font-weight: 500;
    }

    #tab-pick .header-copy {
      margin-top: var(--space-2);
      color: #111111;
      font-size: 11px;
      font-weight: 600;
    }

    #tab-pick .eyebrow {
      visibility: hidden;
      height: 18px;
      margin: 0 0 var(--space-2);
    }

    .pick-topbar {
      display: block;
    }

    .pick-location {
      display: grid;
      gap: 4px;
    }

    .pick-location label,
    .station-title,
    .select-title {
      color: var(--color-text);
      font-size: 11px;
      font-weight: 800;
      text-transform: lowercase;
    }

    .pick-location input {
      min-height: 34px;
      border: 0;
      border-bottom: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      padding: 4px 0;
      font-size: 13px;
    }

    .pick-arrow-btn {
      width: 38px;
      height: 24px;
      min-height: 24px;
      border: 0;
      border-radius: 999px;
      background: #D8D8D8;
      color: #111111;
      font-weight: 900;
    }

    .pick-arrow-btn:disabled {
      opacity: 0.35;
    }

    .step2-nav {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      min-height: 32px;
      margin-bottom: -12px;
    }

    .step2-nav .pick-arrow-btn:first-child {
      grid-column: 1;
    }

    .step2-nav .pick-arrow-btn:last-child {
      grid-column: 3;
    }

    .date-strip {
      display: flex;
      gap: var(--space-2);
      overflow-x: auto;
      padding: var(--space-2) 0 var(--space-3);
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
    }

    .date-strip.is-dragging {
      cursor: grabbing;
      scroll-snap-type: none;
    }

    .date-strip::-webkit-scrollbar {
      display: none;
    }

    .date-item {
      flex: 0 0 44px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #111111;
      padding: 7px 4px;
      text-align: center;
      scroll-snap-align: center;
      transition: background 0.16s ease, transform 0.16s ease, color 0.16s ease;
    }

    .date-item strong,
    .date-item span {
      display: block;
      line-height: 1.1;
    }

    .date-item strong {
      font-size: 17px;
      font-weight: 500;
    }

    .date-item span {
      margin-top: 3px;
      font-size: 10px;
      text-transform: uppercase;
    }

    .date-item.is-active {
      background: #CFCFCF;
      transform: translateY(-1px);
    }

    .date-item.is-today strong {
      color: var(--color-primary-dark);
      font-weight: 800;
    }

    .date-item.is-active strong {
      color: #111111;
      font-weight: 800;
    }

    .inline-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }

    .weather-card {
      min-height: 124px;
      border: 0;
      border-radius: 20px;
      background: #D8D8D8;
      padding: var(--space-4);
      color: #111111;
      font-size: 11px;
      line-height: 1.5;
    }

    .weather-card strong {
      display: block;
      margin-bottom: var(--space-2);
      font-size: 11px;
      font-weight: 800;
      text-transform: lowercase;
    }

    .pick-columns {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(104px, 0.75fr);
      gap: var(--space-3);
      align-items: stretch;
    }

    .station-panel,
    .select-panel {
      min-height: 156px;
      border-radius: 18px;
      background: #D8D8D8;
      padding: var(--space-3);
    }

    .station-panel {
      display: grid;
      gap: var(--space-2);
      align-content: start;
    }

    .station-actions {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: var(--space-2);
      align-items: center;
    }

    .station-add-btn,
    .station-step-btn {
      min-height: 28px;
      border: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      color: #111111;
      font-size: 12px;
      font-weight: 700;
    }

    .station-step-btn {
      border-color: var(--color-primary);
      color: var(--color-primary-dark);
    }

    .station-step-btn:disabled {
      border-color: #A8A8A8;
      color: #8B8B8B;
      opacity: 0.65;
    }

    .selected-list,
    .star-picker-list {
      display: grid;
      gap: var(--space-2);
    }

    .selected-item,
    .star-picker-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 6px;
      border: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      padding: 6px 8px;
    }

    .selected-item h3,
    .star-picker-item h3 {
      margin: 0;
      font-size: 11px;
      line-height: 1.35;
    }

    .selected-item p,
    .star-picker-item p {
      margin: 3px 0 0;
      color: #333333;
      font-size: 10px;
      line-height: 1.35;
    }

    .mini-btn {
      min-height: 34px;
      border: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      color: var(--color-text);
      padding: 0 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .mini-btn.is-primary {
      border-color: rgba(45, 205, 155, 0.36);
      background: var(--color-soft);
      color: var(--color-primary-dark);
    }

    .mini-btn.is-danger {
      border-color: rgba(229, 72, 77, 0.24);
      color: var(--color-danger);
    }

    .condition-grid {
      display: grid;
      gap: 6px;
      margin-top: var(--space-2);
    }

    .condition-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 16px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--color-text);
      padding: 0;
      font-size: 10px;
      font-weight: 600;
    }

    .condition-pill input {
      width: 10px;
      min-height: 10px;
      accent-color: #111111;
    }

    .custom-condition-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-top: var(--space-2);
    }

    .custom-condition-form input {
      min-height: 30px;
      border: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      font-size: 11px;
    }

    .step-footer {
      display: grid;
      gap: var(--space-2);
      margin-top: var(--space-1);
    }

    #tab-pick .step-footer .primary-btn {
      min-height: 40px;
      border-radius: 999px;
    }

    .step2-shell {
      display: grid;
      gap: var(--space-4);
      min-height: 560px;
      overflow: hidden;
    }

    .step2-title {
      display: block;
    }

    .step2-title h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 500;
    }

    .step2-title p {
      margin: 0;
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .channel-orbit {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      align-items: start;
      padding: var(--space-2) 0;
    }

    .channel-dot {
      display: grid;
      justify-items: center;
      gap: 8px;
      border: 0;
      background: transparent;
      color: #111111;
      padding: 0;
      text-align: center;
    }

    .channel-dot em {
      display: block;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #D8D8D8;
      font-style: normal;
    }

    .channel-dot strong {
      display: block;
      font-size: 11px;
      line-height: 1.2;
    }

    .venue-carousel {
      position: relative;
      min-height: 210px;
      margin: 0 calc(var(--space-4) * -1);
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 62%, rgba(255,255,255,0.22) 0 54px, transparent 55px),
        linear-gradient(180deg, #ECECEC 0 44%, #DCDCDC 44% 100%);
      cursor: grab;
      user-select: none;
    }

    .venue-carousel.is-dragging {
      cursor: grabbing;
    }

    .venue-carousel::before {
      position: absolute;
      left: -15%;
      right: -15%;
      top: -58px;
      height: 140px;
      border-radius: 50%;
      background: #F4F4F4;
      content: "";
    }

    .venue-cup-row {
      position: absolute;
      inset: 42px -98px 0;
      display: grid;
      grid-template-columns: repeat(3, 190px);
      justify-content: center;
      align-items: end;
      gap: 36px;
      transform: translateX(0);
      transition: transform 0.22s ease;
      will-change: transform;
    }

    .venue-carousel.is-dragging .venue-cup-row {
      transition: none;
    }

    .venue-cup {
      position: relative;
      height: 156px;
      color: #0F172A;
      text-align: center;
      opacity: 0.55;
    }

    .venue-cup.is-active {
      opacity: 1;
    }

    .venue-cup::before {
      position: absolute;
      left: 42px;
      right: 42px;
      top: 18px;
      bottom: 8px;
      border: 1.5px solid #0F172A;
      border-radius: 26px 26px 36px 36px;
      content: "";
    }

    .venue-cup::after {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 50px;
      border-top: 1px solid #0F172A;
      content: "";
    }

    .venue-cup span {
      position: absolute;
      left: 36px;
      right: 36px;
      top: 88px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
      line-height: 1.2;
      text-decoration: underline;
    }

    .helper-text {
      margin: 0;
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    .placeholder-title {
      margin: 0 0 var(--space-2);
      font-size: 18px;
      line-height: 1.35;
    }

    .placeholder-text {
      margin: 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .primary-btn,
    .secondary-btn,
    .icon-btn {
      min-height: 44px;
      border: 0;
      border-radius: var(--radius-control);
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .primary-btn {
      width: 100%;
      background: var(--color-primary);
      color: #FFFFFF;
      font-weight: 700;
    }

    .secondary-btn {
      background: var(--color-soft);
      color: var(--color-primary-dark);
      font-weight: 700;
      padding: 0 var(--space-4);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      background: var(--color-primary);
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .primary-btn:active,
    .secondary-btn:active,
    .icon-btn:active {
      transform: scale(0.98);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.is-active {
      display: block;
    }

    .tab-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 100%;
      max-width: 430px;
      height: calc(var(--tab-height) + env(safe-area-inset-bottom, 0px));
      padding: var(--space-1) var(--space-3) env(safe-area-inset-bottom, 0px);
      border-top: 1px solid var(--color-line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      transform: translateX(-50%);
    }

    .tab-btn {
      min-height: 52px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #999999;
      font-size: 12px;
      font-weight: 700;
    }

    .tab-icon {
      display: block;
      margin-bottom: 2px;
      font-size: 18px;
      line-height: 1;
    }

    .tab-btn.is-active {
      background: var(--color-soft);
      color: var(--color-primary-dark);
    }

    @media (min-width: 431px) {
      .app-shell {
        border-left: 1px solid var(--color-line);
        border-right: 1px solid var(--color-line);
      }
    }

    @media (max-width: 374px) {
      .card-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <main class="app-main">
      <div id="app-status" class="status-banner" role="status"></div>
      <section id="tab-star" class="tab-panel is-active" aria-labelledby="star-title"></section>
      <section id="tab-pick" class="tab-panel" aria-labelledby="pick-title"></section>
      <section id="tab-my" class="tab-panel" aria-labelledby="my-title"></section>
    </main>

    <nav class="tab-bar" aria-label="主导航">
      <button class="tab-btn is-active" type="button" data-tab="star">
        <span class="tab-icon">★</span>
        Star
      </button>
      <button class="tab-btn" type="button" data-tab="pick">
        <span class="tab-icon">◎</span>
        Pick
      </button>
      <button class="tab-btn" type="button" data-tab="my">
        <span class="tab-icon">人</span>
        My
      </button>
    </nav>
  </div>
  <div id="modal-container" class="modal-container" aria-live="polite"></div>

  <script>
    const DEFAULT_VENUES = [
      {
        id: 'v_demo_001',
        name: '静思自习室',
        address: '朝阳区建国路88号',
        hours: '09:00-22:30',
        price: { amount: 39, unit: '日' },
        tags: ['有插座', '安静', '大桌子', '22点后营业'],
        customTags: ['椅子舒服'],
        menuInfo: '瓶装水 3 元，简餐 18-28 元，可自带饮品。',
        membershipInfo: '日卡 39 元，周卡 199 元，月卡 599 元。',
        notes: '下午三点后人会变多，靠窗区光线最好。',
        images: [],
        visitCount: 2,
        createdAt: '2026-07-06',
        sceneType: '自习室'
      },
      {
        id: 'v_demo_002',
        name: '光合作用咖啡',
        address: '海淀区中关村南路12号',
        hours: '08:30-21:30',
        price: { amount: 32, unit: '杯' },
        tags: ['有咖啡', '靠窗', '有插座'],
        customTags: ['绿植多'],
        menuInfo: '美式 22 元，拿铁 28 元，贝果 26 元，轻食沙拉 36 元。',
        membershipInfo: '充值 300 送 30，工作日 10 次咖啡卡 199 元。',
        notes: '适合轻工作，下午可能有聊天声。',
        images: [],
        visitCount: 1,
        createdAt: '2026-07-06',
        sceneType: '咖啡馆'
      },
      {
        id: 'v_demo_003',
        name: '一格共享书房',
        address: '东城区和平里西街9号',
        hours: '07:30-23:00',
        price: { amount: 45, unit: '日' },
        tags: ['安静', '有插座', '大桌子', '22点后营业'],
        customTags: ['可寄存'],
        menuInfo: '免费饮水，咖啡机 8 元/杯，泡面 12 元。',
        membershipInfo: '日卡 45 元，10 次卡 399 元，月卡含固定座位。',
        notes: '座位密度低，适合长时间专注。',
        images: [],
        visitCount: 0,
        createdAt: '2026-07-06',
        sceneType: '自习室'
      }
    ];

    const DEFAULT_HISTORY = [
      {
        id: 'cr_demo_001',
        date: '2026-07-06',
        userLocation: '朝阳区望京',
        weather: '晴 28°C',
        venueIds: ['v_demo_001', 'v_demo_002'],
        chosenVenueId: 'v_demo_001',
        filterConditions: ['有插座', '安静'],
        notes: '静思自习室更适合论文冲刺。',
        photos: []
      }
    ];

    const DEFAULT_CURRENT_PICK = {
      date: '2026-07-07',
      time: '14:00',
      userLocation: '',
      weather: null,
      selectedVenueIds: [],
      filterConditions: ['有插座', '安静'],
      customConditions: [],
      copiedInfo: {},
      currentStep: 1,
      activeVenueIndex: 0,
      step2Completed: false
    };

    const DEFAULT_FILTERS = ['有插座', '安静', '靠窗', '大桌子', '22点后营业', '有咖啡'];

    const Storage = {
      keys: {
        venues: 'venues',
        history: 'history',
        currentPick: 'currentPick',
        seeded: 'pickpickSeeded'
      },

      init() {
        if (!this.read(this.keys.seeded, false)) {
          this.saveVenues(DEFAULT_VENUES);
          this.saveHistory(DEFAULT_HISTORY);
          this.saveCurrentPick(DEFAULT_CURRENT_PICK);
          this.write(this.keys.seeded, true);
        } else {
          this.migrateVenues();
        }
      },

      read(key, fallback) {
        try {
          const rawValue = window.localStorage.getItem(key);
          return rawValue ? JSON.parse(rawValue) : fallback;
        } catch (error) {
          UI.showStatus('读取本地数据失败，已使用默认数据。');
          return fallback;
        }
      },

      write(key, value) {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
          return true;
        } catch (error) {
          UI.showStatus('存储空间不足，请删除一些旧照片或浏览器数据后重试。');
          return false;
        }
      },

      loadVenues() {
        return this.read(this.keys.venues, []);
      },

      saveVenues(venues) {
        return this.write(this.keys.venues, venues);
      },

      migrateVenues() {
        const venues = this.loadVenues();
        let changed = false;
        const nextVenues = venues.map((venue) => {
          const defaultVenue = DEFAULT_VENUES.find((item) => item.id === venue.id);
          const nextVenue = { ...venue };
          if (typeof nextVenue.menuInfo === 'undefined') {
            nextVenue.menuInfo = defaultVenue?.menuInfo || '';
            changed = true;
          }
          if (typeof nextVenue.membershipInfo === 'undefined') {
            nextVenue.membershipInfo = defaultVenue?.membershipInfo || '';
            changed = true;
          }
          return nextVenue;
        });
        if (changed) this.saveVenues(nextVenues);
      },

      loadHistory() {
        return this.read(this.keys.history, []);
      },

      saveHistory(history) {
        return this.write(this.keys.history, history);
      },

      loadCurrentPick() {
        return this.read(this.keys.currentPick, { ...DEFAULT_CURRENT_PICK });
      },

      saveCurrentPick(currentPick) {
        return this.write(this.keys.currentPick, currentPick);
      }
    };

    const App = {
      currentTab: 'star',

      init() {
        Storage.init();
        StarManager.init();
        PickManager.init();
        this.bindNavigation();
        this.render();
        this.registerServiceWorker();
      },

      bindNavigation() {
        document.querySelectorAll('.tab-btn').forEach((button) => {
          button.addEventListener('click', () => this.switchTab(button.dataset.tab));
        });
      },

      switchTab(tabName) {
        this.currentTab = tabName;
        document.querySelectorAll('.tab-btn').forEach((button) => {
          button.classList.toggle('is-active', button.dataset.tab === tabName);
        });
        document.querySelectorAll('.tab-panel').forEach((panel) => {
          panel.classList.toggle('is-active', panel.id === `tab-${tabName}`);
        });
        this.render();
      },

      render() {
        StarManager.render();
        PickManager.render();
        HistoryManager.render();
      },

      registerServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    };

    const UI = {
      escape(value = '') {
        return String(value).replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[char]));
      },

      renderHeader(title, subtitle, actionHtml = '') {
        return `
          <header class="app-header">
            <div>
              <p class="eyebrow">PickPick</p>
              <h1 id="${title.id}">${title.text}</h1>
              ${subtitle ? `<p class="header-copy">${subtitle}</p>` : ''}
            </div>
            ${actionHtml}
          </header>
        `;
      },

      showStatus(message, type = 'error') {
        const status = document.getElementById('app-status');
        if (!status) return;
        status.textContent = message;
        status.className = `status-banner is-visible${type === 'success' ? ' is-success' : ''}`;
      },

      clearStatus() {
        const status = document.getElementById('app-status');
        if (!status) return;
        status.textContent = '';
        status.className = 'status-banner';
      },

      renderMetrics(metrics) {
        return `
          <div class="metric-grid">
            ${metrics.map((metric) => `
              <div class="metric">
                <span class="metric-value">${metric.value}</span>
                <span class="metric-label">${metric.label}</span>
              </div>
            `).join('')}
          </div>
        `;
      },

      renderTags(tags, primaryTags = []) {
        if (!tags.length) return '<p class="venue-meta">暂无标签</p>';
        return `
          <div class="tag-row">
            ${tags.map((tag) => `
              <span class="tag${primaryTags.includes(tag) ? ' is-primary' : ''}">${this.escape(tag)}</span>
            `).join('')}
          </div>
        `;
      },

      openModal(content) {
        const modal = document.getElementById('modal-container');
        modal.innerHTML = `
          <div class="modal-backdrop" data-action="close-modal"></div>
          <section class="modal-sheet" role="dialog" aria-modal="true">
            ${content}
          </section>
        `;
        modal.classList.add('is-open');
      },

      closeModal() {
        const modal = document.getElementById('modal-container');
        modal.classList.remove('is-open');
        modal.innerHTML = '';
      }
    };

    const StarManager = {
      query: '',
      viewStep: 1,
      activeVenueId: '',

      init() {
        document.getElementById('tab-star').addEventListener('click', (event) => this.handleClick(event));
        document.getElementById('tab-star').addEventListener('input', (event) => this.handleInput(event));
        document.getElementById('modal-container').addEventListener('click', (event) => this.handleModalClick(event));
        document.getElementById('modal-container').addEventListener('submit', (event) => this.handleSubmit(event));
      },

      render() {
        if (this.viewStep === 2) {
          this.renderStep12();
          return;
        }
        const venues = Storage.loadVenues();
        const selectedCount = Storage.loadCurrentPick().selectedVenueIds.length;
        document.getElementById('tab-star').innerHTML = `
          ${UI.renderHeader({ id: 'star-title', text: '收藏库' }, '先把候选自习室和咖啡馆沉淀成自己的地点库。', '<button class="icon-btn" type="button" data-action="new-venue" aria-label="添加地点">+</button>')}
          <section class="panel">
            ${UI.renderMetrics([
              { value: venues.length, label: '已存场地' },
              { value: venues.filter((venue) => venue.sceneType === '自习室').length, label: '自习室' },
              { value: selectedCount, label: '已入 Pick' }
            ])}
            <label class="search-field" for="star-search">
              搜索场地
              <input id="star-search" type="search" value="${UI.escape(this.query)}" placeholder="输入场地名称">
            </label>
            <div id="star-list-area"></div>
          </section>
        `;
        this.renderList();
      },

      renderList() {
        const venues = Storage.loadVenues();
        const currentPick = Storage.loadCurrentPick();
        const keyword = this.query.trim().toLowerCase();
        const filteredVenues = venues.filter((venue) => venue.name.toLowerCase().includes(keyword));
        const listArea = document.getElementById('star-list-area');
        if (!listArea) return;

        if (!venues.length) {
          listArea.innerHTML = `
            <div class="empty-state">
              <h2 class="placeholder-title">还没有收藏地点</h2>
              <p>先添加一个自习室或咖啡馆，后续 Pick 时就能直接选择。</p>
              <button class="primary-btn" type="button" data-action="new-venue">添加第一个地点</button>
            </div>
          `;
          return;
        }

        if (!filteredVenues.length) {
          listArea.innerHTML = `
            <div class="empty-state">
              <h2 class="placeholder-title">没有匹配的地点</h2>
              <p>换一个名称关键词试试。</p>
              <button class="secondary-btn" type="button" data-action="clear-search">清空搜索</button>
            </div>
          `;
          return;
        }

        listArea.innerHTML = `
          <div class="venue-list">
            ${filteredVenues.map((venue) => this.renderVenueCard(venue, currentPick.selectedVenueIds.includes(venue.id))).join('')}
          </div>
        `;
      },

      renderVenueCard(venue, isSelected) {
        const tags = [...venue.tags, ...venue.customTags];
        const background = this.getVenueBackground(venue);
        return `
          <article class="venue-card" style="background-image: url('${background}')">
            <div class="venue-card-body">
              <div class="venue-card-header">
                <div>
                  <h3>${UI.escape(venue.name)}</h3>
                  <p class="venue-meta">${UI.escape(venue.address || '未填写地址')}</p>
                </div>
                <span class="scene-badge">${UI.escape(venue.sceneType || '场地')}</span>
              </div>
              <p class="venue-meta">${UI.escape(venue.hours || '营业时间待补充')} · ${UI.escape(this.formatPrice(venue))}</p>
              ${UI.renderTags(tags.slice(0, 4), venue.tags)}
              <div class="card-actions">
                <button class="text-btn" type="button" data-action="detail-venue" data-id="${venue.id}">查看</button>
                <button class="text-btn" type="button" data-action="edit-venue" data-id="${venue.id}">编辑</button>
                <button class="text-btn is-primary" type="button" data-action="add-to-pick" data-id="${venue.id}" ${isSelected ? 'disabled' : ''}>${isSelected ? '已加入' : '加入'}</button>
                <button class="danger-btn" type="button" data-action="delete-venue" data-id="${venue.id}">删除</button>
              </div>
            </div>
          </article>
        `;
      },

      handleInput(event) {
        if (event.target.id !== 'star-search') return;
        this.query = event.target.value;
        this.renderList();
      },

      handleClick(event) {
        const trigger = event.target.closest('[data-action]');
        if (!trigger) return;
        if (trigger.dataset.action === 'open-channel') {
          PickManager.openChannelByVenueId(this.activeVenueId, trigger.dataset.channel, trigger.dataset.query);
          return;
        }
        this.runAction(trigger.dataset.action, trigger.dataset.id);
      },

      handleModalClick(event) {
        const trigger = event.target.closest('[data-action]');
        if (!trigger) return;
        if (trigger.dataset.action === 'pick-add-star') {
          PickManager.addStarVenue(trigger.dataset.id);
          return;
        }
        if (trigger.dataset.action === 'pick-new-venue') {
          StarManager.openForm('', { addToPick: true });
          return;
        }
        if (trigger.dataset.action === 'pick-open-star-list') {
          PickManager.openStarPickerList();
          return;
        }
        this.runAction(trigger.dataset.action, trigger.dataset.id);
      },

      handleSubmit(event) {
        if (event.target.id === 'channel-link-form') {
          event.preventDefault();
          const formData = new FormData(event.target);
          PickManager.saveChannelLink(event.target.dataset.venueId, event.target.dataset.channel, formData.get('link').trim());
          return;
        }
        if (event.target.id !== 'venue-form') return;
        event.preventDefault();
        this.saveFromForm(event.target);
      },

      runAction(action, id) {
        const actions = {
          'new-venue': () => this.openForm(),
          'edit-venue': () => this.openForm(id),
          'detail-venue': () => this.openDetail(id),
          'delete-venue': () => this.deleteVenue(id),
          'add-to-pick': () => this.addToPick(id),
          'back-star-list': () => this.goStep1(),
          'clear-search': () => {
            this.query = '';
            this.render();
          },
          'close-modal': () => UI.closeModal()
        };
        if (actions[action]) actions[action]();
      },

      openForm(venueId = '', options = {}) {
        const venue = venueId ? Storage.loadVenues().find((item) => item.id === venueId) : null;
        const isNewVenue = !venue;
        const shouldAddToPick = Boolean(options.addToPick);
        const completeTarget = options.addToPick ? 'pick' : (isNewVenue ? 'star' : '');
        const model = venue || {
          id: '',
          name: '',
          address: '',
          hours: '',
          price: { amount: '', unit: '日' },
          tags: [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: '',
          images: [],
          visitCount: 0,
          createdAt: '',
          sceneType: '自习室'
        };
        const fieldsHtml = isNewVenue ? `
          <label class="field">
            名称
            <input name="name" required value="${UI.escape(model.name)}" placeholder="例如 静思自习室">
          </label>
        ` : `
          <div class="form-grid">
            <label class="field is-full">
              名称
              <input name="name" required value="${UI.escape(model.name)}" placeholder="例如 静思自习室">
            </label>
            <label class="field is-full">
              地址
              <input name="address" value="${UI.escape(model.address)}" placeholder="例如 朝阳区建国路88号">
            </label>
            <label class="field">
              营业时间
              <input name="hours" value="${UI.escape(model.hours)}" placeholder="09:00-22:30">
            </label>
            <label class="field">
              场景
              <select name="sceneType">
                <option value="自习室" ${model.sceneType === '自习室' ? 'selected' : ''}>自习室</option>
                <option value="咖啡馆" ${model.sceneType === '咖啡馆' ? 'selected' : ''}>咖啡馆</option>
                <option value="其他" ${model.sceneType === '其他' ? 'selected' : ''}>其他</option>
              </select>
            </label>
            <label class="field">
              价格
              <input name="priceAmount" type="number" min="0" step="1" value="${UI.escape(model.price.amount)}" placeholder="39">
            </label>
            <label class="field">
              单位
              <select name="priceUnit">
                ${['日', '时', '杯', '次'].map((unit) => `<option value="${unit}" ${model.price.unit === unit ? 'selected' : ''}>${unit}</option>`).join('')}
              </select>
            </label>
            <label class="field is-full">
              设施标签
              <input name="tags" value="${UI.escape(model.tags.join('，'))}" placeholder="有插座，安静，靠窗">
            </label>
            <label class="field is-full">
              自定义标签
              <input name="customTags" value="${UI.escape(model.customTags.join('，'))}" placeholder="椅子舒服，绿植多">
            </label>
            <label class="field is-full">
              菜单/饮品
              <textarea name="menuInfo" placeholder="例如 美式 22 元，轻食 36 元，可自带水杯">${UI.escape(model.menuInfo || '')}</textarea>
            </label>
            <label class="field is-full">
              办卡信息
              <textarea name="membershipInfo" placeholder="例如 日卡 39 元，月卡 599 元，10 次卡 399 元">${UI.escape(model.membershipInfo || '')}</textarea>
            </label>
            <label class="field is-full">
              备注
              <textarea name="notes" placeholder="记录适合自己的观察">${UI.escape(model.notes)}</textarea>
            </label>
          </div>
        `;

        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">Star</p>
              <h2 class="modal-title">${venue ? '编辑场地' : '新建地点'}</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <form id="venue-form" class="venue-form" data-id="${UI.escape(model.id)}" data-add-to-pick="${shouldAddToPick ? 'true' : 'false'}" data-complete-target="${completeTarget}">
            ${fieldsHtml}
            <div class="form-actions">
              <button class="primary-btn" type="submit">${isNewVenue ? '保存并完善信息' : '保存场地'}</button>
              <button class="secondary-btn" type="button" data-action="close-modal">取消</button>
            </div>
          </form>
        `);
      },

      openDetail(venueId) {
        const venue = Storage.loadVenues().find((item) => item.id === venueId);
        if (!venue) return;
        const allTags = [...venue.tags, ...venue.customTags];
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">${UI.escape(venue.sceneType || '场地')}</p>
              <h2 class="modal-title">${UI.escape(venue.name)}</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <p class="detail-row">地址：${UI.escape(venue.address || '未填写')}</p>
          <p class="detail-row">营业时间：${UI.escape(venue.hours || '待补充')}</p>
          <p class="detail-row">价格：${UI.escape(this.formatPrice(venue))}</p>
          ${UI.renderTags(allTags, venue.tags)}
          <p class="detail-row">菜单/饮品：${UI.escape(venue.menuInfo || '暂无菜单信息')}</p>
          <p class="detail-row">办卡信息：${UI.escape(venue.membershipInfo || '暂无办卡信息')}</p>
          <p class="detail-row">备注：${UI.escape(venue.notes || '暂无备注')}</p>
          <div class="modal-actions">
            <button class="primary-btn" type="button" data-action="add-to-pick" data-id="${venue.id}">加入 Pick</button>
            <button class="secondary-btn" type="button" data-action="edit-venue" data-id="${venue.id}">编辑</button>
          </div>
        `);
      },

      saveFromForm(form) {
        const formData = new FormData(form);
        const venues = Storage.loadVenues();
        const id = form.dataset.id || this.createId('v');
        const existingVenue = venues.find((venue) => venue.id === id);
        const readField = (name, fallback = '') => String(formData.get(name) ?? fallback).trim();
        const nextVenue = {
          id,
          name: readField('name'),
          address: readField('address', existingVenue?.address || ''),
          hours: readField('hours', existingVenue?.hours || ''),
          price: {
            amount: Number(formData.get('priceAmount')) || existingVenue?.price?.amount || 0,
            unit: formData.get('priceUnit') || existingVenue?.price?.unit || '日'
          },
          tags: this.parseTags(formData.get('tags') ?? existingVenue?.tags?.join('，') ?? ''),
          customTags: this.parseTags(formData.get('customTags') ?? existingVenue?.customTags?.join('，') ?? ''),
          menuInfo: readField('menuInfo', existingVenue?.menuInfo || ''),
          membershipInfo: readField('membershipInfo', existingVenue?.membershipInfo || ''),
          notes: readField('notes', existingVenue?.notes || ''),
          images: existingVenue ? existingVenue.images : [],
          visitCount: existingVenue ? existingVenue.visitCount : 0,
          createdAt: existingVenue ? existingVenue.createdAt : new Date().toISOString().slice(0, 10),
          sceneType: formData.get('sceneType') || existingVenue?.sceneType || '自习室'
        };

        if (!nextVenue.name) {
          UI.showStatus('请先填写场地名称。');
          return;
        }

        const nextVenues = existingVenue
          ? venues.map((venue) => (venue.id === id ? nextVenue : venue))
          : [nextVenue, ...venues];

        if (Storage.saveVenues(nextVenues)) {
          if (form.dataset.addToPick === 'true') {
            const currentPick = Storage.loadCurrentPick();
            Storage.saveCurrentPick({
              ...currentPick,
              selectedVenueIds: [...new Set([...currentPick.selectedVenueIds, id])]
            });
          }
          UI.closeModal();
          if (form.dataset.completeTarget === 'pick') {
            PickManager.openStep2ForVenue(id);
            return;
          }
          if (form.dataset.completeTarget === 'star') {
            this.openStep12ForVenue(id);
            return;
          }
          UI.showStatus(
            form.dataset.addToPick === 'true'
              ? '新地点已加入 Pick 候选列表。'
              : (existingVenue ? '场地已更新。' : '场地已添加。'),
            'success'
          );
          App.render();
        }
      },

      deleteVenue(venueId) {
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId);
        if (!venue) return;
        if (!window.confirm(`删除「${venue.name}」？`)) return;

        const currentPick = Storage.loadCurrentPick();
        const nextSelectedVenueIds = currentPick.selectedVenueIds.filter((id) => id !== venueId);
        Storage.saveVenues(venues.filter((item) => item.id !== venueId));
        Storage.saveCurrentPick({ ...currentPick, selectedVenueIds: nextSelectedVenueIds });
        UI.closeModal();
        UI.showStatus('场地已删除。', 'success');
        App.render();
      },

      addToPick(venueId) {
        const currentPick = Storage.loadCurrentPick();
        if (currentPick.selectedVenueIds.includes(venueId)) {
          UI.showStatus('这个场地已经在 Pick 候选列表里。', 'success');
          return;
        }
        Storage.saveCurrentPick({
          ...currentPick,
          selectedVenueIds: [...currentPick.selectedVenueIds, venueId]
        });
        UI.closeModal();
        UI.showStatus('已加入 Pick 候选列表。', 'success');
        App.render();
      },

      parseTags(value) {
        return String(value || '')
          .split(/[,，、\n]/)
          .map((tag) => tag.trim())
          .filter(Boolean);
      },

      formatPrice(venue) {
        const amount = Number(venue.price?.amount) || 0;
        return amount > 0 ? `${amount}元/${venue.price.unit}` : '价格待补充';
      },

      getVenueBackground(venue) {
        if (venue.images?.length) return UI.escape(venue.images[0]);
        const palettes = {
          '自习室': ['#244D43', '#2DCD9B', '书桌', '专注'],
          '咖啡馆': ['#5A4636', '#D7A86E', '咖啡', '靠窗'],
          '其他': ['#334155', '#94A3B8', '地点', '对比']
        };
        const [base, accent, label, subLabel] = palettes[venue.sceneType] || palettes['其他'];
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
            <defs>
              <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="${base}"/>
                <stop offset="1" stop-color="${accent}"/>
              </linearGradient>
            </defs>
            <rect width="800" height="480" fill="url(#bg)"/>
            <rect x="62" y="78" width="676" height="324" rx="34" fill="rgba(255,255,255,0.16)"/>
            <circle cx="642" cy="145" r="54" fill="rgba(255,255,255,0.22)"/>
            <rect x="108" y="292" width="420" height="26" rx="13" fill="rgba(255,255,255,0.32)"/>
            <rect x="108" y="336" width="280" height="22" rx="11" fill="rgba(255,255,255,0.22)"/>
            <text x="108" y="174" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="54" font-weight="700">${label}</text>
            <text x="112" y="232" fill="rgba(255,255,255,0.76)" font-family="Arial, sans-serif" font-size="30">${subLabel}</text>
          </svg>
        `.trim();
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      },

      createId(prefix) {
        return `${prefix}_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
      },

      openStep12ForVenue(venueId) {
        this.activeVenueId = venueId;
        this.viewStep = 2;
        App.switchTab('star');
      },

      goStep1() {
        this.viewStep = 1;
        this.activeVenueId = '';
        this.render();
      },

      renderStep12() {
        const venue = Storage.loadVenues().find((item) => item.id === this.activeVenueId) || Storage.loadVenues()[0];
        if (!venue) {
          this.goStep1();
          return;
        }
        this.activeVenueId = venue.id;
        document.getElementById('tab-star').innerHTML = PickManager.renderCopyStep({
          title: 'Enjoy coffee any time',
          subtitle: 'Star 1.2',
          venue,
          venues: [venue],
          activeIndex: 0,
          progress: '1/1',
          backAction: 'back-star-list',
          nextAction: '',
          actionAttribute: 'data-action'
        });
      }
    };

    const PickManager = {
      viewStep: 1,
      dateDrag: {
        strip: null,
        targetDate: '',
        startX: 0,
        startScrollLeft: 0,
        moved: false,
        active: false,
        suppressClick: false
      },
      cupDrag: {
        startX: 0,
        lastX: 0,
        moved: false,
        active: false,
        row: null
      },

      init() {
        const pickTab = document.getElementById('tab-pick');
        pickTab.addEventListener('input', (event) => this.handleInput(event));
        pickTab.addEventListener('change', (event) => this.handleChange(event));
        pickTab.addEventListener('click', (event) => this.handleClick(event));
        pickTab.addEventListener('pointerdown', (event) => this.handleDatePointerDown(event));
        pickTab.addEventListener('pointermove', (event) => this.handleDatePointerMove(event));
        pickTab.addEventListener('pointerup', () => this.endDateDrag());
        pickTab.addEventListener('pointercancel', () => this.cancelDateDrag());
        pickTab.addEventListener('pointerdown', (event) => this.handleCupPointerDown(event));
        pickTab.addEventListener('pointermove', (event) => this.handleCupPointerMove(event));
        pickTab.addEventListener('pointerup', () => this.endCupDrag());
        pickTab.addEventListener('pointercancel', () => this.cancelCupDrag());
      },

      render() {
        const currentPick = Storage.loadCurrentPick();
        if (this.viewStep === 2) {
          this.renderStep2(currentPick);
          return;
        }
        if (currentPick.currentStep !== 1) {
          Storage.saveCurrentPick({ ...currentPick, currentStep: 1 });
          currentPick.currentStep = 1;
        }
        this.renderStep1(currentPick);
      },

      renderStep1(currentPick) {
        const selectedVenues = this.getSelectedVenues(currentPick);
        const allConditions = [...DEFAULT_FILTERS, ...currentPick.customConditions];
        const canGoStep2 = selectedVenues.length >= 2;
        document.getElementById('tab-pick').innerHTML = `
          ${UI.renderHeader({ id: 'pick-title', text: 'pick' }, '', `<button class="pick-arrow-btn" type="button" data-pick-action="go-step-2" aria-label="下一步" ${canGoStep2 ? '' : 'disabled'}>→</button>`)}
          <section class="panel pick-board">
            <div class="pick-step">
              <div class="pick-topbar">
                <div class="pick-location">
                  <input id="pick-location-input" name="userLocation" value="${UI.escape(currentPick.userLocation)}" placeholder="输入出发位置" data-pick-field="userLocation">
                </div>
              </div>
              ${this.renderDateStrip(currentPick)}
              ${this.renderWeather(currentPick)}
              <div class="pick-columns">
                <section class="station-panel">
                  <div class="station-title">station</div>
                  <div class="station-actions">
                    <button class="station-add-btn" type="button" data-pick-action="open-star-picker">+</button>
                    <button class="station-step-btn" type="button" data-pick-action="go-step-2" ${canGoStep2 ? '' : 'disabled'}>进入信息复制</button>
                  </div>
                  ${this.renderSelectedVenues(selectedVenues)}
                </section>
                <section class="select-panel">
                  <div class="select-title">select</div>
                  <div class="condition-grid">
                    ${allConditions.map((condition) => `
                      <label class="condition-pill">
                        <input type="checkbox" data-condition="${UI.escape(condition)}" ${currentPick.filterConditions.includes(condition) ? 'checked' : ''}>
                        ${UI.escape(condition)}
                      </label>
                    `).join('')}
                  </div>
                  <div class="custom-condition-form">
                    <input id="custom-condition-input" placeholder="+ 条件">
                    <button class="mini-btn is-primary" type="button" data-pick-action="add-condition">+</button>
                  </div>
                </section>
              </div>
              <div class="step-footer">
                <button class="primary-btn" type="button" data-pick-action="go-step-2" ${canGoStep2 ? '' : 'disabled'}>下一步</button>
                <p class="helper-text">${canGoStep2 ? '可以进入复制信息步骤。' : '至少选择 2 个场地后才能进入下一步。'}</p>
              </div>
            </div>
          </section>
        `;
      },

      renderStep2(currentPick) {
        UI.clearStatus();
        const selectedVenues = this.getSelectedVenues(currentPick);
        const activeVenue = selectedVenues[currentPick.activeVenueIndex] || selectedVenues[0];
        if (!activeVenue) {
          this.goStep1({ activeVenueIndex: 0 });
          return;
        }
        const progress = `${currentPick.activeVenueIndex + 1}/${selectedVenues.length}`;
        document.getElementById('tab-pick').innerHTML = this.renderCopyStep({
          title: 'Enjoy coffee any time',
          subtitle: `当前地点 ${progress}`,
          venue: activeVenue,
          venues: selectedVenues,
          activeIndex: currentPick.activeVenueIndex,
          progress,
          backAction: 'back-step-1',
          nextAction: 'go-step-3',
          actionAttribute: 'data-pick-action'
        });
      },

      renderCopyStep({ title, subtitle, venue, venues = [venue], activeIndex = 0, backAction, nextAction, actionAttribute }) {
        return `
          <div class="step2-nav" aria-label="步骤导航">
            <button class="pick-arrow-btn" type="button" ${actionAttribute}="${backAction}" aria-label="返回">←</button>
            ${nextAction ? `<button class="pick-arrow-btn" type="button" ${actionAttribute}="${nextAction}" aria-label="下一步">→</button>` : ''}
          </div>
          ${UI.renderHeader({ id: 'copy-step-title', text: title }, subtitle)}
          <section class="panel pick-board">
            <div class="step2-shell">
              <div class="step2-title">
                <h2>${UI.escape(venue.name)}</h2>
              </div>
              <div class="channel-orbit">
                ${this.renderChannelCard('xiaohongshu', '小红书', '环境', venue.name, actionAttribute)}
                ${this.renderChannelCard('meituan', '美团', '价格', venue.name, actionAttribute)}
                ${this.renderChannelCard('dianping', '大众点评', '距离', venue.name, actionAttribute)}
              </div>
              ${this.renderVenueCarousel(venues, activeIndex)}
              <p class="helper-text">按住杯子左右拖动切换地点；点击渠道圆点粘贴链接。</p>
            </div>
          </section>
        `;
      },

      renderChannelCard(channel, title, subtitle, venueName, actionAttribute = 'data-pick-action') {
        return `
          <button class="channel-dot" type="button" ${actionAttribute}="open-channel" data-channel="${channel}" data-query="${UI.escape(venueName)}" aria-label="${title} ${subtitle}">
            <em></em>
            <strong>${title}</strong>
          </button>
        `;
      },

      renderVenueCarousel(selectedVenues, activeIndex) {
        const visibleVenues = [
          selectedVenues[activeIndex - 1] || selectedVenues[selectedVenues.length - 1],
          selectedVenues[activeIndex],
          selectedVenues[activeIndex + 1] || selectedVenues[0]
        ].filter(Boolean);
        return `
          <div class="venue-carousel" data-cup-carousel="true" aria-label="当前复制地点">
            <div class="venue-cup-row">
              ${visibleVenues.map((venue, index) => `
                <div class="venue-cup${index === 1 ? ' is-active' : ''}">
                  <span>${UI.escape(venue.name)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      },

      renderDateStrip(currentPick) {
        const today = new Date();
        const todayValue = this.formatDateValue(today);
        const days = Array.from({ length: 21 }, (_, index) => {
            const date = new Date(today);
            date.setDate(today.getDate() + index);
            return date;
          });
        return `
          <div class="date-strip" aria-label="日期选择">
            ${days.map((date) => {
              const value = this.formatDateValue(date);
              const weekday = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'][date.getDay()];
              const isActive = value === currentPick.date;
              const isToday = value === todayValue;
              return `
                <button class="date-item${isActive ? ' is-active' : ''}${isToday ? ' is-today' : ''}" type="button" data-pick-action="set-date" data-date="${value}">
                  <strong>${date.getDate()}</strong>
                  <span>${weekday}</span>
                </button>
              `;
            }).join('')}
          </div>
        `;
      },

      formatDateValue(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      },

      renderWeather(currentPick) {
        if (!currentPick.userLocation) {
          return '<div class="weather-card"><strong>weather</strong>填写出发位置后显示天气占位信息。</div>';
        }
        const weather = WeatherService.getWeather(currentPick);
        return `<div class="weather-card"><strong>weather</strong>${UI.escape(weather)}</div>`;
      },

      renderSelectedVenues(selectedVenues) {
        if (!selectedVenues.length) {
          return `
            <div class="empty-state">
              <h2 class="placeholder-title">还没有候选场地</h2>
              <p>点 + 新建地点或从 Star 选择候选场地。</p>
            </div>
          `;
        }

        return `
          <div class="selected-list">
            ${selectedVenues.map((venue) => `
              <div class="selected-item">
                <div>
                  <h3>${UI.escape(venue.name)}</h3>
                  <p>${UI.escape(venue.hours || '时间待补充')}</p>
                </div>
                <button class="mini-btn is-primary" type="button" data-pick-action="go-step-2" ${Storage.loadCurrentPick().selectedVenueIds.length >= 2 ? '' : 'disabled'}>进入</button>
                <button class="mini-btn is-danger" type="button" data-pick-action="remove-venue" data-id="${venue.id}">×</button>
              </div>
            `).join('')}
          </div>
        `;
      },

      handleInput(event) {
        const field = event.target.dataset.pickField;
        if (!field) return;
        this.updateCurrentPick({ [field]: event.target.value }, false);
      },

      handleChange(event) {
        const field = event.target.dataset.pickField;
        if (field) {
          this.updateCurrentPick({ [field]: event.target.value });
          return;
        }
        const condition = event.target.dataset.condition;
        if (!condition) return;
        const currentPick = Storage.loadCurrentPick();
        const nextConditions = event.target.checked
          ? [...new Set([...currentPick.filterConditions, condition])]
          : currentPick.filterConditions.filter((item) => item !== condition);
        this.updateCurrentPick({ filterConditions: nextConditions }, false);
      },

      handleClick(event) {
        const trigger = event.target.closest('[data-pick-action]');
        if (!trigger) return;
        const action = trigger.dataset.pickAction;
        if (action === 'set-date' && this.dateDrag.suppressClick) {
          event.preventDefault();
          this.dateDrag.moved = false;
          this.dateDrag.suppressClick = false;
          return;
        }
        const actions = {
          'back-step-1': () => this.goStep1(),
          'open-star-picker': () => this.openStarPicker(),
          'open-channel': () => this.openChannel(trigger.dataset.channel, trigger.dataset.query),
          'remove-venue': () => this.removeVenue(trigger.dataset.id),
          'add-condition': () => this.addCustomCondition(),
          'set-date': () => this.setDate(trigger.dataset.date),
          'go-step-2': () => this.goStep2(),
          'go-step-3': () => this.goStep3()
        };
        if (actions[action]) actions[action]();
      },

      setDate(date) {
        this.updateCurrentPick({ date });
      },

      handleDatePointerDown(event) {
        const strip = event.target.closest('.date-strip');
        if (!strip) return;
        this.dateDrag = {
          strip,
          targetDate: event.target.closest('.date-item')?.dataset.date || '',
          startX: event.clientX,
          startScrollLeft: strip.scrollLeft,
          moved: false,
          active: true,
          suppressClick: false
        };
        strip.classList.add('is-dragging');
        strip.setPointerCapture?.(event.pointerId);
      },

      handleDatePointerMove(event) {
        if (!this.dateDrag.active || !this.dateDrag.strip) return;
        const deltaX = event.clientX - this.dateDrag.startX;
        if (Math.abs(deltaX) > 14) this.dateDrag.moved = true;
        if (!this.dateDrag.moved) return;
        this.dateDrag.strip.scrollLeft = this.dateDrag.startScrollLeft - deltaX;
      },

      endDateDrag() {
        if (!this.dateDrag.strip) return;
        this.dateDrag.strip.classList.remove('is-dragging');
        if (this.dateDrag.moved) {
          this.dateDrag.suppressClick = true;
        } else if (this.dateDrag.targetDate) {
          this.dateDrag.suppressClick = true;
          this.setDate(this.dateDrag.targetDate);
        }
        this.dateDrag.active = false;
      },

      cancelDateDrag() {
        if (this.dateDrag.strip) this.dateDrag.strip.classList.remove('is-dragging');
        this.dateDrag.active = false;
        this.dateDrag.suppressClick = false;
      },

      handleCupPointerDown(event) {
        const carousel = event.target.closest('[data-cup-carousel]');
        if (!carousel) return;
        const row = carousel.querySelector('.venue-cup-row');
        this.cupDrag = {
          startX: event.clientX,
          lastX: event.clientX,
          moved: false,
          active: true,
          row
        };
        carousel.classList.add('is-dragging');
        carousel.setPointerCapture?.(event.pointerId);
      },

      handleCupPointerMove(event) {
        if (!this.cupDrag.active) return;
        const deltaX = event.clientX - this.cupDrag.startX;
        this.cupDrag.lastX = event.clientX;
        if (Math.abs(deltaX) > 32) this.cupDrag.moved = true;
        if (this.cupDrag.row) {
          const clampedDelta = Math.max(-120, Math.min(120, deltaX));
          this.cupDrag.row.style.transform = `translateX(${clampedDelta}px)`;
        }
      },

      endCupDrag() {
        const carousel = document.querySelector('[data-cup-carousel]');
        if (carousel) carousel.classList.remove('is-dragging');
        if (!this.cupDrag.active) return;
        const currentPick = Storage.loadCurrentPick();
        const selectedCount = currentPick.selectedVenueIds.length;
        const deltaX = this.cupDrag.lastX - this.cupDrag.startX;
        const row = this.cupDrag.row;
        if (row) {
          row.style.transition = 'transform 0.22s ease';
          row.style.transform = this.cupDrag.moved && selectedCount > 1
            ? `translateX(${deltaX < 0 ? -226 : 226}px)`
            : 'translateX(0)';
        }
        if (this.cupDrag.moved && selectedCount > 1) {
          const direction = deltaX < 0 ? 1 : -1;
          const nextIndex = (currentPick.activeVenueIndex + direction + selectedCount) % selectedCount;
          window.setTimeout(() => {
            this.updateCurrentPick({ activeVenueIndex: nextIndex });
          }, 180);
        }
        this.cupDrag.active = false;
      },

      cancelCupDrag() {
        const carousel = document.querySelector('[data-cup-carousel]');
        if (carousel) carousel.classList.remove('is-dragging');
        if (this.cupDrag.row) this.cupDrag.row.style.transform = 'translateX(0)';
        this.cupDrag.active = false;
      },

      updateCurrentPick(patch, shouldRender = true) {
        const currentPick = Storage.loadCurrentPick();
        Storage.saveCurrentPick({
          ...currentPick,
          ...patch,
          weather: patch.userLocation !== undefined ? null : currentPick.weather
        });
        if (shouldRender) this.render();
      },

      goStep1(patch = {}) {
        this.viewStep = 1;
        this.updateCurrentPick({ currentStep: 1, ...patch });
      },

      openStep2ForVenue(venueId) {
        const currentPick = Storage.loadCurrentPick();
        const selectedVenueIds = [...new Set([...currentPick.selectedVenueIds, venueId])];
        const activeVenueIndex = Math.max(0, selectedVenueIds.indexOf(venueId));
        Storage.saveCurrentPick({
          ...currentPick,
          selectedVenueIds,
          currentStep: 2,
          activeVenueIndex
        });
        this.viewStep = 2;
        App.switchTab('pick');
      },

      openChannel(channel, query) {
        const currentPick = Storage.loadCurrentPick();
        const venueId = currentPick.selectedVenueIds[currentPick.activeVenueIndex];
        const channelNames = {
          meituan: '美团',
          xiaohongshu: '小红书',
          amap: '高德地图',
          dianping: '大众点评'
        };
        const copiedInfo = currentPick.copiedInfo?.[venueId] || {};
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">${UI.escape(channelNames[channel] || '渠道')}</p>
              <h2 class="modal-title">粘贴链接</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <form id="channel-link-form" class="venue-form" data-venue-id="${venueId}" data-channel="${channel}">
            <p class="placeholder-text">请打开${UI.escape(channelNames[channel] || '对应 App')}，搜索：${UI.escape(query)}，再把链接粘贴回来。</p>
            <label class="field">
              链接
              <input name="link" value="${UI.escape(copiedInfo[channel] || '')}" placeholder="粘贴 ${UI.escape(channelNames[channel] || '渠道')} 链接">
            </label>
            <div class="form-actions">
              <button class="primary-btn" type="submit">保存链接</button>
              <button class="secondary-btn" type="button" data-action="close-modal">取消</button>
            </div>
          </form>
        `);
      },

      saveChannelLink(venueId, channel, link) {
        const currentPick = Storage.loadCurrentPick();
        const copiedInfo = {
          ...(currentPick.copiedInfo || {}),
          [venueId]: {
            ...(currentPick.copiedInfo?.[venueId] || {}),
            [channel]: link
          }
        };
        Storage.saveCurrentPick({ ...currentPick, copiedInfo });
        UI.closeModal();
        UI.showStatus('链接已保存。', 'success');
      },

      getSelectedVenues(currentPick) {
        const venues = Storage.loadVenues();
        return currentPick.selectedVenueIds
          .map((venueId) => venues.find((venue) => venue.id === venueId))
          .filter(Boolean);
      },

      openStarPicker() {
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">Pick</p>
              <h2 class="modal-title">添加候选场地</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <div class="modal-actions">
            <button class="primary-btn" type="button" data-action="pick-new-venue">新建地点</button>
            <button class="secondary-btn" type="button" data-action="pick-open-star-list">从 Star 选择</button>
          </div>
        `);
      },

      openStarPickerList() {
        const venues = Storage.loadVenues();
        const currentPick = Storage.loadCurrentPick();
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">Pick</p>
              <h2 class="modal-title">从 Star 选择</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <div class="star-picker-list">
            ${venues.length ? venues.map((venue) => {
              const selected = currentPick.selectedVenueIds.includes(venue.id);
              return `
                <div class="star-picker-item">
                  <div>
                    <h3>${UI.escape(venue.name)}</h3>
                    <p>${UI.escape(venue.sceneType || '场地')} · ${UI.escape(venue.hours || '时间待补充')}</p>
                  </div>
                  <button class="mini-btn is-primary" type="button" data-action="pick-add-star" data-id="${venue.id}" ${selected ? 'disabled' : ''}>${selected ? '已选择' : '选择'}</button>
                </div>
              `;
            }).join('') : '<p class="placeholder-text">Star 里还没有场地。</p>'}
          </div>
        `);
      },

      addStarVenue(venueId) {
        const currentPick = Storage.loadCurrentPick();
        Storage.saveCurrentPick({
          ...currentPick,
          selectedVenueIds: [...new Set([...currentPick.selectedVenueIds, venueId])]
        });
        UI.closeModal();
        UI.showStatus('已加入。', 'success');
        App.render();
      },

      removeVenue(venueId) {
        const currentPick = Storage.loadCurrentPick();
        this.updateCurrentPick({
          selectedVenueIds: currentPick.selectedVenueIds.filter((id) => id !== venueId)
        });
      },

      addCustomCondition() {
        const input = document.getElementById('custom-condition-input');
        const value = input.value.trim();
        if (!value) return;
        const currentPick = Storage.loadCurrentPick();
        const customConditions = [...new Set([...currentPick.customConditions, value])];
        const filterConditions = [...new Set([...currentPick.filterConditions, value])];
        Storage.saveCurrentPick({ ...currentPick, customConditions, filterConditions });
        this.render();
      },

      goStep2() {
        const currentPick = Storage.loadCurrentPick();
        if (currentPick.selectedVenueIds.length < 2) {
          UI.showStatus('至少选择 2 个场地后才能进入下一步。');
          return;
        }
        this.viewStep = 2;
        Storage.saveCurrentPick({ ...currentPick, currentStep: 2, activeVenueIndex: 0 });
        UI.clearStatus();
        this.render();
      },

      goStep3() {
        Storage.saveCurrentPick({ ...Storage.loadCurrentPick(), currentStep: 3, step2Completed: true });
        UI.showStatus('2.3 地图筛选页面会在下一步开发。', 'success');
      }
    };

    const WeatherService = {
      getWeather(currentPick) {
        if (!currentPick.userLocation) return '';
        return `${currentPick.userLocation} · ${currentPick.date} ${currentPick.time} · 天气信息暂不可用，不影响继续对比。`;
      }
    };

    const AIExtractor = {
      extractVenue(rawText) {
        const lines = rawText.split(/\n+/).map((line) => line.trim()).filter(Boolean);
        const name = lines[0] || '未命名场地';
        return {
          id: StarManager.createId('v'),
          name,
          address: lines.find((line) => /区|路|街|号/.test(line)) || '',
          hours: lines.find((line) => /\d{1,2}[:：]\d{2}/.test(line)) || '',
          price: { amount: 0, unit: '日' },
          tags: DEFAULT_FILTERS.filter((tag) => rawText.includes(tag)),
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: rawText,
          images: [],
          visitCount: 0,
          createdAt: new Date().toISOString().slice(0, 10),
          sceneType: rawText.includes('咖啡') ? '咖啡馆' : '自习室'
        };
      }
    };

    const HistoryManager = {
      render() {
        const history = Storage.loadHistory();
        const latestRecord = history[0];
        document.getElementById('tab-my').innerHTML = `
          ${UI.renderHeader({ id: 'my-title', text: '我的记录' }, '回看每一次选择，积累适合自己的场所经验。')}
          <section class="panel">
            ${UI.renderMetrics([
              { value: history.length, label: '历史记录' },
              { value: latestRecord ? latestRecord.venueIds.length : 0, label: '最近对比' },
              { value: latestRecord ? latestRecord.filterConditions.length : 0, label: '使用条件' }
            ])}
            <h2 class="placeholder-title">历史记录模型已接入</h2>
            <p class="placeholder-text">${latestRecord ? `${latestRecord.date} 在 ${latestRecord.userLocation} 选择了示例场地。` : '暂无历史记录。'} 日历和记录本会在 My 阶段实现。</p>
          </section>
        `;
      }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
