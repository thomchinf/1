<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2DCD9B">
  <title>PickPick</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <style>
    :root {
      --color-primary: #5F6B4A;
      --color-primary-dark: #3F4A35;
      --color-accent: #E36F45;
      --color-accent-dark: #D85F3F;
      --color-highlight: #E8C76B;
      --color-bluegreen: #8FAAA3;
      --color-bg: #FAF6EF;
      --color-surface: #FFFDF8;
      --color-surface-soft: #F3EBDD;
      --color-text: #2F332B;
      --color-muted: #6F7468;
      --color-line: #D8D0C2;
      --color-soft: #F3EBDD;
      --color-danger: #D85F3F;
      --shadow-card: 0 8px 22px rgba(63, 74, 53, 0.08);
      --radius-card: 18px;
      --radius-control: 16px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --tab-height: 64px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      display: flex;
      justify-content: center;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--color-bg);
      overflow: hidden;
    }

    .app-main {
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 0px) + var(--space-4)) var(--space-4)
        calc(var(--tab-height) + env(safe-area-inset-bottom, 0px) + var(--space-4));
      overflow-y: auto;
    }

    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .eyebrow {
      margin: 0 0 var(--space-1);
      color: var(--color-accent-dark);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    #star-title,
    #star-copy-title,
    #copy-step-title {
      font-family: "Segoe Script", "Brush Script MT", cursive;
      font-size: 28px;
      font-style: italic;
      font-weight: 600;
      letter-spacing: 0;
    }

    .header-copy {
      margin: var(--space-2) 0 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .panel {
      background: var(--color-surface);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--space-4);
    }

    .panel + .panel {
      margin-top: var(--space-4);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .metric {
      min-width: 0;
      border: 1px solid rgba(216, 208, 194, 0.78);
      border-radius: 14px;
      background: var(--color-surface-soft);
      padding: var(--space-3);
    }

    .metric-value {
      display: block;
      color: var(--color-primary-dark);
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .metric-label {
      display: block;
      margin-top: var(--space-1);
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .data-list {
      display: grid;
      gap: var(--space-2);
      margin: var(--space-3) 0 0;
      padding: 0;
      list-style: none;
    }

    .data-list li {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      border-top: 1px solid var(--color-line);
      padding-top: var(--space-2);
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .data-list strong {
      color: var(--color-text);
      font-size: 14px;
    }

    .status-banner {
      display: none;
      margin-bottom: var(--space-4);
      border: 1px solid rgba(216, 95, 63, 0.28);
      border-radius: var(--radius-control);
      background: #FFF3ED;
      color: #9C3F29;
      padding: var(--space-3);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-banner.is-visible {
      display: block;
    }

    .status-banner.is-success {
      border-color: rgba(95, 107, 74, 0.34);
      background: #F0EBDD;
      color: var(--color-primary-dark);
    }

    .inline-status {
      display: none;
      border: 1px solid rgba(95, 107, 74, 0.24);
      border-radius: var(--radius-control);
      background: #F7F3E9;
      color: var(--color-primary-dark);
      padding: var(--space-2) var(--space-3);
      font-size: 12px;
      line-height: 1.45;
    }

    .inline-status.is-visible {
      display: block;
    }

    .inline-status.is-error {
      border-color: rgba(216, 95, 63, 0.28);
      background: #FFF3ED;
      color: #9C3F29;
    }

    .search-field,
    .field {
      display: grid;
      gap: var(--space-2);
    }

    .search-field {
      margin-bottom: var(--space-4);
    }

    label {
      color: var(--color-text);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-control);
      background: var(--color-surface);
      color: var(--color-text);
      padding: 10px 12px;
      outline: none;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(227, 111, 69, 0.14);
    }

    .venue-list {
      display: grid;
      gap: var(--space-3);
      margin-top: var(--space-4);
    }

    .star-search-panel {
      display: grid;
      gap: var(--space-3);
      border: 0;
      background: transparent;
      padding: 0;
      box-shadow: none;
    }

    .star-filter-stack {
      display: grid;
      gap: 6px;
    }

    .star-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 100%;
      overflow: visible;
      padding: 0 2px 2px 0;
      scrollbar-width: none;
    }

    .star-filter-row + .star-filter-row {
      margin-top: 0;
    }

    .star-filter-row.is-scene {
      min-height: 28px;
    }

    .star-scene-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .star-scene-chip {
      min-height: 26px;
      border: 1px solid rgba(216, 208, 194, 0.86);
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.88);
      color: var(--color-primary-dark);
      padding: 0 10px;
      font-size: 10px;
      font-weight: 800;
      box-shadow: 0 3px 10px rgba(47, 51, 43, 0.08);
    }

    .star-scene-chip.is-active {
      border-color: rgba(95, 107, 74, 0.38);
      background: #5F6B4A;
      color: #FFFFFF;
    }

    .star-filter-row::-webkit-scrollbar {
      display: none;
    }

    .star-filter-field {
      flex: 0 0 auto;
      display: block;
    }

    .star-filter-field span {
      display: none;
    }

    .star-filter-field select {
      width: 54px;
      max-width: 100%;
      min-height: 26px;
      padding: 0 8px;
      border: 1px solid rgba(216, 208, 194, 0.86);
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.88);
      color: var(--color-primary-dark);
      font-size: 10px;
      font-weight: 700;
      box-shadow: 0 3px 10px rgba(47, 51, 43, 0.08);
    }

    .venue-card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: 166px auto;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      background-position: center;
      background-size: cover;
      box-shadow: var(--shadow-card);
      color: #FFFFFF;
      isolation: isolate;
      min-height: 256px;
    }

    .venue-card::before {
      position: absolute;
      inset: 0;
      z-index: -1;
      content: "";
      background: linear-gradient(180deg, rgba(47, 51, 43, 0.02) 0%, rgba(47, 51, 43, 0.12) 42%, rgba(47, 51, 43, 0.74) 100%);
    }

    .venue-card::after {
      position: absolute;
      inset: 0;
      z-index: -2;
      content: "";
      background: var(--color-primary-dark);
    }

    .venue-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-2);
    }

    .venue-title-row {
      display: flex;
      align-items: baseline;
      gap: 7px;
      min-width: 0;
    }

    .venue-title-row h3 {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .joined-badge {
      flex: 0 0 auto;
      color: rgba(255, 253, 248, 0.62);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .venue-card-body {
      position: relative;
      z-index: 2;
      grid-row: 2;
      align-self: end;
      display: grid;
      gap: 4px;
      margin: var(--space-2);
      border: 1px solid rgba(255, 253, 248, 0.20);
      border-radius: 14px;
      background: rgba(47, 51, 43, 0.52);
      padding: 7px 9px;
      backdrop-filter: blur(10px);
    }

    .star-photo-label {
      position: absolute;
      left: 50%;
      top: 88px;
      z-index: 1;
      display: grid;
      place-items: center;
      width: min(360px, calc(100% - 48px));
      height: 140px;
      overflow: hidden;
      border: 1px solid rgba(255, 253, 248, 0.34);
      border-radius: 13px;
      background: rgba(255, 253, 248, 0.22);
      color: rgba(255, 253, 248, 0.82);
      font-size: 13px;
      font-weight: 800;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 10px 24px rgba(17, 17, 17, 0.10);
    }

    .star-photo-label.has-image {
      background: rgba(255, 253, 248, 0.28);
    }

    .star-photo-label img {
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      display: block;
    }

    .star-card-remove {
      position: absolute;
      right: 10px;
      top: 10px;
      z-index: 2;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      min-height: 24px;
      border: 1px solid rgba(255, 253, 248, 0.42);
      border-radius: 50%;
      background: rgba(95, 107, 74, 0.62);
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 800;
      backdrop-filter: blur(10px);
    }

    .venue-card h3,
    .modal-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
    }

    .venue-card h3 {
      font-size: 15px;
    }

    .venue-meta,
    .detail-row {
      margin: 0;
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .venue-card .venue-meta {
      color: rgba(255, 255, 255, 0.84);
      font-size: 11px;
      line-height: 1.25;
    }

    .scene-badge {
      flex: 0 0 auto;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.20);
      color: #FFFFFF;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      border-radius: 999px;
      background: var(--color-surface-soft);
      color: var(--color-muted);
      padding: 5px 9px;
      font-size: 11px;
      line-height: 1.2;
    }

    .tag.is-primary {
      background: rgba(95, 107, 74, 0.14);
      color: var(--color-primary-dark);
      font-weight: 700;
    }

    .tag.is-muted {
      background: #EEE6D9;
      color: #A79E90;
      text-decoration: line-through;
    }

    .venue-card .tag {
      background: rgba(255, 253, 248, 0.20);
      color: rgba(255, 253, 248, 0.9);
      backdrop-filter: blur(10px);
    }

    .venue-card .tag.is-primary {
      background: rgba(232, 199, 107, 0.86);
      color: var(--color-text);
    }

    .venue-card .tag.is-muted {
      background: rgba(255, 253, 248, 0.14);
      color: #FFFFFF;
    }

    .card-actions,
    .form-actions,
    .modal-actions {
      display: grid;
      gap: var(--space-2);
    }

    .card-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .venue-card .card-actions {
      display: flex;
      justify-content: flex-end;
    }

    .venue-card .text-btn {
      width: auto;
      min-width: 64px;
      min-height: 26px;
      padding: 0 12px;
    }

    .text-btn,
    .danger-btn {
      min-height: 32px;
      border: 1px solid rgba(255, 253, 248, 0.24);
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.16);
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .text-btn.is-primary {
      border-color: rgba(227, 111, 69, 0.62);
      background: rgba(227, 111, 69, 0.92);
      color: #FFFFFF;
    }

    .venue-card .text-btn.is-primary {
      border-color: rgba(255, 253, 248, 0.36);
      background: rgba(255, 253, 248, 0.20);
      color: #FFFFFF;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .danger-btn {
      border-color: rgba(255, 253, 248, 0.24);
      color: #FFE8DE;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.56;
    }

    .empty-state {
      display: grid;
      gap: var(--space-3);
      border: 1px dashed var(--color-line);
      border-radius: var(--radius-card);
      background: var(--color-surface);
      padding: var(--space-5);
      text-align: center;
    }

    .empty-state p {
      margin: 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .modal-container {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
    }

    .modal-container.is-open {
      display: block;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(47, 51, 43, 0.36);
    }

    .modal-sheet {
      position: absolute;
      left: 50%;
      bottom: 0;
      display: grid;
      gap: var(--space-4);
      width: 100%;
      max-width: 430px;
      max-height: min(88vh, 760px);
      overflow-y: auto;
      border: 1px solid rgba(216, 208, 194, 0.88);
      border-bottom: 0;
      border-radius: 24px 24px 0 0;
      background: var(--color-surface);
      padding: var(--space-5) var(--space-4) calc(var(--space-5) + env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -14px 32px rgba(63, 74, 53, 0.12);
      transform: translateX(-50%);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .modal-close {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      min-height: 40px;
      border: 0;
      border-radius: 50%;
      background: var(--color-surface-soft);
      color: var(--color-muted);
      font-size: 22px;
      line-height: 1;
    }

    .venue-form {
      display: grid;
      gap: var(--space-4);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .form-grid .field.is-full {
      grid-column: 1 / -1;
    }

    .pick-step {
      display: grid;
      gap: var(--space-3);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .pick-board {
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
    }

    #tab-pick .app-header {
      margin-bottom: var(--space-3);
    }

    #tab-pick h1 {
      font-size: 24px;
      font-weight: 500;
    }

    #tab-pick .header-copy {
      margin-top: var(--space-2);
      color: #111111;
      font-size: 11px;
      font-weight: 600;
    }

    #tab-pick .eyebrow {
      visibility: hidden;
      height: 18px;
      margin: 0 0 var(--space-2);
    }

    .pick-step-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .pick-step-header h1 {
      margin: 0 0 4px;
      font-family: "Segoe Script", "Brush Script MT", cursive;
      font-size: 28px;
      font-style: italic;
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .pick-step-header p {
      max-width: 190px;
      margin: 0;
      color: #111111;
      font-size: 10px;
      line-height: 1.25;
      font-weight: 600;
    }

    .pick-topbar {
      display: block;
    }

    .pick-location {
      display: grid;
      gap: 4px;
    }

    .pick-location label,
    .station-title,
    .select-title {
      color: var(--color-text);
      font-family: "Segoe Script", "Brush Script MT", cursive;
      font-size: 14px;
      font-style: italic;
      font-weight: 700;
      line-height: 1.2;
      text-transform: lowercase;
    }

    .pick-location input,
    .pick-location textarea {
      min-height: 34px;
      border: 0;
      border-bottom: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      padding: 4px 0;
      font-size: 13px;
      line-height: 1.35;
      resize: vertical;
    }

    .pick-arrow-btn {
      width: 38px;
      height: 24px;
      min-height: 24px;
      border: 0;
      border-radius: 999px;
      background: #D8D8D8;
      color: #111111;
      font-weight: 900;
    }

    .pick-arrow-btn:disabled {
      opacity: 0.35;
    }

    .step2-nav {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      min-height: 32px;
      margin-bottom: -12px;
    }

    .step2-nav .pick-arrow-btn:first-child {
      grid-column: 1;
    }

    .step2-nav .pick-arrow-btn:last-child {
      grid-column: 3;
    }

    .step2-nav .pick-arrow-btn[data-pick-action="finish-pick"] {
      width: 50px;
    }

    .date-strip {
      display: flex;
      gap: var(--space-2);
      overflow-x: auto;
      padding: var(--space-2) 0 var(--space-3);
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
    }

    .date-strip.is-dragging {
      cursor: grabbing;
      scroll-snap-type: none;
    }

    .date-picker {
      display: grid;
      gap: 6px;
    }

    .date-month-controls {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: -30px;
      margin-bottom: 2px;
      padding-right: 2px;
    }

    .date-month-control {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #111111;
      font-size: 10px;
      font-weight: 700;
    }

    .date-month-control select {
      width: auto;
      min-height: 20px;
      border: 1px solid var(--color-line);
      border-radius: 999px;
      background: var(--color-surface);
      color: #111111;
      padding: 0 8px;
      font-size: 10px;
      font-weight: 700;
    }

    .date-strip::-webkit-scrollbar {
      display: none;
    }

    .date-item {
      flex: 0 0 44px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #111111;
      padding: 7px 4px;
      text-align: center;
      scroll-snap-align: center;
      transition: background 0.16s ease, transform 0.16s ease, color 0.16s ease;
    }

    .date-item strong,
    .date-item span {
      display: block;
      line-height: 1.1;
    }

    .date-item strong {
      font-size: 17px;
      font-weight: 500;
    }

    .date-item span {
      margin-top: 3px;
      font-size: 10px;
      text-transform: uppercase;
    }

    .date-item.is-active {
      background: var(--color-primary);
      color: #FFFFFF;
      transform: translateY(-1px);
    }

    .date-item.is-today strong {

<body>
  <div class="app-shell">
    <main class="app-main">
      <div id="app-status" class="status-banner" role="status"></div>
      <section id="tab-star" class="tab-panel is-active" aria-labelledby="star-title"></section>
      <section id="tab-pick" class="tab-panel" aria-labelledby="pick-title"></section>
      <section id="tab-my" class="tab-panel" aria-labelledby="my-title"></section>
    </main>

    <nav class="tab-bar" aria-label="主导航">
      <button class="tab-btn is-active" type="button" data-tab="star">
        <span class="tab-icon">★</span>
        Star
      </button>
      <button class="tab-btn" type="button" data-tab="pick">
        <span class="tab-icon">◎</span>
        Pick
      </button>
      <button class="tab-btn" type="button" data-tab="my">
        <span class="tab-icon">人</span>
        My
      </button>
    </nav>
  </div>
  <div id="modal-container" class="modal-container" aria-live="polite"></div>

  <script>
    const XIAOHONGSHU_PROXY_URL = 'http://127.0.0.1:18061/prepare-xiaohongshu';
    const XIAOHONGSHU_MAX_IMAGES = 9;

    const DEFAULT_VENUES = [];

    const DEFAULT_HISTORY = [];

    const DEFAULT_CURRENT_PICK = {
      date: '2026-07-07',
      time: '14:00',
      userLocation: '',
      originPlace: null,
      weather: null,
      selectedVenueIds: [],
      filterConditions: [],
      customConditions: [],
      copiedInfo: {},
      confirmedVenueIds: [],
      currentStep: 1,
      activeVenueIndex: 0,
      step2Completed: false
    };

    const DEFAULT_FILTERS = ['有插座', '安静', '靠窗', '大桌子', '22点后营业', '有咖啡'];

    const Storage = {
      keys: {
        venues: 'venues',
        history: 'history',
        currentPick: 'currentPick',
        seeded: 'pickpickSeeded',
        historyReset: 'pickpickHistoryReset20260721'
      },

      init() {
        if (!this.read(this.keys.seeded, false)) {
          this.saveVenues(DEFAULT_VENUES);
          this.saveHistory(DEFAULT_HISTORY);
          this.saveCurrentPick(DEFAULT_CURRENT_PICK);
          this.write(this.keys.seeded, true);
          this.write(this.keys.historyReset, true);
        } else {
          this.resetHistoryForEmptyStart();
          this.removeDemoData();
          this.migrateVenues();
          this.migrateCurrentPick();
        }
      },

      read(key, fallback) {
        try {
          const rawValue = window.localStorage.getItem(key);
          return rawValue ? JSON.parse(rawValue) : fallback;
        } catch (error) {
          UI.showStatus('读取本地数据失败，已使用默认数据。');
          return fallback;
        }
      },

      write(key, value) {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
          return true;
        } catch (error) {
          UI.showStatus('存储空间不足，请删除一些旧照片或浏览器数据后重试。');
          return false;
        }
      },

      loadVenues() {
        return this.read(this.keys.venues, []);
      },

      saveVenues(venues) {
        return this.write(this.keys.venues, venues);
      },

      resetHistoryForEmptyStart() {
        if (this.read(this.keys.historyReset, false)) return;
        this.saveHistory([]);
        this.write(this.keys.historyReset, true);
      },

      removeDemoData() {
        const isDemoVenue = (id = '') => String(id).startsWith('v_demo_');
        const isDemoRecord = (id = '') => String(id).startsWith('cr_demo_');
        const venues = this.loadVenues();
        const nextVenues = venues.filter((venue) => !isDemoVenue(venue.id));
        if (nextVenues.length !== venues.length) this.saveVenues(nextVenues);

        const history = this.loadHistory();
        const nextHistory = history.filter((record) => !isDemoRecord(record.id));
        if (nextHistory.length !== history.length) this.saveHistory(nextHistory);

        const currentPick = this.loadCurrentPick();
        const selectedVenueIds = (currentPick.selectedVenueIds || []).filter((id) => !isDemoVenue(id));
        const confirmedVenueIds = (currentPick.confirmedVenueIds || []).filter((id) => !isDemoVenue(id));
        const copiedInfo = Object.fromEntries(
          Object.entries(currentPick.copiedInfo || {}).filter(([id]) => !isDemoVenue(id))
        );
        if (
          selectedVenueIds.length !== (currentPick.selectedVenueIds || []).length ||
          confirmedVenueIds.length !== (currentPick.confirmedVenueIds || []).length ||
          Object.keys(copiedInfo).length !== Object.keys(currentPick.copiedInfo || {}).length
        ) {
          this.saveCurrentPick({
            ...currentPick,
            selectedVenueIds,
            confirmedVenueIds,
            copiedInfo
          });
        }
      },

      migrateVenues() {
        const venues = this.loadVenues();
        let changed = false;
        const nextVenues = venues.map((venue) => {
          const defaultVenue = DEFAULT_VENUES.find((item) => item.id === venue.id);
          const nextVenue = { ...venue };
          if (typeof nextVenue.menuInfo === 'undefined') {
            nextVenue.menuInfo = defaultVenue?.menuInfo || '';
            changed = true;
          }
          if (typeof nextVenue.membershipInfo === 'undefined') {
            nextVenue.membershipInfo = defaultVenue?.membershipInfo || '';
            changed = true;
          }
          if (typeof nextVenue.service === 'undefined') {
            nextVenue.service = Array.isArray(nextVenue.pet) ? nextVenue.pet : [];
            changed = true;
          }
          if (typeof nextVenue.channelLinks === 'undefined') {
            nextVenue.channelLinks = defaultVenue?.channelLinks || {};
            changed = true;
          }
          if (typeof nextVenue.geoPlace === 'undefined' && defaultVenue?.geoPlace) {
            nextVenue.geoPlace = defaultVenue.geoPlace;
            changed = true;
          }
          return nextVenue;
        });
        if (changed) this.saveVenues(nextVenues);
      },

      migrateCurrentPick() {
        const currentPick = this.loadCurrentPick();
        const nextPick = {
          ...DEFAULT_CURRENT_PICK,
          ...currentPick,
          confirmedVenueIds: currentPick.confirmedVenueIds || []
        };
        nextPick.filterConditions = (nextPick.filterConditions || []).map((condition) => (condition === '宠物' ? '服务' : condition));
        if (
          typeof currentPick.confirmedVenueIds !== 'undefined' &&
          JSON.stringify(nextPick.filterConditions) === JSON.stringify(currentPick.filterConditions || [])
        ) return;
        this.saveCurrentPick(nextPick);
      },

      loadHistory() {
        return this.read(this.keys.history, []);
      },

      saveHistory(history) {
        return this.write(this.keys.history, history);
      },

      loadCurrentPick() {
        return this.read(this.keys.currentPick, { ...DEFAULT_CURRENT_PICK });
      },

      saveCurrentPick(currentPick) {
        return this.write(this.keys.currentPick, currentPick);
      }
    };

      handleShareTarget() {
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title')?.trim() || '';
        const text = params.get('text')?.trim() || '';
        const explicitUrl = params.get('url')?.trim() || '';
        const sharedText = [title, text, explicitUrl].filter(Boolean).join('\n');
        const url = explicitUrl || sharedText.match(/https?:\/\/\S+/)?.[0] || '';
        if (!title && !text && !url) return;

        const extractedVenue = AIExtractor.applyToVenue({
          id: StarManager.createId('v'),
          name: title || AIExtractor.extractName(AIExtractor.normalizeText(sharedText).split(/\n+/).map((line) => line.trim()).filter(Boolean)),
          address: '',
          hours: '',
          price: { amount: 0, unit: '日' },
          tags: [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: text || url || '',
          images: [],
          channelLinks: url ? { share: url } : {},
          visitCount: 0,
          createdAt: new Date().toISOString().slice(0, 10),
          sceneType: '其他',
          source: 'share',
          sourceUrl: url
        }, sharedText);

        StarManager.openStep12Draft(extractedVenue);
        UI.showStatus('已接收分享内容，请确认后保存到 Star 库。', 'success');
        try {
          window.history.replaceState({}, document.title, window.location.href.split('?')[0]);
        } catch (error) {}
      },

      bindExtensionBridge() {
        window.addEventListener('pickpick:dianping-result', (event) => {
          this.handleDianpingExtensionResult(event.detail || {});
        });
      },

      buildExtensionRawText(detail = {}) {
        const venue = detail.venue || {};
        return [
          detail.rawText || '',
          venue.name ? `名称：${venue.name}` : '',
          venue.address ? `地点：${venue.address}` : '',
          venue.hours ? `时间：${venue.hours}` : '',
          venue.price?.text || venue.price?.amount ? `价格：${venue.price?.text || venue.price?.amount}` : '',
          venue.sceneType ? `场景：${venue.sceneType}` : '',
          venue.device?.length ? `设备：${venue.device.join('、')}` : '',
          venue.food?.length ? `美食：${venue.food.join('、')}` : '',
          venue.business?.length ? `业态：${venue.business.join('、')}` : '',
          (venue.service?.length || venue.pet?.length) ? `服务：${[...(venue.service || []), ...(venue.pet || [])].join('、')}` : '',
          venue.notes ? `备注：${venue.notes}` : '',
          detail.shopUrl || ''
        ].filter(Boolean).join('\n');
      },

      buildExtensionBaseVenue(venue = {}, shopUrl = '') {
        return {
          id: StarManager.createId('v'),
          name: venue.name || '未命名地点',
          address: '',
          hours: '',
          price: { amount: 0, unit: '人', text: '' },
          environment: [],
          device: [],
          food: [],
          business: [],
          service: [],
          pet: [],
          tags: [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: '',
          images: [],
          channelLinks: shopUrl ? { dianping: shopUrl } : {},
          visitCount: 0,
          createdAt: new Date().toISOString().slice(0, 10),
          sceneType: '',
          source: 'dianping-extension',
          sourceUrl: shopUrl
        };
      },

      async handleDianpingExtensionResult(detail = {}) {
        const extensionVenue = detail.venue || detail.result?.data?.venue || {};
        const shopUrl = detail.shopUrl || extensionVenue.source || extensionVenue.sourceUrl || '';
        const rawText = this.buildExtensionRawText({ ...detail, venue: extensionVenue, shopUrl });
        if (!BackendClient.hasVenueData(extensionVenue)) {
          UI.showStatus('扩展结果为空，请重新提取大众点评信息。');
          return;
        }
        if (this.currentTab === 'pick' && PickManager.viewStep === 2) {
          await this.applyDianpingExtensionToPick(extensionVenue, rawText, shopUrl);
          return;
        }
        await this.applyDianpingExtensionToStar(extensionVenue, rawText, shopUrl);
      },

      async applyDianpingExtensionToStar(extensionVenue, rawText, shopUrl) {
        const activeVenue = StarManager.getStep12Venue();
        const baseVenue = activeVenue
          ? {
            ...activeVenue,
            channelLinks: {
              ...(activeVenue.channelLinks || {}),
              dianping: shopUrl || activeVenue.channelLinks?.dianping || ''
            },
            sourceUrl: activeVenue.sourceUrl || shopUrl
          }
          : this.buildExtensionBaseVenue(extensionVenue, shopUrl);
        const extractedVenue = AIExtractor.applyToVenue(baseVenue, rawText, extensionVenue);
        const enriched = await BackendClient.enrichVenueWithPoi({
          baseVenue,
          venue: extractedVenue,
          rawText,
          extraction: { source: 'extension', venue: extensionVenue, sourceText: rawText },
          channel: 'dianping'
        });
        const nextVenue = enriched.venue;
        if (StarManager.step12Draft && StarManager.step12Draft.id === baseVenue.id) {
          StarManager.step12Draft = nextVenue;
          StarManager.renderStep12();
        } else if (activeVenue) {
          const venues = Storage.loadVenues();
          if (venues.some((item) => item.id === activeVenue.id)) {
            Storage.saveVenues(venues.map((item) => (item.id === activeVenue.id ? nextVenue : item)));
            StarManager.renderStep12();
          } else {
            StarManager.openStep12Draft(nextVenue);
          }
        } else {
          StarManager.openStep12Draft(nextVenue);
        }
        UI.closeModal();
        if (enriched.poiCandidates.length) {
          StarManager.showPoiCandidates({
            owner: 'star',
            venueId: nextVenue.id,
            baseVenue,
            candidates: enriched.poiCandidates
          });
          UI.showStatus('已接收大众点评扩展信息，请选择高德地点。', 'success');
          return;
        }
        UI.showStatus('已接收大众点评扩展信息。', 'success');
      },

      async applyDianpingExtensionToPick(extensionVenue, rawText, shopUrl) {
        const currentPick = Storage.loadCurrentPick();
        const selectedVenues = PickManager.getSelectedVenues(currentPick);
        const activeVenue = selectedVenues[currentPick.activeVenueIndex] || selectedVenues[0];
        if (!activeVenue) {
          await this.applyDianpingExtensionToStar(extensionVenue, rawText, shopUrl);
          return;
        }
        const baseVenue = {
          ...activeVenue,
          channelLinks: {
            ...(activeVenue.channelLinks || {}),
            dianping: shopUrl || activeVenue.channelLinks?.dianping || ''
          },
          sourceUrl: activeVenue.sourceUrl || shopUrl
        };
        const extractedVenue = AIExtractor.applyToVenue(baseVenue, rawText, extensionVenue);
        const enriched = await BackendClient.enrichVenueWithPoi({
          baseVenue,
          venue: extractedVenue,
          rawText,
          extraction: { source: 'extension', venue: extensionVenue, sourceText: rawText },
          channel: 'dianping'
        });
        const venues = Storage.loadVenues();
        Storage.saveVenues(venues.map((item) => (item.id === activeVenue.id ? enriched.venue : item)));
        const copiedInfo = {
          ...(currentPick.copiedInfo || {}),
          [activeVenue.id]: {
            ...(currentPick.copiedInfo?.[activeVenue.id] || {}),
            dianping: rawText
          }
        };
        Storage.saveCurrentPick({ ...currentPick, copiedInfo });
        PickManager.render();
        UI.closeModal();
        if (enriched.poiCandidates.length) {
          StarManager.showPoiCandidates({
            owner: 'pick',
            venueId: activeVenue.id,
            baseVenue,
            candidates: enriched.poiCandidates
          });
          UI.showStatus('已接收大众点评扩展信息，请选择高德地点。', 'success');
          return;
        }
        UI.showStatus('已接收大众点评扩展信息。', 'success');
      },

      registerServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }

    const ImageTools = {
      compressImage(file, options = {}) {
        const maxSize = Number(options.maxSize) || 1200;
        const quality = Number(options.quality) || 0.72;
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = () => reject(new Error('read failed'));
          reader.onload = () => {
            const image = new Image();
            image.onerror = () => reject(new Error('image failed'));
            image.onload = () => {
              const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
              const canvas = document.createElement('canvas');
              canvas.width = Math.max(1, Math.round(image.width * scale));
              canvas.height = Math.max(1, Math.round(image.height * scale));
              const context = canvas.getContext('2d');
              context.drawImage(image, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL('image/jpeg', quality));
            };
            image.src = reader.result;
          };
          reader.readAsDataURL(file);
        });
      }
    };

    const StarManager = {
      query: '',
      starFilters: {
        sceneType: '',
        environment: '',
        device: '',
        food: '',
        price: '',
        business: '',
        service: ''
      },
      viewStep: 1,
      activeVenueId: '',
      step12Draft: null,
      pendingPoiSelection: null,

        startY: 0
      },

      init() {
        const starTab = document.getElementById('tab-star');

        starTab.addEventListener('input', (event) => this.handleInput(event));
        starTab.addEventListener('change', (event) => this.handleChange(event));

          ${UI.renderHeader({ id: 'star-title', text: 'Star' }, 'Store the favorite places in the database.', '<button class="icon-btn" type="button" data-action="new-venue" aria-label="添加地点">+</button>')}
          <section class="panel star-search-panel">

      renderList() {
        const venues = Storage.loadVenues();
        const currentPick = Storage.loadCurrentPick();
        const keyword = this.query.trim().toLowerCase();
        const filteredVenues = venues.filter((venue) => {
          const searchable = [
            venue.name,
            venue.address,
            venue.sceneType,
            ...(venue.tags || []),
            ...(venue.customTags || [])
          ].join(' ').toLowerCase();
          const matchesQuery = !keyword || searchable.includes(keyword);
          return matchesQuery && this.matchesStarFilters(venue);
        });
        const listArea = document.getElementById('star-list-area');
        if (!listArea) return;

        if (!venues.length) {
          listArea.innerHTML = `
            <div class="empty-state">
              <h2 class="placeholder-title">还没有收藏地点</h2>
              <p>先添加一个自习室或咖啡馆，后续 Pick 时就能直接选择。</p>
              <button class="primary-btn" type="button" data-action="new-venue">添加第一个地点</button>

          listArea.innerHTML = `

      renderStarFilters(venues) {
        const groups = this.getStarFilterGroups(venues);
        const sceneGroups = groups.filter((group) => group.key === 'sceneType');
        const otherGroups = groups.filter((group) => group.key !== 'sceneType');
        const sceneOptions = ['全部', ...(sceneGroups[0]?.options || [])];
        const renderGroup = (group) => `
          <label class="star-filter-field">
            <span>${UI.escape(group.label)}</span>

                  const active = (this.starFilters.sceneType || '') === value;
                  return `
                    <button class="star-scene-chip${active ? ' is-active' : ''}" type="button" data-action="star-scene-filter" data-value="${UI.escape(value)}">

      renderVenueCard(venue, isSelected = false) {
        const background = this.getVenueBackground(venue);
        const firstImage = this.getRenderableImages(venue.images || [])[0] || '';
        return `
          <article class="venue-card" style="background-image: url('${background}')">
            <button class="star-card-remove" type="button" data-action="delete-venue" data-id="${venue.id}" aria-label="删除 ${UI.escape(venue.name)}">−</button>

              ${firstImage ? `<img src="${UI.escape(firstImage)}" alt="${UI.escape(venue.name)} 图片 1" loading="lazy" decoding="async" referrerpolicy="no-referrer">` : '图片'}
            </span>

              <div class="venue-card-header">

                  <div class="venue-title-row">

      },

      getStarFilterGroups(venues = []) {
        const prices = [...new Set(venues
          .map((venue) => Number(venue.price?.amount) || 0)
          .filter((amount) => amount > 0)
          .sort((a, b) => a - b)
          .map(String))];
        return [
          { key: 'sceneType', label: '场景', options: ['自习室', '咖啡馆', '其他'] },
          { key: 'environment', label: '环境', options: ['安静', '喧闹', '自然光充足', '光线偏暗', '色彩温暖', '空间宽敞', '周末人多', '咖啡香'] },
          { key: 'device', label: '设备', options: ['座位宽敞', '座位偏窄', '椅子舒服', '空调偏冷', '有窗景', '有树荫', '大桌', '7-10人桌', '插座', '每座有插座', '插座不多', '洗手间'] },
          { key: 'food', label: '美食', options: ['手冲咖啡', '特调咖啡', '风味咖啡', '茶', '气泡水', '简餐', '甜品'] },
          { key: 'price', label: '价格', options: prices },
          { key: 'business', label: '业态', options: ['纯咖啡', '书店+咖啡', '日咖夜酒', '狗咖'] },
          { key: 'service', label: '服务', options: ['Wi-Fi', '服务态度好', '宠物友好', '不可携带宠物', '可抽烟', '禁烟', '有停车位', '地铁便利'] }
        ];
      },

      getVenueTagText(venue) {
        return [...(venue.tags || []), ...(venue.customTags || [])].join(' ');
      },

      getVenueFieldValue(venue, key) {
        const groups = this.getStarFilterGroups();
        const group = groups.find((item) => item.key === key);
        if (key === 'sceneType') return venue.sceneType || '-';
        if (key === 'price') return this.formatPrice(venue);
        const structuredValue = key === 'service'
          ? this.getVenueServiceValues(venue)
          : (Array.isArray(venue[key]) ? venue[key].filter(Boolean) : []);
        if (structuredValue.length) return structuredValue.join('、');
        const tagText = this.getVenueTagText(venue);
        const matched = group?.options.filter((option) => tagText.includes(option)) || [];
        return matched.join('、') || '-';
      },

      getVenueServiceValues(venue = {}) {
        return [...new Set([
          ...(Array.isArray(venue.service) ? venue.service : []),
          ...(Array.isArray(venue.pet) ? venue.pet : [])
        ].map((item) => String(item || '').trim()).filter(Boolean))];
      },

      getVenueFieldEditValue(venue, key) {
        if (key === 'price') {
          const amount = Number(venue.price?.amount) || 0;
          return amount > 0 ? String(amount) : '';
        }
        const value = this.getVenueFieldValue(venue, key);
        return value === '-' ? '' : value;
      },

      getCategoryOptions() {
        return this.getStarFilterGroups()
          .filter((group) => group.key !== 'price')
          .flatMap((group) => group.options);
      },

      getUncategorizedTags(venue) {
        const categoryOptions = new Set(this.getCategoryOptions());
        return [...(venue.tags || []), ...(venue.customTags || [])]
          .filter((tag) => tag && !categoryOptions.has(tag));
      },

      getVenueInfoRows(venue) {
        return [
          ['名称', venue.name || '-'],
          ['地点', venue.address || '-'],
          ['时间', venue.hours || '-'],
          ['场景', venue.sceneType || '-'],
          ['环境', this.getVenueFieldValue(venue, 'environment')],
          ['设备', this.getVenueFieldValue(venue, 'device')],
          ['美食', this.getVenueFieldValue(venue, 'food')],
          ['价格', this.getVenueFieldValue(venue, 'price')],
          ['业态', this.getVenueFieldValue(venue, 'business')],
          ['服务', this.getVenueFieldValue(venue, 'service')],
          ['备注', venue.notes || '-']
        ];

      readStep12Form(venue) {
        const form = document.getElementById('star-step12-form');
        if (!form) return venue;
        const formData = new FormData(form);
        const readText = (name) => String(formData.get(name) || '').trim();
        const environment = this.parseTags(readText('environment'));
        const device = this.parseTags(readText('device'));
        const food = this.parseTags(readText('food'));
        const business = this.parseTags(readText('business'));
        const service = this.parseTags(readText('service'));
        const amountText = readText('priceAmount');
        const amountMatch = amountText.match(/\d+(\.\d+)?/);
        const priceAmount = amountMatch ? Number(amountMatch[0]) : 0;
        const uncategorizedTags = this.getUncategorizedTags(venue);
        return {
          ...venue,
          name: readText('name') || venue.name,
          address: readText('address'),
          hours: readText('hours'),
          sceneType: readText('sceneType') || '其他',
          environment,
          device,
          food,
          business,
          service,
          pet: [],
          tags: [...new Set([...environment, ...device])],
          customTags: [...new Set([...uncategorizedTags, ...food, ...business, ...service])],
          price: {
            amount: priceAmount,
            unit: venue.price?.unit || '杯'
          },
          notes: readText('notes')
        };
      },

      matchesStarFilters(venue) {
        return Object.entries(this.starFilters).every(([key, value]) => {
          if (!value) return true;
          if (key === 'price') {
            return String(Number(venue.price?.amount) || '') === value;
          }
          if (key === 'sceneType') return (venue.sceneType || '') === value;
          return [this.getVenueTagText(venue), this.getVenueFieldValue(venue, key)].join(' ').includes(value);
        });
      },

      handleInput(event) {
        if (event.target.id !== 'star-search') return;
        this.query = event.target.value;
        this.renderList();
      },

      handleChange(event) {
        const key = event.target.dataset.filterKey;
        if (!key) return;
        this.starFilters = {
          ...this.starFilters,
          [key]: event.target.value
        };
        this.renderList();
      },

      handleClick(event) {
        const trigger = event.target.closest('[data-action]');
        if (!trigger) return;
        if (trigger.dataset.action === 'open-channel') {
          this.openChannel(trigger.dataset.channel, trigger.dataset.query);
          return;
        }
        this.runAction(trigger.dataset.action, trigger.dataset.id, trigger);
      },

      handleModalClick(event) {
        const trigger = event.target.closest('[data-action]');
        if (!trigger) return;
        if (trigger.dataset.action === 'open-dianping-search') {
          this.openDianpingSearch(trigger.dataset.query || '', trigger.dataset.city || '');
          return;
        }
        if (trigger.dataset.action === 'pick-add-star') {
          PickManager.addStarVenue(trigger.dataset.id);
          return;
        }
        if (trigger.dataset.action === 'pick-new-venue') {
          StarManager.openForm('', { addToPick: true });
          return;
        }
        if (trigger.dataset.action === 'pick-open-star-list') {
          PickManager.openStarPickerList();
          return;
        }
        this.runAction(trigger.dataset.action, trigger.dataset.id, trigger);
      },

      handleModalChange(event) {
        const input = event.target.closest('input[data-channel-screenshot]');
        if (!input) return;
        const files = Array.from(input.files || []);
        this.handleChannelScreenshotUpload(input, files);
        input.value = '';
      },

      handlePointerDown(event) {
        const item = event.target.closest('.image-gallery-item[data-image-index]');
        if (!item || event.target.closest('.image-gallery-delete')) return;
        this.startImageLongPress(event, item);
      },

      handlePointerMove(event) {
        if (!this.imageLongPress.timer) return;
        const movedX = Math.abs(event.clientX - this.imageLongPress.startX);
        const movedY = Math.abs(event.clientY - this.imageLongPress.startY);
        if (movedX > 10 || movedY > 10) this.cancelImageLongPress();
      },

      handlePointerUp() {
        this.cancelImageLongPress();
      },

      handlePointerCancel() {
        this.cancelImageLongPress();
      },

      startImageLongPress(event, item) {
        this.cancelImageLongPress();
        const index = Number(item.dataset.imageIndex);
        if (!Number.isFinite(index)) return;
        this.imageLongPress = {
          index,
          startX: event.clientX,
          startY: event.clientY,
          timer: window.setTimeout(() => {
            this.imageLongPress.timer = null;
            this.openImageDelete(index);
          }, 560)
        };
      },

      cancelImageLongPress() {
        if (this.imageLongPress.timer) window.clearTimeout(this.imageLongPress.timer);
        this.imageLongPress = { timer: null, index: -1, startX: 0, startY: 0 };
      },

      openImageDelete(index) {
        this.imageDeleteIndex = index;
        document.querySelectorAll('#tab-star .image-gallery-item[data-image-index]').forEach((item) => {
          item.classList.toggle('is-delete-open', Number(item.dataset.imageIndex) === index);
        });
      },

      getChannelExtractWaitMessage(channel) {
        const names = {
          xiaohongshu: '\u5c0f\u7ea2\u4e66',
          dianping: '\u5927\u4f17\u70b9\u8bc4',
          amap: '\u9ad8\u5fb7',
          meituan: '\u7f8e\u56e2'
        };
        const name = names[channel] || '\u5e73\u53f0';
        return channel === 'xiaohongshu'
          ? '\u6b63\u5728\u63d0\u53d6\u5c0f\u7ea2\u4e66\u5185\u5bb9\uff0c\u8bf7\u7a0d\u540e\uff0c\u53ef\u80fd\u9700\u8981\u51e0\u79d2...'
          : `\u6b63\u5728\u63d0\u53d6${name}\u5185\u5bb9\uff0c\u8bf7\u7a0d\u540e...`;
      },

      setChannelExtractStatus(form, message, options = {}) {
        if (!form) return;
        let status = form.querySelector('[data-channel-extract-status]');
        if (!status) {
          status = document.createElement('p');
          status.dataset.channelExtractStatus = 'true';
          status.setAttribute('role', 'status');
          status.className = 'inline-status';
          const actions = form.querySelector('.form-actions:last-of-type');
          form.insertBefore(status, actions || null);
        }
        status.textContent = message || '';
        status.className = `inline-status${message ? ' is-visible' : ''}${options.error ? ' is-error' : ''}`;
      },

      setChannelSubmitButton(form, loading) {
        const button = form?.querySelector('button[type="submit"]');
        if (!button) return;
        if (loading) {
          if (!button.dataset.originalText) button.dataset.originalText = button.textContent || '';
          button.disabled = true;
          button.textContent = '\u63d0\u53d6\u4e2d...';
          return;
        }
        button.disabled = false;
        if (button.dataset.originalText) {
          button.textContent = button.dataset.originalText;
          delete button.dataset.originalText;
        }
      },

      async handleChannelScreenshotUpload(input, files) {
        const form = input?.closest('form');
        const imageFiles = files.filter((file) => file.type.startsWith('image/'));
        if (!imageFiles.length) {
          this.setChannelExtractStatus(form, '请选择图片文件。', { error: true });
          UI.showStatus('请选择图片文件。');
          return;
        }
        input.disabled = true;
        this.setChannelExtractStatus(form, `正在保存 ${imageFiles.length} 张截图...`);
        UI.showStatus('正在保存截图...', 'success');
        try {
          const compressedImages = await Promise.all(imageFiles.map((file) => ImageTools.compressImage(file, {
            maxSize: 1400,
            quality: 0.74
          })));
          const saved = this.saveChannelScreenshots(input.dataset.owner, input.dataset.venueId, compressedImages);
          if (!saved) {
            this.setChannelExtractStatus(form, '截图保存失败，请先确认场地存在。', { error: true });
            UI.showStatus('截图保存失败，请先确认场地存在。');
            return;
          }
          const message = `已保存 ${compressedImages.length} 张截图到场地图片。`;
          this.setChannelExtractStatus(form, message);
          UI.showStatus(message, 'success');
        } catch (error) {
          console.error('[PickPick] channel screenshot upload failed', error);
          this.setChannelExtractStatus(form, '截图处理失败，请换一张图片重试。', { error: true });
          UI.showStatus('截图处理失败，请换一张图片重试。');
        } finally {
          input.disabled = false;
        }
      },

      saveChannelScreenshots(owner, venueId, images = []) {
        if (!venueId || !images.length) return false;
        const mergeImages = (venue) => ({
          ...venue,
          images: AIExtractor.uniqueArray([...(venue.images || []), ...images])
        });

        if (owner === 'star' && this.step12Draft?.id === venueId) {
          this.step12Draft = mergeImages(this.readStep12Form(this.step12Draft));
          this.imageDeleteIndex = -1;
          this.renderStep12();
          return true;
        }

        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId);
        if (!venue) return false;
        const baseVenue = owner === 'star' && this.viewStep === 2 && this.activeVenueId === venueId
          ? this.readStep12Form(venue)
          : venue;
        const nextVenue = mergeImages(baseVenue);
        if (!Storage.saveVenues(venues.map((item) => (item.id === venueId ? nextVenue : item)))) return false;
        this.imageDeleteIndex = -1;
        if (owner === 'pick') {
          if (PickManager.viewStep === 2 || PickManager.viewStep === 3) PickManager.render();
        } else if (this.viewStep === 2 && this.activeVenueId === venueId) {
          this.renderStep12();
        } else if (this.viewStep === 1) {
          this.renderList();
        }
        return true;
      },

      async handleSubmit(event) {
        if (event.target.id === 'star-step12-form') {
          event.preventDefault();
          this.confirmStep12();
          return;
        }
        if (event.target.id === 'channel-link-form') {
          event.preventDefault();
          const formData = new FormData(event.target);
          const link = String(formData.get('link') || '').trim();
          console.info('[PickPick] channel submit', {
            owner: event.target.dataset.owner,
            venueId: event.target.dataset.venueId,
            channel: event.target.dataset.channel,
            linkLength: link.length,
            backendConfigured: BackendClient.isConfigured()
          });
          const waitMessage = this.getChannelExtractWaitMessage(event.target.dataset.channel);
          this.setChannelExtractStatus(event.target, waitMessage);
          this.setChannelSubmitButton(event.target, true);
          UI.showStatus(waitMessage, 'success');
          try {
            if (event.target.dataset.owner === 'pick') {
              await PickManager.saveChannelLink(event.target.dataset.venueId, event.target.dataset.channel, link);
            } else {
              await this.saveChannelLink(event.target.dataset.venueId, event.target.dataset.channel, link);
            }
          } catch (error) {
            console.error('[PickPick] channel extract failed', error);
            if (event.target.isConnected) {
              this.setChannelExtractStatus(
                event.target,
                `\u63d0\u53d6\u5931\u8d25\uff1a${error?.message || '\u8bf7\u68c0\u67e5\u5185\u5bb9\u540e\u91cd\u8bd5'}`,
                { error: true }
              );
            }
            UI.showStatus('\u63d0\u53d6\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u5185\u5bb9\u540e\u91cd\u8bd5\u3002');
          } finally {
            if (event.target.isConnected) this.setChannelSubmitButton(event.target, false);
          }
          return;
        }
        if (event.target.id !== 'venue-form') return;
        event.preventDefault();
        this.saveFromForm(event.target);
      },

      runAction(action, id, trigger = null) {
        const actions = {
          'new-venue': () => this.openForm(),
          'edit-venue': () => this.openForm(id),
          'detail-venue': () => this.openDetail(id),
          'delete-venue': () => this.deleteVenue(id),
          'add-to-pick': () => this.addToPick(id),
          'apply-poi-candidate': () => this.applyPoiCandidate(trigger?.dataset.index),
          'star-scene-filter': () => {
            this.starFilters = {
              ...this.starFilters,
              sceneType: trigger?.dataset.value || ''
            };
            this.render();
          },
          'back-star-list': () => this.goStep1(),
          'confirm-star-info': () => this.confirmStep12(),
          'clear-star-info': () => this.clearStep12Info(),
          'delete-step12-image': () => this.deleteStep12Image(trigger?.dataset.index),
          'clear-search': () => {
            this.query = '';
            this.starFilters = {
              sceneType: '',
              environment: '',
              device: '',
              food: '',
              price: '',
              business: '',
              service: ''
            };
            this.render();
          },
          'close-modal': () => UI.closeModal()
        };
        if (actions[action]) actions[action]();
      },

      openDianpingSearch(query = '', city = '') {
        const keyword = String(query || '').trim();
        if (!keyword) {
          UI.showStatus('请先填写场地名称。');
          return;
        }
        const cityId = this.getDianpingCityId(city || keyword);
        const url = `https://www.dianping.com/search/keyword/${cityId}/0_${encodeURIComponent(keyword)}`;
        window.open(url, '_blank', 'noopener,noreferrer');
        UI.showStatus('已打开大众点评搜索页，进入店铺后可用扩展提取。', 'success');
      },

      getDianpingCityId(text = '') {
        const value = String(text || '');
        const cityMap = [
          ['北京', '2'],
          ['上海', '1'],
          ['广州', '4'],
          ['深圳', '7'],
          ['天津', '10'],
          ['杭州', '3'],
          ['南京', '5'],
          ['苏州', '6'],
          ['成都', '8'],
          ['武汉', '16'],
          ['重庆', '9'],
          ['西安', '17']
        ];
        return cityMap.find(([name]) => value.includes(name))?.[1] || '10';
      },

          address: '',
          hours: '',

          customTags: [],

          menuInfo: '',
          membershipInfo: '',

                <option value="咖啡馆" ${model.sceneType === '咖啡馆' ? 'selected' : ''}>咖啡馆</option>

              <textarea name="menuInfo" placeholder="例如 美式 22 元，轻食 36 元，可自带水杯">${UI.escape(model.menuInfo || '')}</textarea>

              办卡信息

        UI.openModal(`
          <div class="modal-header">

            </div>
