<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2DCD9B">
  <title>PickPick</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <style>
    :root {
      --color-primary: #2DCD9B;
      --color-primary-dark: #159D77;
      --color-bg: #FAFAFA;
      --color-surface: #FFFFFF;
      --color-text: #1F2933;
      --color-muted: #6B7280;
      --color-line: #E5E7EB;
      --color-soft: #F2FBF8;
      --color-danger: #E5484D;
      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.06);
      --radius-card: 12px;
      --radius-control: 12px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --tab-height: 64px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      display: flex;
      justify-content: center;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--color-bg);
      overflow: hidden;
    }

    .app-main {
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 0px) + var(--space-4)) var(--space-4)
        calc(var(--tab-height) + env(safe-area-inset-bottom, 0px) + var(--space-4));
      overflow-y: auto;
    }

    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .eyebrow {
      margin: 0 0 var(--space-1);
      color: var(--color-primary-dark);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .header-copy {
      margin: var(--space-2) 0 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .panel {
      background: var(--color-surface);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--space-4);
    }

    .panel + .panel {
      margin-top: var(--space-4);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .metric {
      min-width: 0;
      border-radius: 10px;
      background: var(--color-soft);
      padding: var(--space-3);
    }

    .metric-value {
      display: block;
      color: var(--color-primary-dark);
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .metric-label {
      display: block;
      margin-top: var(--space-1);
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .data-list {
      display: grid;
      gap: var(--space-2);
      margin: var(--space-3) 0 0;
      padding: 0;
      list-style: none;
    }

    .data-list li {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      border-top: 1px solid var(--color-line);
      padding-top: var(--space-2);
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .data-list strong {
      color: var(--color-text);
      font-size: 14px;
    }

    .status-banner {
      display: none;
      margin-bottom: var(--space-4);
      border: 1px solid rgba(229, 72, 77, 0.28);
      border-radius: var(--radius-control);
      background: #FFF5F5;
      color: #A8252A;
      padding: var(--space-3);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-banner.is-visible {
      display: block;
    }

    .placeholder-title {
      margin: 0 0 var(--space-2);
      font-size: 18px;
      line-height: 1.35;
    }

    .placeholder-text {
      margin: 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .primary-btn,
    .secondary-btn,
    .icon-btn {
      min-height: 44px;
      border: 0;
      border-radius: var(--radius-control);
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .primary-btn {
      width: 100%;
      background: var(--color-primary);
      color: #FFFFFF;
      font-weight: 700;
    }

    .secondary-btn {
      background: var(--color-soft);
      color: var(--color-primary-dark);
      font-weight: 700;
      padding: 0 var(--space-4);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      background: var(--color-primary);
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .primary-btn:active,
    .secondary-btn:active,
    .icon-btn:active {
      transform: scale(0.98);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.is-active {
      display: block;
    }

    .tab-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 100%;
      max-width: 430px;
      height: calc(var(--tab-height) + env(safe-area-inset-bottom, 0px));
      padding: var(--space-1) var(--space-3) env(safe-area-inset-bottom, 0px);
      border-top: 1px solid var(--color-line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      transform: translateX(-50%);
    }

    .tab-btn {
      min-height: 52px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #999999;
      font-size: 12px;
      font-weight: 700;
    }

    .tab-icon {
      display: block;
      margin-bottom: 2px;
      font-size: 18px;
      line-height: 1;
    }

    .tab-btn.is-active {
      background: var(--color-soft);
      color: var(--color-primary-dark);
    }

    @media (min-width: 431px) {
      .app-shell {
        border-left: 1px solid var(--color-line);
        border-right: 1px solid var(--color-line);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <main class="app-main">
      <div id="app-status" class="status-banner" role="status"></div>
      <section id="tab-star" class="tab-panel is-active" aria-labelledby="star-title"></section>
      <section id="tab-pick" class="tab-panel" aria-labelledby="pick-title"></section>
      <section id="tab-my" class="tab-panel" aria-labelledby="my-title"></section>
    </main>

    <nav class="tab-bar" aria-label="主导航">
      <button class="tab-btn is-active" type="button" data-tab="star">
        <span class="tab-icon">★</span>
        Star
      </button>
      <button class="tab-btn" type="button" data-tab="pick">
        <span class="tab-icon">◎</span>
        Pick
      </button>
      <button class="tab-btn" type="button" data-tab="my">
        <span class="tab-icon">人</span>
        My
      </button>
    </nav>
  </div>

  <script>
    const DEFAULT_VENUES = [
      {
        id: 'v_demo_001',
        name: '静思自习室',
        address: '朝阳区建国路88号',
        hours: '09:00-22:30',
        price: { amount: 39, unit: '日' },
        tags: ['有插座', '安静', '大桌子', '22点后营业'],
        customTags: ['椅子舒服'],
        notes: '下午三点后人会变多，靠窗区光线最好。',
        images: [],
        visitCount: 2,
        createdAt: '2026-07-06',
        sceneType: '自习室'
      },
      {
        id: 'v_demo_002',
        name: '光合作用咖啡',
        address: '海淀区中关村南路12号',
        hours: '08:30-21:30',
        price: { amount: 32, unit: '杯' },
        tags: ['有咖啡', '靠窗', '有插座'],
        customTags: ['绿植多'],
        notes: '适合轻工作，下午可能有聊天声。',
        images: [],
        visitCount: 1,
        createdAt: '2026-07-06',
        sceneType: '咖啡馆'
      },
      {
        id: 'v_demo_003',
        name: '一格共享书房',
        address: '东城区和平里西街9号',
        hours: '07:30-23:00',
        price: { amount: 45, unit: '日' },
        tags: ['安静', '有插座', '大桌子', '22点后营业'],
        customTags: ['可寄存'],
        notes: '座位密度低，适合长时间专注。',
        images: [],
        visitCount: 0,
        createdAt: '2026-07-06',
        sceneType: '自习室'
      }
    ];

    const DEFAULT_HISTORY = [
      {
        id: 'cr_demo_001',
        date: '2026-07-06',
        userLocation: '朝阳区望京',
        weather: '晴 28°C',
        venueIds: ['v_demo_001', 'v_demo_002'],
        chosenVenueId: 'v_demo_001',
        filterConditions: ['有插座', '安静'],
        notes: '静思自习室更适合论文冲刺。',
        photos: []
      }
    ];

    const DEFAULT_CURRENT_PICK = {
      date: '2026-07-07',
      time: '14:00',
      userLocation: '',
      weather: null,
      selectedVenueIds: [],
      filterConditions: ['有插座', '安静'],
      customConditions: [],
      currentStep: 1,
      activeVenueIndex: 0,
      step2Completed: false
    };

    const Storage = {
      keys: {
        venues: 'venues',
        history: 'history',
        currentPick: 'currentPick',
        seeded: 'pickpickSeeded'
      },

      init() {
        if (!this.read(this.keys.seeded, false)) {
          this.saveVenues(DEFAULT_VENUES);
          this.saveHistory(DEFAULT_HISTORY);
          this.saveCurrentPick(DEFAULT_CURRENT_PICK);
          this.write(this.keys.seeded, true);
        }
      },

      read(key, fallback) {
        try {
          const rawValue = window.localStorage.getItem(key);
          return rawValue ? JSON.parse(rawValue) : fallback;
        } catch (error) {
          UI.showStatus('读取本地数据失败，已使用默认数据。');
          return fallback;
        }
      },

      write(key, value) {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
          return true;
        } catch (error) {
          UI.showStatus('存储空间不足，请删除一些旧照片或浏览器数据后重试。');
          return false;
        }
      },

      loadVenues() {
        return this.read(this.keys.venues, []);
      },

      saveVenues(venues) {
        return this.write(this.keys.venues, venues);
      },

      loadHistory() {
        return this.read(this.keys.history, []);
      },

      saveHistory(history) {
        return this.write(this.keys.history, history);
      },

      loadCurrentPick() {
        return this.read(this.keys.currentPick, { ...DEFAULT_CURRENT_PICK });
      },

      saveCurrentPick(currentPick) {
        return this.write(this.keys.currentPick, currentPick);
      }
    };

    const App = {
      currentTab: 'star',

      init() {
        Storage.init();
        this.bindNavigation();
        this.render();
        this.registerServiceWorker();
      },

      bindNavigation() {
        document.querySelectorAll('.tab-btn').forEach((button) => {
          button.addEventListener('click', () => this.switchTab(button.dataset.tab));
        });
      },

      switchTab(tabName) {
        this.currentTab = tabName;
        document.querySelectorAll('.tab-btn').forEach((button) => {
          button.classList.toggle('is-active', button.dataset.tab === tabName);
        });
        document.querySelectorAll('.tab-panel').forEach((panel) => {
          panel.classList.toggle('is-active', panel.id === `tab-${tabName}`);
        });
        this.render();
      },

      render() {
        StarManager.render();
        PickManager.render();
        HistoryManager.render();
      },

      registerServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    };

    const UI = {
      renderHeader(title, subtitle, actionHtml = '') {
        return `
          <header class="app-header">
            <div>
              <p class="eyebrow">PickPick</p>
              <h1 id="${title.id}">${title.text}</h1>
              <p class="header-copy">${subtitle}</p>
            </div>
            ${actionHtml}
          </header>
        `;
      },

      showStatus(message) {
        const status = document.getElementById('app-status');
        if (!status) return;
        status.textContent = message;
        status.classList.add('is-visible');
      },

      renderMetrics(metrics) {
        return `
          <div class="metric-grid">
            ${metrics.map((metric) => `
              <div class="metric">
                <span class="metric-value">${metric.value}</span>
                <span class="metric-label">${metric.label}</span>
              </div>
            `).join('')}
          </div>
        `;
      }
    };

    const StarManager = {
      render() {
        const venues = Storage.loadVenues();
        const previewVenues = venues.slice(0, 3);
        document.getElementById('tab-star').innerHTML = `
          ${UI.renderHeader({ id: 'star-title', text: '收藏库' }, '先把候选自习室和咖啡馆沉淀成自己的地点库。', '<button class="icon-btn" type="button" aria-label="添加地点">+</button>')}
          <section class="panel">
            ${UI.renderMetrics([
              { value: venues.length, label: '已存场地' },
              { value: venues.filter((venue) => venue.sceneType === '自习室').length, label: '自习室' },
              { value: venues.filter((venue) => venue.sceneType === '咖啡馆').length, label: '咖啡馆' }
            ])}
            <h2 class="placeholder-title">示例场地数据已接入</h2>
            <p class="placeholder-text">当前阶段只验证 Storage 和数据模型，新增、搜索和详情会在下一步实现。</p>
            <ul class="data-list" aria-label="示例场地">
              ${previewVenues.map((venue) => `
                <li>
                  <strong>${venue.name}</strong>
                  <span>${venue.hours} · ${venue.price.amount}/${venue.price.unit}</span>
                </li>
              `).join('')}
            </ul>
          </section>
        `;
      }
    };

    const PickManager = {
      render() {
        const currentPick = Storage.loadCurrentPick();
        document.getElementById('tab-pick').innerHTML = `
          ${UI.renderHeader({ id: 'pick-title', text: '对比决策' }, '从候选地点里快速筛掉不合适的选择。')}
          <section class="panel">
            ${UI.renderMetrics([
              { value: currentPick.currentStep, label: '当前步骤' },
              { value: currentPick.selectedVenueIds.length, label: '候选场地' },
              { value: currentPick.filterConditions.length, label: '默认条件' }
            ])}
            <h2 class="placeholder-title">currentPick 状态已初始化</h2>
            <p class="placeholder-text">默认计划时间为 ${currentPick.date} ${currentPick.time}。下一步会实现步骤 2.1 的输入和候选场地管理。</p>
          </section>
        `;
      }
    };

    const HistoryManager = {
      render() {
        const history = Storage.loadHistory();
        const latestRecord = history[0];
        document.getElementById('tab-my').innerHTML = `
          ${UI.renderHeader({ id: 'my-title', text: '我的记录' }, '回看每一次选择，积累适合自己的场所经验。')}
          <section class="panel">
            ${UI.renderMetrics([
              { value: history.length, label: '历史记录' },
              { value: latestRecord ? latestRecord.venueIds.length : 0, label: '最近对比' },
              { value: latestRecord ? latestRecord.filterConditions.length : 0, label: '使用条件' }
            ])}
            <h2 class="placeholder-title">历史记录模型已接入</h2>
            <p class="placeholder-text">${latestRecord ? `${latestRecord.date} 在 ${latestRecord.userLocation} 选择了示例场地。` : '暂无历史记录。'} 日历和记录本会在 My 阶段实现。</p>
          </section>
        `;
      }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
