<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2DCD9B">
  <title>PickPick</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <style>
    :root {
      --color-primary: #5F6B4A;
      --color-primary-dark: #3F4A35;
      --color-accent: #E36F45;
      --color-accent-dark: #D85F3F;
      --color-highlight: #E8C76B;
      --color-bluegreen: #8FAAA3;
      --color-bg: #FAF6EF;
      --color-surface: #FFFDF8;
      --color-surface-soft: #F3EBDD;
      --color-text: #2F332B;
      --color-muted: #6F7468;
      --color-line: #D8D0C2;
      --color-soft: #F3EBDD;
      --color-danger: #D85F3F;
      --shadow-card: 0 8px 22px rgba(63, 74, 53, 0.08);
      --radius-card: 18px;
      --radius-control: 16px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --tab-height: 64px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      display: flex;
      justify-content: center;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--color-bg);
      overflow: hidden;
    }

    .app-main {
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 0px) + var(--space-4)) var(--space-4)
        calc(var(--tab-height) + env(safe-area-inset-bottom, 0px) + var(--space-4));
      overflow-y: auto;
    }

    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .eyebrow {
      margin: 0 0 var(--space-1);
      color: var(--color-accent-dark);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    #star-title,
    #star-copy-title,
    #copy-step-title {
      font-family: "Segoe Script", "Brush Script MT", cursive;
      font-size: 28px;
      font-style: italic;
      font-weight: 600;
      letter-spacing: 0;
    }

    .header-copy {
      margin: var(--space-2) 0 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .panel {
      background: var(--color-surface);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--space-4);
    }

    .panel + .panel {
      margin-top: var(--space-4);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .metric {
      min-width: 0;
      border: 1px solid rgba(216, 208, 194, 0.78);
      border-radius: 14px;
      background: var(--color-surface-soft);
      padding: var(--space-3);
    }

    .metric-value {
      display: block;
      color: var(--color-primary-dark);
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .metric-label {
      display: block;
      margin-top: var(--space-1);
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .data-list {
      display: grid;
      gap: var(--space-2);
      margin: var(--space-3) 0 0;
      padding: 0;
      list-style: none;
    }

    .data-list li {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      border-top: 1px solid var(--color-line);
      padding-top: var(--space-2);
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .data-list strong {
      color: var(--color-text);
      font-size: 14px;
    }

    .status-banner {
      display: none;
      margin-bottom: var(--space-4);
      border: 1px solid rgba(216, 95, 63, 0.28);
      border-radius: var(--radius-control);
      background: #FFF3ED;
      color: #9C3F29;
      padding: var(--space-3);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-banner.is-visible {
      display: block;
    }

    .status-banner.is-success {
      border-color: rgba(95, 107, 74, 0.34);
      background: #F0EBDD;
      color: var(--color-primary-dark);
    }

    .search-field,
    .field {
      display: grid;
      gap: var(--space-2);
    }

    .search-field {
      margin-bottom: var(--space-4);
    }

    label {
      color: var(--color-text);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-control);
      background: var(--color-surface);
      color: var(--color-text);
      padding: 10px 12px;
      outline: none;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(227, 111, 69, 0.14);
    }

    .venue-list {
      display: grid;
      gap: var(--space-3);
      margin-top: var(--space-4);
    }

    .star-search-panel {
      display: grid;
      gap: var(--space-3);
      border: 0;
      background: transparent;
      padding: 0;
      box-shadow: none;
    }

    .star-filter-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .star-filter-row::-webkit-scrollbar {
      display: none;
    }

    .star-filter-field {
      flex: 0 0 auto;
      display: block;
    }

    .star-filter-field span {
      display: none;
    }

    .star-filter-field select {
      width: 54px;
      min-height: 26px;
      padding: 0 8px;
      border: 1px solid rgba(216, 208, 194, 0.86);
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.88);
      color: var(--color-primary-dark);
      font-size: 10px;
      font-weight: 700;
      box-shadow: 0 3px 10px rgba(47, 51, 43, 0.08);
    }

    .venue-card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: minmax(138px, 1fr) auto;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      background-position: center;
      background-size: cover;
      box-shadow: var(--shadow-card);
      color: #FFFFFF;
      isolation: isolate;
      min-height: 216px;
    }

    .venue-card::before {
      position: absolute;
      inset: 0;
      z-index: -1;
      content: "";
      background: linear-gradient(180deg, rgba(47, 51, 43, 0.02) 0%, rgba(47, 51, 43, 0.12) 42%, rgba(47, 51, 43, 0.74) 100%);
    }

    .venue-card::after {
      position: absolute;
      inset: 0;
      z-index: -2;
      content: "";
      background: var(--color-primary-dark);
    }

    .venue-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-2);
    }

    .venue-title-row {
      display: flex;
      align-items: baseline;
      gap: 7px;
      min-width: 0;
    }

    .venue-title-row h3 {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .joined-badge {
      flex: 0 0 auto;
      color: rgba(255, 253, 248, 0.62);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .venue-card-body {
      align-self: end;
      display: grid;
      gap: 6px;
      margin: var(--space-2);
      border: 1px solid rgba(255, 253, 248, 0.20);
      border-radius: 14px;
      background: rgba(47, 51, 43, 0.52);
      padding: 9px 10px;
      backdrop-filter: blur(10px);
    }

    .star-photo-label {
      position: absolute;
      left: 50%;
      top: 38%;
      z-index: 1;
      color: rgba(255, 253, 248, 0.74);
      font-size: 13px;
      font-weight: 800;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .star-card-remove {
      position: absolute;
      right: 10px;
      top: 10px;
      z-index: 2;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      min-height: 24px;
      border: 1px solid rgba(255, 253, 248, 0.42);
      border-radius: 50%;
      background: rgba(95, 107, 74, 0.62);
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 800;
      backdrop-filter: blur(10px);
    }

    .venue-card h3,
    .modal-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
    }

    .venue-card h3 {
      font-size: 16px;
    }

    .venue-meta,
    .detail-row {
      margin: 0;
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .venue-card .venue-meta {
      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      line-height: 1.35;
    }

    .scene-badge {
      flex: 0 0 auto;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.20);
      color: #FFFFFF;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      border-radius: 999px;
      background: var(--color-surface-soft);
      color: var(--color-muted);
      padding: 5px 9px;
      font-size: 11px;
      line-height: 1.2;
    }

    .tag.is-primary {
      background: rgba(95, 107, 74, 0.14);
      color: var(--color-primary-dark);
      font-weight: 700;
    }

    .tag.is-muted {
      background: #EEE6D9;
      color: #A79E90;
      text-decoration: line-through;
    }

    .venue-card .tag {
      background: rgba(255, 253, 248, 0.20);
      color: rgba(255, 253, 248, 0.9);
      backdrop-filter: blur(10px);
    }

    .venue-card .tag.is-primary {
      background: rgba(232, 199, 107, 0.86);
      color: var(--color-text);
    }

    .venue-card .tag.is-muted {
      background: rgba(255, 253, 248, 0.14);
      color: #FFFFFF;
    }

    .card-actions,
    .form-actions,
    .modal-actions {
      display: grid;
      gap: var(--space-2);
    }

    .card-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .venue-card .card-actions {
      display: flex;
      justify-content: flex-end;
    }

    .venue-card .text-btn {
      width: auto;
      min-width: 68px;
      min-height: 28px;
      padding: 0 14px;
    }

    .text-btn,
    .danger-btn {
      min-height: 32px;
      border: 1px solid rgba(255, 253, 248, 0.24);
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.16);
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .text-btn.is-primary {
      border-color: rgba(227, 111, 69, 0.62);
      background: rgba(227, 111, 69, 0.92);
      color: #FFFFFF;
    }

    .venue-card .text-btn.is-primary {
      border-color: rgba(255, 253, 248, 0.36);
      background: rgba(255, 253, 248, 0.20);
      color: #FFFFFF;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .danger-btn {
      border-color: rgba(255, 253, 248, 0.24);
      color: #FFE8DE;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.56;
    }

    .empty-state {
      display: grid;
      gap: var(--space-3);
      border: 1px dashed var(--color-line);
      border-radius: var(--radius-card);
      background: var(--color-surface);
      padding: var(--space-5);
      text-align: center;
    }

    .empty-state p {
      margin: 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .modal-container {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
    }

    .modal-container.is-open {
      display: block;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(47, 51, 43, 0.36);
    }

    .modal-sheet {
      position: absolute;
      left: 50%;
      bottom: 0;
      display: grid;
      gap: var(--space-4);
      width: 100%;
      max-width: 430px;
      max-height: min(88vh, 760px);
      overflow-y: auto;
      border: 1px solid rgba(216, 208, 194, 0.88);
      border-bottom: 0;
      border-radius: 24px 24px 0 0;
      background: var(--color-surface);
      padding: var(--space-5) var(--space-4) calc(var(--space-5) + env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -14px 32px rgba(63, 74, 53, 0.12);
      transform: translateX(-50%);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .modal-close {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      min-height: 40px;
      border: 0;
      border-radius: 50%;
      background: var(--color-surface-soft);
      color: var(--color-muted);
      font-size: 22px;
      line-height: 1;
    }

    .venue-form {
      display: grid;
      gap: var(--space-4);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .form-grid .field.is-full {
      grid-column: 1 / -1;
    }

    .pick-step {
      display: grid;
      gap: var(--space-3);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .pick-board {
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
    }

    #tab-pick .app-header {
      margin-bottom: var(--space-3);
    }

    #tab-pick h1 {
      font-size: 24px;
      font-weight: 500;
    }

    #tab-pick .header-copy {
      margin-top: var(--space-2);
      color: #111111;
      font-size: 11px;
      font-weight: 600;
    }

    #tab-pick .eyebrow {
      visibility: hidden;
      height: 18px;
      margin: 0 0 var(--space-2);
    }

    .pick-step-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .pick-step-header h1 {
      margin: 0 0 4px;
      font-family: "Segoe Script", "Brush Script MT", cursive;
      font-size: 28px;
      font-style: italic;
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .pick-step-header p {
      max-width: 190px;
      margin: 0;
      color: #111111;
      font-size: 10px;
      line-height: 1.25;
      font-weight: 600;
    }

    .pick-topbar {
      display: block;
    }

    .pick-location {
      display: grid;
      gap: 4px;
    }

    .pick-location label,
    .station-title,
    .select-title {
      color: var(--color-text);
      font-family: "Segoe Script", "Brush Script MT", cursive;
      font-size: 14px;
      font-style: italic;
      font-weight: 700;
      line-height: 1.2;
      text-transform: lowercase;
    }

    .pick-location input,
    .pick-location textarea {
      min-height: 34px;
      border: 0;
      border-bottom: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      padding: 4px 0;
      font-size: 13px;
      line-height: 1.35;
      resize: vertical;
    }

    .pick-arrow-btn {
      width: 38px;
      height: 24px;
      min-height: 24px;
      border: 0;
      border-radius: 999px;
      background: #D8D8D8;
      color: #111111;
      font-weight: 900;
    }

    .pick-arrow-btn:disabled {
      opacity: 0.35;
    }

    .step2-nav {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      min-height: 32px;
      margin-bottom: -12px;
    }

    .step2-nav .pick-arrow-btn:first-child {
      grid-column: 1;
    }

    .step2-nav .pick-arrow-btn:last-child {
      grid-column: 3;
    }

    .date-strip {
      display: flex;
      gap: var(--space-2);
      overflow-x: auto;
      padding: var(--space-2) 0 var(--space-3);
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
    }

    .date-strip.is-dragging {
      cursor: grabbing;
      scroll-snap-type: none;
    }

    .date-picker {
      display: grid;
      gap: 6px;
    }

    .date-month-controls {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: -30px;
      margin-bottom: 2px;
      padding-right: 2px;
    }

    .date-month-control {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #111111;
      font-size: 10px;
      font-weight: 700;
    }

    .date-month-control select {
      width: auto;
      min-height: 20px;
      border: 1px solid var(--color-line);
      border-radius: 999px;
      background: var(--color-surface);
      color: #111111;
      padding: 0 8px;
      font-size: 10px;
      font-weight: 700;
    }

    .date-strip::-webkit-scrollbar {
      display: none;
    }

    .date-item {
      flex: 0 0 44px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #111111;
      padding: 7px 4px;
      text-align: center;
      scroll-snap-align: center;
      transition: background 0.16s ease, transform 0.16s ease, color 0.16s ease;
    }

    .date-item strong,
    .date-item span {
      display: block;
      line-height: 1.1;
    }

    .date-item strong {
      font-size: 17px;
      font-weight: 500;
    }

    .date-item span {
      margin-top: 3px;
      font-size: 10px;
      text-transform: uppercase;
    }

    .date-item.is-active {
      background: var(--color-primary);
      color: #FFFFFF;
      transform: translateY(-1px);
    }

    .date-item.is-today strong {
      color: var(--color-primary-dark);
      font-weight: 800;
    }

    .date-item.is-active strong {
      color: #FFFFFF;
      font-weight: 800;
    }

    .inline-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }

    .weather-card {
      min-height: 124px;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      background: linear-gradient(135deg, var(--color-surface) 0%, var(--color-surface-soft) 100%);
      padding: var(--space-4);
      color: var(--color-text);
      font-size: 11px;
      line-height: 1.5;
      box-shadow: var(--shadow-card);
    }

    .weather-card strong {
      display: block;
      margin-bottom: var(--space-2);
      font-family: "Segoe Script", "Brush Script MT", cursive;
      font-size: 14px;
      font-style: italic;
      font-weight: 700;
      line-height: 1.2;
      text-transform: lowercase;
    }

    .weather-card span {
      display: block;
    }

    .pick-columns {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(104px, 0.75fr);
      gap: var(--space-3);
      align-items: stretch;
    }

    .station-panel,
    .select-panel {
      min-height: 156px;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      background: var(--color-surface);
      padding: var(--space-3);
      box-shadow: var(--shadow-card);
    }

    .station-panel {
      display: grid;
      gap: var(--space-2);
      align-content: start;
    }

    .station-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-2);
      align-items: center;
    }

    .station-add-btn,
    .station-step-btn {
      min-height: 28px;
      border: 1px solid var(--color-line);
      border-radius: 999px;
      background: var(--color-surface-soft);
      color: var(--color-primary-dark);
      font-size: 12px;
      font-weight: 700;
    }

    .station-step-btn {
      border-color: var(--color-accent);
      background: var(--color-accent);
      color: #FFFFFF;
    }

    .station-step-btn:disabled {
      border-color: #A8A8A8;
      color: #8B8B8B;

    .calendar-day,
    .calendar-weekday {
      min-height: 27px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--color-text);
      font-size: 10px;
      font-weight: 500;
      text-align: center;
    }

    .calendar-weekday {
      min-height: 16px;
      font-size: 9px;
    }

    .calendar-day {
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      border-color: var(--color-line);
      border-radius: 9px;
      background: rgba(243, 235, 221, 0.42);
      padding: 0;
    }

    .calendar-day img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .calendar-day span {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 253, 248, 0.78);
    }

    .calendar-day.is-empty {
      border-color: transparent;
      background: transparent;
    }

    .calendar-day.has-record {
      background: rgba(143, 170, 163, 0.16);
      color: var(--color-text);
    }

    .calendar-day.is-today {
      color: var(--color-primary-dark);
      font-weight: 900;
    }

    .calendar-day.is-active {
      border-color: var(--color-accent);
      background: #FFF1E9;
      color: var(--color-accent-dark);
      box-shadow: inset 0 0 0 1px var(--color-accent);
    }

    .calendar-day.has-photo {
      border-color: var(--color-primary-dark);
      background: var(--color-surface);
    }

    .calendar-upload-input {
      display: none;
    }

    .recent-board {
      position: relative;
      display: grid;
      gap: 0;
      min-height: 110px;
      border: 1px dashed var(--color-line);
      border-radius: var(--radius-card);
      background: var(--color-surface-soft);
      padding: 10px 0 10px 20px;
      overflow: hidden;
    }

    .recent-board::before,
    .recent-board::after {
      position: absolute;
      left: -8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--color-bg);
      content: "";
    }

    .recent-board::before {
      top: 11px;
    }

    .recent-board::after {
      bottom: 11px;
    }

    .recent-item {
      position: relative;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 76px 24px;
      gap: 8px;
      align-items: center;
      min-height: 30px;
      border: 0;
      background: transparent;
      color: var(--color-text);
      padding: 0 8px 0 16px;
      text-align: left;
    }

    .recent-item::before {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      border-left: 1px solid rgba(95, 107, 74, 0.46);
      content: "";
    }

    .recent-item::after {
      position: absolute;
      left: -3px;
      top: 50%;
      width: 7px;
      height: 7px;
      border: 1px solid var(--color-primary);
      border-radius: 50%;
      background: var(--color-surface);
      content: "";
      transform: translateY(-50%);
    }

    .recent-item.is-active {
      font-weight: 800;
    }

    .recent-date,
    .recent-venue,
    .recent-time,
    .recent-place,
    .record-card h3,
    .record-card p {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 10px;
      line-height: 1.2;
    }

    .recent-place {
      width: 18px;
      height: 18px;
      border: 1px solid var(--color-line);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 11px;
    }

    .my-tool-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-2);
      align-items: center;
      padding: 0 3px;
    }

    .my-tool-row input {
      display: none;
    }

    .my-tool-btn {
      display: grid;
      place-items: center;
      min-height: 34px;
      border: 1px solid var(--color-line);
      border-radius: 999px;
      background: var(--color-surface);
      color: var(--color-primary-dark);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(63, 74, 53, 0.06);
    }

    .my-tool-btn.is-disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .record-book {
      position: relative;
      min-height: 132px;
      margin-top: 2px;
      padding: 0 28px 0 0;
      touch-action: pan-y;
      user-select: none;
      cursor: grab;
    }

    .record-book.is-dragging {
      cursor: grabbing;
    }

    .record-card {
      position: relative;
      z-index: 3;
      display: grid;
      gap: var(--space-3);
      min-height: 132px;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      background: var(--color-surface);
      padding: var(--space-3);
      box-shadow: 8px 0 0 rgba(232, 199, 107, 0.42), 14px 0 0 rgba(143, 170, 163, 0.34), 20px 0 0 rgba(216, 95, 63, 0.22);
      overflow: hidden;
      transition: transform 0.18s ease;
    }

    .record-book.is-dragging .record-card {
      transition: none;
    }

    .record-card h3 {
      font-size: 15px;
      line-height: 1.25;
    }

    .record-meta {
      display: grid;
      gap: var(--space-1);
    }

    .record-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .record-page-count {
      position: absolute;
      right: 7px;
      bottom: 7px;
      z-index: 4;
      color: var(--color-muted);
      font-size: 10px;
      font-weight: 800;
    }

    .record-note {
      min-height: 54px;
      border-radius: 12px;
      resize: vertical;
    }

    .photo-stack {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .photo-thumb {
      position: relative;
      flex: 0 0 58px;
      overflow: hidden;
      border: 1px solid rgba(17, 17, 17, 0.18);
      border-radius: 6px;
      background: #F3F4F6;
      aspect-ratio: 1;
    }

    .photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-thumb button {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 24px;
      min-height: 24px;
      border: 0;
      border-radius: 50%;
      background: rgba(17,17,17,0.72);
      color: #FFFFFF;
    }

    .photo-empty {
      border: 1px dashed var(--color-line);
      border-radius: 10px;
      color: var(--color-muted);
      padding: var(--space-2);
      text-align: center;
      font-size: 12px;
    }

    .helper-text {
      margin: 0;
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    .placeholder-title {
      margin: 0 0 var(--space-2);
      font-size: 18px;
      line-height: 1.35;
    }

    .placeholder-text {
      margin: 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .primary-btn,
    .secondary-btn,
    .icon-btn {
      min-height: 44px;
      border: 0;
      border-radius: var(--radius-control);
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .primary-btn {
      width: 100%;
      background: var(--color-accent);
      color: #FFFFFF;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(216, 95, 63, 0.16);
    }

    .secondary-btn {
      border: 1px solid var(--color-line);
      background: var(--color-surface);
      color: var(--color-primary-dark);
      font-weight: 700;
      padding: 0 var(--space-4);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      background: var(--color-primary);
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(63, 74, 53, 0.14);
    }

    .primary-btn:active,
    .secondary-btn:active,
    .icon-btn:active {
      transform: scale(0.98);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.is-active {
      display: block;
    }

    .tab-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 100%;
      max-width: 430px;
      height: calc(var(--tab-height) + env(safe-area-inset-bottom, 0px));
      padding: var(--space-1) var(--space-3) env(safe-area-inset-bottom, 0px);
      border-top: 1px solid var(--color-line);
      background: rgba(255, 253, 248, 0.94);
      box-shadow: 0 -8px 24px rgba(63, 74, 53, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transform: translateX(-50%);
    }

    .tab-btn {
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      background: transparent;
      color: var(--color-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .tab-icon {
      display: block;
      margin-bottom: 2px;
      font-size: 18px;
      line-height: 1;
    }

    .tab-btn.is-active {
      background: rgba(95, 107, 74, 0.12);
      color: var(--color-primary-dark);
    }

    @media (min-width: 431px) {
      .app-shell {
        border-left: 1px solid var(--color-line);
        border-right: 1px solid var(--color-line);
      }
    }

    @media (max-width: 374px) {
      .card-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <main class="app-main">
      <div id="app-status" class="status-banner" role="status"></div>
      <section id="tab-star" class="tab-panel is-active" aria-labelledby="star-title"></section>
      <section id="tab-pick" class="tab-panel" aria-labelledby="pick-title"></section>
      <section id="tab-my" class="tab-panel" aria-labelledby="my-title"></section>
    </main>

    <nav class="tab-bar" aria-label="主导航">
      <button class="tab-btn is-active" type="button" data-tab="star">
        <span class="tab-icon">★</span>
        Star
      </button>
      <button class="tab-btn" type="button" data-tab="pick">
        <span class="tab-icon">◎</span>
        Pick
      </button>
      <button class="tab-btn" type="button" data-tab="my">
        <span class="tab-icon">人</span>
        My
      </button>
    </nav>
  </div>
  <div id="modal-container" class="modal-container" aria-live="polite"></div>

  <script>
    const DEFAULT_VENUES = [
      {
        id: 'v_demo_001',
        name: '静思自习室',
        address: '朝阳区建国路88号',
        hours: '09:00-22:30',
        price: { amount: 39, unit: '日' },
        tags: ['有插座', '安静', '大桌子', '22点后营业'],
        customTags: ['椅子舒服'],
        menuInfo: '瓶装水 3 元，简餐 18-28 元，可自带饮品。',
        membershipInfo: '日卡 39 元，周卡 199 元，月卡 599 元。',
        notes: '下午三点后人会变多，靠窗区光线最好。',
        images: [],
        visitCount: 2,
        createdAt: '2026-07-06',
        sceneType: '自习室'
      },
      {
        id: 'v_demo_002',
        name: '光合作用咖啡',
        address: '海淀区中关村南路12号',
        hours: '08:30-21:30',
        price: { amount: 32, unit: '杯' },
        tags: ['有咖啡', '靠窗', '有插座'],
        customTags: ['绿植多'],
        menuInfo: '美式 22 元，拿铁 28 元，贝果 26 元，轻食沙拉 36 元。',
        membershipInfo: '充值 300 送 30，工作日 10 次咖啡卡 199 元。',
        notes: '适合轻工作，下午可能有聊天声。',
        images: [],
        visitCount: 1,
        createdAt: '2026-07-06',
        sceneType: '咖啡馆'
      },
      {
        id: 'v_demo_003',
        name: '一格共享书房',
        address: '东城区和平里西街9号',
        hours: '07:30-23:00',
        price: { amount: 45, unit: '日' },
        tags: ['安静', '有插座', '大桌子', '22点后营业'],
        customTags: ['可寄存'],
        menuInfo: '免费饮水，咖啡机 8 元/杯，泡面 12 元。',
        membershipInfo: '日卡 45 元，10 次卡 399 元，月卡含固定座位。',
        notes: '座位密度低，适合长时间专注。',
        images: [],
        visitCount: 0,
        createdAt: '2026-07-06',
        sceneType: '自习室'
      }
    ];

    const DEFAULT_HISTORY = [
      {
        id: 'cr_demo_001',
        date: '2026-07-06',
        userLocation: '朝阳区望京',
        weather: '晴 28°C',
        venueIds: ['v_demo_001', 'v_demo_002'],
        chosenVenueId: 'v_demo_001',
        filterConditions: ['有插座', '安静'],
        notes: '静思自习室更适合论文冲刺。',
        photos: []
      }
    ];

    const DEFAULT_CURRENT_PICK = {
      date: '2026-07-07',
      time: '14:00',
      userLocation: '',
      originPlace: null,
      weather: null,
      selectedVenueIds: [],
      filterConditions: ['有插座', '安静'],
      customConditions: [],
      copiedInfo: {},
      confirmedVenueIds: [],
      currentStep: 1,
      activeVenueIndex: 0,
      step2Completed: false
    };

    const DEFAULT_FILTERS = ['有插座', '安静', '靠窗', '大桌子', '22点后营业', '有咖啡'];

    const Storage = {
      keys: {
        venues: 'venues',
        history: 'history',
        currentPick: 'currentPick',
        seeded: 'pickpickSeeded'
      },

      init() {
        if (!this.read(this.keys.seeded, false)) {
          this.saveVenues(DEFAULT_VENUES);
          this.saveHistory(DEFAULT_HISTORY);
          this.saveCurrentPick(DEFAULT_CURRENT_PICK);
          this.write(this.keys.seeded, true);
        } else {
          this.migrateVenues();
          this.migrateCurrentPick();
        }
      },

      read(key, fallback) {
        try {
          const rawValue = window.localStorage.getItem(key);
          return rawValue ? JSON.parse(rawValue) : fallback;
        } catch (error) {
          UI.showStatus('读取本地数据失败，已使用默认数据。');
          return fallback;
        }
      },

      write(key, value) {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
          return true;
        } catch (error) {
          UI.showStatus('存储空间不足，请删除一些旧照片或浏览器数据后重试。');
          return false;
        }
      },

      loadVenues() {
        return this.read(this.keys.venues, []);
      },

      saveVenues(venues) {
        return this.write(this.keys.venues, venues);
      },

      migrateVenues() {
        const venues = this.loadVenues();
        let changed = false;
        const nextVenues = venues.map((venue) => {
          const defaultVenue = DEFAULT_VENUES.find((item) => item.id === venue.id);
          const nextVenue = { ...venue };
          if (typeof nextVenue.menuInfo === 'undefined') {
            nextVenue.menuInfo = defaultVenue?.menuInfo || '';
            changed = true;
          }
          if (typeof nextVenue.membershipInfo === 'undefined') {
            nextVenue.membershipInfo = defaultVenue?.membershipInfo || '';
            changed = true;
          }
          if (typeof nextVenue.channelLinks === 'undefined') {
            nextVenue.channelLinks = defaultVenue?.channelLinks || {};
            changed = true;
          }
          if (typeof nextVenue.geoPlace === 'undefined' && defaultVenue?.geoPlace) {
            nextVenue.geoPlace = defaultVenue.geoPlace;
            changed = true;
          }
          return nextVenue;
        });
        if (changed) this.saveVenues(nextVenues);
      },

      migrateCurrentPick() {
        const currentPick = this.loadCurrentPick();
        if (typeof currentPick.confirmedVenueIds !== 'undefined') return;
        this.saveCurrentPick({ ...DEFAULT_CURRENT_PICK, ...currentPick, confirmedVenueIds: [] });
      },

      loadHistory() {
        return this.read(this.keys.history, []);
      },

      saveHistory(history) {
        return this.write(this.keys.history, history);
      },

      loadCurrentPick() {
        return this.read(this.keys.currentPick, { ...DEFAULT_CURRENT_PICK });
      },

      saveCurrentPick(currentPick) {
        return this.write(this.keys.currentPick, currentPick);
      }
    };

    const App = {
      currentTab: 'star',

      init() {
        Storage.init();
        StarManager.init();
        PickManager.init();
        HistoryManager.init();
        this.bindNavigation();
        this.handleShareTarget();
        this.render();
        this.registerServiceWorker();
      },

      bindNavigation() {
        document.querySelectorAll('.tab-btn').forEach((button) => {
          button.addEventListener('click', () => {
            if (button.dataset.tab === 'pick') {
              PickManager.viewStep = 1;
              const currentPick = Storage.loadCurrentPick();
              if (currentPick.currentStep !== 1) {
                Storage.saveCurrentPick({ ...currentPick, currentStep: 1 });
              }
            }
            this.switchTab(button.dataset.tab);
          });
        });
      },

      switchTab(tabName) {
        this.currentTab = tabName;
        document.querySelectorAll('.tab-btn').forEach((button) => {
          button.classList.toggle('is-active', button.dataset.tab === tabName);
        });
        document.querySelectorAll('.tab-panel').forEach((panel) => {
          panel.classList.toggle('is-active', panel.id === `tab-${tabName}`);
        });
        this.render();
      },

      render() {
        StarManager.render();
        PickManager.render();
        HistoryManager.render();
      },

      handleShareTarget() {
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title')?.trim() || '';
        const text = params.get('text')?.trim() || '';
        const explicitUrl = params.get('url')?.trim() || '';
        const sharedText = [title, text, explicitUrl].filter(Boolean).join('\n');
        const url = explicitUrl || sharedText.match(/https?:\/\/\S+/)?.[0] || '';
        if (!title && !text && !url) return;

        const extractedVenue = AIExtractor.applyToVenue({
          id: StarManager.createId('v'),
          name: title || AIExtractor.extractName(AIExtractor.normalizeText(sharedText).split(/\n+/).map((line) => line.trim()).filter(Boolean)),
          address: '',
          hours: '',
          price: { amount: 0, unit: '日' },
          tags: [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: text || url || '',
          images: [],
          channelLinks: url ? { share: url } : {},
          visitCount: 0,
          createdAt: new Date().toISOString().slice(0, 10),
          sceneType: '其他',
          source: 'share',
          sourceUrl: url
        }, sharedText);

        StarManager.openStep12Draft(extractedVenue);
        UI.showStatus('已接收分享内容，请确认后保存到 Star 库。', 'success');
        try {
          window.history.replaceState({}, document.title, window.location.href.split('?')[0]);
        } catch (error) {}
      },

      registerServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    };

    const UI = {
      escape(value = '') {
        return String(value).replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[char]));
      },

      renderHeader(title, subtitle, actionHtml = '') {
        return `
          <header class="app-header">
            <div>
              <p class="eyebrow">PickPick</p>
              <h1 id="${title.id}">${title.text}</h1>
              ${subtitle ? `<p class="header-copy">${subtitle}</p>` : ''}
            </div>
            ${actionHtml}
          </header>
        `;
      },

      showStatus(message, type = 'error') {
        const status = document.getElementById('app-status');
        if (!status) return;
        status.textContent = message;
        status.className = `status-banner is-visible${type === 'success' ? ' is-success' : ''}`;
      },

      clearStatus() {
        const status = document.getElementById('app-status');
        if (!status) return;
        status.textContent = '';
        status.className = 'status-banner';
      },

      renderMetrics(metrics) {
        return `
          <div class="metric-grid">
            ${metrics.map((metric) => `
              <div class="metric">
                <span class="metric-value">${metric.value}</span>
                <span class="metric-label">${metric.label}</span>
              </div>
            `).join('')}
          </div>
        `;
      },

      renderTags(tags, primaryTags = []) {
        if (!tags.length) return '<p class="venue-meta">暂无标签</p>';
        return `
          <div class="tag-row">
            ${tags.map((tag) => `
              <span class="tag${primaryTags.includes(tag) ? ' is-primary' : ''}">${this.escape(tag)}</span>
            `).join('')}
          </div>
        `;
      },

      openModal(content) {
        const modal = document.getElementById('modal-container');
        modal.innerHTML = `
          <div class="modal-backdrop" data-action="close-modal"></div>
          <section class="modal-sheet" role="dialog" aria-modal="true">
            ${content}
          </section>
        `;
        modal.classList.add('is-open');
      },

      closeModal() {
        const modal = document.getElementById('modal-container');
        modal.classList.remove('is-open');
        modal.innerHTML = '';
      }
    };

    const StarManager = {
      query: '',
      starFilters: {
        environment: '',
        device: '',
        food: '',
        price: '',
        business: '',
        pet: ''
      },
      viewStep: 1,
      activeVenueId: '',
      step12Draft: null,

      init() {
        document.getElementById('tab-star').addEventListener('click', (event) => this.handleClick(event));
        document.getElementById('tab-star').addEventListener('input', (event) => this.handleInput(event));
        document.getElementById('tab-star').addEventListener('change', (event) => this.handleChange(event));
        document.getElementById('tab-star').addEventListener('submit', (event) => this.handleSubmit(event));
        document.getElementById('modal-container').addEventListener('click', (event) => this.handleModalClick(event));
        document.getElementById('modal-container').addEventListener('submit', (event) => this.handleSubmit(event));
      },

      render() {
        if (this.viewStep === 2) {
          this.renderStep12();
          return;
        }
        const venues = Storage.loadVenues();
        document.getElementById('tab-star').innerHTML = `
          ${UI.renderHeader({ id: 'star-title', text: 'Star' }, 'Store the favorite places in the database.', '<button class="icon-btn" type="button" data-action="new-venue" aria-label="添加地点">+</button>')}
          <section class="panel star-search-panel">
            <label class="search-field" for="star-search">
              <span class="sr-only">搜索场地</span>
              <input id="star-search" type="search" value="${UI.escape(this.query)}" placeholder="Search place name">
            </label>
            ${this.renderStarFilters(venues)}
            <div id="star-list-area"></div>
          </section>
        `;
        this.renderList();
      },

      renderList() {
        const venues = Storage.loadVenues();
        const currentPick = Storage.loadCurrentPick();
        const keyword = this.query.trim().toLowerCase();
        const filteredVenues = venues.filter((venue) => {
          const searchable = [
            venue.name,
            venue.address,
            venue.sceneType,
            ...(venue.tags || []),
            ...(venue.customTags || [])
          ].join(' ').toLowerCase();
          const matchesQuery = !keyword || searchable.includes(keyword);
          return matchesQuery && this.matchesStarFilters(venue);
        });
        const listArea = document.getElementById('star-list-area');
        if (!listArea) return;

        if (!venues.length) {
          listArea.innerHTML = `
            <div class="empty-state">
              <h2 class="placeholder-title">还没有收藏地点</h2>
              <p>先添加一个自习室或咖啡馆，后续 Pick 时就能直接选择。</p>
              <button class="primary-btn" type="button" data-action="new-venue">添加第一个地点</button>
            </div>
          `;
          return;
        }

        if (!filteredVenues.length) {
          listArea.innerHTML = `
            <div class="empty-state">
              <h2 class="placeholder-title">没有匹配的地点</h2>
              <p>换一个名称关键词试试。</p>
              <button class="secondary-btn" type="button" data-action="clear-search">清空搜索</button>
            </div>
          `;
          return;
        }

        listArea.innerHTML = `
          <div class="venue-list">
            ${filteredVenues.map((venue) => this.renderVenueCard(venue, currentPick.selectedVenueIds.includes(venue.id))).join('')}
          </div>
        `;
      },

      renderStarFilters(venues) {
        const groups = this.getStarFilterGroups(venues);
        return `
          <div class="star-filter-row" aria-label="Star 筛选">
            ${groups.map((group) => `
              <label class="star-filter-field">
                <span>${UI.escape(group.label)}</span>
                <select data-filter-key="${UI.escape(group.key)}" aria-label="${UI.escape(group.label)}">
                  <option value="">${UI.escape(group.label)}</option>
                  ${group.options.map((option) => `
                    <option value="${UI.escape(option)}" ${this.starFilters[group.key] === option ? 'selected' : ''}>${UI.escape(option)}</option>
                  `).join('')}
                </select>
              </label>
            `).join('')}
          </div>
        `;
      },

      renderVenueCard(venue, isSelected = false) {
        const background = this.getVenueBackground(venue);
        return `
          <article class="venue-card" style="background-image: url('${background}')">
            <button class="star-card-remove" type="button" data-action="delete-venue" data-id="${venue.id}" aria-label="删除 ${UI.escape(venue.name)}">−</button>
            <span class="star-photo-label">图片</span>
            <div class="venue-card-body">
              <div class="venue-card-header">
                <div>
                  <div class="venue-title-row">
                    <h3>${UI.escape(venue.name)}</h3>
                    ${isSelected ? '<span class="joined-badge">已加入</span>' : ''}
                  </div>
                  <p class="venue-meta">${UI.escape(venue.address || '未填写地址')} · ${UI.escape(venue.hours || '时间待补充')}</p>
                </div>
                <span class="scene-badge">${UI.escape(venue.sceneType || '场地')}</span>
              </div>
              <div class="card-actions">
                <button class="text-btn is-primary" type="button" data-action="detail-venue" data-id="${venue.id}">查看</button>
              </div>
            </div>
          </article>
        `;
      },

      getStarFilterGroups(venues = []) {
        const prices = [...new Set(venues
          .map((venue) => Number(venue.price?.amount) || 0)
          .filter((amount) => amount > 0)
          .sort((a, b) => a - b)
          .map(String))];
        return [
          { key: 'environment', label: '环境', options: ['安静', '禁烟', '靠窗'] },
          { key: 'device', label: '设备', options: ['插座', '大桌', '音乐', '卫生间'] },
          { key: 'food', label: '美食', options: ['柠檬巴斯克'] },
          { key: 'price', label: '价格', options: prices },
          { key: 'business', label: '业态', options: ['纯咖啡', '日咖夜酒', '书店+咖啡'] },
          { key: 'pet', label: '宠物', options: ['猫', '狗'] }
        ];
      },

      getVenueTagText(venue) {
        return [...(venue.tags || []), ...(venue.customTags || [])].join(' ');
      },

      getVenueFieldValue(venue, key) {
        const groups = this.getStarFilterGroups();
        const group = groups.find((item) => item.key === key);
        if (key === 'price') return this.formatPrice(venue);
        const structuredValue = Array.isArray(venue[key]) ? venue[key].filter(Boolean) : [];
        if (structuredValue.length) return structuredValue.join('、');
        const tagText = this.getVenueTagText(venue);
        const matched = group?.options.filter((option) => tagText.includes(option)) || [];
        return matched.join('、') || '-';
      },

      getVenueFieldEditValue(venue, key) {
        if (key === 'price') {
          const amount = Number(venue.price?.amount) || 0;
          return amount > 0 ? String(amount) : '';
        }
        const value = this.getVenueFieldValue(venue, key);
        return value === '-' ? '' : value;
      },

      getCategoryOptions() {
        return this.getStarFilterGroups()
          .filter((group) => group.key !== 'price')
          .flatMap((group) => group.options);
      },

      getUncategorizedTags(venue) {
        const categoryOptions = new Set(this.getCategoryOptions());
        return [...(venue.tags || []), ...(venue.customTags || [])]
          .filter((tag) => tag && !categoryOptions.has(tag));
      },

      getVenueInfoRows(venue) {
        return [
          ['名称', venue.name || '-'],
          ['地点', venue.address || '-'],
          ['时间', venue.hours || '-'],
          ['场景', venue.sceneType || '-'],
          ['环境', this.getVenueFieldValue(venue, 'environment')],
          ['设备', this.getVenueFieldValue(venue, 'device')],
          ['美食', this.getVenueFieldValue(venue, 'food')],
          ['价格', this.getVenueFieldValue(venue, 'price')],
          ['业态', this.getVenueFieldValue(venue, 'business')],
          ['宠物', this.getVenueFieldValue(venue, 'pet')],
          ['备注', venue.notes || '-']
        ];
      },

      readStep12Form(venue) {
        const form = document.getElementById('star-step12-form');
        if (!form) return venue;
        const formData = new FormData(form);
        const readText = (name) => String(formData.get(name) || '').trim();
        const environment = this.parseTags(readText('environment'));
        const device = this.parseTags(readText('device'));
        const food = this.parseTags(readText('food'));
        const business = this.parseTags(readText('business'));
        const pet = this.parseTags(readText('pet'));
        const amountText = readText('priceAmount');
        const amountMatch = amountText.match(/\d+(\.\d+)?/);
        const priceAmount = amountMatch ? Number(amountMatch[0]) : 0;
        const uncategorizedTags = this.getUncategorizedTags(venue);
        return {
          ...venue,
          name: readText('name') || venue.name,
          address: readText('address'),
          hours: readText('hours'),
          sceneType: readText('sceneType') || '其他',
          environment,
          device,
          food,
          business,
          pet,
          tags: [...new Set([...environment, ...device])],
          customTags: [...new Set([...uncategorizedTags, ...food, ...business, ...pet])],
          price: {
            amount: priceAmount,
            unit: venue.price?.unit || '杯'
          },
          notes: readText('notes')
        };
      },

      matchesStarFilters(venue) {
        return Object.entries(this.starFilters).every(([key, value]) => {
          if (!value) return true;
          if (key === 'price') {
            return String(Number(venue.price?.amount) || '') === value;
          }
          return this.getVenueTagText(venue).includes(value);
        });
      },

      handleInput(event) {
        if (event.target.id !== 'star-search') return;
        this.query = event.target.value;
        this.renderList();
      },

      handleChange(event) {
        const key = event.target.dataset.filterKey;
        if (!key) return;
        this.starFilters = {
          ...this.starFilters,
          [key]: event.target.value
        };
        this.renderList();
      },

      handleClick(event) {
        const trigger = event.target.closest('[data-action]');
        if (!trigger) return;
        if (trigger.dataset.action === 'open-channel') {
          this.openChannel(trigger.dataset.channel, trigger.dataset.query);
          return;
        }
        this.runAction(trigger.dataset.action, trigger.dataset.id);
      },

      handleModalClick(event) {
        const trigger = event.target.closest('[data-action]');
        if (!trigger) return;
        if (trigger.dataset.action === 'pick-add-star') {
          PickManager.addStarVenue(trigger.dataset.id);
          return;
        }
        if (trigger.dataset.action === 'pick-new-venue') {
          StarManager.openForm('', { addToPick: true });
          return;
        }
        if (trigger.dataset.action === 'pick-open-star-list') {
          PickManager.openStarPickerList();
          return;
        }
        this.runAction(trigger.dataset.action, trigger.dataset.id);
      },

      async handleSubmit(event) {
        if (event.target.id === 'star-step12-form') {
          event.preventDefault();
          this.confirmStep12();
          return;
        }
        if (event.target.id === 'channel-link-form') {
          event.preventDefault();
          const formData = new FormData(event.target);
          const link = String(formData.get('link') || '').trim();
          console.info('[PickPick] channel submit', {
            owner: event.target.dataset.owner,
            venueId: event.target.dataset.venueId,
            channel: event.target.dataset.channel,
            linkLength: link.length,
            backendConfigured: BackendClient.isConfigured()
          });
          if (event.target.dataset.owner === 'pick') {
            await PickManager.saveChannelLink(event.target.dataset.venueId, event.target.dataset.channel, link);
          } else {
            await this.saveChannelLink(event.target.dataset.venueId, event.target.dataset.channel, link);
          }
          return;
        }
        if (event.target.id !== 'venue-form') return;
        event.preventDefault();
        this.saveFromForm(event.target);
      },

      runAction(action, id) {
        const actions = {
          'new-venue': () => this.openForm(),
          'edit-venue': () => this.openForm(id),
          'detail-venue': () => this.openDetail(id),
          'delete-venue': () => this.deleteVenue(id),
          'add-to-pick': () => this.addToPick(id),
          'back-star-list': () => this.goStep1(),
          'confirm-star-info': () => this.confirmStep12(),
          'clear-star-info': () => this.clearStep12Info(),
          'clear-search': () => {
            this.query = '';
            this.render();
          },
          'close-modal': () => UI.closeModal()
        };
        if (actions[action]) actions[action]();
      },

      openForm(venueId = '', options = {}) {
        const venue = venueId ? Storage.loadVenues().find((item) => item.id === venueId) : null;
        const isNewVenue = !venue;
        const shouldAddToPick = Boolean(options.addToPick);
        const completeTarget = options.addToPick ? 'pick' : (isNewVenue ? 'star' : '');
        const model = venue || {
          id: '',
          name: '',
          address: '',
          hours: '',
          price: { amount: '', unit: '日' },
          tags: [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: '',
          images: [],
          channelLinks: {},
          visitCount: 0,
          createdAt: '',
          sceneType: '自习室'
        };
        const fieldsHtml = isNewVenue ? `
          <label class="field">
            名称
            <input name="name" required value="${UI.escape(model.name)}" placeholder="例如 静思自习室">
          </label>
        ` : `
          <div class="form-grid">
            <label class="field is-full">
              名称
              <input name="name" required value="${UI.escape(model.name)}" placeholder="例如 静思自习室">
            </label>
            <label class="field is-full">
              地址
              <input name="address" value="${UI.escape(model.address)}" placeholder="例如 朝阳区建国路88号">
            </label>
            <label class="field">
              营业时间
              <input name="hours" value="${UI.escape(model.hours)}" placeholder="09:00-22:30">
            </label>
            <label class="field">
              场景
              <select name="sceneType">
                <option value="自习室" ${model.sceneType === '自习室' ? 'selected' : ''}>自习室</option>
                <option value="咖啡馆" ${model.sceneType === '咖啡馆' ? 'selected' : ''}>咖啡馆</option>
                <option value="其他" ${model.sceneType === '其他' ? 'selected' : ''}>其他</option>
              </select>
            </label>
            <label class="field">
              价格
              <input name="priceAmount" type="number" min="0" step="1" value="${UI.escape(model.price.amount)}" placeholder="39">
            </label>
            <label class="field">
              单位
              <select name="priceUnit">
                ${['日', '时', '杯', '次'].map((unit) => `<option value="${unit}" ${model.price.unit === unit ? 'selected' : ''}>${unit}</option>`).join('')}
              </select>
            </label>
            <label class="field is-full">
              设施标签
              <input name="tags" value="${UI.escape(model.tags.join('，'))}" placeholder="有插座，安静，靠窗">
            </label>
            <label class="field is-full">
              自定义标签
              <input name="customTags" value="${UI.escape(model.customTags.join('，'))}" placeholder="椅子舒服，绿植多">
            </label>
            <label class="field is-full">
              菜单/饮品
              <textarea name="menuInfo" placeholder="例如 美式 22 元，轻食 36 元，可自带水杯">${UI.escape(model.menuInfo || '')}</textarea>
            </label>
            <label class="field is-full">
              办卡信息
              <textarea name="membershipInfo" placeholder="例如 日卡 39 元，月卡 599 元，10 次卡 399 元">${UI.escape(model.membershipInfo || '')}</textarea>
            </label>
            <label class="field is-full">
              备注
              <textarea name="notes" placeholder="记录适合自己的观察">${UI.escape(model.notes)}</textarea>
            </label>
          </div>
        `;

        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">Star</p>
              <h2 class="modal-title">${venue ? '编辑场地' : '新建地点'}</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <form id="venue-form" class="venue-form" data-id="${UI.escape(model.id)}" data-add-to-pick="${shouldAddToPick ? 'true' : 'false'}" data-complete-target="${completeTarget}">
            ${fieldsHtml}
            <div class="form-actions">
              <button class="primary-btn" type="submit">${isNewVenue ? '保存并完善信息' : '保存场地'}</button>
              <button class="secondary-btn" type="button" data-action="close-modal">取消</button>
            </div>
          </form>
        `);
      },

      openDetail(venueId) {
        const venue = Storage.loadVenues().find((item) => item.id === venueId);
        if (!venue) return;
        const infoRows = this.getVenueInfoRows(venue);
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">${UI.escape(venue.sceneType || '场地')}</p>
              <h2 class="modal-title">${UI.escape(venue.name)}</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <div class="star-info-list">
            ${infoRows.map(([label, value]) => `
              <div class="star-info-row">
                <strong>${UI.escape(label)}</strong>
                <span>${UI.escape(value)}</span>
              </div>
            `).join('')}
          </div>
          <div class="modal-actions">
            <button class="primary-btn" type="button" data-action="add-to-pick" data-id="${venue.id}">加入 Pick</button>
            <button class="secondary-btn" type="button" data-action="edit-venue" data-id="${venue.id}">编辑</button>
          </div>
        `);
      },

      saveFromForm(form) {
        const formData = new FormData(form);
        const venues = Storage.loadVenues();
        const id = form.dataset.id || this.createId('v');
        const existingVenue = venues.find((venue) => venue.id === id);
        const readField = (name, fallback = '') => String(formData.get(name) ?? fallback).trim();
        const nextVenue = {
          id,
          name: readField('name'),
          address: readField('address', existingVenue?.address || ''),
          hours: readField('hours', existingVenue?.hours || ''),
          price: {
            amount: Number(formData.get('priceAmount')) || existingVenue?.price?.amount || 0,
            unit: formData.get('priceUnit') || existingVenue?.price?.unit || '日'
          },
          tags: this.parseTags(formData.get('tags') ?? existingVenue?.tags?.join('，') ?? ''),
          customTags: this.parseTags(formData.get('customTags') ?? existingVenue?.customTags?.join('，') ?? ''),
          menuInfo: readField('menuInfo', existingVenue?.menuInfo || ''),
          membershipInfo: readField('membershipInfo', existingVenue?.membershipInfo || ''),
          notes: readField('notes', existingVenue?.notes || ''),
          images: existingVenue ? existingVenue.images : [],
          channelLinks: existingVenue ? (existingVenue.channelLinks || {}) : {},
          geoPlace: existingVenue?.geoPlace || null,
          visitCount: existingVenue ? existingVenue.visitCount : 0,
          createdAt: existingVenue ? existingVenue.createdAt : new Date().toISOString().slice(0, 10),
          sceneType: formData.get('sceneType') || existingVenue?.sceneType || '自习室'
        };

        if (!nextVenue.name) {
          UI.showStatus('请先填写场地名称。');
          return;
        }

        if (!existingVenue && form.dataset.completeTarget === 'star') {
          UI.closeModal();
          this.openStep12Draft(nextVenue);
          return;
        }

        const nextVenues = existingVenue
          ? venues.map((venue) => (venue.id === id ? nextVenue : venue))
          : [nextVenue, ...venues];

        if (Storage.saveVenues(nextVenues)) {
          if (form.dataset.addToPick === 'true') {
            const currentPick = Storage.loadCurrentPick();
            Storage.saveCurrentPick({
              ...currentPick,
              selectedVenueIds: [...new Set([...currentPick.selectedVenueIds, id])]
            });
          }
          UI.closeModal();
          if (form.dataset.completeTarget === 'pick') {
            PickManager.goStep1({ selectedVenueIds: [...new Set([...Storage.loadCurrentPick().selectedVenueIds, id])] });
            UI.showStatus('新地点已加入 Pick 候选列表。', 'success');
            return;
          }
          if (form.dataset.completeTarget === 'star') {
            this.openStep12ForVenue(id);
            return;
          }
          UI.showStatus(
            form.dataset.addToPick === 'true'
              ? '新地点已加入 Pick 候选列表。'
              : (existingVenue ? '场地已更新。' : '场地已添加。'),
            'success'
          );
          App.render();
        }
      },

      deleteVenue(venueId) {
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId);
        if (!venue) return;
        if (!window.confirm(`删除「${venue.name}」？`)) return;

        const currentPick = Storage.loadCurrentPick();
        const nextSelectedVenueIds = currentPick.selectedVenueIds.filter((id) => id !== venueId);
        Storage.saveVenues(venues.filter((item) => item.id !== venueId));
        Storage.saveCurrentPick({ ...currentPick, selectedVenueIds: nextSelectedVenueIds });
        UI.closeModal();
        UI.showStatus('场地已删除。', 'success');
        App.render();
      },

      addToPick(venueId) {
        const currentPick = Storage.loadCurrentPick();
        if (currentPick.selectedVenueIds.includes(venueId)) {
          UI.showStatus('这个场地已经在 Pick 候选列表里。', 'success');
          return;
        }
        Storage.saveCurrentPick({
          ...currentPick,
          selectedVenueIds: [...currentPick.selectedVenueIds, venueId]
        });
        UI.closeModal();
        UI.showStatus('已加入 Pick 候选列表。', 'success');
        App.render();
      },

      parseTags(value) {
        return String(value || '')
          .split(/[,，、\n]/)
          .map((tag) => tag.trim())
          .filter(Boolean);
      },

      formatPrice(venue) {
        const amount = Number(venue.price?.amount) || 0;
        if (amount > 0) return `${amount}元/${venue.price.unit || '次'}`;
        return venue.price?.text || '价格待补充';
      },

      getVenueBackground(venue) {
        if (venue.images?.length) return UI.escape(venue.images[0]);
        const palettes = {
          '自习室': ['#244D43', '#2DCD9B', '书桌', '专注'],
          '咖啡馆': ['#5A4636', '#D7A86E', '咖啡', '靠窗'],
          '其他': ['#334155', '#94A3B8', '地点', '对比']
        };
        const [base, accent, label, subLabel] = palettes[venue.sceneType] || palettes['其他'];
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
            <defs>
              <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="${base}"/>
                <stop offset="1" stop-color="${accent}"/>
              </linearGradient>
            </defs>
            <rect width="800" height="480" fill="url(#bg)"/>
            <rect x="62" y="78" width="676" height="324" rx="34" fill="rgba(255,255,255,0.16)"/>
            <circle cx="642" cy="145" r="54" fill="rgba(255,255,255,0.22)"/>
            <rect x="108" y="292" width="420" height="26" rx="13" fill="rgba(255,255,255,0.32)"/>
            <rect x="108" y="336" width="280" height="22" rx="11" fill="rgba(255,255,255,0.22)"/>
            <text x="108" y="174" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="54" font-weight="700">${label}</text>
            <text x="112" y="232" fill="rgba(255,255,255,0.76)" font-family="Arial, sans-serif" font-size="30">${subLabel}</text>
          </svg>
        `.trim();
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      },

      createId(prefix) {
        return `${prefix}_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
      },

      openStep12ForVenue(venueId) {
        this.activeVenueId = venueId;
        this.step12Draft = null;
        this.viewStep = 2;
        App.switchTab('star');
      },

      openStep12Draft(venue) {
        this.step12Draft = { ...venue, channelLinks: venue.channelLinks || {} };
        this.activeVenueId = venue.id;
        this.viewStep = 2;
        App.switchTab('star');
      },

      goStep1() {
        this.viewStep = 1;
        this.activeVenueId = '';
        this.step12Draft = null;
        this.render();
      },

      getChannelName(channel) {
        const channelNames = {
          meituan: '美团',
          xiaohongshu: '小红书',
          amap: '高德',
          dianping: '大众点评'
        };
        return channelNames[channel] || '渠道';
      },

      openChannel(channel, query) {
        const venue = this.getStep12Venue();
        if (!venue) return;
        UI.openModal(`
          <div class="modal-header">
            <div>
              <p class="eyebrow">${UI.escape(this.getChannelName(channel))}</p>
              <h2 class="modal-title">粘贴信息</h2>
            </div>
            <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭">×</button>
          </div>
          <form id="channel-link-form" class="venue-form" data-owner="star" data-venue-id="${venue.id}" data-channel="${channel}">
            <p class="placeholder-text">可以保存链接；要自动提取字段，请粘贴页面复制出来的文字内容。</p>
            <label class="field">
              链接/复制内容
              <textarea name="link" rows="5" placeholder="粘贴 ${UI.escape(this.getChannelName(channel))} 链接或页面复制内容">${UI.escape(venue.channelLinks?.[channel] || '')}</textarea>
            </label>
            <div class="form-actions">
              <button class="primary-btn" type="submit">保存并提取</button>
              <button class="secondary-btn" type="button" data-action="close-modal">取消</button>
            </div>
          </form>
        `);
      },

      async saveChannelLink(venueId, channel, link) {
        console.info('[PickPick] star saveChannelLink', {
          venueId,
          channel,
          linkLength: String(link || '').length,
          hasDraft: Boolean(this.step12Draft),
          draftId: this.step12Draft?.id || '',
          backendConfigured: BackendClient.isConfigured()
        });
        if (this.step12Draft && this.step12Draft.id === venueId) {
          const baseDraft = {
            ...this.step12Draft,
            channelLinks: {
              ...(this.step12Draft.channelLinks || {}),
              [channel]: link
            }
          };
          const extraction = await BackendClient.extractVenueInfo({
            rawText: link,
            channel,
            venue: baseDraft,
            context: 'star'
          });
          const nextDraft = AIExtractor.applyToVenue(baseDraft, link, extraction.venue);
          const changedFields = AIExtractor.getChangedFields(baseDraft, nextDraft);
          this.step12Draft = {
            ...nextDraft
          };
          UI.closeModal();
          UI.showStatus(AIExtractor.getExtractionStatus(link, changedFields), 'success');
          this.renderStep12();
          return;
        }
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === venueId);
        if (!venue) {
          console.warn('[PickPick] star saveChannelLink skipped: venue not found', { venueId, channel });
          return;
        }
        const baseVenue = {
          ...venue,
          channelLinks: {
            ...(venue.channelLinks || {}),
            [channel]: link
          }
        };
        const extraction = await BackendClient.extractVenueInfo({
          rawText: link,
          channel,
          venue: baseVenue,
          context: 'star'
        });
        const nextVenue = AIExtractor.applyToVenue(baseVenue, link, extraction.venue);
        const changedFields = AIExtractor.getChangedFields(baseVenue, nextVenue);
        if (!Storage.saveVenues(venues.map((item) => (item.id === venueId ? nextVenue : item)))) return;
        UI.closeModal();
        UI.showStatus(AIExtractor.getExtractionStatus(link, changedFields), 'success');
        this.renderStep12();
      },

      confirmStep12() {
        const venue = this.getStep12Venue();
        if (!venue) return;
        const nextVenue = this.readStep12Form(venue);
        if (!nextVenue.name.trim()) {
          UI.showStatus('请先填写名称。');
          return;
        }
        if (this.step12Draft) {
          const venues = Storage.loadVenues();
          const existingIndex = venues.findIndex((item) => item.id === nextVenue.id);
          const nextVenues = existingIndex >= 0
            ? venues.map((item) => (item.id === nextVenue.id ? nextVenue : item))
            : [nextVenue, ...venues];
          if (!Storage.saveVenues(nextVenues)) return;
        } else {
          const venues = Storage.loadVenues();
          if (!Storage.saveVenues(venues.map((item) => (item.id === nextVenue.id ? nextVenue : item)))) return;
        }
        this.goStep1();
        UI.showStatus('已保存到 Star 库。', 'success');
      },

      clearStep12Info() {
        if (this.step12Draft) {
          this.step12Draft = {
            ...this.step12Draft,
            address: '',
            hours: '',
            price: { amount: 0, unit: this.step12Draft.price?.unit || '日' },
            tags: [],
            customTags: [],
            menuInfo: '',
            membershipInfo: '',
            notes: '',
            channelLinks: {}
          };
          UI.showStatus('信息已清空。', 'success');
          this.renderStep12();
          return;
        }
        const venues = Storage.loadVenues();
        const venue = venues.find((item) => item.id === this.activeVenueId);
        if (!venue) return;
        const nextVenue = {
          ...venue,
          address: '',
          hours: '',
          price: { amount: 0, unit: venue.price?.unit || '日' },
          tags: [],
          customTags: [],
          menuInfo: '',
          membershipInfo: '',
          notes: '',
          channelLinks: {}
        };
        if (!Storage.saveVenues(venues.map((item) => (item.id === venue.id ? nextVenue : item)))) return;
        UI.showStatus('信息已清空。', 'success');
        this.renderStep12();
      },

      getStep12Venue() {
        return this.step12Draft || Storage.loadVenues().find((item) => item.id === this.activeVenueId);
      },

      getSourceLinks(venue) {
        return [
          venue.sourceUrl,
          ...Object.values(venue.channelLinks || {})
        ]
          .flatMap((value) => String(value || '').match(/https?:\/\/\S+/g) || [])
          .filter(Boolean);
      },

      getExtractedLabels(venue) {
        return [
          ['address', '位置'],
          ['hours', '时间'],
          ['price', '价格'],
          ['tags', '标签'],
          ['customTags', '自定义标签'],
          ['menuInfo', '菜单'],
          ['membershipInfo', '办卡'],
          ['notes', '备注']
        ]
          .filter(([field]) => {
            const value = venue[field];
            if (field === 'price') return Number(value?.amount) > 0;
            return Array.isArray(value) ? value.length : Boolean(value);
          })
          .map(([, label]) => label);
      },

      renderSourceInfo(venue) {
        const links = [...new Set(this.getSourceLinks(venue))];
        const labels = this.getExtractedLabels(venue);
        return `
          <div class="source-info-panel" aria-label="来源与提取状态">
            <div class="star-info-row">
              <strong>来源</strong>
              <span>${links.length ? `${links.length} 个链接已保存` : '暂无来源链接'}</span>
            </div>
            ${links[0] ? `<div class="source-link">${UI.escape(links[0])}</div>` : ''}
            <p class="placeholder-text">${labels.length ? `本地已提取：${UI.escape(labels.join('、'))}` : '还没有提取到字段，可以继续粘贴页面文字。'}</p>
            <p class="placeholder-text">${UI.escape(BackendClient.getStatusText())}</p>
          </div>
        `;
      },

      renderStep12Info(venue) {
        const image = venue.images?.[0] || '';
        return `
          <form id="star-step12-form" class="star-info-panel" aria-label="场地补充信息">
            <div class="star-info-image">
              ${image ? `<img src="${UI.escape(image)}" alt="${UI.escape(venue.name)} 图片">` : '图片'}
            </div>
            <div class="star-info-list">
              <label class="star-info-row">
                <strong>名称</strong>
                <input class="star-info-input" name="name" value="${UI.escape(venue.name || '')}">
              </label>
              <label class="star-info-row">
                <strong>地点</strong>
                <input class="star-info-input" name="address" value="${UI.escape(venue.address || '')}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>时间</strong>
                <input class="star-info-input" name="hours" value="${UI.escape(venue.hours || '')}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>场景</strong>
                <select class="star-info-input" name="sceneType">
                  ${['自习室', '咖啡馆', '其他'].map((scene) => `<option value="${scene}" ${venue.sceneType === scene ? 'selected' : ''}>${scene}</option>`).join('')}
                </select>
              </label>
              <label class="star-info-row">
                <strong>环境</strong>
                <input class="star-info-input" name="environment" value="${UI.escape(this.getVenueFieldEditValue(venue, 'environment'))}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>设备</strong>
                <input class="star-info-input" name="device" value="${UI.escape(this.getVenueFieldEditValue(venue, 'device'))}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>美食</strong>
                <input class="star-info-input" name="food" value="${UI.escape(this.getVenueFieldEditValue(venue, 'food'))}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>价格</strong>
                <input class="star-info-input" name="priceAmount" value="${UI.escape(this.getVenueFieldEditValue(venue, 'price'))}" placeholder="价格待补充">
              </label>
              <label class="star-info-row">
                <strong>业态</strong>
                <input class="star-info-input" name="business" value="${UI.escape(this.getVenueFieldEditValue(venue, 'business'))}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>宠物</strong>
                <input class="star-info-input" name="pet" value="${UI.escape(this.getVenueFieldEditValue(venue, 'pet'))}" placeholder="-">
              </label>
              <label class="star-info-row">
                <strong>备注</strong>
                <textarea class="star-info-input" name="notes" rows="3" placeholder="-">${UI.escape(venue.notes || '')}</textarea>
              </label>
            </div>
          </form>
        `;
      },

      renderStep12() {
        const venue = this.getStep12Venue();
        if (!venue) {
          this.goStep1();
          return;
        }
        this.activeVenueId = venue.id;
        document.getElementById('tab-star').innerHTML = `
          <div class="star12-actions" aria-label="Star 信息补全导航">
            <button class="secondary-btn" type="button" data-action="back-star-list" aria-label="返回">←</button>
            <span></span>
            <button class="primary-btn" type="button" data-action="confirm-star-info">Save</button>
            <button class="secondary-btn" type="button" data-action="clear-star-info">Clear</button>
          </div>
          ${UI.renderHeader({ id: 'star-copy-title', text: 'Star' }, 'Paste source info and complete one place.')}
          <section class="panel pick-board">
            <div class="step2-shell">
              <div class="star-cup-card">
                <div class="star-cup">
                  <span class="star-cup-logo">logo</span>
                  <span class="star-cup-name">${UI.escape(venue.name)}</span>
                </div>
              </div>
              <div class="channel-orbit is-star12">
                ${PickManager.renderChannelCard('xiaohongshu', '小红书', '环境', venue.name, 'data-action')}
                ${PickManager.renderChannelCard('dianping', '大众点评', '价格', venue.name, 'data-action')}
              </div>
              ${this.renderStep12Info(venue)}
            </div>
          </section>
        `;
      }
    };

    const PickManager = {
      viewStep: 1,
      dateDrag: {
        strip: null,
        targetDate: '',
        startX: 0,
        startScrollLeft: 0,
        moved: false,
        active: false,
        suppressClick: false
      },
      cupDrag: {
        startX: 0,
        lastX: 0,
        moved: false,
        active: false,
        row: null
      },

      init() {
        const pickTab = document.getElementById('tab-pick');
