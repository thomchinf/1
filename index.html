<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2DCD9B">
  <title>PickPick</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <style>
    :root {
      --color-primary: #2DCD9B;
      --color-primary-dark: #159D77;
      --color-bg: #FAFAFA;
      --color-surface: #FFFFFF;
      --color-text: #1F2933;
      --color-muted: #6B7280;
      --color-line: #E5E7EB;
      --color-soft: #F2FBF8;
      --color-danger: #E5484D;
      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.06);
      --radius-card: 12px;
      --radius-control: 12px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --tab-height: 64px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      display: flex;
      justify-content: center;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--color-bg);
      overflow: hidden;
    }

    .app-main {
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 0px) + var(--space-4)) var(--space-4)
        calc(var(--tab-height) + env(safe-area-inset-bottom, 0px) + var(--space-4));
      overflow-y: auto;
    }

    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .eyebrow {
      margin: 0 0 var(--space-1);
      color: var(--color-primary-dark);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .header-copy {
      margin: var(--space-2) 0 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .panel {
      background: var(--color-surface);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--space-4);
    }

    .panel + .panel {
      margin-top: var(--space-4);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .metric {
      min-width: 0;
      border-radius: 10px;
      background: var(--color-soft);
      padding: var(--space-3);
    }

    .metric-value {
      display: block;
      color: var(--color-primary-dark);
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .metric-label {
      display: block;
      margin-top: var(--space-1);
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .data-list {
      display: grid;
      gap: var(--space-2);
      margin: var(--space-3) 0 0;
      padding: 0;
      list-style: none;
    }

    .data-list li {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      border-top: 1px solid var(--color-line);
      padding-top: var(--space-2);
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .data-list strong {
      color: var(--color-text);
      font-size: 14px;
    }

    .status-banner {
      display: none;
      margin-bottom: var(--space-4);
      border: 1px solid rgba(229, 72, 77, 0.28);
      border-radius: var(--radius-control);
      background: #FFF5F5;
      color: #A8252A;
      padding: var(--space-3);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-banner.is-visible {
      display: block;
    }

    .status-banner.is-success {
      border-color: rgba(45, 205, 155, 0.36);
      background: #ECFDF5;
      color: #13765A;
    }

    .search-field,
    .field {
      display: grid;
      gap: var(--space-2);
    }

    .search-field {
      margin-bottom: var(--space-4);
    }

    label {
      color: var(--color-text);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-control);
      background: #FFFFFF;
      color: var(--color-text);
      padding: 10px 12px;
      outline: none;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(45, 205, 155, 0.16);
    }

    .venue-list {
      display: grid;
      gap: var(--space-3);
      margin-top: var(--space-4);
    }

    .venue-card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: minmax(96px, 1fr) auto;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      background-position: center;
      background-size: cover;
      box-shadow: var(--shadow-card);
      color: #FFFFFF;
      isolation: isolate;
      min-height: 240px;
    }

    .venue-card::before {
      position: absolute;
      inset: 0;
      z-index: -1;
      content: "";
      background: linear-gradient(180deg, rgba(31, 41, 51, 0.04) 0%, rgba(31, 41, 51, 0.12) 42%, rgba(31, 41, 51, 0.82) 100%);
    }

    .venue-card::after {
      position: absolute;
      inset: 0;
      z-index: -2;
      content: "";
      background: #1F2933;
    }

    .venue-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-2);
    }

    .venue-card-body {
      align-self: end;
      display: grid;
      gap: var(--space-2);
      margin: var(--space-3);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      background: rgba(31, 41, 51, 0.54);
      padding: var(--space-3);
      backdrop-filter: blur(10px);
    }

    .venue-card h3,
    .modal-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
    }

    .venue-card h3 {
      font-size: 16px;
    }

    .venue-meta,
    .detail-row {
      margin: 0;
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .venue-card .venue-meta {
      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      line-height: 1.35;
    }

    .scene-badge {
      flex: 0 0 auto;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      color: #FFFFFF;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      border-radius: 999px;
      background: #F3F4F6;
      color: var(--color-muted);
      padding: 4px 7px;
      font-size: 11px;
      line-height: 1.2;
    }

    .tag.is-primary {
      background: var(--color-soft);
      color: var(--color-primary-dark);
      font-weight: 700;
    }

    .tag.is-muted {
      background: #E5E7EB;
      color: #9CA3AF;
      text-decoration: line-through;
    }

    .venue-card .tag {
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
    }

    .venue-card .tag.is-primary {
      background: rgba(45, 205, 155, 0.88);
      color: #FFFFFF;
    }

    .card-actions,
    .form-actions,
    .modal-actions {
      display: grid;
      gap: var(--space-2);
    }

    .card-actions {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .text-btn,
    .danger-btn {
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.16);
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .text-btn.is-primary {
      border-color: rgba(45, 205, 155, 0.56);
      background: rgba(45, 205, 155, 0.9);
      color: #FFFFFF;
    }

    .danger-btn {
      border-color: rgba(255, 255, 255, 0.22);
      color: #FFE3E3;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.56;
    }

    .empty-state {
      display: grid;
      gap: var(--space-3);
      border: 1px dashed var(--color-line);
      border-radius: var(--radius-card);
      background: #FFFFFF;
      padding: var(--space-5);
      text-align: center;
    }

    .empty-state p {
      margin: 0;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .modal-container {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
    }

    .modal-container.is-open {
      display: block;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(31, 41, 51, 0.42);
    }

    .modal-sheet {
      position: absolute;
      left: 50%;
      bottom: 0;
      display: grid;
      gap: var(--space-4);
      width: 100%;
      max-width: 430px;
      max-height: min(88vh, 760px);
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      background: #FFFFFF;
      padding: var(--space-5) var(--space-4) calc(var(--space-5) + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .modal-close {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      min-height: 40px;
      border: 0;
      border-radius: 50%;
      background: #F3F4F6;
      color: var(--color-muted);
      font-size: 22px;
      line-height: 1;
    }

    .venue-form {
      display: grid;
      gap: var(--space-4);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .form-grid .field.is-full {
      grid-column: 1 / -1;
    }

    .pick-step {
      display: grid;
      gap: var(--space-3);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .pick-board {
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
    }

    #tab-pick .app-header {
      margin-bottom: var(--space-3);
    }

    #tab-pick h1 {
      font-size: 24px;
      font-weight: 500;
    }

    #tab-pick .header-copy {
      margin-top: var(--space-2);
      color: #111111;
      font-size: 11px;
      font-weight: 600;
    }

    #tab-pick .eyebrow {
      visibility: hidden;
      height: 18px;
      margin: 0 0 var(--space-2);
    }

    .pick-topbar {
      display: block;
    }

    .pick-location {
      display: grid;
      gap: 4px;
    }

    .pick-location label,
    .station-title,
    .select-title {
      color: var(--color-text);
      font-size: 11px;
      font-weight: 800;
      text-transform: lowercase;
    }

    .pick-location input {
      min-height: 34px;
      border: 0;
      border-bottom: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      padding: 4px 0;
      font-size: 13px;
    }

    .pick-arrow-btn {
      width: 38px;
      height: 24px;
      min-height: 24px;
      border: 0;
      border-radius: 999px;
      background: #D8D8D8;
      color: #111111;
      font-weight: 900;
    }

    .pick-arrow-btn:disabled {
      opacity: 0.35;
    }

    .step2-nav {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      min-height: 32px;
      margin-bottom: -12px;
    }

    .step2-nav .pick-arrow-btn:first-child {
      grid-column: 1;
    }

    .step2-nav .pick-arrow-btn:last-child {
      grid-column: 3;
    }

    .date-strip {
      display: flex;
      gap: var(--space-2);
      overflow-x: auto;
      padding: var(--space-2) 0 var(--space-3);
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
    }

    .date-strip.is-dragging {
      cursor: grabbing;
      scroll-snap-type: none;
    }

    .date-picker {
      display: grid;
      gap: var(--space-2);
    }

    .date-month-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }

    .date-month-controls select {
      min-height: 34px;
      border: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      color: #111111;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .date-strip::-webkit-scrollbar {
      display: none;
    }

    .date-item {
      flex: 0 0 44px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #111111;
      padding: 7px 4px;
      text-align: center;
      scroll-snap-align: center;
      transition: background 0.16s ease, transform 0.16s ease, color 0.16s ease;
    }

    .date-item strong,
    .date-item span {
      display: block;
      line-height: 1.1;
    }

    .date-item strong {
      font-size: 17px;
      font-weight: 500;
    }

    .date-item span {
      margin-top: 3px;
      font-size: 10px;
      text-transform: uppercase;
    }

    .date-item.is-active {
      background: #CFCFCF;
      transform: translateY(-1px);
    }

    .date-item.is-today strong {
      color: var(--color-primary-dark);
      font-weight: 800;
    }

    .date-item.is-active strong {
      color: #111111;
      font-weight: 800;
    }

    .inline-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }

    .weather-card {
      min-height: 124px;
      border: 0;
      border-radius: 20px;
      background: #D8D8D8;
      padding: var(--space-4);
      color: #111111;
      font-size: 11px;
      line-height: 1.5;
    }

    .weather-card strong {
      display: block;
      margin-bottom: var(--space-2);
      font-size: 11px;
      font-weight: 800;
      text-transform: lowercase;
    }

    .weather-card span {
      display: block;
    }

    .pick-columns {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(104px, 0.75fr);
      gap: var(--space-3);
      align-items: stretch;
    }

    .station-panel,
    .select-panel {
      min-height: 156px;
      border-radius: 18px;
      background: #D8D8D8;
      padding: var(--space-3);
    }

    .station-panel {
      display: grid;
      gap: var(--space-2);
      align-content: start;
    }

    .station-actions {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: var(--space-2);
      align-items: center;
    }

    .station-add-btn,
    .station-step-btn {
      min-height: 28px;
      border: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      color: #111111;
      font-size: 12px;
      font-weight: 700;
    }

    .station-step-btn {
      border-color: var(--color-primary);
      color: var(--color-primary-dark);
    }

    .station-step-btn:disabled {
      border-color: #A8A8A8;
      color: #8B8B8B;
      opacity: 0.65;
    }

    .selected-list,
    .star-picker-list {
      display: grid;
      gap: var(--space-2);
    }

    .selected-item,
    .star-picker-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 6px;
      border: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      padding: 6px 8px;
    }

    .selected-item h3,
    .star-picker-item h3 {
      margin: 0;
      font-size: 11px;
      line-height: 1.35;
    }

    .selected-item p,
    .star-picker-item p {
      margin: 3px 0 0;
      color: #333333;
      font-size: 10px;
      line-height: 1.35;
    }

    .mini-btn {
      min-height: 34px;
      border: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      color: var(--color-text);
      padding: 0 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .mini-btn.is-primary {
      border-color: rgba(45, 205, 155, 0.36);
      background: var(--color-soft);
      color: var(--color-primary-dark);
    }

    .mini-btn.is-danger {
      border-color: rgba(229, 72, 77, 0.24);
      color: var(--color-danger);
    }

    .condition-grid {
      display: grid;
      gap: 6px;
      margin-top: var(--space-2);
    }

    .condition-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 16px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--color-text);
      padding: 0;
      font-size: 10px;
      font-weight: 600;
    }

    .condition-pill input {
      width: 10px;
      min-height: 10px;
      accent-color: #111111;
    }

    .custom-condition-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-top: var(--space-2);
    }

    .custom-condition-form input {
      min-height: 30px;
      border: 1px solid #111111;
      border-radius: 0;
      background: transparent;
      font-size: 11px;
    }

    .step-footer {
      display: grid;
      gap: var(--space-2);
      margin-top: var(--space-1);
    }

    #tab-pick .step-footer .primary-btn {
      min-height: 40px;
      border-radius: 999px;
    }

    .step2-shell {
      display: grid;
      gap: var(--space-4);
      min-height: 560px;
      overflow: hidden;
    }

    .step2-title {
      display: block;
    }

    .step2-title h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 500;
    }

    .step2-title p {
      margin: 0;
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .channel-orbit {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      align-items: start;
      padding: var(--space-2) 0;
    }

    .channel-dot {
      display: grid;
      justify-items: center;
      gap: 8px;
      border: 0;
      background: transparent;
      color: #111111;
      padding: 0;
      text-align: center;
    }

    .channel-dot em {
      display: block;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #D8D8D8;
      font-style: normal;
    }

    .channel-dot strong {
      display: block;
      font-size: 11px;
      line-height: 1.2;
    }

    .venue-carousel {
      position: relative;
      min-height: 210px;
      margin: 0 calc(var(--space-4) * -1);
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 62%, rgba(255,255,255,0.22) 0 54px, transparent 55px),
        linear-gradient(180deg, #ECECEC 0 44%, #DCDCDC 44% 100%);
      cursor: grab;
      user-select: none;
    }

    .venue-carousel.is-dragging {
      cursor: grabbing;
    }

    .venue-carousel::before {
      position: absolute;
      left: -15%;
      right: -15%;
      top: -58px;
      height: 140px;
      border-radius: 50%;
      background: #F4F4F4;
      content: "";
    }

    .venue-cup-row {
      position: absolute;
      inset: 42px -98px 0;
      display: grid;
      grid-template-columns: repeat(3, 190px);
      justify-content: center;
      align-items: end;
      gap: 36px;
      transform: translateX(0);
      transition: transform 0.22s ease;
      will-change: transform;
    }

    .venue-carousel.is-dragging .venue-cup-row {
      transition: none;
    }

    .venue-cup {
      position: relative;
      height: 156px;
      color: #0F172A;
      text-align: center;
      opacity: 0.55;
    }

    .venue-cup.is-active {
      opacity: 1;
    }

    .venue-cup::before {
      position: absolute;
      left: 42px;
      right: 42px;
      top: 18px;
      bottom: 8px;
      border: 1.5px solid #0F172A;
      border-radius: 26px 26px 36px 36px;
      content: "";
    }

    .venue-cup::after {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 50px;

    const DEFAULT_CURRENT_PICK = {
      date: '2026-07-07',
